function Schedule({G}){
  const [boxGame,setBoxGame]=useState(null);
  const uid2=G.userTeamId;
  const rivalId=G.teams[uid2].rivalId;
  const games=[];
  G.schedule.forEach((day,di)=>{ const g=day.find(x=>x.home===uid2||x.away===uid2); if(g) games.push({di,g}); });
  const offDays = G.schedule.length - games.length;
  return (
    <Card>
      <div className="flex items-baseline justify-between mb-2">
        <h3 className="font-bold">Season Schedule — {G.teams[uid2].name}</h3>
        <span className="text-xs text-slate-500">{games.length} games · {offDays} off days · <span className="text-rose-300">⚔ rival</span></span>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-1 text-sm">
        {games.map(({di,g})=>{
          const home=g.home===uid2; const opp=G.teams[home?g.away:g.home];
          const win=g.played?((home?g.hs>g.as:g.as>g.hs)?"W":"L"):null;
          const isRival = opp.id===rivalId;
          const canBox = g.played && g.box;
          return (
            <div key={di} onClick={canBox?()=>setBoxGame(g.box):undefined}
              title={canBox?"View box score":undefined}
              className={"flex items-center gap-2 px-2 py-1 rounded "+(canBox?"cursor-pointer hover:ring-1 hover:ring-emerald-600/60 ":"")+(di===G.day?"bg-emerald-900/40":isRival?"bg-rose-950/40 border border-rose-900/40":"bg-[#13203a]")}>
              <span className="text-slate-500 text-xs w-8">{di+1}</span>
              <span className="text-slate-400 text-xs w-6">{home?"vs":"@"}</span>
              <span className="flex-1 truncate">{isRival&&<span className="text-rose-400">⚔ </span>}{opp.abbr} {opp.nick}</span>
              {g.played && <span className={"text-xs font-bold "+(win==="W"?"text-emerald-400":"text-red-400")}>{win} {home?g.hs:g.as}-{home?g.as:g.hs}</span>}
              {canBox && <span className="text-slate-600 text-[10px]">▦</span>}
            </div>
          );
        })}
      </div>
      {boxGame && <BoxScore G={G} box={boxGame} onClose={()=>setBoxGame(null)} />}
    </Card>
  );
}

/* ----------------------------- Finances -------------------------------- */
// terms a player will re-sign for. winning teams get a hometown discount; losing
// teams pay a premium, and a star on a losing club would rather test free agency.
function extensionTerms(G, p){
  // for AAA players, resolve to the parent MLB team for win% discount logic
  const team = isAAAId(p.teamId) ? G.teams[parentIdOf(p.teamId)] : G.teams[p.teamId];
  // until there's a real sample of games, treat the club as neutral (.500)
  const wpct = (team && (team.w+team.l)>=20) ? pct(team) : 0.5;
  const market = salaryFor(p);
  // morale: a happy player gives a hometown discount, an unhappy one demands a premium / won't extend
  const moodF = 1 - ((p.morale!=null?p.morale:60)-60)/300;   // morale 90→×0.90, morale 30→×1.10
  const factor = clamp((1.18 - wpct*0.55)*moodF, 0.78, 1.30);
  const salary = clamp(round(market*factor*10)/10, 0.7, 60);
  const years = p.age>=33 ? 2 : p.age>=30 ? 3 : 4;
  const refuses = (wpct < 0.40 && p.ovr >= 75) || (p.morale!=null && p.morale<=20 && p.ovr>=72);
  return { market, salary, years, factor, refuses, discountPct: round((1-factor)*100) };
}

/* ---- Contract negotiation modal (sign a FA / extend your own player) ---- */
const DEFAULT_NEED = { HR:25, RBI:80, H:150, R:80, SB:25, AVG:290, W:14, SO:180, SV:30, QS:18, IP:180 };
function ContractModal({G, p, mode, capSpace, factor, refuses, onClose, onSign, tShow, bestOffer, userSit}){
  const ask=contractAsk(p);
  const [years,setYears]=useState(ask.years);
  const [aav,setAav]=useState(Math.max(0.5, round(ask.fairAAV*(factor||1)*10)/10));
  const [incs,setIncs]=useState([]);
  const isP=p.isP;
  const statOpts=Object.entries(STAT_INCENTIVES).filter(([k,v])=>v.hit!==isP);
  const addInc=()=>{ const d=statOpts[0]; setIncs([...incs,{stat:d[0], need:DEFAULT_NEED[d[0]]||10, amount:1.0}]); };
  const updInc=(i,k,v)=>{ const a=incs.slice(); a[i]={...a[i],[k]:v}; setIncs(a); };
  const delInc=(i)=>setIncs(incs.filter((_,j)=>j!==i));
  const incTotal=incs.reduce((s,x)=>s+(+x.amount||0),0);
  const required=requiredAAV(p, years, factor);
  const neededBase=Math.max(0.5, round((required-0.5*incTotal)*10)/10);
  const capProblem = mode==="sign" && +aav>capSpace+0.001;
  // competing market offer: the player picks the best FIT, so the user must out-bid (money/
  // years, with a slight winner nudge baked into offerFit) to beat a rival's standing offer.
  const rivalTeam = bestOffer ? teamById(G, bestOffer.teamId) : null;
  const userFit = (mode==="sign" && bestOffer) ? offerFit(p, {aav:+aav, years}, userSit) : null;
  const beatsMarket = !bestOffer || (userFit >= bestOffer.fit - 0.001);
  // he signs once the offer (base + half the incentives) meets his ask, fits the cap, AND beats the market
  const accepts = !refuses && +aav>=0.5 && willSign(p, +aav, years, incTotal, factor) && !capProblem && beatsMarket;
  const inp="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm";
  const offer=()=>{
    if(refuses){ tShow&&tShow(`${p.name} wants to test free agency`); return; }
    if(capProblem){ tShow&&tShow(`Not enough cap space (base ${money(+aav)})`); return; }
    if(!willSign(p, +aav, years, incTotal, factor)){ tShow&&tShow(`${p.name} wants more — try ~${money(neededBase)}/yr base`); return; }
    if(!beatsMarket){ tShow&&tShow(`${p.name} prefers ${rivalTeam?rivalTeam.abbr:"another club"}'s offer — beat ${bestOffer.years}y · ${money(bestOffer.aav)}/yr`); return; }
    onSign(+aav, years, incs.map(x=>({stat:x.stat, need:+x.need, amount:+x.amount, label:(STAT_INCENTIVES[x.stat]||{}).label||"bonus"})));
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-lg w-full max-h-[88vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1">
            <div className="font-bold">{mode==="sign"?"Sign":"Extend"} {p.name}</div>
            <div className="text-xs text-slate-400">{p.pos} · Age {p.age} · OVR {p.ovr} · POT {p.pot} · seeks ~{money(ask.fairAAV*(factor||1))}/yr</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {refuses && <div className="text-sm text-red-300 bg-red-900/20 border border-red-800/40 rounded p-2 mb-2">He won't talk extension on a losing club — win more, or let him test free agency.</div>}
        {bestOffer && rivalTeam && <div className={"text-xs rounded p-2 mb-2 border "+(beatsMarket?"text-emerald-300 bg-emerald-900/15 border-emerald-800/40":"text-amber-300 bg-amber-900/15 border-amber-800/40")}>
          💰 Competing offer — <b>{rivalTeam.abbr}</b>: {bestOffer.years}y · {money(bestOffer.aav)}/yr. {beatsMarket?"Your offer is winning the bidding.":"He prefers their deal — raise your salary/years to win him over."}
        </div>}
        <div className="grid grid-cols-2 gap-3 mb-3">
          <label className="text-xs text-slate-400">Years
            <div className="flex items-center gap-2 mt-1">
              <button onClick={()=>setYears(Math.max(1,years-1))} className="px-2 bg-[#16213a] rounded">−</button>
              <span className="tnum font-bold text-slate-100 w-6 text-center">{years}</span>
              <button onClick={()=>setYears(Math.min(8,years+1))} className="px-2 bg-[#16213a] rounded">+</button>
            </div>
          </label>
          <label className="text-xs text-slate-400">Salary $M/yr (base)
            <input type="number" step="0.1" min="0.5" value={aav} onChange={e=>setAav(e.target.value)} className={inp+" w-full mt-1"} />
          </label>
        </div>
        <div className="text-xs text-slate-400 mb-1 flex items-center justify-between">
          <span>Performance incentives <span className="text-slate-600">(off-cap; count ½ toward his ask)</span></span>
          <button onClick={addInc} className="px-2 py-0.5 bg-[#16213a] rounded hover:bg-[#1c2c4a] text-emerald-300">+ add</button>
        </div>
        <div className="space-y-1 mb-3">
          {incs.length===0 && <div className="text-xs text-slate-600">No incentives. Add stat bonuses to sweeten the deal for less guaranteed money.</div>}
          {incs.map((x,i)=>(
            <div key={i} className="flex items-center gap-1.5 text-xs bg-[#13203a] rounded px-2 py-1">
              <span className="text-emerald-400">+{money(+x.amount||0)}</span>
              <span className="text-slate-500">if</span>
              <select value={x.stat} onChange={e=>updInc(i,"stat",e.target.value)} className={inp}>
                {statOpts.map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
              <span className="text-slate-500">≥</span>
              <input type="number" value={x.need} onChange={e=>updInc(i,"need",e.target.value)} className={inp+" w-16"} />
              <span className="text-slate-500 ml-1">$</span>
              <input type="number" step="0.1" value={x.amount} onChange={e=>updInc(i,"amount",e.target.value)} className={inp+" w-14"} />
              <button onClick={()=>delInc(i)} className="ml-auto text-red-400 hover:text-red-300">×</button>
            </div>
          ))}
        </div>
        <div className="flex items-center justify-between text-sm border-t border-[#1d2940] pt-2 mb-2">
          <div className="text-slate-400 text-xs">
            Guaranteed <b className="text-slate-200">{money((+aav||0)*years)}</b> over {years}y
            {incTotal>0 && <span> · up to <b className="text-slate-200">{money(((+aav||0)+incTotal)*years)}</b> w/ incentives</span>}
          </div>
          <div className={accepts?"text-emerald-400 font-semibold":"text-amber-400"}>
            {refuses?"Refusing":accepts?"✅ He'll sign":capProblem?"⛔ Over budget":`💬 Wants ~${money(neededBase)}/yr`}
          </div>
        </div>
        <button onClick={offer} disabled={!accepts} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold disabled:opacity-40 disabled:cursor-not-allowed">
          {mode==="sign"?"Sign Contract":"Offer Extension"}
        </button>
      </div>
    </div>
  );
}

/* ---- Restructure modal: defer current-year money to later years (+premium) ---- */
function RestructureModal({G, p, onClose, onApply, tShow}){
  const cur=(p.contract||[p.salary]).slice();
  const laterYears=cur.length-1;
  const maxMove=Math.max(0, round((cur[0]-0.5)*10)/10);
  const [move,setMove]=useState(Math.round(maxMove*5)/10);  // default ~half
  const PREMIUM=0.10;
  const mv=clamp(+move||0, 0, maxMove);
  const deferred=mv*(1+PREMIUM);
  const perLater=laterYears>0?deferred/laterYears:0;
  const sched=cur.map((v,i)=> i===0 ? round((v-mv)*10)/10 : round((v+perLater)*10)/10);
  const apply=()=>{ if(laterYears<=0){ tShow&&tShow("Need 2+ years left to restructure"); return; } if(mv<=0){ tShow&&tShow("Move some money first"); return; } onApply(sched); };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-md w-full" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1"><div className="font-bold">Restructure {p.name}</div><div className="text-xs text-slate-400">Defer current-year salary to later years (+10% premium he pockets)</div></div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {laterYears<=0 ? <div className="text-sm text-slate-400">He's in the last year of his deal — nothing to restructure.</div> : <>
          <label className="text-xs text-slate-400">Move from this year: <b className="text-slate-100">{money(mv)}</b> (max {money(maxMove)})</label>
          <input type="range" min="0" max={maxMove} step="0.1" value={mv} onChange={e=>setMove(e.target.value)} className="w-full my-2" />
          <div className="grid grid-cols-2 gap-3 text-sm mb-3">
            <div><div className="text-xs text-slate-500 mb-1">Now</div>{cur.map((v,i)=><div key={i} className="tnum">Yr{i+1}: {money(v)}</div>)}</div>
            <div><div className="text-xs text-slate-500 mb-1">After</div>{sched.map((v,i)=><div key={i} className={"tnum "+(i===0?"text-emerald-400":"text-slate-300")}>Yr{i+1}: {money(v)}</div>)}</div>
          </div>
          <div className="text-xs text-slate-400 mb-2">Frees <b className="text-emerald-400">{money(mv)}</b> in cap now · adds {money(deferred)} (incl. +{money(deferred-mv)} premium) to later years. Total +{money(deferred-mv)}.</div>
          <button onClick={apply} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold">Restructure (he agrees)</button>
        </>}
      </div>
    </div>
  );
}

function Finances({G, commit, tShow}){
  const team=G.teams[G.userTeamId];
  // MLB + AAA org — users need to see and extend AAA players too
  const ros = rosterOf(G,team.id).concat(rosterOf(G,aaaIdOf(team.id))).sort((a,b)=>b.salary-a.salary);
  const total=payroll(G,team.id);
  const space=team.budget-total;
  const [extendT,setExtendT]=useState(null);       // player being extended (ContractModal)
  const [restructT,setRestructT]=useState(null);   // player being restructured
  const extFactor=p=>extensionTerms(G,p);
  const doExtend=(p, aav, years, incs)=>{
    const spaceAfter = team.budget - (payroll(G,team.id) - p.salary) - aav;
    if(spaceAfter<0){ tShow(`Not enough budget — that's ${money(aav)}/yr`); return; }
    setContract(p, aav, years, incs);
    const it=incentivesPerYear(p);
    logNews(G,"signing",`${team.abbr} extended ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}${it?` +${money(it)}/yr inc`:""}`, team.id);
    setExtendT(null); commit(G); tShow(`✅ ${p.name} extended`);
  };
  const doRestruct=(p, sched)=>{
    p.contract=sched.slice(); p.salary=sched[0]; p.years=sched.length; p.incentive=incentivesPerYear(p);
    logNews(G,"signing",`${team.abbr} restructured ${p.name}'s deal — ${money(sched[0])} cap hit this year`, team.id);
    setRestructT(null); commit(G); tShow(`✅ Restructured ${p.name}`);
  };
  return (
    <div className="space-y-4">
      <div className="grid sm:grid-cols-3 gap-3">
        <Card><div className="text-slate-400 text-xs">BUDGET</div><div className="text-2xl font-bold tnum">{money(team.budget)}</div>{team.budgetDelta?<div className={"text-xs "+(team.budgetDelta>0?"text-emerald-400":"text-red-400")}>{team.budgetDelta>0?"▲ +":"▼ "}{team.budgetDelta} vs last yr</div>:<div className="text-xs text-slate-500">revenue grows as you win</div>}</Card>
        <Card><div className="text-slate-400 text-xs">ATTENDANCE</div><div className="text-2xl font-bold tnum">{team.attendance?(team.attendance/1000).toFixed(1)+"K":"—"}</div><div className="text-xs text-slate-500">{team.attendance?`${Math.round((team.attFill||0)*100)}% of ${((team.ballpark&&team.ballpark.capacity||0)/1000).toFixed(0)}K · winning fills seats`:"set after your first season"}</div></Card>

/* ----------------------------- Trades ---------------------------------- */
function Trades({G, commit, tShow, tradeFocus, setTradeFocus}){
  const me = G.teams[G.userTeamId];
  const [otherId, setOtherId] = useState(G.teams.find(t=>t.id!==me.id).id);
  const [give, setGive] = useState([]);      // player ids
  const [get, setGet] = useState([]);
  const [givePk, setGivePk] = useState([]);  // pick ids
  const [getPk, setGetPk] = useState([]);
  const [modal, setModal] = useState(null);  // player whose stats we're viewing
  const [shopId, setShopId] = useState(null);     // player being shopped
  const [shopOffers, setShopOffers] = useState(null);
  const other = G.teams[otherId];
  const reset = ()=>{ setGive([]); setGet([]); setGivePk([]); setGetPk([]); };
  const gaugeInterest = (pid)=>{ const p=G.players[pid]; setShopId(pid); setShopOffers(p?shopPlayer(G,p):[]); };
  const acceptShop = (o)=>{ const youGet=o.give.map(id=>G.players[id]&&G.players[id].name).filter(Boolean).join(", ");
    const tgt=G.players[o.get[0]]; executeOffer(G,o);
    logNews(G,"trade",`${me.abbr} traded ${tgt?tgt.name:"a player"} to ${G.teams[o.fromId].abbr} for ${youGet}`, me.id);
    setShopOffers(null); setShopId(null); commit(G); tShow("✅ Trade completed!"); };
  const toggleBlock = (pid)=>{ const p=G.players[pid]; if(!p) return; p.onBlock=!p.onBlock; commit(G); tShow(p.onBlock?`${p.name} placed on the block`:`${p.name} off the block`); };

  // Arrive here from the Players tab's "Trade" button: pre-select that player's
  // club and drop him straight into the "acquire" list — no re-searching.
  useEffect(()=>{
    if(tradeFocus==null) return;
    const p = G.players[tradeFocus];
    // only MLB/AAA org players can be traded — college amateurs (and FAs) are not tradeable
    if(p && p.teamId!=null && !isCollegeId(p.teamId)){
      const orgId = isAAAId(p.teamId) ? parentIdOf(p.teamId) : p.teamId;
      if(orgId!==me.id && G.teams[orgId]){ setOtherId(orgId); setGive([]); setGivePk([]); setGetPk([]); setGet([p.id]); }
    }
    if(setTradeFocus) setTradeFocus(null);
  }, [tradeFocus]);

  // players: MLB roster + AAA affiliate, AAA tagged
  const orgPlayers = mlbId => rosterOf(G,mlbId).concat(rosterOf(G,aaaIdOf(mlbId))).sort((a,b)=>b.ovr-a.ovr);
  const myRos = orgPlayers(me.id), otRos = orgPlayers(other.id);
  const myPicks = (G.picks||[]).filter(pk=>pk.owner===me.id).sort((a,b)=>a.season-b.season||a.round-b.round);
  const otPicks = (G.picks||[]).filter(pk=>pk.owner===other.id).sort((a,b)=>a.season-b.season||a.round-b.round);
  const toggle=(arr,set,id)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  const giveVal = give.reduce((s,id)=>s+playerValue(G.players[id]),0) + givePk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:me.id}),0);
  const getVal  = get.reduce((s,id)=>s+playerValue(G.players[id]),0)  + getPk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:other.id}),0);

  const deadlinePassed = G.phase==="regular" && G.day>G.tradeDeadline;
  const propose=()=>{
    if(deadlinePassed){ tShow("⛔ The trade deadline has passed"); return; }
    if(!give.length && !get.length && !givePk.length && !getPk.length){ tShow("Add players or picks to the trade"); return; }
    if(getVal===0){ tShow("Select something to acquire"); return; }
    const blocked = give.map(id=>G.players[id]).find(p=>p&&p.noTrade);
    if(blocked){ tShow(`🔒 ${blocked.name} has a no-trade clause`); return; }
    if(giveVal >= getVal*0.97){
      give.forEach(id=>movePlayer(G, G.players[id], other.id));
      get.forEach(id=>movePlayer(G, G.players[id], me.id));
      givePk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=other.id; });
      getPk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=me.id; });
      autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
      ensureLineup(me, G.players); autoSetLineups(G.aaaTeams[me.id], G.players);
      const getDesc = get.map(id=>G.players[id].name).concat(getPk.length?[`${getPk.length} pick${getPk.length>1?"s":""}`]:[]).join(", ");
      const giveDesc = give.map(id=>G.players[id].name).concat(givePk.length?[`${givePk.length} pick${givePk.length>1?"s":""}`]:[]).join(", ");
      logNews(G,"trade",`${me.abbr} acquired ${getDesc||"picks"} from ${other.abbr} for ${giveDesc||"picks"}`, me.id);
      reset(); commit(G); tShow("✅ Trade accepted!");
    } else {
      const need = (getVal*0.97 - giveVal);
      tShow(`❌ Rejected — ${other.nick} want ~${need.toFixed(0)} more value`);
    }
  };

  // a compact one-line stat summary so you can judge a player without leaving the trade
  const statLine = p => p.isP
    ? (p.stats.OUT ? `${f1(ip(p.stats))} IP · ${f2(era(p.stats))} ERA · ${p.stats.W||0}-${p.stats.L||0} · ${p.stats.SO||0}K` : "no stats yet")
    : (p.stats.AB ? `${f3(avg(p.stats))}/${f3(obp(p.stats))}/${f3(slg(p.stats))} · ${p.stats.HR||0} HR · ${p.stats.RBI||0} RBI` : "no stats yet");
  const playerBox = (title, ros, sel, set, isGive) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      <div className="max-h-72 overflow-y-auto space-y-0.5">
        {ros.map(p=>(
          <div key={p.id} className={"flex items-center gap-2 px-2 py-1 rounded text-sm "+(sel.includes(p.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" className="shrink-0" checked={sel.includes(p.id)}
              onChange={()=>{ if(isGive && p.noTrade && !sel.includes(p.id)){ tShow(`🔒 ${p.name} has a no-trade clause — he won't waive it`); return; } toggle(sel,set,p.id); }} />
            <OvrPot p={p}/>
            <button onClick={()=>setModal(p)} className="flex-1 text-left min-w-0">
              <div className="truncate">{p.pos} {p.name} {isAAAId(p.teamId)&&<span className="text-amber-400 text-[10px] font-bold">AAA</span>}{p.noTrade&&<span className="text-rose-400 text-[10px]" title="No-trade clause"> 🔒</span>}{p.tradeRequest&&<span className="text-amber-400 text-[10px]" title="Requested a trade"> 😤</span>} <span className="text-slate-500">ⓘ</span></div>
              <div className="text-[11px] text-slate-500 truncate">age {p.age} · {money(p.salary)} · val {playerValue(p).toFixed(0)} · {statLine(p)}</div>
            </button>
          </div>
        ))}
      </div>
    </Card>
  );
  const pickBox = (title, picks, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      {picks.length? <div className="space-y-0.5 max-h-72 overflow-y-auto">
        {picks.map(pk=>(
          <label key={pk.id} className={"flex items-center gap-2 px-2 py-1 rounded cursor-pointer text-sm "+(sel.includes(pk.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" checked={sel.includes(pk.id)} onChange={()=>toggle(sel,set,pk.id)} />
            <span className="flex-1">{pk.season} Round {pk.round}{pk.orig!==pk.owner?` (via ${G.teams[pk.orig].abbr})`:""}</span>
            <span className="text-emerald-400 text-xs">val {pickValue(G,pk)}</span>
          </label>
        ))}
      </div> : <div className="text-xs text-slate-500">No tradeable picks.</div>}
    </Card>
  );

  return (
    <div className="space-y-4">
      {deadlinePassed && <Card className="border-amber-600/60">
        <div className="text-sm text-amber-300 font-semibold">🔒 The trade deadline (Day {G.tradeDeadline+1}) has passed.</div>
        <div className="text-xs text-slate-400 mt-0.5">No more trades until the offseason. You can still browse rosters below.</div>
      </Card>}
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Trade with:</span>
          <select value={otherId} onChange={e=>{setOtherId(Number(e.target.value));setGet([]);setGetPk([]);}} className="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm">
            {G.teams.filter(t=>t.id!==me.id).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <div className="ml-auto text-xs text-slate-400">You give <b className="text-slate-200">{giveVal.toFixed(0)}</b> · You get <b className="text-slate-200">{getVal.toFixed(0)}</b></div>
        </div>
        <div className="text-xs text-slate-500 mt-1">Pick values reflect each team's projected finish — a pick from a struggling club is worth more.</div>
      </Card>

      {!deadlinePassed && <Card>
        <div className="flex items-center gap-2 flex-wrap mb-2">
          <h3 className="font-bold text-sm">🔎 Shop a Player <span className="text-slate-500 font-normal">— gauge the market</span></h3>
          <select value={shopId||""} onChange={e=>{ const v=e.target.value?Number(e.target.value):null; setShopId(v); setShopOffers(null); }} className="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm">
            <option value="">Select a player…</option>
            {rosterOf(G,me.id).sort((a,b)=>b.ovr-a.ovr).map(p=><option key={p.id} value={p.id}>{p.pos} {p.name} ({p.ovr}){p.onBlock?" · on block":""}</option>)}
          </select>
          <button disabled={!shopId} onClick={()=>gaugeInterest(shopId)} className={"px-3 py-1 rounded text-sm font-semibold "+(shopId?"bg-emerald-500 text-slate-900":"bg-[#16213a] text-slate-500")}>Gauge Interest</button>
          {shopId && <button onClick={()=>toggleBlock(shopId)} className="px-2 py-1 rounded text-xs bg-[#16213a] text-slate-300 hover:bg-[#1c2c4a]">{G.players[shopId]&&G.players[shopId].onBlock?"Remove from block":"Place on block"}</button>}
        </div>
        {shopOffers!=null && (shopOffers.length? <div className="space-y-2">
          {shopOffers.map((o,i)=>{ const from=G.teams[o.fromId]; const youGet=o.give.map(id=>G.players[id]).filter(Boolean);
            return <div key={i} className="bg-[#13203a] rounded p-2">
              <div className="text-xs text-slate-400 mb-1">{from.name} offer for {G.players[o.get[0]].name}:</div>
              <div className="text-sm"><span className="text-emerald-400 text-xs">You get </span>{youGet.map(p=>`${p.pos} ${p.name} (${p.ovr}→${p.pot})`).join(", ")||"—"}</div>
              <button onClick={()=>acceptShop(o)} className="mt-2 px-3 py-1 bg-emerald-500 text-slate-900 rounded text-xs font-semibold hover:bg-emerald-400">Accept</button>
            </div>;
          })}
        </div> : <div className="text-sm text-slate-500">No clubs are biting right now — try placing him on the block, or shop a player others need.</div>)}
        <div className="text-[11px] text-slate-500 mt-2">Players <b>on the block</b> draw AI offers far more often (watch the Hub).</div>
      </Card>}

      <div className="grid md:grid-cols-2 gap-4">
        {playerBox(`Send from ${me.nick}`, myRos, give, setGive, true)}
        {playerBox(`Acquire from ${other.nick}`, otRos, get, setGet)}
        {pickBox(`${me.nick} picks to send`, myPicks, givePk, setGivePk)}
        {pickBox(`${other.nick} picks to acquire`, otPicks, getPk, setGetPk)}
      </div>

      {modal && <PlayerModal p={modal} team={teamById(G, modal.teamId)} G={G} onClose={()=>setModal(null)} />}
    </div>
  );

// move a player between organizations, preserving his MLB/AAA level and cleaning old lineup refs
function movePlayer(G, p, destMlbId){
  if(!p) return;
  const wasAAA = isAAAId(p.teamId);
  const from = teamById(G, p.teamId);
  if(from){ from.lineup=from.lineup.filter(x=>x!==p.id); from.rotation=from.rotation.filter(x=>x!==p.id); if(from.pos) delete from.pos[p.id]; }
  p.teamId = wasAAA ? aaaIdOf(destMlbId) : destMlbId;
}
function ensureLineup(team, players){
  const ros = rosterOf2(players, team.id);
  team.lineup = team.lineup.filter(id=>players[id] && players[id].teamId===team.id && !players[id].isP);
  team.rotation = team.rotation.filter(id=>players[id] && players[id].teamId===team.id && players[id].isP);
  if(team.lineup.length<9 || team.rotation.length<5) autoSetLineups(team, players);
}
function rosterOf2(players, teamId){ return Object.values(players).filter(p=>p.teamId===teamId); }

// An AI club proposes a trade to the user: it covets one of the user's useful
// (not untouchable) MLB players and assembles a package of comparable value from
// players it can spare. Returns an offer object or null. Roughly fair — the user
// decides whether the fit is worth it.
function makeAITradeOffer(G){
  const meId=G.userTeamId;
  const userMlb = rosterOf(G, meId);
  if(userMlb.length<11) return null;
  const targets = userMlb.filter(p=>p.ovr>=58 && p.ovr<=84);
  if(!targets.length) return null;
  // a player the user has put on the block draws interest far more often
  const blocked = userMlb.filter(p=>p.onBlock && p.ovr>=50 && playerValue(p)>=3);
  const target = (blocked.length && chance(0.75)) ? pick(blocked) : pick(targets);
  const tval = playerValue(target);
  if(tval<3) return null;
  const other = pick(G.teams.filter(t=>t.id!==meId));
  const otherOrg = rosterOf(G, other.id).concat(rosterOf(G, aaaIdOf(other.id)));
  if(otherOrg.length<12) return null;
  // pieces they'd part with — but never a single player worth far more than the target
  // (no gutting their roster for a mid player). Build a package of comparable value.
  const spare = otherOrg.map(p=>({p,v:playerValue(p)})).filter(c=>c.v<=tval*1.12).sort((a,b)=>b.v-a.v);
  let give=[], acc=0;
  for(const c of spare){
    if(acc>=tval*0.97 || give.length>=3) break;
    if(acc+c.v<=tval*1.15){ give.push(c.p.id); acc+=c.v; }
  }
  if(acc < tval*0.90 || give.length===0) return null;   // couldn't put together a fair package
  return { fromId:other.id, get:[target.id], give, givePk:[], getPk:[], season:G.season, day:G.day };
}
// Execute an accepted offer: AI's `give` players come to the user; the user's
// `get` players go to the AI. Levels (MLB/AAA) are preserved; lineups refreshed.
function executeOffer(G, o){
  const meId=G.userTeamId, other=G.teams[o.fromId];
  o.give.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,meId); });
  o.get.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,o.fromId); });
  (o.givePk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=meId; });
  (o.getPk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=o.fromId; });
  ensureLineup(G.teams[meId], G.players); autoSetLineups(G.aaaTeams[meId], G.players);
  autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
}

// Shop a specific user player around the league: returns up to 3 offers from clubs that have a
// positional need (or a win-now club wanting a quality bat/arm) and can assemble fair value.
function shopPlayer(G, target){
  const meId=G.userTeamId; if(!target) return []; const tval=playerValue(target); if(tval<2) return [];
  const offers=[];
  G.teams.filter(t=>t.id!==meId).forEach(other=>{
    const s=teamSituation(G, other.id), needs=s.needs||[];
    const posNeed = target.isP ? (needs.includes("SP")||needs.includes("RP")) : needs.includes(target.pos);
    const winNow = s.mode==="Win-now"||s.mode==="Contender";
    if(!(posNeed || (winNow && target.ovr>=72))) return;
    const otherOrg = rosterOf(G, other.id).concat(rosterOf(G, aaaIdOf(other.id)));
    if(otherOrg.length<12) return;
    const spare = otherOrg.map(p=>({p,v:playerValue(p)})).filter(c=>c.v<=tval*1.12 && c.p.ovr>=45).sort((a,b)=>b.v-a.v);
    let give=[], acc=0;
    for(const c of spare){ if(acc>=tval*0.98||give.length>=3) break; if(acc+c.v<=tval*1.18){ give.push(c.p.id); acc+=c.v; } }
    if(acc>=tval*0.92 && give.length) offers.push({ fromId:other.id, get:[target.id], give, givePk:[], getPk:[], season:G.season, day:G.day, _val:Math.round(acc) });
  });
  return offers.sort((a,b)=>b._val-a._val).slice(0,3);
}

/* ----------------------------- Free Agency ----------------------------- */
const FA_SORTS = {
  ovr: (a,b)=>b.ovr-a.ovr,
  pot: (a,b)=>b.pot-a.pot,
  age: (a,b)=>a.age-b.age || b.ovr-a.ovr,
  ask: (a,b)=>salaryFor(b)-salaryFor(a),
  val: (a,b)=>playerValue(b)-playerValue(a),
};
function FreeAgency({G, commit, tShow}){
  const me=G.teams[G.userTeamId];
  const [pos,setPos]=useState("ALL");
  const [sort,setSort]=useState("ovr");
  // Make sure the AI market has been computed at least once so the user sees rival offers
  // (they bid first). Runs once per season when offers are missing — no render loop.
  useEffect(()=>{
    if(G.freeAgents.length && !G.freeAgents.some(id=>G.players[id] && G.players[id].bestOffer!==undefined)){
      refreshFAMarket(G); commit(G);
    }
  }, [G.season]);
  const userSit = useMemo(()=>teamSituation(G, G.userTeamId), [G.season, G.day]);
  const fas = G.freeAgents.map(id=>G.players[id]).filter(Boolean)
    .filter(p=>pos==="ALL" || (pos==="P"?p.isP:(!p.isP && p.pos===pos)))
    .sort(FA_SORTS[sort]||FA_SORTS.ovr);
  const space = me.budget - payroll(G,me.id);
  const [negotiate, setNegotiate] = useState(null);   // FA being signed via ContractModal
  const doSign=(p, aav, years, incentives)=>{
    setContract(p, aav, years, incentives);
    p.teamId=me.id; G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    p.bestOffer=null; p.offers=[];
    onFreeAgentSigned(G, p, me.id);   // QO comp pick if he declined elsewhere's QO (no-op if he re-signs with you)
    const incTot=incentivesPerYear(p);
    logNews(G,"signing",`${me.abbr} signed ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}${incTot?` +${money(incTot)}/yr inc`:""}`, me.id);
    ensureLineup(me,G.players); refreshFAMarket(G); setNegotiate(null); commit(G); tShow(`✅ Signed ${p.name}`);
  };
  // let the market move: rival clubs sign their best-fit targets (they may steal a guy you wanted)
  const advanceMarket=()=>{
    const n=processFAWave(G, 0.5);
    commit(G); tShow(n>0?`📝 ${n} free agent${n>1?"s":""} signed elsewhere`:"Market quiet — no one signed");
  };
  const waived = (G.waivers||[]).map(w=>({w, p:G.players[w.id]})).filter(x=>x.p && x.p.teamId==null);
  const claim=(p)=>{
    if(p.salary>space){ tShow(`Not enough cap space (need ${money(p.salary)})`); return; }
    p.teamId=me.id;
    G.waivers=(G.waivers||[]).filter(w=>w.id!==p.id);
    ensureLineup(me,G.players);
    logNews(G,"roster",`${me.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, me.id);
    commit(G); tShow(`✅ Claimed ${p.name}`);
  };
  if(!G.freeAgents.length && !waived.length) return <Card>No free agents or waiver players available right now. They appear when teams make cuts mid-season, or after the season when contracts expire.</Card>;
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Cap space:</span>
          <b className={space>=0?"text-emerald-400":"text-red-400"}>{money(space)}</b>
          <button onClick={advanceMarket} className="px-2 py-1 rounded text-xs bg-amber-600/80 hover:bg-amber-500 text-slate-900 font-semibold" title="Rival clubs sign their targets — act fast or lose players">⏵ Let rivals sign</button>
          <div className="ml-auto flex gap-1 flex-wrap">
            {["ALL","C","1B","2B","3B","SS","LF","CF","RF","DH","P"].map(x=>(
              <button key={x} onClick={()=>setPos(x)} className={"px-2 py-0.5 rounded text-xs "+(pos===x?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>{x}</button>
            ))}
          </div>
        </div>
        <p className="text-[11px] text-slate-500 mt-1">Rival clubs bid on free agents based on their needs &amp; budget — you'll see the top competing offer. To sign a player you must beat it (players weigh money, years, and a winning club). Hit <b>Let rivals sign</b> to advance the market.</p>
      </Card>
      {waived.length>0 && <Card className="border-sky-700/40">
        <div className="text-sm font-semibold text-sky-300 mb-1">📋 Waiver Wire <span className="text-slate-500 text-xs font-normal">({waived.length})</span></div>
        <p className="text-xs text-slate-400 mb-2">Players just cut by other clubs. You have first crack for ~2 days before rival teams (worst record first) can claim them.</p>
        <div className="overflow-x-auto max-h-64 overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th>Age</th><th>OVR</th><th>POT</th><th>From</th><th className="text-right">Salary</th><th></th></tr></thead>
            <tbody>
              {waived.map(({w,p})=>(
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td>
                  <td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-slate-400">{p.pot}</td>
                  <td className="text-center text-slate-500 text-xs">{G.teams[w.fromId]?G.teams[w.fromId].abbr:"—"}</td>
                  <td className="text-right">{money(p.salary)}</td>
                  <td className="text-right"><button onClick={()=>claim(p)} className="px-2 py-0.5 bg-sky-600 rounded text-xs hover:bg-sky-500">Claim</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>}
      {G.freeAgents.length>0 && (()=>{
        const arrow = k => sort===k ? " ▾" : "";
        const SortTh = ({k, label, cls=""}) => (
          <th className={cls}><button onClick={()=>setSort(k)} className={"hover:text-slate-200 "+(sort===k?"text-emerald-400 font-semibold":"")}>{label}{arrow(k)}</button></th>
        );
        return <Card>
        <div className="text-xs text-slate-500 mb-1">{fas.length} free agent{fas.length!==1?"s":""} · tap a column to sort</div>
        <div className="overflow-x-auto max-h-[70vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]">
              <th className="text-left">Pos</th><th className="text-left">Name</th>
              <SortTh k="age" label="Age"/><SortTh k="ovr" label="OVR"/><SortTh k="pot" label="POT"/>
              <SortTh k="val" label="Val"/><SortTh k="ask" label="Ask" cls="text-right"/><th className="text-right">Top Offer</th><th></th>
            </tr></thead>
            <tbody>
              {fas.map(p=>{ const bo=p.bestOffer, rt=bo?teamById(G,bo.teamId):null; return (
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td>
                  <td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-amber-300/90 font-semibold">{p.pot}</td>
                  <td className="text-center text-slate-400">{playerValue(p).toFixed(0)}</td>
                  <td className="text-right text-slate-400">~{money(salaryFor(p))}/yr</td>
                  <td className="text-right text-xs whitespace-nowrap">{bo&&rt?<span className="text-amber-300">{rt.abbr} {bo.years}y·{money(bo.aav)}</span>:<span className="text-slate-600">no bids</span>}</td>
                  <td className="text-right pl-2 whitespace-nowrap">
                    <button onClick={()=>setNegotiate(p)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500">Negotiate</button>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </Card>;
      })()}
      {negotiate && <ContractModal G={G} p={negotiate} mode="sign" capSpace={space} factor={1} refuses={false}
        bestOffer={negotiate.bestOffer} userSit={userSit}
        onClose={()=>setNegotiate(null)} onSign={(a,y,inc)=>doSign(negotiate,a,y,inc)} tShow={tShow} />}
    </div>
  );
}

/* ----------------------------- Playoffs -------------------------------- */
const SERIES_LEN = { wc:1, ds:5, cs:7, ws:7 };   // wild card is a single play-in game
function mkSeries(hi, lo){ return { hi, lo, hw:0, lw:0, games:[], done:false, winner:null }; }

/* ----------------------------- awards ---------------------------------- */
// MVP / Player-of-the-Year score: rate stats × playing time + counting punch
function mvpScore(s){ if(!s || !s.AB) return -999;
  const pt=clamp(s.PA/550,0,1.15);
  return ((ops(s)-0.300)*55)*pt + s.HR*0.6 + s.RBI*0.22 + s.R*0.14 + s.SB*0.08; }
// Cy Young score: ERA/WHIP × innings + strikeouts/wins/saves
function cyScore(s){ if(!s) return -999; const ipv=s.OUT/3; if(ipv<10) return -999;
  const pt=clamp(ipv/170,0,1.15);
  return ((4.40-era(s))*20 + (1.28-whip(s))*30)*pt + s.SO*0.10 + s.W*1.6 + s.SV*0.8 + ipv*0.04; }
function bestBy(arr,fn){ return arr.reduce((b,p)=>(b==null||fn(p)>fn(b))?p:b,null); }
function awardLine(s, isP){ return isP
  ? `${s.W}-${s.L}, ${s.OUT?f2(era(s)):"—"} ERA, ${s.SO} K${s.SV?`, ${s.SV} SV`:""}`
  : `${f3(avg(s))}/${f3(obp(s))}/${f3(slg(s))}, ${s.HR} HR, ${s.RBI} RBI`; }
function addAccolade(p,season,award,league){ (p.accolades=p.accolades||[]).push({season,award,league}); }
// Record single-game feats (no-hitter/perfect game/cycle/multi-HR) as accolades + news.
const FEAT_VERB = { "Perfect Game":"threw a PERFECT GAME! 💎", "No-Hitter":"threw a NO-HITTER! 🚫",
  "Cycle":"hit for the CYCLE! 🔄", "4-HR Game":"smashed 4 HOME RUNS in a game! 💣", "3-HR Game":"hit 3 home runs in a game! 💥" };
function recordFeats(G, out){
  if(!out || !out.feats || !out.feats.length) return;
  out.feats.forEach(f=>{ const p=G.players[f.pid]; if(!p) return;
    addAccolade(p, G.season, f.feat);
    const tid = isMlbId(p.teamId)?p.teamId:(isAAAId(p.teamId)?parentIdOf(p.teamId):null);
    logNews(G,"award",`✨ ${p.name} ${FEAT_VERB[f.feat]||f.feat}`, tid);
  });
}
// Career milestone news (run at season end while stats are live). First time a player is
// seen, his already-passed milestones are baselined silently; later crossings get announced.
const HIT_MILES = { HR:[100,200,300,400,500,600,700], H:[1000,2000,3000], RBI:[1000,1500,2000], R:[1000,1500,2000], SB:[300,400,500] };
const PIT_MILES = { W:[100,200,250,300], SO:[1000,2000,2500,3000], SV:[100,200,300,400] };
const MILE_LABEL = { HR:"home runs", H:"hits", RBI:"RBI", R:"runs", SB:"stolen bases", W:"wins", SO:"strikeouts", SV:"saves" };
function checkMilestones(G){
  Object.values(G.players).forEach(p=>{
    if(!isMlbId(p.teamId)) return;
    const fresh = !p._miles; p._miles = p._miles || {};
    const c=p.career||{}, s=p.stats||{}, set = p.isP?PIT_MILES:HIT_MILES;
    Object.keys(set).forEach(k=>{ const tot=(c[k]||0)+(s[k]||0);
      set[k].forEach(m=>{ const key=k+m;
        if(tot>=m && !p._miles[key]){ p._miles[key]=1; if(!fresh) logNews(G,"award",`🎉 ${p.name} reached ${m} career ${MILE_LABEL[k]}`, p.teamId); }
      });
    });
  });
}
// Hand out season awards (run at end of the regular season, before stats reset).
function computeAwards(G){
  // MLB-only season line per player (a called-up player's AAA stats don't count toward MLB awards)
  const ml=new Map(); const S=p=>{ if(!ml.has(p.id)) ml.set(p.id, levelStats(p,"MLB")); return ml.get(p.id); };
  const recOf=p=>p?{id:p.id,name:p.name,pos:p.pos,team:(teamById(G,p.teamId)||{}).abbr||"",ovr:p.ovr,line:awardLine(S(p),p.isP)}:null;
  const warCtx=leagueWarCtx(G,"MLB");
  const out={season:G.season, leagues:{}};
  ["Empire","Pioneer"].forEach(lg=>{
    const pool=Object.values(G.players).filter(p=>{const t=teamById(G,p.teamId);return t&&!t.aaa&&!t.college&&t.league===lg;});
    const hitters=pool.filter(p=>!p.isP), pitchers=pool.filter(p=>p.isP);
    const mvp=bestBy(hitters,p=>mvpScore(S(p))), cy=bestBy(pitchers,p=>cyScore(S(p)));
    const asHit=[];
    ["C","1B","2B","3B","SS","LF","CF","RF","DH"].forEach(pos=>{
      const poolPos = pos==="DH" ? hitters.filter(p=>!asHit.includes(p))
                                 : hitters.filter(p=>p.pos===pos && !asHit.includes(p));
      const b=bestBy(poolPos,p=>mvpScore(S(p))); if(b) asHit.push(b);
    });
    const asPit=[...pitchers].sort((a,b)=>cyScore(S(b))-cyScore(S(a))).slice(0,6);
    out.leagues[lg]={ mvp:recOf(mvp), cy:recOf(cy), allStars:{hitters:asHit.map(recOf), pitchers:asPit.map(recOf)} };
    if(mvp){ addAccolade(mvp,G.season,"MVP",lg); logNews(G,"award",`🏅 ${mvp.name} won the ${lg} League MVP`, mvp.teamId); }
    if(cy){ addAccolade(cy,G.season,"Cy Young",lg); logNews(G,"award",`🏅 ${cy.name} won the ${lg} League Cy Young`, cy.teamId); }
    asHit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
    asPit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
    // Rookie of the Year — best WAR among true rookies (no prior MLB season)
    const rookies = pool.filter(p=> !(p.history||[]).some(h=>h.level==="MLB") && (p.isP? S(p).OUT>=60 : S(p).PA>=150));
    const roy = rookies.reduce((b,p)=> (b==null||warOf(p,warCtx,S(p))>warOf(b,warCtx,S(b)))?p:b, null);
    // Reliever of the Year — saves + holds + run prevention over a relief workload
    const relScore = s => (s.SV||0)*1.0 + (s.HLD||0)*0.5 + (s.SO||0)*0.05 + (3.5-era(s))*12;   // ERA matters most
    const relYr = pitchers.filter(p=> S(p).GS<5 && S(p).OUT>=90)
      .reduce((b,p)=> (b==null||relScore(S(p))>relScore(S(b)))?p:b, null);
    // Gold Glove — best fielder (by FPCT, DEF tiebreak) at each position, including P
    const gg=[]; ["C","1B","2B","3B","SS","LF","CF","RF","P"].forEach(pos=>{
      const sc=p=>fpct(S(p))+n01(p.def||50)*0.01;
      const b=pool.filter(p=>(pos==="P"?p.isP:(!p.isP&&p.pos===pos)) && (S(p).TC||0)>=(pos==="P"?12:80))
        .reduce((a,c)=>(a==null||sc(c)>sc(a))?c:a,null);
      if(b) gg.push(b);
    });
    // Silver Slugger — best bat (by OPS) at each position, including DH
    const ss=[]; ["C","1B","2B","3B","SS","LF","CF","RF","DH"].forEach(pos=>{
      const b=hitters.filter(p=>p.pos===pos && S(p).PA>=200)
        .reduce((a,c)=>(a==null||ops(S(c))>ops(S(a)))?c:a,null);
      if(b) ss.push(b);
    });
    // Comeback Player of the Year — biggest rebound vs last season, or a productive return
    // after missing last year (e.g. injury). Needs prior MLB experience and a real down/lost
    // year; must actually produce now. Some seasons may have no clear winner.
    const cpoy = (()=>{
      let best=null, bestSc=-1e9;
      pool.forEach(p=>{
        const cur=S(p); if(p.isP? cur.OUT<120 : cur.PA<300) return;
        const mlbRows=(p.history||[]).filter(h=>h.level==="MLB");
        if(!mlbRows.length) return;                       // no prior MLB → a rookie, not a comeback
        const curWar=warOf(p,warCtx,cur);
        if(curWar<3) return;                              // must produce now
        const lastRow=mlbRows.find(h=>h.season===G.season-1);
        if(lastRow && lastRow.war==null) return;          // can't assess (pre-WAR history row)
        const missedLast=!lastRow;                        // didn't play MLB last year → a return
        const baseline=lastRow?lastRow.war:0;
        if(!(missedLast || baseline<1.5)) return;         // last year must have been down/lost
        const sc=(curWar-baseline)+(missedLast?1.0:0);
        if(sc>bestSc){ bestSc=sc; best={p,missedLast}; }
      });
      return bestSc>=3 ? best : null;
    })();
    Object.assign(out.leagues[lg], { roy:recOf(roy), relYr:recOf(relYr), cpoy:recOf(cpoy?cpoy.p:null), gg:gg.map(recOf), ss:ss.map(recOf) });
    if(cpoy){ addAccolade(cpoy.p,G.season,"Comeback Player",lg);
      logNews(G,"award",`🏅 ${cpoy.p.name} won the ${lg} Comeback Player of the Year${cpoy.missedLast?" (return season)":""}`, cpoy.p.teamId); }
    if(roy){ addAccolade(roy,G.season,"Rookie of the Year",lg); logNews(G,"award",`🏅 ${roy.name} won the ${lg} Rookie of the Year`, roy.teamId); }
    if(relYr){ addAccolade(relYr,G.season,"Reliever of the Year",lg); logNews(G,"award",`🏅 ${relYr.name} won ${lg} Reliever of the Year`, relYr.teamId); }
    gg.forEach(p=>addAccolade(p,G.season,"Gold Glove",lg));
    ss.forEach(p=>addAccolade(p,G.season,"Silver Slugger",lg));
  });
  G.awards=out;
  (G.awardHistory=G.awardHistory||[]).unshift(out);
  if(G.awardHistory.length>40) G.awardHistory.pop();
}

/* ------------------------------ All-Star Game ------------------------------ */
// A mid-season exhibition (Empire vs Pioneer) played with the REAL sim, banked separately so
// it never touches regular-season stats (like the BA Cup). Rosters are picked from current
// MLB form (best at each lineup slot + top arms), mirroring the season-end All-Star selection.
const ASG_HOME_ID=900, ASG_AWAY_ID=901;   // ad-hoc team ids (outside the MLB/AAA/college namespace)
const asgBucket = p => p.asgStats = p.asgStats || (p.isP?emptyPitStats():emptyHitStats());
function pickAllStars(G, lg){
  const pool=Object.values(G.players).filter(p=>{const t=teamById(G,p.teamId);return t&&!t.aaa&&!t.college&&t.league===lg && !isInjured(p);});
  const S=p=>levelStats(p,"MLB");
  const hitters=pool.filter(p=>!p.isP), pitchers=pool.filter(p=>p.isP);
  const chosen=[];
  ["C","1B","2B","3B","SS","LF","CF","RF","DH"].forEach(pos=>{
    const cand = pos==="DH" ? hitters.filter(p=>!chosen.includes(p))
                            : hitters.filter(p=>p.pos===pos && !chosen.includes(p));
    const b=bestBy(cand,p=>mvpScore(S(p))) || bestBy(hitters.filter(p=>!chosen.includes(p)),p=>mvpScore(S(p)));
    if(b) chosen.push(b);
  });
  const arms=[...pitchers].sort((a,b)=>cyScore(S(b))-cyScore(S(a))).slice(0,8);
  return { hitters:chosen, pitchers:arms };
}
function makeAllStarTeam(G, lg, id, roster){
  const order=["C","1B","2B","3B","SS","LF","CF","RF","DH"];
  const pos={}; roster.hitters.forEach((p,i)=>{ pos[p.id]=order[i]||p.pos; });
  // batting order: contact/eye up top, like autoSetLineups
  const lineup=roster.hitters.slice().sort((a,b)=>(b.con+b.eye)-(a.con+a.eye)).map(p=>p.id).slice(0,9);
  const sp=roster.pitchers.filter(p=>p.role==="SP");
  const starter=sp[0]||roster.pitchers[0];
  return { id, name:lg+" All-Stars", city:lg, nick:"All-Stars", abbr: lg==="Empire"?"EMP":"PIO",
           league:lg, division:"AS", w:0,l:0,poGi:0,rs:0,ra:0, streak:0,
           lineup, pos, rotation:[starter.id], bullpen:roster.pitchers.filter(p=>p.id!==starter.id).map(p=>p.id) };
}
function asgScore(s0, s, isP, onWinner){
  let v;
  if(isP){ const outs=(s.OUT||0)-(s0.OUT||0), er=(s.ER||0)-(s0.ER||0), so=(s.SO||0)-(s0.SO||0);
    v = outs/3*1.2 + so*0.8 - er*1.5; }
  else { const h=(s.H||0)-(s0.H||0), hr=(s.HR||0)-(s0.HR||0), rbi=(s.RBI||0)-(s0.RBI||0), r=(s.R||0)-(s0.R||0), sb=(s.SB||0)-(s0.SB||0);
    v = h*1.0 + hr*2.0 + rbi*1.2 + r*0.8 + sb*0.5; }
  return v + (onWinner?2.5:0);
}
function playAllStarGame(G){
  const eR=pickAllStars(G,"Empire"), pR=pickAllStars(G,"Pioneer");
  if(eR.hitters.length<9 || pR.hitters.length<9 || !eR.pitchers.length || !pR.pitchers.length) return;
  // home = Pioneer, away = Empire (arbitrary, neutral exhibition)
  const home=makeAllStarTeam(G,"Pioneer",ASG_HOME_ID,pR), away=makeAllStarTeam(G,"Empire",ASG_AWAY_ID,eR);
  const homeRoster=[...pR.hitters,...pR.pitchers], awayRoster=[...eR.hitters,...eR.pitchers];
  const idx={ [ASG_HOME_ID]:homeRoster, [ASG_AWAY_ID]:awayRoster };
  const roster=[...homeRoster,...awayRoster];
  const winSet=new Set();   // filled after the result
  const snap={}; roster.forEach(p=>snap[p.id]=Object.assign({},p.stats));
  const res=simGame(home,away,G.players,idx);   // REAL sim; no markGamesPlayed / records / feats (exhibition)
  const homeWon=res.hs>res.as;
  const winnerId=homeWon?ASG_HOME_ID:ASG_AWAY_ID;
  (homeWon?homeRoster:awayRoster).forEach(p=>winSet.add(p.id));
  // MVP — best line, with a nudge toward the winning side (computed BEFORE banking)
  let mvp=null, mvpSc=-1e9;
  roster.forEach(p=>{ const sc=asgScore(snap[p.id],p.stats,p.isP,winSet.has(p.id));
    if(sc>mvpSc){ mvpSc=sc; mvp=p; } });
  bankSeparate(roster, snap, asgBucket);   // move the game's stats out of p.stats (regular season stays clean)
  if(mvp){ addAccolade(mvp,G.season,"All-Star MVP",(teamById(G,mvp.teamId)||{}).league||"");
    logNews(G,"award",`⭐ ${mvp.name} (${(teamById(G,mvp.teamId)||{}).abbr||""}) is the ${G.season} All-Star Game MVP`, mvp.teamId); }
  // label the box so the generic BoxScore shows the All-Star team names (teamById can't resolve ad-hoc ids)
  res.box.homeT={abbr:home.abbr, nick:home.nick}; res.box.awayT={abbr:away.abbr, nick:away.nick};
  res.box.plays=res.plays; res.box.walkoff=res.walkoff; res.box.finalInning=res.finalInning;   // scoring-play game log
  G.allStarGame={ season:G.season, day:G.day,
                  empireScore: res.as, pioneerScore: res.hs,   // away=Empire, home=Pioneer
                  winner: homeWon?"Pioneer":"Empire",
                  mvp: mvp?{id:mvp.id, name:mvp.name, team:(teamById(G,mvp.teamId)||{}).abbr||"", isP:mvp.isP}:null,
                  box: res.box };
  logNews(G,"award",`⭐ ${G.season} All-Star Game: Pioneer ${res.hs}, Empire ${res.as}`, null);
}

// Update each franchise's all-time, single-season record book. Run at season end
// (in enterPlayoffs, before stats reset). Each record is {value, holder, season}.
function recordFranchiseRecords(G){
  G.teams.forEach(t=>{
    const rec = t.records = t.records || {};
    const up = (key,value,holder)=>{ if(value==null||value<=0) return; if(!rec[key]||value>rec[key].value) rec[key]={value,holder,season:G.season}; };
    const lo = (key,value,holder)=>{ if(value==null) return; if(!rec[key]||value<rec[key].value) rec[key]={value,holder,season:G.season}; };
    up("teamWins", t.w, t.name);
    up("winStreak", t._wsMax, t.name);
    const ros = Object.values(G.players).filter(p=>p.teamId===t.id);
    const hitters = ros.filter(p=>!p.isP && p.stats.PA>=300);
    const pitchers = ros.filter(p=>p.isP && p.stats.OUT>=120);
    const bestH=(fn,key)=>{ const b=hitters.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(key,fn(b),b.name); };
    bestH(p=>p.stats.HR,"HR"); bestH(p=>p.stats.RBI,"RBI"); bestH(p=>p.stats.H,"H");
    bestH(p=>p.stats.R,"R"); bestH(p=>p.stats.SB,"SB"); bestH(p=>+avg(p.stats).toFixed(3),"AVG");
    const bestP=(fn,key)=>{ const b=pitchers.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(key,fn(b),b.name); };
    bestP(p=>p.stats.W,"pW"); bestP(p=>p.stats.SO,"pK"); bestP(p=>p.stats.SV,"pSV");
    const bERA=pitchers.reduce((a,c)=>(!a||era(c.stats)<era(a.stats))?c:a,null); if(bERA) lo("ERA",+era(bERA.stats).toFixed(2),bERA.name);
  });
}

// Franchise ALL-TIME leaders: each club's career leaderboard (HR/H/RBI/R/SB; W/SO/SV/IP),
// accumulated each season from the MLB stat line of whoever's currently on the club. Persistent
// on team.allTime (survives player pruning/retirement), keyed by player id so a long-tenured
// player's total grows year over year. Capped at 25/category so a club's board stays bounded.
function accumulateAllTime(G){
  G.teams.forEach(t=>{
    const at = t.allTime = t.allTime || {};
    const ros = Object.values(G.players).filter(p=>p.teamId===t.id);
    const add = (cat, p, v) => { if(!v||v<=0) return; const arr=at[cat]=at[cat]||[];
      let e=arr.find(x=>x.id===p.id); if(!e){ e={id:p.id, name:p.name, value:0}; arr.push(e); }
      e.value+=v; e.name=p.name; };
    ros.forEach(p=>{ const s=levelStats(p,"MLB");
      if(p.isP){ add("W",p,s.W); add("SO",p,s.SO); add("SV",p,s.SV); add("OUT",p,s.OUT); }
      else { add("HR",p,s.HR); add("H",p,s.H); add("RBI",p,s.RBI); add("R",p,s.R); add("SB",p,s.SB); } });
    Object.keys(at).forEach(cat=>{ at[cat].sort((a,b)=>b.value-a.value); if(at[cat].length>25) at[cat].length=25; });
  });
}

// All-time, league-wide records in three tiers: single-GAME, single-SEASON, and CAREER
// bests (best mark by ANYONE, ever). Kept on G.records = {game,season,career}. Each entry
// is {value, holder, team, season}. Game records are fed live from the sim (see
// updateGameRecords) so they only fill in going forward; season/career run at season end.
function ensureRecords(G){ if(!G.records) G.records={ game:{}, season:{}, career:{} }; return G.records; }
const teamAbbrOf = (G,p)=>{ const t=teamById(G,p.teamId); return t?(t.aaa?t.abbr+" AAA":t.abbr):""; };

const RECNAME={teamWins:"wins (season)",winStreak:"win streak (season)",HR:"home runs (season)",RBI:"RBI (season)",H:"hits (season)",R:"runs (season)",SB:"steals (season)",AVG:"batting avg (season)",pW:"wins (season)",pK:"strikeouts (season)",pSV:"saves (season)",ERA:"ERA (season)"};
const fmtRec=(k,v)=>k==="AVG"?f3(v):k==="ERA"?f2(v):v;
function recordSeasonRecords(G){
  const R=ensureRecords(G).season;
  const announce=(k,v,holder,old)=>{ if(old) logNews(G,"award",`🏆 NEW LEAGUE RECORD! ${holder} — ${fmtRec(k,v)} ${RECNAME[k]||k} (broke ${old.holder}'s ${fmtRec(k,old.value)})`, null); };
  const up=(k,v,holder,team)=>{ if(v==null||v<=0) return; const old=R[k]; if(!old||v>old.value){ announce(k,v,holder,old); R[k]={value:v,holder,team,season:G.season}; } };
  const lo=(k,v,holder,team)=>{ if(v==null) return; const old=R[k]; if(!old||v<old.value){ announce(k,v,holder,old); R[k]={value:v,holder,team,season:G.season}; } };
  G.teams.forEach(t=>up("teamWins", t.w, t.name, t.abbr));
  G.teams.forEach(t=>up("winStreak", t._wsMax, t.name, t.abbr));
  const mlb=Object.values(G.players).filter(p=>isMlbId(p.teamId));
  const hitters=mlb.filter(p=>!p.isP && p.stats.PA>=300);
  const pitchers=mlb.filter(p=>p.isP && p.stats.OUT>=120);
  const bH=(fn,k)=>{ const b=hitters.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(k,fn(b),b.name,teamAbbrOf(G,b)); };
  bH(p=>p.stats.HR,"HR"); bH(p=>p.stats.RBI,"RBI"); bH(p=>p.stats.H,"H"); bH(p=>p.stats.R,"R"); bH(p=>p.stats.SB,"SB"); bH(p=>+avg(p.stats).toFixed(3),"AVG");
  const bP=(fn,k)=>{ const b=pitchers.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(k,fn(b),b.name,teamAbbrOf(G,b)); };
  bP(p=>p.stats.W,"pW"); bP(p=>p.stats.SO,"pK"); bP(p=>p.stats.SV,"pSV");
  const bERA=pitchers.reduce((a,c)=>(!a||era(c.stats)<era(a.stats))?c:a,null); if(bERA) lo("ERA",+era(bERA.stats).toFixed(2),bERA.name,teamAbbrOf(G,bERA));
}

// Best CAREER totals by anyone. Running career = career-to-date + the live season (which
// hasn't been merged yet at season end). Stored as a persistent high-water mark so it
// survives the player later being pruned from the pool.
function recordCareerRecords(G){
  const R=ensureRecords(G).career;
  const up=(k,v,holder,team)=>{ if(v==null||v<=0) return; if(!R[k]||v>R[k].value) R[k]={value:v,holder,team,season:G.season}; };
  Object.values(G.players).forEach(p=>{
    if(isCollegeId(p.teamId)) return;             // amateur stats don't set pro career records
    const c=p.career||{}, s=p.stats||{}, tot=k=>(c[k]||0)+(s[k]||0), team=teamAbbrOf(G,p);
    if(p.isP){ up("cW",tot("W"),p.name,team); up("cSV",tot("SV"),p.name,team); up("cK",tot("SO"),p.name,team); up("cIP",Math.floor(tot("OUT")/3),p.name,team); }
    else { up("cHR",tot("HR"),p.name,team); up("cH",tot("H"),p.name,team); up("cRBI",tot("RBI"),p.name,team); up("cR",tot("R"),p.name,team); up("cSB",tot("SB"),p.name,team); }
  });
}

// Single-GAME bests, fed from simGame's per-game lines. MLB games only, going forward.
function updateGameRecords(G, lines, season){
  if(!lines||!lines.length) return;
  const R=ensureRecords(G).game;
  const up=(k,v,name,team)=>{ if(v==null||v<=0) return; if(!R[k]||v>R[k].value) R[k]={value:v,holder:name,team,season}; };
  lines.forEach(l=>{
    const team=G.teams[l.team]?G.teams[l.team].abbr:"";
    if(l.isP){ up("gK",l.so,l.name,team); }
    else { up("gHR",l.hr,l.name,team); up("gH",l.h,l.name,team); up("gRBI",l.rbi,l.name,team); }
  });
}

// Active hitting streaks: consecutive MLB regular-season games with >=1 hit. Fed live from
// simGame's per-game lines (MLB only, via simDay). A no-bat day (ab===0) leaves the streak
// intact; a hitless game with >=1 AB ends it. Logs milestones to the wire (15+, then every 5)
// and keeps the league single-season + career record for the longest streak ever.
function updateHitStreaks(G, lines){
  if(!lines||!lines.length) return;
  lines.forEach(l=>{
    if(l.isP || !(l.ab>0)) return;
    const p=G.players[l.pid]; if(!p) return;
    if(l.h>0){
      p._hitStreak=(p._hitStreak||0)+1;
      if(p._hitStreak>(p._bestHitStreak||0)) p._bestHitStreak=p._hitStreak;
      const s=p._hitStreak;
      if(s===15 || (s>15 && s%5===0))
        logNews(G,"award",`🔥 ${p.name} (${teamAbbrOf(G,p)}) extends his hitting streak to ${s} games`, p.teamId);
      recordHitStreak(G, p, s);
    } else {
      p._hitStreak=0;
    }
  });
}
function recordHitStreak(G, p, s){
  const R=ensureRecords(G), team=teamAbbrOf(G,p);
  const old=R.season.hitStreak;
  if(!old || s>old.value){
    if(old && s>=15) logNews(G,"award",`🏆 NEW LEAGUE RECORD! ${p.name} — ${s}-game hitting streak (broke ${old.holder}'s ${old.value})`, null);
    R.season.hitStreak={value:s, holder:p.name, team, season:G.season};
  }
  if(!R.career.cHitStreak || s>R.career.cHitStreak.value)
    R.career.cHitStreak={value:s, holder:p.name, team, season:G.season};
}

// a player's CAREER total at one level (sum of that level's history rows + the live season,
// since season stats haven't been folded into history yet at season end)
function levelCareerTotal(p, level, key){
  let t=0;
  (p.history||[]).forEach(h=>{ if(h.level===level && h.stats) t += (h.stats[key]||0); });
  if(levelOf(p.teamId)===level) t += (p.stats[key]||0);
  return t;
}
// Single-season + career bests for a secondary league (College/AAA), kept on its own page.
// `level` = "COL" or "AAA"; stores into G.collegeRecords / G.aaaRecords {season,career}.
function recordMinorRecords(G, level){
  const store = level==="COL" ? (G.collegeRecords=G.collegeRecords||{season:{},career:{}})
                              : (G.aaaRecords=G.aaaRecords||{season:{},career:{}});
  store.season=store.season||{}; store.career=store.career||{};
  const players = Object.values(G.players).filter(p=>levelOf(p.teamId)===level);
  const teams = level==="COL"?(G.collegeTeams||[]):G.aaaTeams;
  const gp = Math.max(1, ...teams.map(t=>t.w+t.l));
  const qPA=Math.max(40, round(gp*2.0)), qOUT=Math.max(40, round(gp*1.0));
  const hitters=players.filter(p=>!p.isP && p.stats.PA>=qPA);
  const pitchers=players.filter(p=>p.isP && p.stats.OUT>=qOUT);
  const upS=(k,v,h,t)=>{ if(v==null||v<=0) return; if(!store.season[k]||v>store.season[k].value) store.season[k]={value:v,holder:h,team:t,season:G.season}; };
  const loS=(k,v,h,t)=>{ if(v==null) return; if(!store.season[k]||v<store.season[k].value) store.season[k]={value:v,holder:h,team:t,season:G.season}; };
  const bH=(fn,k)=>{ const b=hitters.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) upS(k,fn(b),b.name,teamAbbrOf(G,b)); };
  bH(p=>p.stats.HR,"HR"); bH(p=>p.stats.RBI,"RBI"); bH(p=>p.stats.H,"H"); bH(p=>p.stats.R,"R"); bH(p=>p.stats.SB,"SB"); bH(p=>+avg(p.stats).toFixed(3),"AVG");
  const bP=(fn,k)=>{ const b=pitchers.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) upS(k,fn(b),b.name,teamAbbrOf(G,b)); };
  bP(p=>p.stats.W,"pW"); bP(p=>p.stats.SO,"pK"); bP(p=>p.stats.SV,"pSV");
  const bERA=pitchers.reduce((a,c)=>(!a||era(c.stats)<era(a.stats))?c:a,null); if(bERA) loS("ERA",+era(bERA.stats).toFixed(2),bERA.name,teamAbbrOf(G,bERA));
  // career high-water marks (persist even after the player is drafted/gone)
  const upC=(k,v,h,t)=>{ if(v==null||v<=0) return; if(!store.career[k]||v>store.career[k].value) store.career[k]={value:v,holder:h,team:t,season:G.season}; };
  players.forEach(p=>{ const tm=teamAbbrOf(G,p);
    if(p.isP){ upC("cK",levelCareerTotal(p,level,"SO"),p.name,tm); upC("cW",levelCareerTotal(p,level,"W"),p.name,tm); upC("cSV",levelCareerTotal(p,level,"SV"),p.name,tm); }
    else { upC("cHR",levelCareerTotal(p,level,"HR"),p.name,tm); upC("cH",levelCareerTotal(p,level,"H"),p.name,tm); upC("cRBI",levelCareerTotal(p,level,"RBI"),p.name,tm); upC("cSB",levelCareerTotal(p,level,"SB"),p.name,tm); }
  });
}

// Snapshot the just-finished regular season's highlights for the offseason recap. Run in
// enterPlayoffs while every stat line is still live (before the reset). Champion is added later
// (known after the bracket); the recap card reads it from G.champions at display time.
function buildSeasonRecap(G){
  const u=G.teams[G.userTeamId];
  const mlb=Object.values(G.players).filter(p=>isMlbId(p.teamId));
  const hitters=mlb.filter(p=>!p.isP && p.stats.PA>=300), pitchers=mlb.filter(p=>p.isP && p.stats.OUT>=300);   // ~100 IP → starter-level leaders
  const top=(arr,fn)=>arr.reduce((b,p)=>(b==null||fn(p)>fn(b))?p:b,null);
  const low=(arr,fn)=>arr.reduce((b,p)=>(b==null||fn(p)<fn(b))?p:b,null);
  const L=(p,val)=> p?{id:p.id, name:p.name, team:(teamById(G,p.teamId)||{}).abbr||"", val}:null;
  const hrL=top(hitters,p=>p.stats.HR), avgL=top(hitters,p=>avg(p.stats)), rbiL=top(hitters,p=>p.stats.RBI);
  const wL=top(pitchers,p=>p.stats.W), kL=top(pitchers,p=>p.stats.SO), eraL=low(pitchers,p=>era(p.stats));
  const warCtx=leagueWarCtx(G,"MLB");
  const uHit=Object.values(G.players).filter(p=>p.teamId===u.id && !p.isP && p.stats.PA>0);
  const uPit=Object.values(G.players).filter(p=>p.teamId===u.id && p.isP && p.stats.OUT>0);
  const uBestH=top(uHit,p=>warOf(p,warCtx,levelStats(p,"MLB"))), uBestP=top(uPit,p=>warOf(p,warCtx,levelStats(p,"MLB")));
  const div=standings(G.teams)[u.league+" "+u.division]; const place=div.findIndex(t=>t.id===u.id)+1;
  const seeds=playoffSeeds(G.teams,u.league).map(t=>t.id);
  const bestTeam=G.teams.reduce((b,t)=>(b==null||t.w>b.w)?t:b,null);
  // awards won by the user's players this season
  const userAwards=[];
  ["Empire","Pioneer"].forEach(lg=>{ const L=G.awards&&G.awards.leagues&&G.awards.leagues[lg]; if(!L) return;
    [["mvp","MVP"],["cy","Cy Young"],["roy","Rookie of the Year"],["relYr","Reliever of the Year"],["cpoy","Comeback Player"]].forEach(([k,lbl])=>{
      const r=L[k]; if(r && r.team===u.abbr) userAwards.push(`${lbl}: ${r.name}`); }); });
  const hs=(G.records&&G.records.season&&G.records.season.hitStreak);
  G.seasonRecap={
    season:G.season, userW:u.w, userL:u.l, place, division:u.division,
    madePlayoffs:seeds.includes(u.id), divWinner:seeds.slice(0,3).includes(u.id),
    runDiff:u.rs-u.ra,
    leaders:{ HR:L(hrL, hrL&&hrL.stats.HR), AVG:L(avgL, avgL&&f3(avg(avgL.stats))), RBI:L(rbiL, rbiL&&rbiL.stats.RBI),
              W:L(wL, wL&&wL.stats.W), K:L(kL, kL&&kL.stats.SO), ERA:L(eraL, eraL&&f2(era(eraL.stats))) },
    userBestH: uBestH?{id:uBestH.id,name:uBestH.name,line:`${uBestH.stats.HR} HR, ${uBestH.stats.RBI} RBI, ${f3(avg(uBestH.stats))}`}:null,
    userBestP: uBestP?{id:uBestP.id,name:uBestP.name,line:`${uBestP.stats.W}-${uBestP.stats.L}, ${f2(era(uBestP.stats))} ERA, ${uBestP.stats.SO} K`}:null,
    userAwards,
    hitStreak: (hs&&hs.season===G.season)?{holder:hs.holder, team:hs.team, value:hs.value}:null,
    bestTeam: bestTeam?{abbr:bestTeam.abbr, name:bestTeam.name, w:bestTeam.w, l:bestTeam.l}:null,
  };
}

// Player morale (0-100) + trade requests + no-trade clauses, refreshed once a season (in
// enterPlayoffs, while standings + season stats are live). Drives extension price, trade availability.
function playerMorale(G, p){
  if(p.teamId==null || !isMlbId(p.teamId)) return 60;
  const t=G.teams[p.teamId]; if(!t) return 60;
  const wp=(t.w+t.l)? t.w/(t.w+t.l) : 0.5;
  let m = 60 + (wp-0.5)*80;                              // contender → content, cellar → sour
  const seeds=playoffSeeds(G.teams,t.league).map(x=>x.id); if(seeds.includes(t.id)) m+=8;
  const pt = p.isP ? p.stats.OUT/3 : p.stats.PA;
  const expect = p.isP ? (p.role==="SP"?150:50) : 450;
  if(p.ovr>=70 && pt < expect*0.5) m -= 18;              // a good player short of playing time
  if(p.ovr>=78 && wp<0.47) m -= 20;                      // a star stuck on a loser wants to win
  if(wp<0.38) m -= 6;                                    // a true cellar club grinds everyone down
  m += clamp((p._lastDelta||0)*2, -8, 8);               // last year's development swing
  return clamp(Math.round(m), 0, 100);
}
function updateMoraleAndStatus(G){
  G.teams.forEach(t=>{
    Object.values(G.players).filter(p=>p.teamId===t.id).forEach(p=>{
      p.morale = playerMorale(G, p);
      if(p.morale<=35 && p.ovr>=76){ if(!p.tradeRequest && p.teamId===G.userTeamId) logNews(G,"roster",`😤 ${p.name} has requested a trade — unhappy with ${t.abbr}.`, t.id); p.tradeRequest=true; }
      else if(p.morale>=45 && p.tradeRequest) p.tradeRequest=false;
      const tenure=(p.history||[]).filter(h=>h.level==="MLB" && (h.teams||[]).includes(t.abbr)).length;
      p.noTrade = (p.ovr>=80 && p.age>=31 && tenure>=4 && p.morale>=55);
    });
  });
}

function enterPlayoffs(G){
  finishBACup(G);     // make sure the season's BA Cup has a winner before the season closes
  evalOwnerMandate(G);   // grade the user's owner mandate while standings are final
  computeAwards(G);   // hand out hardware while season stats are still live
  recordFranchiseRecords(G);   // update each club's all-time record book before stats reset
  accumulateAllTime(G);        // grow each club's career all-time leaderboards (before stats reset)
  recordSeasonRecords(G);      // league-wide single-season records
  recordCareerRecords(G);      // league-wide career records (high-water mark)
  recordMinorRecords(G,"AAA"); recordMinorRecords(G,"COL");   // AAA/college season + career bests (before playoff stats)
  if(!(G.settings&&G.settings.potm===false) && G._curMonth!=null) finishMonth(G, G._curMonth);   // award the final month
  updateMoraleAndStatus(G);   // refresh morale, trade requests, no-trade clauses (standings final)
  checkMilestones(G);   // 🎉 career milestone news (500 HR, 3000 K, 300 W, ...)
  buildSeasonRecap(G);  // snapshot the year's highlights (while stats are live) for the offseason recap
  payIncentives(G);   // settle stat-based contract bonuses (off-cap)
  G.phase="playoffs";
  const mk = league => {
    const seeds = playoffSeeds(G.teams, league).map(t=>t.id);
    // wild-card play-in (single game): the two wild cards (seeds 4 & 5) play once,
    // higher seed hosts; winner becomes the 4th team. Seeds 1-3 (div winners) wait.
    return { seeds, wc:[ mkSeries(seeds[3], seeds[4]) ], ds:null, cs:null };
  };
  G.playoffs = { Empire: mk("Empire"), Pioneer: mk("Pioneer"), round:"wc", wsWinner:null, ws:null };
  // AAA + college postseasons auto-sim instantly and are shown as finished brackets.
  // AAA mirrors MLB (Bo5/Bo7); college is the same shape but best-of-3.
  try{
    G.aaaPlayoffs = runAutoPlayoffs(G, G.aaaTeams, ["Empire","Pioneer"], {wc:1,ds:5,cs:7,final:7});
    (G.aaaChampions=G.aaaChampions||[]).push({season:G.season, id:G.aaaPlayoffs.champion});
    if(G.collegeTeams && G.collegeTeams.length){
      G.collegePlayoffs = runAutoPlayoffs(G, G.collegeTeams, ["Coastal","Heartland"], {wc:1,ds:3,cs:3,final:3});
      (G.collegeChampions=G.collegeChampions||[]).push({season:G.season, id:G.collegePlayoffs.champion});
      const cc=teamById(G,G.collegePlayoffs.champion);
      if(cc) logNews(G,"champ",`🎓 ${cc.name} won the ${G.season} College Championship!`, null);
    }
    const ac=teamById(G,G.aaaPlayoffs.champion);
    if(ac) logNews(G,"champ",`🏆 ${ac.abbr} AAA won the ${G.season} AAA title`, parentIdOf(ac.id));
  }catch(e){ /* never let a minor-league bracket block the MLB postseason */ }
}

// Move the stat delta accrued during a special (postseason / cup) game out of p.stats
// (which stays REGULAR-SEASON only) and into a separate career bucket on the player.
// `target(p)` lazily returns the stats object to add the delta into.
function bankSeparate(roster, snap, target){
  roster.forEach(p=>{ const s0=snap[p.id]; if(!s0) return;
    let b=null;
    for(const k in p.stats){ const d=p.stats[k]-(s0[k]||0); if(d){ if(!b) b=target(p); b[k]=(b[k]||0)+d; p.stats[k]=s0[k]||0; } }
  });
}
// playoff bucket: p.postStats keyed by LEVEL (MLB/AAA/COL) → its own collective row each
const postBucket = (lvl) => p=>{ p.postStats=p.postStats||{}; return p.postStats[lvl]=p.postStats[lvl]||(p.isP?emptyPitStats():emptyHitStats()); };
const cupBucket = p => p.cupStats=p.cupStats||(p.isP?emptyPitStats():emptyHitStats());
function seriesGame(G, hiId, loId, hiHome){
  const home = hiHome? teamById(G,hiId):teamById(G,loId);   // teamById → works for MLB/AAA/college
  const away = hiHome? teamById(G,loId):teamById(G,hiId);
  const roster=[...rosterOf(G,home.id), ...rosterOf(G,away.id)];
  const snap={}; roster.forEach(p=>snap[p.id]=Object.assign({},p.stats));
  const r = simGame(home, away, G.players);
  markGamesPlayed(home, away, G.players);
  if(isMlbId(hiId)) updateGameRecords(G, r.gameLines, G.season);   // MLB playoff games only
  recordFeats(G, r);                                        // postseason no-hitters / cycles count too
  bankSeparate(roster, snap, postBucket(levelOf(hiId)));   // postseason stats, kept separate by level
  const winnerId = r.hs>r.as?home.id:away.id;
  // keep the scoring-play game log on every postseason game's box (bounded set)
  if(r.box){ r.box.plays=r.plays; r.box.walkoff=r.walkoff; r.box.finalInning=r.finalInning; }
  return { winnerId, hs:r.hs, as:r.as, homeId:home.id, awayId:away.id, box:r.box };
}
// Auto-sim an entire best-of series (2-2-1 home pattern) to completion — used for the
// AAA & college postseasons, which run instantly and are shown as a finished bracket.
function simSeriesAuto(G, hiId, loId, bestOf){
  const need=Math.ceil(bestOf/2); const s={ hi:hiId, lo:loId, hw:0, lw:0, games:[], winner:null };
  let gp=0;
  const ht=teamById(G,hiId), lt=teamById(G,loId);
  while(s.hw<need && s.lw<need && gp++<bestOf+2){
    const hiHome = s.games.length<2 || s.games.length>=4;
    const res=seriesGame(G, hiId, loId, hiHome);
    if(res.winnerId===hiId) s.hw++; else s.lw++;
    // advance each club's playoff game index so getPitchers rotates the starter (matches MLB)
    if(ht) ht.poGi=(ht.poGi||0)+1;
    if(lt) lt.poGi=(lt.poGi||0)+1;
    // keep the box score so the user can open each playoff game's player stats (postseason only)
    s.games.push({ winnerId:res.winnerId, hs:res.hs, as:res.as, box:res.box });
  }
  s.winner = s.hw>s.lw? hiId : loId;
  return s;
}
// Run a full MLB-style bracket (WC play-in → DS → CS → final) for a secondary league,
// fully auto-simmed. `leagues` = the two league names; `lens` = series lengths per round.
function runAutoPlayoffs(G, teams, leagues, lens){
  // make sure every contender can field a game
  teams.forEach(t=>autoSetLineups(t, G.players));
  const seeded={}; leagues.forEach(lg=> seeded[lg]=playoffSeeds(teams,lg).map(t=>t.id));
  const wc={}, ds={}, cs={};
  leagues.forEach(lg=>{ const s=seeded[lg]; wc[lg]=simSeriesAuto(G,s[3],s[4],lens.wc); });
  leagues.forEach(lg=>{ const s=seeded[lg]; ds[lg]=[ simSeriesAuto(G,s[0],wc[lg].winner,lens.ds), simSeriesAuto(G,s[1],s[2],lens.ds) ]; });
  leagues.forEach(lg=>{ const d=ds[lg]; cs[lg]=simSeriesAuto(G,d[0].winner,d[1].winner,lens.cs); });
  const final=simSeriesAuto(G, cs[leagues[0]].winner, cs[leagues[1]].winner, lens.final);
  return { leagues, seeded, wc, ds, cs, final, champion:final.winner, season:G.season };
}

// play a single game in one series (2-2-1 home pattern), updating its W tally
function playoffSeriesGame(G, s, bestOf){
  if(s.done) return;
  const need = Math.ceil(bestOf/2);
  const hiHome = s.games.length<2 || s.games.length>=4;
  const res = seriesGame(G, s.hi, s.lo, hiHome);
  if(res.winnerId===s.hi) s.hw++; else s.lw++;
  s.games.push(res);
  G.teams[s.hi].poGi=(G.teams[s.hi].poGi||0)+1;
  G.teams[s.lo].poGi=(G.teams[s.lo].poGi||0)+1;
  if(s.hw>=need){ s.done=true; s.winner=s.hi; }
  else if(s.lw>=need){ s.done=true; s.winner=s.lo; }
}

// the series currently being contested in this round
function activeSeriesList(po){
  if(po.round==="wc") return [...po.Empire.wc, ...po.Pioneer.wc];
  if(po.round==="ds") return [...po.Empire.ds, ...po.Pioneer.ds];
  if(po.round==="cs") return [po.Empire.cs, po.Pioneer.cs];
  if(po.round==="ws") return po.ws?[po.ws]:[];
  return [];
}

// once a round's series are all decided, build the next round's matchups
function buildNextRound(G){
  const po=G.playoffs;
  if(po.round==="wc"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg];
      // #1 seed draws the wild-card play-in winner; #2 and #3 meet in the other series
      b.ds=[ mkSeries(b.seeds[0], b.wc[0].winner), mkSeries(b.seeds[1], b.seeds[2]) ];
    });
    po.round="ds";
  } else if(po.round==="ds"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg]; b.cs=mkSeries(b.ds[0].winner, b.ds[1].winner); });
    po.round="cs";
  } else if(po.round==="cs"){
    po.ws=mkSeries(po.Empire.cs.winner, po.Pioneer.cs.winner); po.round="ws";
  } else if(po.round==="ws"){
    if(po.wsWinner!=null) return;          // already crowned — guard against double-click
    po.wsWinner=po.ws.winner; G.champion={id:po.ws.winner, season:G.season};
    G.champions = G.champions||[];
    if(!G.champions.some(c=>c.season===G.season)){
      G.champions.push({season:G.season, id:po.ws.winner});
      // hand a championship ring to everyone on the title-winning MLB roster
      rosterOf(G, po.ws.winner).forEach(pl=>{ (pl.rings=pl.rings||[]).push(G.season); });
    }
    logNews(G,"champ",`🏆 ${G.teams[po.ws.winner].name} won the ${G.season} World Series!`, po.ws.winner);
    startOffseason(G);
  }
}

function Playoffs({G, commit, tShow}){
