function Trades({G, commit, tShow}){
  const me = G.teams[G.userTeamId];
  const [otherId, setOtherId] = useState(G.teams.find(t=>t.id!==me.id).id);
  const [give, setGive] = useState([]);      // player ids
  const [get, setGet] = useState([]);
  const [givePk, setGivePk] = useState([]);  // pick ids
  const [getPk, setGetPk] = useState([]);
  const other = G.teams[otherId];
  const reset = ()=>{ setGive([]); setGet([]); setGivePk([]); setGetPk([]); };

  // players: MLB roster + AAA affiliate, AAA tagged
  const orgPlayers = mlbId => rosterOf(G,mlbId).concat(rosterOf(G,aaaIdOf(mlbId))).sort((a,b)=>b.ovr-a.ovr);
  const myRos = orgPlayers(me.id), otRos = orgPlayers(other.id);
  const myPicks = (G.picks||[]).filter(pk=>pk.owner===me.id).sort((a,b)=>a.round-b.round);
  const otPicks = (G.picks||[]).filter(pk=>pk.owner===other.id).sort((a,b)=>a.round-b.round);
  const toggle=(arr,set,id)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  const giveVal = give.reduce((s,id)=>s+playerValue(G.players[id]),0) + givePk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:me.id}),0);
  const getVal  = get.reduce((s,id)=>s+playerValue(G.players[id]),0)  + getPk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:other.id}),0);

  const propose=()=>{
    if(!give.length && !get.length && !givePk.length && !getPk.length){ tShow("Add players or picks to the trade"); return; }
    if(getVal===0){ tShow("Select something to acquire"); return; }
    if(giveVal >= getVal*0.97){
      give.forEach(id=>movePlayer(G, G.players[id], other.id));
      get.forEach(id=>movePlayer(G, G.players[id], me.id));
      givePk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=other.id; });
      getPk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=me.id; });
      autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
      ensureLineup(me, G.players); autoSetLineups(G.aaaTeams[me.id], G.players);
      reset(); commit(G); tShow("✅ Trade accepted!");
    } else {
      const need = (getVal*0.97 - giveVal);
      tShow(`❌ Rejected — ${other.nick} want ~${need.toFixed(0)} more value`);
    }
  };

  const playerBox = (title, ros, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      <div className="max-h-72 overflow-y-auto space-y-0.5">
        {ros.map(p=>(
          <label key={p.id} className={"flex items-center gap-2 px-2 py-1 rounded cursor-pointer text-sm "+(sel.includes(p.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" checked={sel.includes(p.id)} onChange={()=>toggle(sel,set,p.id)} />
            <OvrPill v={p.ovr}/>
            <span className="flex-1">{p.pos} {p.name} {isAAAId(p.teamId)&&<span className="text-amber-400 text-[10px] font-bold">AAA</span>}</span>
            <span className="text-slate-500 text-xs">{money(p.salary)}</span>
          </label>
        ))}
      </div>
    </Card>
  );
  const pickBox = (title, picks, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      {picks.length? <div className="space-y-0.5">
        {picks.map(pk=>(
          <label key={pk.id} className={"flex items-center gap-2 px-2 py-1 rounded cursor-pointer text-sm "+(sel.includes(pk.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" checked={sel.includes(pk.id)} onChange={()=>toggle(sel,set,pk.id)} />
            <span className="flex-1">{pk.season} Round {pk.round}{pk.orig!==pk.owner?` (via ${G.teams[pk.orig].abbr})`:""}</span>
            <span className="text-emerald-400 text-xs">val {pickValue(G,pk)}</span>
          </label>
        ))}
      </div> : <div className="text-xs text-slate-500">No tradeable picks.</div>}
    </Card>
  );

  return (
    <div className="space-y-4">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Trade with:</span>
          <select value={otherId} onChange={e=>{setOtherId(Number(e.target.value));setGet([]);setGetPk([]);}} className="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm">
            {G.teams.filter(t=>t.id!==me.id).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <div className="ml-auto text-xs text-slate-400">You give <b className="text-slate-200">{giveVal.toFixed(0)}</b> · You get <b className="text-slate-200">{getVal.toFixed(0)}</b></div>
        </div>
        <div className="text-xs text-slate-500 mt-1">Pick values reflect each team's projected finish — a pick from a struggling club is worth more.</div>
      </Card>
      <div className="grid md:grid-cols-2 gap-4">
        {playerBox(`Send from ${me.nick}`, myRos, give, setGive)}
        {playerBox(`Acquire from ${other.nick}`, otRos, get, setGet)}
        {pickBox(`${me.nick} picks to send`, myPicks, givePk, setGivePk)}
        {pickBox(`${other.nick} picks to acquire`, otPicks, getPk, setGetPk)}
      </div>
      <button onClick={propose} className="px-6 py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold">Propose Trade</button>
    </div>
  );
}
// move a player between organizations, preserving his MLB/AAA level and cleaning old lineup refs
function movePlayer(G, p, destMlbId){
  if(!p) return;
  const wasAAA = isAAAId(p.teamId);
  const from = teamById(G, p.teamId);
  if(from){ from.lineup=from.lineup.filter(x=>x!==p.id); from.rotation=from.rotation.filter(x=>x!==p.id); if(from.pos) delete from.pos[p.id]; }
  p.teamId = wasAAA ? aaaIdOf(destMlbId) : destMlbId;
}
function ensureLineup(team, players){
  const ros = rosterOf2(players, team.id);
  team.lineup = team.lineup.filter(id=>players[id] && players[id].teamId===team.id && !players[id].isP);
  team.rotation = team.rotation.filter(id=>players[id] && players[id].teamId===team.id && players[id].isP);
  if(team.lineup.length<9 || team.rotation.length<5) autoSetLineups(team, players);
}
function rosterOf2(players, teamId){ return Object.values(players).filter(p=>p.teamId===teamId); }

/* ----------------------------- Free Agency ----------------------------- */
function FreeAgency({G, commit, tShow}){
  const me=G.teams[G.userTeamId];
  const [pos,setPos]=useState("ALL");
  const fas = G.freeAgents.map(id=>G.players[id]).filter(Boolean)
    .filter(p=>pos==="ALL" || (pos==="P"?p.isP:(!p.isP && p.pos===pos)))
    .sort((a,b)=>b.ovr-a.ovr);
  const space = me.budget - payroll(G,me.id);
  const sign=(p)=>{
    if(p.salary>space){ tShow(`Not enough cap space (need ${money(p.salary)})`); return; }
    p.teamId=me.id; p.incentive=0; G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    commit(G); tShow(`✅ Signed ${p.name}`);
  };
  // Incentive-laden deal: lower guaranteed base (cap hit) in exchange for off-cap
  // performance bonuses — lets you fit a player under the cap for less up front.
  const incBase = p => Math.max(0.7, round(p.salary*0.6*10)/10);
  const signInc=(p)=>{
    const base=incBase(p);
    if(base>space){ tShow(`Not enough cap space (need ${money(base)} base)`); return; }
    p.teamId=me.id; p.incentive=round(p.salary*0.6*10)/10; p.salary=base;
    G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    commit(G); tShow(`✅ Signed ${p.name} — ${money(base)} base + ${money(p.incentive)} incentives`);
  };
  if(!G.freeAgents.length) return <Card>No free agents available right now. They appear after the season when contracts expire.</Card>;
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Cap space:</span>
          <b className={space>=0?"text-emerald-400":"text-red-400"}>{money(space)}</b>
          <div className="ml-auto flex gap-1">
            {["ALL","C","1B","2B","3B","SS","LF","CF","RF","DH","P"].map(x=>(
              <button key={x} onClick={()=>setPos(x)} className={"px-2 py-0.5 rounded text-xs "+(pos===x?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>{x}</button>
            ))}
          </div>
        </div>
      </Card>
      <Card>
        <div className="overflow-x-auto max-h-[70vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th>Age</th><th>OVR</th><th>POT</th><th className="text-right">Ask</th><th></th></tr></thead>
            <tbody>
              {fas.map(p=>(
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td>
                  <td className="text-left">{p.name}</td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-slate-400">{p.pot}</td>
                  <td className="text-right">{money(p.salary)} · {p.years}y</td>
                  <td className="text-right pl-2 whitespace-nowrap">
                    <button onClick={()=>sign(p)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500 mr-1">Sign</button>
                    <button onClick={()=>signInc(p)} title={`Sign for ${money(incBase(p))} base + incentives`} className="px-2 py-0.5 bg-[#16213a] rounded text-xs hover:bg-[#1c2c4a]">+Inc</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ----------------------------- Playoffs -------------------------------- */
const SERIES_LEN = { wc:3, ds:5, cs:7, ws:7 };
function mkSeries(hi, lo){ return { hi, lo, hw:0, lw:0, games:[], done:false, winner:null }; }

/* ----------------------------- awards ---------------------------------- */
// MVP / Player-of-the-Year score: rate stats × playing time + counting punch
function mvpScore(p){ const s=p.stats; if(!s.AB) return -999;
  const pt=clamp(s.PA/550,0,1.15);
  return ((ops(s)-0.300)*55)*pt + s.HR*0.6 + s.RBI*0.22 + s.R*0.14 + s.SB*0.08; }
// Cy Young score: ERA/WHIP × innings + strikeouts/wins/saves
function cyScore(p){ const s=p.stats; const ipv=s.OUT/3; if(ipv<10) return -999;
  const pt=clamp(ipv/170,0,1.15);
  return ((4.40-era(s))*20 + (1.28-whip(s))*30)*pt + s.SO*0.10 + s.W*1.6 + s.SV*0.8 + ipv*0.04; }
function bestBy(arr,fn){ return arr.reduce((b,p)=>(b==null||fn(p)>fn(b))?p:b,null); }
function awardLine(p){ const s=p.stats; return p.isP
  ? `${s.W}-${s.L}, ${s.OUT?f2(era(s)):"—"} ERA, ${s.SO} K${s.SV?`, ${s.SV} SV`:""}`
  : `${f3(avg(s))}/${f3(obp(s))}/${f3(slg(s))}, ${s.HR} HR, ${s.RBI} RBI`; }
function addAccolade(p,season,award,league){ (p.accolades=p.accolades||[]).push({season,award,league}); }
// Hand out season awards (run at end of the regular season, before stats reset).
function computeAwards(G){
  const recOf=p=>p?{id:p.id,name:p.name,pos:p.pos,team:(teamById(G,p.teamId)||{}).abbr||"",ovr:p.ovr,line:awardLine(p)}:null;
  const out={season:G.season, leagues:{}};
  ["Empire","Pioneer"].forEach(lg=>{
    const pool=Object.values(G.players).filter(p=>{const t=teamById(G,p.teamId);return t&&!t.aaa&&t.league===lg;});
    const hitters=pool.filter(p=>!p.isP), pitchers=pool.filter(p=>p.isP);
    const mvp=bestBy(hitters,mvpScore), cy=bestBy(pitchers,cyScore);
    const asHit=[];
    ["C","1B","2B","3B","SS","LF","CF","RF","DH"].forEach(pos=>{
      const poolPos = pos==="DH" ? hitters.filter(p=>!asHit.includes(p))
                                 : hitters.filter(p=>p.pos===pos && !asHit.includes(p));
      const b=bestBy(poolPos,mvpScore); if(b) asHit.push(b);
    });
    const asPit=[...pitchers].sort((a,b)=>cyScore(b)-cyScore(a)).slice(0,6);
    out.leagues[lg]={ mvp:recOf(mvp), cy:recOf(cy), allStars:{hitters:asHit.map(recOf), pitchers:asPit.map(recOf)} };
    if(mvp) addAccolade(mvp,G.season,"MVP",lg);
    if(cy) addAccolade(cy,G.season,"Cy Young",lg);
    asHit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
    asPit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
  });
  G.awards=out;
  (G.awardHistory=G.awardHistory||[]).unshift(out);
  if(G.awardHistory.length>40) G.awardHistory.pop();
}

function enterPlayoffs(G){
  computeAwards(G);   // hand out hardware while season stats are still live
  G.phase="playoffs";
  const mk = league => {
    const seeds = playoffSeeds(G.teams, league).map(t=>t.id);
    // round 1: wildcard (best-of-3): seed2v5, seed3v4 ; 0,1 bye
    return { seeds, wc:[ mkSeries(seeds[2],seeds[5]), mkSeries(seeds[3],seeds[4]) ], ds:null, cs:null };
  };
  G.playoffs = { Empire: mk("Empire"), Pioneer: mk("Pioneer"), round:"wc", wsWinner:null, ws:null };
}

function seriesGame(G, hiId, loId, hiHome){
  const home = hiHome? G.teams[hiId]:G.teams[loId];
  const away = hiHome? G.teams[loId]:G.teams[hiId];
  const r = simGame(home, away, G.players);
  markGamesPlayed(home, away, G.players);
  const winnerId = r.hs>r.as?home.id:away.id;
  return { winnerId, hs:r.hs, as:r.as, homeId:home.id, awayId:away.id };
}

// play a single game in one series (2-2-1 home pattern), updating its W tally
function playoffSeriesGame(G, s, bestOf){
  if(s.done) return;
  const need = Math.ceil(bestOf/2);
  const hiHome = s.games.length<2 || s.games.length>=4;
  const res = seriesGame(G, s.hi, s.lo, hiHome);
  if(res.winnerId===s.hi) s.hw++; else s.lw++;
  s.games.push(res);
  if(s.hw>=need){ s.done=true; s.winner=s.hi; }
  else if(s.lw>=need){ s.done=true; s.winner=s.lo; }
}

// the series currently being contested in this round
function activeSeriesList(po){
  if(po.round==="wc") return [...po.Empire.wc, ...po.Pioneer.wc];
  if(po.round==="ds") return [...po.Empire.ds, ...po.Pioneer.ds];
  if(po.round==="cs") return [po.Empire.cs, po.Pioneer.cs];
  if(po.round==="ws") return po.ws?[po.ws]:[];
  return [];
}

// once a round's series are all decided, build the next round's matchups
function buildNextRound(G){
  const po=G.playoffs;
  if(po.round==="wc"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg];
      b.ds=[ mkSeries(b.seeds[0], b.wc[1].winner), mkSeries(b.seeds[1], b.wc[0].winner) ];
    });
    po.round="ds";
  } else if(po.round==="ds"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg]; b.cs=mkSeries(b.ds[0].winner, b.ds[1].winner); });
    po.round="cs";
  } else if(po.round==="cs"){
    po.ws=mkSeries(po.Empire.cs.winner, po.Pioneer.cs.winner); po.round="ws";
  } else if(po.round==="ws"){
    po.wsWinner=po.ws.winner; G.champion={id:po.ws.winner, season:G.season}; startOffseason(G);
  }
}

function Playoffs({G, commit, tShow}){
  const po=G.playoffs;
  if(!po) return <Card>No active postseason.</Card>;
  const tn = id => G.teams[id];
  const round = po.round;
  const bestOf = SERIES_LEN[round] || 7;
  const active = activeSeriesList(po);
  const allDone = active.length>0 && active.every(s=>s.done);
  const roundName = {wc:"Wild Card",ds:"Division Series",cs:"League Championship",ws:"World Series"}[round];
  const nextName = {wc:"Division Series",ds:"League Championship",cs:"World Series"}[round];
  const userSeries = active.find(s=>s.hi===G.userTeamId||s.lo===G.userTeamId);

  const simGameStep = ()=>{ active.forEach(s=>{ if(!s.done) playoffSeriesGame(G,s,bestOf); }); commit(G); };
  const simRound = ()=>{ let guard=0; while(active.some(s=>!s.done) && guard<80){ active.forEach(s=>{ if(!s.done) playoffSeriesGame(G,s,bestOf); }); guard++; } commit(G); };
  const nextRound = ()=>{ buildNextRound(G); commit(G); if(po.round==="ws"||G.phase==="offseason") tShow("🏆 Champions crowned!"); };

  // one series row with its running W tally and game-by-game line scores
  const SeriesView = ({title, s, len})=>{

            const hiWon = g.winnerId===s.hi;
            return <span key={i} title={"Game "+(i+1)}
              className={"text-[10px] rounded px-1 tnum "+(hiWon?"bg-emerald-900/50 text-emerald-200":"bg-[#0b1220] text-slate-300")}>
              G{i+1} {hiSc}-{loSc}</span>;
          })}
          {!s.done && <span className="text-[10px] text-slate-500 px-1">best of {len} · {Math.ceil(len/2)-Math.max(s.hw,s.lw)} to clinch</span>}

  return (
    <div className="space-y-4">
      <Card>

          <div className="flex gap-2">
            {!po.wsWinner && !allDone && <>
              <button onClick={simGameStep} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Sim Next Game →</button>
              <button onClick={simRound} className="px-3 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] text-sm">Sim Whole {roundName}</button>

        {userSeries && <div className="text-xs text-emerald-300 mt-2">
          Your series: {tn(userSeries.hi).abbr} vs {tn(userSeries.lo).abbr} — {userSeries.done? (userSeries.winner===G.userTeamId?"you advance! ✅":"eliminated") : `${userSeries.hi===G.userTeamId?userSeries.hw:userSeries.lw}–${userSeries.hi===G.userTeamId?userSeries.lw:userSeries.hw}`}
        </div>}

/* ----------------------------- Offseason ------------------------------- */
function startOffseason(G){
  G.phase="offseason";
  G.offStep = "intro";
}

function OffseasonHub({G, commit, tShow, setTab}){
  const champ = G.champion? G.teams[G.champion.id]:null;
  const step = G.offStep||"intro";

  const doProgression = ()=>{
    Object.values(G.players).forEach(p=>{
      recordSeasonHistory(p, G.season);   // log the year that just ended (team[s], stats) before aging
      const before = p.ovr;
      p.age++;
      // Directed development: young players climb toward their potential; prospects in
      // AAA grow faster; performers (esp. promoted early) keep climbing; older players decline.
      const gap = p.pot - p.ovr;            // remaining room to ceiling
      const perf = seasonPerf(p);           // how he played this year
      let center;
      if(p.age<=23)      center = 1.5 + gap*0.16;            // fast risers
      else if(p.age<=26) center = 0.6 + gap*0.11;
      else if(p.age<=28) center = 0.05 + gap*0.05;           // last bit of growth, then peak
      else if(p.age<=30) center = -0.5;                      // gentle decline begins
      else if(p.age<=33) center = -1.1 - (p.age-30)*0.25;
      else               center = -2.2 - (p.age-33)*0.4;     // age cliff
      if(isAAAId(p.teamId) && p.age<=25) center += 1.2;      // minors development boost
      // performance: young producers develop faster, vets who rake age gracefully, busts stall
      if(p.age<=27) center += perf.score * perf.weight * 1.6;
      else          center += perf.score * perf.weight * 0.7;
      center = clamp(center, -5, 4.5);
      const each = r=>{ if(p[r]!==undefined) p[r]=clamp(round(p[r]+gauss(center,1.2)),20,99); };
      (p.isP?["stu","ctl","stm"]:["con","pow","eye","spd","def"]).forEach(each);
      computeOvr(p);
      // a young breakout can raise his ceiling; everyone's ceiling erodes once past their prime
      if(p.age<=25 && (p.ovr>p.pot || (perf.score>0.7 && chance(0.5))))
        p.pot = clamp(Math.max(p.ovr, p.pot+rint(0,3)), p.ovr, 99);
      else if(p.age>=29) p.pot = Math.max(p.ovr, p.pot-1);
      p._lastDelta = p.ovr - before;        // for the offseason development report
      // reset season stats -> career
      mergeCareer(p);
      p.salary = blendSalary(p);
    });
    // retirements: old players, and washed-up fringe vets, hang it up
    const retired=[];
    Object.values(G.players).forEach(p=>{
      let retP = p.age>=39? 0.85 : p.age>=37? 0.5 : p.age>=35? 0.25 : p.age>=33? 0.08 : 0.004;
      if(p.age>=32 && p.ovr<48) retP = Math.max(retP, 0.45); // fringe vets retire rather than ride the minors
      if(chance(retP)){ retired.push(p.id); }
    });
    retired.forEach(id=>{
      const p=G.players[id]; const t=teamById(G, p.teamId);
      if(t){ t.lineup=t.lineup.filter(x=>x!==id); t.rotation=t.rotation.filter(x=>x!==id); if(t.pos) delete t.pos[id]; }
      G.freeAgents=G.freeAgents.filter(x=>x!==id);
      delete G.players[id];
    });
    // decrement contracts, then expire to free agency
    Object.values(G.players).forEach(p=>{ p.years--; });
    Object.values(G.players).forEach(p=>{
      if(p.years<=0 && p.teamId!=null){
        // young prospects in the minors stay under team control
        if(isAAAId(p.teamId) && p.age<25){ p.years=rint(2,4); return; }
        const t=teamById(G, p.teamId);
        if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
        p.teamId=null; p.years=rint(1,4); p.salary=salaryFor(p);
        if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
      }
    });
    G.offStep="draft-build";
    buildDraft(G);
    commit(G);
    tShow("Players aged & contracts processed");
  };

  if(step==="intro"){
    return (
      <div className="space-y-4">
        {champ && <Card className="text-center">
          <div className="text-3xl mb-1">🏆</div>
          <div className="text-xl font-black text-emerald-400">{champ.name}</div>
          <div className="text-slate-400 text-sm">{G.champion.season} Champions</div>
        </Card>}
        <Card>
          <h3 className="font-bold mb-2">Offseason — {G.season} → {G.season+1}</h3>
          <ol className="text-sm text-slate-300 list-decimal ml-5 space-y-1 mb-3">
            <li>Player aging, development & retirements</li>
            <li>Expiring contracts hit free agency</li>
            <li>Amateur Draft (Draft tab)</li>
            <li>Sign free agents (Free Agency tab)</li>
            <li>Start the new season</li>
          </ol>
          <button onClick={doProgression} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Process Offseason →</button>
        </Card>
      </div>
    );
  }
  // draft-build or later
  const orgIds=[G.userTeamId, aaaIdOf(G.userTeamId)];
  const dev=Object.values(G.players).filter(p=>orgIds.includes(p.teamId) && p._lastDelta!=null);
  const risers=[...dev].sort((a,b)=>b._lastDelta-a._lastDelta).slice(0,6).filter(p=>p._lastDelta>0);
  const fallers=[...dev].sort((a,b)=>a._lastDelta-b._lastDelta).slice(0,6).filter(p=>p._lastDelta<0);
  const devRow=p=>(
    <div key={p.id} className="flex items-center gap-2 text-sm">
      <OvrPill v={p.ovr}/>
      <span className="flex-1 truncate">{p.pos} {p.name} <span className="text-slate-500 text-xs">{p.age}{isAAAId(p.teamId)?" · AAA":""}</span></span>
      <span className={"tnum font-semibold "+(p._lastDelta>0?"text-emerald-400":"text-red-400")}>{p._lastDelta>0?"+":""}{p._lastDelta}</span>
    </div>
  );
  return (
    <div className="space-y-4">
      {(risers.length||fallers.length)>0 && <Card>
        <h3 className="font-bold mb-1">Player Development — {G.season} → {G.season+1}</h3>
        <p className="text-xs text-slate-400 mb-3">OVR change from aging &amp; development across your organization. Young players climb toward their potential (faster in AAA and faster still when they produce); players 29+ start to decline.</p>
        <div className="grid sm:grid-cols-2 gap-4">
          <div><div className="text-xs text-emerald-300 font-semibold mb-1">📈 Risers</div><div className="space-y-1">{risers.length?risers.map(devRow):<div className="text-slate-500 text-sm">—</div>}</div></div>
          <div><div className="text-xs text-red-300 font-semibold mb-1">📉 Decliners</div><div className="space-y-1">{fallers.length?fallers.map(devRow):<div className="text-slate-500 text-sm">—</div>}</div></div>
        </div>
      </Card>}
      <Card>
        <h3 className="font-bold mb-2">Offseason Tasks</h3>
        <p className="text-sm text-slate-300 mb-3">Use the <b>Draft</b> and <b>Free Agency</b> tabs to improve your roster, then start the new season.</p>
        <div className="flex gap-2 flex-wrap">
          <button onClick={()=>setTab("draft")} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a]">Go to Draft</button>
          <button onClick={()=>setTab("fa")} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a]">Go to Free Agency</button>
          <button onClick={()=>{ startNewSeason(G); commit(G); tShow("Play ball! New season started."); setTab("hub"); }}
            className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Start {G.season+1} Season →</button>
        </div>
      </Card>
    </div>
  );
}

// snapshot the season that just ended into per-year history (with team[s] played for),
// then clear the year's team tags. Call BEFORE aging/development so age & OVR reflect the season.
function recordSeasonHistory(p, season){
  const s=p.stats;
  const played = p.isP ? (s.OUT>0) : (s.PA>0);
  if(played){
    p.history = p.history||[];
    p.history.push({ season, age:p.age, ovr:p.ovr, isP:p.isP,
      teams:(p._yrTeams&&p._yrTeams.length)?p._yrTeams.slice():[],
      stats:Object.assign({}, s) });
    if(p.history.length>30) p.history.shift();
  }
  p._yrTeams=[];
}
function mergeCareer(p){
  const c=p.career, s=p.stats;
  Object.keys(s).forEach(k=>{ c[k]=(c[k]||0)+s[k]; });
  p.stats = p.isP?emptyPitStats():emptyHitStats();
}
function blendSalary(p){
  // re-evaluate salary based on new ovr, keep within reason
  const fair=salaryFor(p);
  return clamp(round(((p.salary*0.5)+(fair*0.5))*10)/10, 0.7, 45);
}

function buildDraft(G){
  // generate draft class: 5 rounds * 30 picks = 150 young prospects
  const cls=[];
  for(let i=0;i<150;i++){
    let p;
    if(chance(0.45)) p=makePitcher(chance(0.6)?"SP":"RP",[18,22]);
    else p=makeHitter(pick(INF_OF.concat(["DH"])),[18,22]);
    // prospects: lower current, boosted potential
    p.teamId=null; p.years=4; p.salary=0.7;
    cls.push(p.id); G.players[p.id]=p;
  }
  // selection order from owned picks: by round, then the ORIGINAL team's
  // reverse-standings slot (so traded picks keep their original draft value)
  const worstFirst=[...G.teams].sort((a,b)=>pct(a)-pct(b)).map(t=>t.id);
  const slotOf=id=>worstFirst.indexOf(id);
  G.draftPicks=[...G.picks].sort((a,b)=> a.round-b.round || slotOf(a.orig)-slotOf(b.orig));
  G.draftPick=0;
  G.draftClass=cls.sort((a,b)=>G.players[b].pot-G.players[a].pot);
}

function Draft({G, commit, tShow}){
  const picksArr = G.draftPicks||[];
  if(!picksArr.length)
    return <Card>The draft isn't ready yet — process the offseason from the Hub first.</Card>;
  const totalPicks = picksArr.length;

  if(G.draftPick>=totalPicks){
    return <Card><div className="font-bold mb-2">✅ Draft complete</div>
      <p className="text-sm text-slate-300">Your picks report to your <b>AAA affiliate</b> (check the Roster → AAA section, then call up whoever's ready). Head to Free Agency or start the season from the Hub.</p></Card>;
  }

  const curPick = picksArr[G.draftPick];
  const onClock = curPick.owner;
  const round = curPick.round;
  const traded = curPick.owner!==curPick.orig;
  const isUser = onClock===G.userTeamId;
  const avail = G.draftClass.map(id=>G.players[id]).filter(Boolean);
  const pickInRound = picksArr.slice(0,G.draftPick).filter(p=>p.round===round).length+1;

  const assign=(g,pid,ownerId)=>{ const p=g.players[pid]; if(!p) return;        // draftees start in AAA
    const pk=(g.draftPicks||[])[g.draftPick]||{};
    p.draftInfo={ year:g.season+1, round:pk.round||0, overall:g.draftPick+1,
                  by:(g.teams[ownerId]?g.teams[ownerId].abbr:ownerId) };
    p.teamId=aaaIdOf(ownerId); };
  const draftPlayer=(pid)=>{
    if(!G.players[pid]) return;
    assign(G,pid,onClock);
    G.draftClass=G.draftClass.filter(x=>x!==pid);
    G.draftPick++; commit(G);
  };
  const aiPick=()=>{ const best=G.draftClass[0]; if(best!=null) draftPlayer(best); };
  const simToMe=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && picksArr[g.draftPick].owner!==g.userTeamId && guard<totalPicks){
      const best=g.draftClass[0]; if(best==null) break;
      assign(g,best,picksArr[g.draftPick].owner);
      g.draftClass=g.draftClass.filter(x=>x!==best); g.draftPick++; guard++;
    }
    commit(g);
  };
  const simAll=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && guard<totalPicks+5){
      const best=g.draftClass[0]; if(best==null) break;
      assign(g,best,picksArr[g.draftPick].owner);
      g.draftClass=g.draftClass.filter(x=>x!==best); g.draftPick++; guard++;
    }
    g.teams.forEach(t=>trimRoster(g,t));
    g.aaaTeams.forEach(t=>autoSetLineups(t,g.players)); // draftees joined AAA
    commit(g); tShow("Draft complete");
  };

  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="text-sm">Round <b>{round}</b> · Pick <b>{pickInRound}</b> · Overall <b>{G.draftPick+1}</b>/{totalPicks}</div>
          <div className={"px-2 py-0.5 rounded text-sm font-semibold "+(isUser?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>
            On the clock: {G.teams[onClock].name}{isUser?" (YOU)":""}{traded?` (via ${G.teams[curPick.orig].abbr})`:""}
          </div>
          <div className="ml-auto flex gap-2">
            {!isUser && <button onClick={aiPick} className="px-3 py-1 bg-[#16213a] rounded text-sm">Next Pick</button>}
            <button onClick={simToMe} className="px-3 py-1 bg-[#16213a] rounded text-sm">Sim to My Pick</button>
            <button onClick={simAll} className="px-3 py-1 bg-[#16213a] rounded text-sm">Sim Rest</button>
          </div>
        </div>
      </Card>
      <Card>
        <div className="text-xs text-slate-400 mb-1">Best Available ({avail.length})</div>
        <div className="overflow-x-auto max-h-[65vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th>Age</th><th>OVR</th><th>POT</th>{isUser&&<th></th>}</tr></thead>
            <tbody>
              {avail.slice(0,60).map(p=>(
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td><td className="text-left">{p.name}</td>
                  <td className="text-center">{p.age}</td><td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-amber-300 font-semibold">{p.pot}</td>
                  {isUser&&<td className="text-right"><button onClick={()=>draftPlayer(p.id)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500">Draft</button></td>}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

const ROSTER_CAP = 32;
function trimRoster(G, team){
  let ros=rosterOf(G,team.id).sort((a,b)=>b.ovr-a.ovr);
  // cap roster size (keep the best by OVR); supports the deeper 30-man rosters
  while(ros.length>ROSTER_CAP){
    const cut=ros.pop();
    cut.teamId=null; if(!G.freeAgents.includes(cut.id)) G.freeAgents.push(cut.id);
  }
}

function startNewSeason(G){
  // AI free agency: each AI team fills to ~26 and addresses cap
  G.teams.forEach(t=>{
    if(t.id===G.userTeamId) return;
    let ros=rosterOf(G,t.id);
    let guard=0;
    while(ros.length<28 && G.freeAgents.length && guard<80){
      // pick best affordable FA
      const space=t.budget-payroll(G,t.id);
      const cand=G.freeAgents.map(id=>G.players[id]).filter(p=>p&&p.salary<=Math.max(space,1)).sort((a,b)=>b.ovr-a.ovr)[0];
      if(!cand) break;
      cand.teamId=t.id; G.freeAgents=G.freeAgents.filter(id=>id!==cand.id);
      ros=rosterOf(G,t.id); guard++;
    }
    trimRoster(G,t);
    autoSetLineups(t, G.players);
  });
  // make sure user roster is valid for play
  const me=G.teams[G.userTeamId];
  ensureLineup(me, G.players);
  // AAA rosters changed (draft, call-ups/send-downs) — refresh their lineups
  G.aaaTeams.forEach(t=>autoSetLineups(t, G.players));
  // reset records & stats (MLB + AAA)
  G.teams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0; });
  G.aaaTeams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0; });
  G.schedule = buildSchedule(G.teams.map(t=>t.id));
  G.aaaSchedule = buildSchedule(G.aaaTeams.map(t=>t.id));
  G.day=0; G.season++; G.phase="regular";
  G.playoffs=null; G.draftClass=[]; G.draftPicks=[]; G.draftPick=0; G.offStep=null;
  G.picks = buildPicks(G.season+1, G.teams);   // next year's tradeable picks
}

/* ----------------------------- Awards UI ------------------------------- */
function Awards({G}){
  const a=G.awards; const hist=G.awardHistory||[];
  if(!a) return <Card>Awards are handed out at the end of each regular season. Finish a season to crown your <b>Players of the Year</b>, <b>Cy Young</b> winners, and <b>All-Star</b> teams.</Card>;
  const Person=({r,tag})=> r?(
    <div className="flex items-center gap-2">
      {tag && <span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-500 text-slate-900 font-bold w-9 text-center">{tag}</span>}
      <OvrPill v={r.ovr}/>
      <div className="flex-1 min-w-0">
        <div className="font-semibold text-sm truncate">{r.name} <span className="text-slate-500 text-xs">{r.pos} · {r.team}</span></div>
        <div className="text-xs text-slate-400 tnum truncate">{r.line}</div>
      </div>
    </div>
  ):<div className="text-slate-500 text-sm">—</div>;
  return (
    <div className="space-y-4">
      <Card><h3 className="font-bold">🏅 {a.season} Awards</h3></Card>
      <div className="grid md:grid-cols-2 gap-4">
        {["Empire","Pioneer"].map(lg=>{
          const L=a.leagues[lg]; if(!L) return null;
          return (
            <Card key={lg}>
              <div className="font-bold text-emerald-300 mb-2">{lg} League</div>
              <div className="space-y-3 mb-3">
                <div><div className="text-xs text-amber-300 font-semibold mb-1">Player of the Year</div><Person r={L.mvp} tag="MVP"/></div>
                <div><div className="text-xs text-amber-300 font-semibold mb-1">Cy Young</div><Person r={L.cy} tag="CY"/></div>
              </div>
              <div className="text-xs text-slate-400 mb-1 font-semibold">All-Stars — Position Players</div>
              <div className="space-y-1 mb-3">{L.allStars.hitters.map((r,i)=><Person key={i} r={r}/>)}</div>
              <div className="text-xs text-slate-400 mb-1 font-semibold">All-Stars — Pitchers</div>
              <div className="space-y-1">{L.allStars.pitchers.map((r,i)=><Person key={i} r={r}/>)}</div>
            </Card>
          );
        })}
      </div>
      {hist.length>1 && <Card>
        <h3 className="font-bold mb-2">Award History</h3>
        <div className="overflow-x-auto"><table className="w-full text-sm">
          <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left py-1">Season</th><th className="text-left">League</th><th className="text-left">MVP</th><th className="text-left">Cy Young</th></tr></thead>
          <tbody>{hist.map(h=>["Empire","Pioneer"].map(lg=>{const L=h.leagues&&h.leagues[lg]; if(!L) return null; return (
            <tr key={h.season+lg} className="border-b border-[#15203a]"><td className="py-1">{h.season}</td><td className="text-slate-400">{lg}</td><td>{L.mvp?`${L.mvp.name} (${L.mvp.team})`:"—"}</td><td>{L.cy?`${L.cy.name} (${L.cy.team})`:"—"}</td></tr>
          );}))}</tbody>
        </table></div>
      </Card>}
    </div>
  );
}

/* ----------------------------- All Players browser --------------------- */
function PlayersBrowser({G}){
  const [q,setQ]=useState(""); const [teamF,setTeamF]=useState("ALL"); const [levelF,setLevelF]=useState("ALL");
  const [posF,setPosF]=useState("ALL"); const [ageMin,setAgeMin]=useState(""); const [ageMax,setAgeMax]=useState("");
  const [sortK,setSortK]=useState("ovr"); const [modal,setModal]=useState(null);
  const all=Object.values(G.players);
  const lvlOf=p=>p.teamId==null?"FA":(isAAAId(p.teamId)?"AAA":"MLB");
  const orgOf=p=>p.teamId==null?null:(isAAAId(p.teamId)?parentIdOf(p.teamId):p.teamId);
  let rows=all.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q.toLowerCase())) return false;
    const lvl=lvlOf(p);
    if(levelF!=="ALL" && lvl!==levelF) return false;
    if(teamF==="FA"){ if(lvl!=="FA") return false; }
    else if(teamF!=="ALL"){ if(orgOf(p)!==Number(teamF)) return false; }
    if(posF==="P"){ if(!p.isP) return false; }
    else if(posF==="H"){ if(p.isP) return false; }
    else if(posF!=="ALL"){ if(p.pos!==posF) return false; }
    const amin=ageMin?Number(ageMin):0, amax=ageMax?Number(ageMax):99;
    if(p.age<amin||p.age>amax) return false;
    return true;
  });
  const sorters={ ovr:(a,b)=>b.ovr-a.ovr, pot:(a,b)=>b.pot-a.pot, age:(a,b)=>a.age-b.age,
    name:(a,b)=>a.name.localeCompare(b.name), salary:(a,b)=>b.salary-a.salary, value:(a,b)=>playerValue(b)-playerValue(a),
    hr:(a,b)=>(b.stats.HR||0)-(a.stats.HR||0), avg:(a,b)=>avg(b.stats)-avg(a.stats),
    era:(a,b)=>((a.isP&&a.stats.OUT)?era(a.stats):99)-((b.isP&&b.stats.OUT)?era(b.stats):99) };
  const total=rows.length; rows=[...rows].sort(sorters[sortK]||sorters.ovr).slice(0,400);
  const keyStat=p=>p.isP ? (p.stats.OUT?`${p.stats.W}-${p.stats.L} · ${f2(era(p.stats))} ERA`:"—")
                         : (p.stats.AB?`${f3(avg(p.stats))} · ${p.stats.HR} HR · ${f3(ops(p.stats))} OPS`:"—");
  const teamLabel=p=>{ const t=teamById(G,p.teamId); return t?(t.abbr+(t.aaa?" AAA":"")):"FA"; };
  const sel="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm";
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex flex-wrap gap-2 items-center">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search name…" className={sel+" flex-1 min-w-[140px]"} />
          <select value={teamF} onChange={e=>setTeamF(e.target.value)} className={sel}>
            <option value="ALL">All teams</option>
            {G.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            <option value="FA">Free Agents</option>
          </select>
          <select value={levelF} onChange={e=>setLevelF(e.target.value)} className={sel}>
            <option value="ALL">All levels</option><option value="MLB">MLB</option><option value="AAA">AAA</option><option value="FA">Free agent</option>
          </select>
          <select value={posF} onChange={e=>setPosF(e.target.value)} className={sel}>
            <option value="ALL">All pos</option><option value="H">Hitters</option><option value="P">Pitchers</option>
            {["C","1B","2B","3B","SS","LF","CF","RF","DH","SP","RP"].map(x=><option key={x} value={x}>{x}</option>)}
          </select>
          <input value={ageMin} onChange={e=>setAgeMin(e.target.value)} placeholder="min age" type="number" className={sel+" w-20"} />
          <input value={ageMax} onChange={e=>setAgeMax(e.target.value)} placeholder="max age" type="number" className={sel+" w-20"} />
          <select value={sortK} onChange={e=>setSortK(e.target.value)} className={sel}>
            <option value="ovr">Sort: OVR</option><option value="pot">POT</option><option value="value">Trade value</option>
            <option value="age">Age</option><option value="salary">Salary</option><option value="name">Name</option>
            <option value="hr">HR</option><option value="avg">AVG</option><option value="era">ERA</option>
          </select>
        </div>
        <div className="text-xs text-slate-500 mt-2">{total} players match{total>400?" (showing first 400)":""}</div>
      </Card>
      <Card>
        <div className="overflow-x-auto max-h-[72vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940] sticky top-0 bg-[#101a30]">
              <th className="text-left py-1">Pos</th><th className="text-left">Name</th><th className="text-left">Team</th><th>Lvl</th><th>Age</th><th>OVR</th><th>POT</th><th className="text-right">Salary</th><th className="text-right pr-2">Val</th><th className="text-left pl-3">Stats</th>
            </tr></thead>
            <tbody>
              {rows.map(p=>(
                <tr key={p.id} className="border-b border-[#15203a] hover:bg-[#13203a]">
                  <td className="text-slate-400 py-1">{p.pos}</td>
                  <td className="text-left"><button onClick={()=>setModal(p)} className="font-medium hover:text-emerald-300">{p.name}</button></td>
                  <td className="text-left text-slate-400">{teamLabel(p)}</td>
                  <td className="text-center text-slate-500 text-xs">{lvlOf(p)}</td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-slate-400">{p.pot}</td>
                  <td className="text-right text-slate-300">{money(p.salary)}</td>
                  <td className="text-right pr-2 text-slate-400">{playerValue(p).toFixed(0)}</td>
                  <td className="text-left pl-3 text-slate-400 text-xs whitespace-nowrap">{keyStat(p)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
      {modal && <PlayerModal p={modal} team={teamById(G, modal.teamId)} onClose={()=>setModal(null)} />}
    </div>
  );
}

/* ----------------------------- mount ----------------------------------- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
