/* =========================================================================
   POCKET GM — BASEBALL   (single-file React)
   Full GM suite: roster, lineup/rotation, season sim, standings, stat
   leaders, finances/contracts, trades, free agency, amateur draft,
   playoffs, and a multi-season franchise loop. Fictional players/teams.

/* ----------------------------- RNG / utils ----------------------------- */
// Pluggable RNG: defaults to Math.random, but league generation can swap in a
// seeded PRNG (mulberry32) for reproducible/shareable leagues, then restore.
let _rng = Math.random;
function setRng(fn){ _rng = fn || Math.random; }
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rint = (a, b) => Math.floor(_rng() * (b - a + 1)) + a;
const pick = arr => arr[Math.floor(_rng() * arr.length)];
const chance = p => _rng() < p;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const round = Math.round;
function gauss(mean, sd) {
  let u = 0, v = 0;
  while (u === 0) u = _rng();
  while (v === 0) v = _rng();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rateGauss = (mean, sd) => clamp(round(gauss(mean, sd)), 20, 99);
const n01 = r => (r - 20) / 79; // normalize 20..99 -> 0..1
const money = m => (m >= 1 ? "$" + m.toFixed(1) + "M" : "$" + round(m * 1000) + "K");
// Player-id generator. NOTE: this counter lives in memory and resets to 1 on every
// page load, but player ids are persisted in the save. After loading a franchise we
// MUST resume it past the highest existing id (see uid.atLeast in migrate) — otherwise
// freshly generated players (draft, AAA refill, FA fill) reuse low ids and silently
// OVERWRITE existing players in the G.players dict. That was the "my players keep
// disappearing every season" bug (your oldest = lowest-id starters got clobbered first).
const uid = (() => { let i = 1; const f = () => i++; f.atLeast = n => { if(Number.isFinite(n) && n >= i) i = n + 1; }; return f; })();

const genName = () => pick(FIRST) + " " + pick(LAST);

/* ----------------------------- teams ----------------------------------- */
// [city, nickname, abbr, league, division]
const TEAM_DEFS = [
  ["New York","Empires","NYE","Empire","East"],
  ["Boston","Mariners","BOS","Empire","East"],
  ["Philadelphia","Liberty","PHI","Empire","East"],
  ["Washington","Sentinels","WAS","Empire","East"],
  ["Baltimore","Crabs","BAL","Empire","East"],
  ["Chicago","Pillars","CHP","Empire","Central"],
  ["Detroit","Motors","DET","Empire","Central"],
  ["Cleveland","Forge","CLE","Empire","Central"],
  ["Minneapolis","Northmen","MIN","Empire","Central"],
  ["Kansas City","Smoke","KC","Empire","Central"],
  ["Los Angeles","Stars","LAS","Empire","West"],
  ["San Francisco","Bridges","SF","Empire","West"],
  ["Seattle","Pilots","SEA","Empire","West"],
  ["Denver","Summit","DEN","Empire","West"],
  ["Phoenix","Heat","PHX","Empire","West"],
  ["Miami","Tarpons","MIA","Pioneer","East"],
  ["Atlanta","Peaches","ATL","Pioneer","East"],
  ["Tampa","Rays","TB","Pioneer","East"],
  ["Charlotte","Hornets","CLT","Pioneer","East"],
  ["Pittsburgh","Steel","PIT","Pioneer","East"],
  ["St. Louis","Arches","STL","Pioneer","Central"],
  ["Milwaukee","Brewers","MIL","Pioneer","Central"],
  ["Cincinnati","Reds","CIN","Pioneer","Central"],
  ["Houston","Comets","HOU","Pioneer","Central"],
  ["Dallas","Drovers","DAL","Pioneer","Central"],
  ["San Diego","Waves","SD","Pioneer","West"],
  ["Portland","Lumber","POR","Pioneer","West"],
  ["Sacramento","Gold","SAC","Pioneer","West"],

  ["Austin","Outlaws","AUS","Pioneer","West"],

const HIT_POS = ["C","1B","2B","3B","SS","LF","CF","RF","DH"];
const INF_OF = ["C","1B","2B","3B","SS","LF","CF","RF"];
const FIELD_POS = ["C","1B","2B","3B","SS","LF","CF","RF"]; // 8 defensive slots (+ DH = 9th batter)

/* MLB teams use ids 0..29; each has a AAA affiliate at id 30+i. A player's teamId
   tells you which roster (and level) he's on. */
const AAA_OFFSET = 30;
const isAAAId = id => id!=null && id>=AAA_OFFSET;
const aaaIdOf = mlbId => mlbId + AAA_OFFSET;
const parentIdOf = aaaId => aaaId - AAA_OFFSET;
function teamById(G, id){ return id==null?null : (id>=AAA_OFFSET ? G.aaaTeams[id-AAA_OFFSET] : G.teams[id]); }

/* ----------------------------- player gen ------------------------------ */
function emptyHitStats(){return{G:0,PA:0,AB:0,H:0,_2B:0,_3B:0,HR:0,R:0,RBI:0,BB:0,SO:0,SB:0,CS:0};}
function emptyPitStats(){return{G:0,GS:0,OUT:0,H:0,ER:0,BB:0,SO:0,W:0,L:0,SV:0,HRA:0,QS:0,HLD:0};}
// Per-level (MLB vs AAA) stat splitting for the year-by-year history. The sim
// pools everything into p.stats; we snapshot at each level change (call-up / send-down)
// and at season end, attributing the delta since the last snapshot to the level the
// player was just at. So a season split between the bigs and AAA yields two history rows.
function flushLevel(p){
  if(!p || !p.stats) return;
  const lvl = isAAAId(p.teamId) ? "AAA" : "MLB";
  if(!p._levelStats) p._levelStats = {};
  if(!p._levelStats[lvl]) p._levelStats[lvl] = p.isP?emptyPitStats():emptyHitStats();
  const snap = p._levelSnap || {}, bucket = p._levelStats[lvl];
  for(const k in p.stats) bucket[k] = (bucket[k]||0) + (p.stats[k] - (snap[k]||0));
  p._levelSnap = Object.assign({}, p.stats);
}

function makeHitter(pos, ageRange, meanAdj=0){
  const age = rint(ageRange[0], ageRange[1]);
  let con = rateGauss(57+meanAdj,14), pow = rateGauss(52+meanAdj,15), eye = rateGauss(53+meanAdj,13);
  let spd = rateGauss(pos==="CF"?62:50, 14);
  let def = rateGauss(["SS","CF","C","2B"].includes(pos)?60:50, 13);
  // ~8% of players are "stars" — a fat top end so elite talent stands out
  if(chance(0.08)){
    const b = rint(8,18);
    con = clamp(con+b,20,99); pow = clamp(pow+b,20,99); eye = clamp(eye+round(b/2),20,99);
  }
  const p = {
    id: uid(), name: genName(), age, pos, isP:false,
    bats: chance(0.72)?"R":(chance(0.85)?"L":"S"),
    con, pow, eye, spd, def,
    stats: emptyHitStats(), career: emptyHitStats(),
  };
  computeOvr(p); setPotential(p); p.peakOvr = p.ovr; p.salary = salaryFor(p); p.years = rint(1,5);
  ensureContract(p);
  return p;
}
function makePitcher(role, ageRange, meanAdj=0){
  const age = rint(ageRange[0], ageRange[1]);
  let stu = rateGauss((role==="SP"?58:60)+meanAdj, 14);
  let ctl = rateGauss(56+meanAdj,13);
  let stm = rateGauss(role==="SP"?62:40, 12);
  // ~8% of arms are "stars"
  if(chance(0.08)){
    const b = rint(8,18);
    stu = clamp(stu+b,20,99); ctl = clamp(ctl+round(b/2),20,99);
  }
  const p = {
    id: uid(), name: genName(), age, pos: role, role, isP:true,
    throws: chance(0.7)?"R":"L",
    stu, ctl, stm,
    stats: emptyPitStats(), career: emptyPitStats(),
  };
  computeOvr(p); setPotential(p); p.peakOvr = p.ovr; p.salary = salaryFor(p); p.years = rint(1,5);
  ensureContract(p);
  return p;
}
function computeOvr(p){
  if(p.isP){
    const w = p.role==="SP"?[.42,.36,.22]:[.50,.40,.10];
    p.ovr = round(w[0]*p.stu + w[1]*p.ctl + w[2]*p.stm);
  } else {
    p.ovr = round(.30*p.con + .30*p.pow + .14*p.eye + .10*p.spd + .16*p.def);
  }
  p.ovr = clamp(p.ovr,20,99);
  return p.ovr;
}
function setPotential(p){
  // younger players have more growth room
  const room = clamp(round((26 - p.age) * 1.6 + gauss(2,4)), -4, 24);
  p.pot = clamp(p.ovr + Math.max(0, room), p.ovr, 99);
  // rare "boom" prospect: a raw, low-rated youngster with a sky-high ceiling — a long
  // grind that occasionally turns into a star (e.g. a 55 OVR with 85 potential).
  if(p.age<=22 && chance(0.035)){
    p.pot = clamp(p.pot + rint(14,28), p.ovr, 99);
  }
}
function salaryFor(p){
  const o = p.ovr;
  let s = Math.pow(Math.max(0,o-40)/59, 2) * 36;
  if(p.age < 25) s *= 0.45;          // pre-arb cheap
  else if(p.age < 28) s *= 0.8;
  return clamp(round(s*10)/10, 0.7, 45);
}
// Convex ability->value curve. Steep on purpose: a star is worth FAR more than a
// pile of scrubs (you can't bundle ten 50s to equal an 85). Roughly:
// 50->~2, 60->~6, 70->~17, 75->~28, 80->~42, 85->~60, 90->~83, 95->~110.
function abilityValue(o){ return Math.pow(Math.max(0,o-35)/45, 2.6) * 55; }
function playerValue(p){
  const pot = p.pot || p.ovr;
  const cur = abilityValue(p.ovr);
  // youth = share of the gap-to-potential we expect a player to actually realize
  // (1.0 for a teenager, fading to 0 by ~28 — old players won't reach their ceiling)
  const youth = clamp((28 - p.age) / 13, 0, 1);
  const projOvr = p.ovr + (pot - p.ovr) * youth;   // expected peak ability
  const fut = abilityValue(projOvr);
  // young players are valued mostly on projection (prospect premium); vets on the now
  const w = 0.30 + 0.50 * youth;                    // 0.30 (vet) .. ~0.80 (teen)
  let v = cur * (1 - w) + fut * w;
  // small decline tax once a player is past his prime and clearly fading
  if(p.age >= 31) v *= clamp(1 - (p.age - 30) * 0.05, 0.55, 1);
  v -= p.salary * 0.18;                             // contract drag (cheap = bonus)
  return Math.max(0.3, round(v * 10) / 10);
}
// How well a player performed this past season, used to drive development.
// score: -1.5 (awful) .. +1.5 (elite), 0 if he barely played.
// weight: how much to trust it (more PA/IP = more weight).
function seasonPerf(p){
  const s = p.stats;
  if(p.isP){
    const ipv = s.OUT/3;
    if(ipv < 15) return {score:0, weight:0};
    return { score: clamp((4.35 - era(s))/1.4, -1.5, 1.5), weight: clamp(ipv/150, 0.15, 1) };
  }
  if(s.PA < 60) return {score:0, weight:0};
  return { score: clamp((ops(s) - 0.715)/0.16, -1.5, 1.5), weight: clamp(s.PA/500, 0.15, 1) };
}

/* ----------------------------- league gen ------------------------------ */
function makeTeam(def, idx){
  const [city,nick,abbr,league,division] = def;
  const t = { id: idx, city, nick, abbr, league, division,
    name: city+" "+nick, w:0, l:0, rs:0, ra:0,
    budget: rint(120,225), lineup:[], rotation:[], userControlled:false };
  const players = [];
  // position players: 1 starter each (9) + 7 bench/reserve = 16 hitters
  HIT_POS.forEach(pos => players.push(makeHitter(pos,[23,33])));
  for(let i=0;i<7;i++) players.push(makeHitter(pick(INF_OF),[22,34]));
  // pitchers: 5 SP + 9 RP = 14 arms  (30-man roster overall)
  for(let i=0;i<5;i++) players.push(makePitcher("SP",[23,34]));
  for(let i=0;i<9;i++) players.push(makePitcher("RP",[22,34]));
  players.forEach(p=>p.teamId=idx);
  t._players = players;
  return t;
}

/* ----------------------------- AAA affiliate --------------------------- */
function makeAAATeam(parent){
  return { id: aaaIdOf(parent.id), parent: parent.id,
    city: parent.city, nick: parent.nick, abbr: parent.abbr,
    league: parent.league, division: parent.division,
    name: parent.name+" (AAA)", aaa:true,
    w:0, l:0, rs:0, ra:0, lineup:[], rotation:[], pos:{},
    userControlled: parent.userControlled };
}
// younger, a notch weaker than the bigs, but full of high-ceiling prospects
function buildAAARoster(aaaId){
  const players=[];
  FIELD_POS.forEach(pos => players.push(makeHitter(pos,[19,25],-6)));
  for(let i=0;i<5;i++) players.push(makeHitter(pick(INF_OF),[19,26],-6)); // 14 hitters
  for(let i=0;i<5;i++) players.push(makePitcher("SP",[19,25],-6));
  for(let i=0;i<8;i++) players.push(makePitcher("RP",[19,26],-6));        // 13 arms (deep enough pen)
  players.forEach(p=>{ p.teamId=aaaId; setContract(p, Math.min(p.salary,0.7), p.years, []); });
  return players;
}
// Repair a depleted roster up to a fieldable minimum. Over many seasons, call-ups,
// trades, and lopsided draft classes can drain a roster (esp. AAA) below what a game
// needs — a team with no pitcher or no hitters used to CRASH the sim mid-day, hanging
// the whole "Sim" loop. This guarantees every club can always field a game.
function refillRoster(G, teamId, minH, minP, ageRange, meanAdj){
  const ros=Object.values(G.players).filter(p=>p.teamId===teamId);
  let h=ros.filter(p=>!p.isP).length, pi=ros.filter(p=>p.isP).length;
  while(h<minH){ const p=makeHitter(FIELD_POS[h%FIELD_POS.length],ageRange,meanAdj||0); p.teamId=teamId; if(meanAdj<0) setContract(p,Math.min(p.salary,0.7),p.years,[]); G.players[p.id]=p; h++; }
  while(pi<minP){ const p=makePitcher(pi<5?"SP":"RP",ageRange,meanAdj||0); p.teamId=teamId; if(meanAdj<0) setContract(p,Math.min(p.salary,0.7),p.years,[]); G.players[p.id]=p; pi++; }
}

/* ----------------------------- draft picks ----------------------------- */
// Each MLB team owns 5 future picks (one per round). Picks are tradeable; the
// draft order within a round follows the ORIGINAL team's reverse standings.
function buildPicks(season, teams){
  const picks=[];
  for(let round=1; round<=5; round++){
    teams.forEach(t=>picks.push({ id:"pk"+season+"-"+round+"-"+t.id, season, round, orig:t.id, owner:t.id }));
  }
  return picks;
}
function pickSlot(G, origId){ // 0 = projected worst team = first pick
  return [...G.teams].sort((a,b)=>pct(a)-pct(b)).map(t=>t.id).indexOf(origId);
}
function pickValue(G, pick){
  const slot = pickSlot(G, pick.orig);            // 0..29 (0 best)
  // a top-of-round pick yields a blue-chip prospect, so value it like one
  const roundBase = [0,24,12,6.5,3.6,2][pick.round] || 1.2;
  const v = roundBase * (1 - slot/40);            // earlier slot worth more
  return Math.max(0.3, round(v*10)/10);
}

function autoSetLineups(team, players){
  const all = Array.isArray(players) ? players : Object.values(players);
  const roster = all.filter(p=>p.teamId===team.id);
  const hitters = roster.filter(p=>!p.isP).sort((a,b)=>b.ovr-a.ovr);
  const pitchers = roster.filter(p=>p.isP);
  // pick best at each defensive slot, then DH = best leftover; record assignments
  const used = new Set(); const lineup = []; const posMap = {};
  FIELD_POS.forEach(pos=>{
    let best=null;
    for(const h of hitters){ if(used.has(h.id)) continue; if(h.pos===pos){best=h;break;} }
    if(!best){ for(const h of hitters){ if(!used.has(h.id)){best=h;break;} } }
    if(best){ used.add(best.id); lineup.push(best.id); posMap[best.id]=pos; }
  });
  const dh = hitters.find(h=>!used.has(h.id)); if(dh){used.add(dh.id);lineup.push(dh.id);posMap[dh.id]="DH";}
  // order by a rough lineup logic: speed/eye top, power middle
  const ids = lineup.slice();
  ids.sort((a,b)=>{
    const pa=all.find(x=>x.id===a),pb=all.find(x=>x.id===b);
    return (pb.con+pb.eye) - (pa.con+pa.eye);
  });
  team.lineup = ids.slice(0,9);
  team.pos = posMap;
  // ALWAYS field a 5-man rotation: real SPs first, then promote the best other arms if short
  let sp = pitchers.filter(p=>p.role==="SP").sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
  if(sp.length<5){
    const extra = pitchers.filter(p=>!sp.includes(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
    sp = sp.concat(extra);
  }
  team.rotation = sp.slice(0,5);
  // default bullpen priority: everyone not starting, best arm (closer) first
  const inRot = new Set(team.rotation);
  team.bullpen = pitchers.filter(p=>!inRot.has(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
}

// Keep an organization's BEST players on the big-league club (AI roster management).
// Without this, randomly-generated/aged orgs can leave 70+ OVR talent rotting in AAA
// behind worse MLB scrubs. Promotes by OVR while guaranteeing a natural fielder at
// every position and a 5-man-capable staff; everyone else is sent to the affiliate.
function aiAlignOrg(G, mlbId){
  const aaaId = aaaIdOf(mlbId);
  const org = Object.values(G.players).filter(p=>p.teamId===mlbId || p.teamId===aaaId);
  if(!org.length) return;
  const hitters = org.filter(p=>!p.isP);
  const pitchers = org.filter(p=>p.isP);
  // hitters: first guarantee the best natural starter at each field position is up,
  // then fill the rest of the (up to 16) hitter slots with the best remaining by OVR.
  const upH = new Set();
  FIELD_POS.forEach(pos=>{
    const best = hitters.filter(p=>p.pos===pos && !upH.has(p.id)).sort((a,b)=>b.ovr-a.ovr)[0];
    if(best) upH.add(best.id);
  });
  hitters.slice().sort((a,b)=>b.ovr-a.ovr).forEach(p=>{ if(upH.size<16 && !upH.has(p.id)) upH.add(p.id); });
  hitters.forEach(p=>{ p.teamId = upH.has(p.id) ? mlbId : aaaId; });
  // pitchers: keep the 5 best starters up, then the best arms overall (up to 14 total).
  const upP = new Set();
  pitchers.filter(p=>p.role==="SP").sort((a,b)=>b.ovr-a.ovr).slice(0,5).forEach(p=>upP.add(p.id));
  pitchers.slice().sort((a,b)=>b.ovr-a.ovr).forEach(p=>{ if(upP.size<14 && !upP.has(p.id)) upP.add(p.id); });
  pitchers.forEach(p=>{ p.teamId = upP.has(p.id) ? mlbId : aaaId; });
}

// Shuffle which city/nickname identities land in which league+division slot,
// keeping the league/division structure (15+15, 5 per division) fixed and the
// user's selected franchise pinned to its index so userTeamId stays valid.
function shuffledTeamDefs(pinIdx){
  const defs = TEAM_DEFS.map(d=>d.slice());
  const slots = defs.map((_,i)=>i).filter(i=>i!==pinIdx);
  const ids = slots.map(i=>[defs[i][0],defs[i][1],defs[i][2]]);
  for(let i=ids.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
  slots.forEach((slot,k)=>{ defs[slot][0]=ids[k][0]; defs[slot][1]=ids[k][1]; defs[slot][2]=ids[k][2]; });
  return defs;
}

function generateLeague(userTeamId, opts={}){
  const { seed=null, shuffle=false } = opts;
  // Seed only the league build; restore Math.random afterward so the season
  // sim stays genuinely random even for a reproducible league.
  if(seed!=null && !Number.isNaN(seed)) setRng(mulberry32(seed >>> 0));
  const defs = shuffle ? shuffledTeamDefs(userTeamId) : TEAM_DEFS;
  const teams = defs.map((d,i)=>makeTeam(d,i));
  teams[userTeamId].userControlled = true;
  const players = {};
  teams.forEach(t=>{ t._players.forEach(p=>players[p.id]=p); delete t._players; });
  // AAA affiliates: one per MLB team, each with its own prospect-laden roster
  const aaaTeams = teams.map(t=>makeAAATeam(t));
  aaaTeams.forEach(at=>buildAAARoster(at.id).forEach(p=>players[p.id]=p));
  // sort each org so its best talent starts on the big-league club, not buried in AAA
  const Gtmp = { players };
  teams.forEach(t=>aiAlignOrg(Gtmp, t.id));
  teams.forEach(t=>autoSetLineups(t, players));
  aaaTeams.forEach(at=>autoSetLineups(at, players));
  setRng(null);
  return { teams, aaaTeams, players };
}

/* ----------------------------- schedule -------------------------------- */
// games each pair plays: division rivals most, same-league moderate, interleague rare.
// (4 div × 18) + (10 same-league × 8) + (5 mirror-division interleague × 2) = 162 per team.
function gamesBetween(a, b){
  if(a.league===b.league) return a.division===b.division ? 18 : 8;
  return a.division===b.division ? 2 : 0;          // interleague only vs the mirror division
}
// Build a 162-game schedule spread over ~224 days WITH off days: not every team plays
// every day. Returns an array of days, each an array of {home,away,played,hs,as}.
function buildSchedule(teams){
  const games=[];
  for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++){
    const a=teams[i], b=teams[j], n=gamesBetween(a,b);
    for(let k=0;k<n;k++){ const [home,away]=(k%2===0)?[a.id,b.id]:[b.id,a.id]; games.push({home,away}); }
  }
  // shuffle so matchups scatter across the calendar
  for(let i=games.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); [games[i],games[j]]=[games[j],games[i]]; }
  // pack into days, never the same team twice a day, always filling the emptiest valid day
  const TARGET_DAYS=224;
  const days=Array.from({length:TARGET_DAYS},()=>({games:[],busy:new Set()}));
  for(const g of games){
    let best=-1, bestLen=Infinity;
    for(let d=0; d<days.length; d++){
      const day=days[d];
      if(day.busy.has(g.home)||day.busy.has(g.away)) continue;
      if(day.games.length<bestLen){ bestLen=day.games.length; best=d; if(bestLen===0) break; }
    }
    if(best<0){ days.push({games:[],busy:new Set()}); best=days.length-1; }
    const day=days[best]; day.games.push(g); day.busy.add(g.home); day.busy.add(g.away);
  }
  while(days.length && days[days.length-1].games.length===0) days.pop();
  return days.map(d=>d.games.map(g=>({home:g.home, away:g.away, played:false, hs:0, as:0})));
}
// keep the MLB and AAA calendars the same length (pad the shorter with off days)
function padSchedules(a, b){
  const len=Math.max(a.length,b.length);
  while(a.length<len) a.push([]);
  while(b.length<len) b.push([]);
}

/* ----------------------------- game sim -------------------------------- */
function teamDefRating(team, players){
  const pos = team.pos || {};
  let sum=0, n=0;
  team.lineup.forEach(id=>{
    const p = players[id]; if(!p || p.isP) return;
    const assigned = pos[id] || p.pos;
    if(assigned==="DH") return;                                  // DH doesn't field
    let d = p.def;
    if(assigned !== p.pos) d = Math.max(20, d - 12);             // out-of-position penalty
    sum += d; n++;
  });
  return n ? sum/n : 50;
}

function paOutcome(bat, pit, defN){
  const bc=n01(bat.con), bp=n01(bat.pow), be=n01(bat.eye), bs=n01(bat.spd);
  const ps=n01(pit.stu), pc=n01(pit.ctl);
  let kP = clamp(0.215 + 0.13*(ps-0.5) - 0.11*(bc-0.5) + 0.05*(pc-0.5), 0.04, 0.45);
  let bbP = clamp(0.085 + 0.08*(be-0.5) - 0.08*(pc-0.5) - 0.02*(ps-0.5), 0.02, 0.22);
  // HR needs power AND some contact — a one-dimensional slugger who can't make contact
  // shouldn't lead the league in homers, so a contact term gates the pure-power slope.
  let hrP = clamp(0.019 + 0.074*(bp-0.5) + 0.040*(bc-0.5) - 0.030*(ps-0.5), 0.002, 0.13);
  const r = Math.random();
  if(r < kP) return {o:"K"};
  if(r < kP+bbP) return {o:"BB"};
  if(r < kP+bbP+hrP) return {o:"HR"};
  // ball in play
  let babip = clamp(0.300 + 0.11*(bc-0.5) - 0.05*(pc-0.5) - 0.06*(defN-0.5), 0.19, 0.40);
  if(!chance(babip)) return {o:"OUT"};
  // hit type
  const tripP = 0.018 + 0.04*bs;
  const rr = Math.random();
  if(rr < tripP) return {o:"3B"};
  if(rr < tripP + 0.21) return {o:"2B"};
  return {o:"1B"};
}

// advance runners; bases = [r1,r2,r3] holding batter objects or null. returns runs scored
function advance(bases, out, batter){
  let runs=0;
  const score = ()=>{ runs++; };
  if(out==="BB"){
    if(bases[0]){ if(bases[1]){ if(bases[2]){ score(); } bases[2]=bases[1]; } bases[1]=bases[0]; }
    bases[0]=batter;
  } else if(out==="1B"){
    if(bases[2]){score(); bases[2]=null;}
    if(bases[1]){score(); bases[1]=null;}
    if(bases[0]){ bases[1]=bases[0]; bases[0]=null; }
    bases[0]=batter;
  } else if(out==="2B"){
    if(bases[2]){score();bases[2]=null;}
    if(bases[1]){score();bases[1]=null;}
    if(bases[0]){ bases[2]=bases[0]; bases[0]=null; }
    bases[1]=batter;
  } else if(out==="3B"){
    if(bases[2]){score();bases[2]=null;}
    if(bases[1]){score();bases[1]=null;}
    if(bases[0]){score();bases[0]=null;}
    bases[2]=batter;
  } else if(out==="HR"){
    if(bases[2]){score();bases[2]=null;}
    if(bases[1]){score();bases[1]=null;}
    if(bases[0]){score();bases[0]=null;}
    score();
  }
  return runs;
}

// Per-team roster index, built ONCE per sim-day so games don't each re-scan the
// entire (potentially thousands-large) player dict. Hot sim helpers take an
// optional `idx`; when absent they fall back to a full scan (fine for one-off UI).
function rosterIndex(players){
  const idx={};
  for(const id in players){ const p=players[id]; if(p.teamId==null) continue; (idx[p.teamId]=idx[p.teamId]||[]).push(p); }
  return idx;
}
const teamRoster = (players, teamId, idx) => idx ? (idx[teamId]||[]) : Object.values(players).filter(p=>p.teamId===teamId);

// ordered list of bullpen pitcher ids (everyone not in the rotation), honoring the
// user's saved priority (team.bullpen) and appending any new arms by OVR. best-first.
function bullpenOrder(team, players, idx){
  const ros = teamRoster(players, team.id, idx).filter(p=>p.isP);
  const inRot = new Set(team.rotation||[]);
  const pool = ros.filter(p=>!inRot.has(p.id));
  const listed = (team.bullpen||[]).filter(id=>pool.some(p=>p.id===id));
  const rest = pool.filter(p=>!listed.includes(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
  return listed.concat(rest);
}
function getPitchers(team, players, idx){
  const ros = teamRoster(players, team.id, idx).filter(p=>p.isP);
  const gi = team.w + team.l;
  const rotIds = team.rotation.length?team.rotation:ros.filter(p=>p.role==="SP").map(p=>p.id);
  let starter = players[rotIds[gi % Math.max(1,rotIds.length)]] || ros.find(p=>p.role==="SP") || ros[0];
  // pen is best-first by priority; pen[0] is the closer
  const pen = bullpenOrder(team, players, idx).map(id=>players[id]).filter(Boolean);
  return { starter, pen };
}

function lineupHitters(team, players, idx){
  let hs = team.lineup.map(id=>players[id]).filter(p=>p&&!p.isP);
  if(hs.length<9){
    const extra = teamRoster(players, team.id, idx).filter(p=>!p.isP && !team.lineup.includes(p.id));
    extra.sort((a,b)=>b.ovr-a.ovr);
    hs = hs.concat(extra).slice(0,9);
  }
  return hs.slice(0,9);
}

function simGame(home, away, players, idx){
  const out = { home, away };
  const lineups = { [home.id]: lineupHitters(home,players,idx), [away.id]: lineupHitters(away,players,idx) };
  const order = { [home.id]:0, [away.id]:0 };
  const defN = { [home.id]: n01(teamDefRating(home,players)), [away.id]: n01(teamDefRating(away,players)) };
  const arms = { [home.id]: getPitchers(home,players,idx), [away.id]: getPitchers(away,players,idx) };
  const cur = { [home.id]:{p:arms[home.id].starter, outs:0, er:0, idx:0, gs:true},
                [away.id]:{p:arms[away.id].starter, outs:0, er:0, idx:0, gs:true} };
  const starterTarget = id => 12 + round(n01(arms[id].starter.stm)*9); // ~12-21 outs (4-7 ip)
  const score = { [home.id]:0, [away.id]:0 };
  // mark GS
  cur[home.id].p.stats.GS++; cur[away.id].p.stats.GS++;
  cur[home.id].p.stats.G++; cur[away.id].p.stats.G++;
  // snapshot each starter's season line so we can credit a Quality Start (6+ IP, <=3 ER) afterward
  const startSnap = { [home.id]:{out:cur[home.id].p.stats.OUT, er:cur[home.id].p.stats.ER},
                      [away.id]:{out:cur[away.id].p.stats.OUT, er:cur[away.id].p.stats.ER} };
  const usedPen = { [home.id]:[], [away.id]:[] };
  const gOuts = {};   // outs each pitcher has recorded THIS game (for workload balancing)

  // bring an arm into the game (counts an appearance the first time only this game)
  function bringIn(pitId, p){
    if(!p) return;
    const c = cur[pitId];
    if(c.p && c.p.id===p.id) return;
    c.p = p; c.gs = false; c.segOuts = 0;
    if(!usedPen[pitId].includes(p.id)){ usedPen[pitId].push(p.id); p.stats.G++; }
  }
  // workload key: spread by what an arm has thrown THIS game, then THIS season
  const loadKey = p => (gOuts[p.id]||0)*100000 + (p.stats.OUT||0);
  const leastLoaded = arr => arr.reduce((b,p)=> (b==null||loadKey(p)<loadKey(b))?p:b, null);
  // Choose a reliever. pen is best-first (pen[0]=closer). Philosophy: LEAN ON THE
  // GOOD ARMS — the setup tier (best non-closers) carries the meaningful innings,
  // the closer locks down saves, and only the dregs mop up blowouts. Within those
  // roles we hand the ball to whoever's freshest, so no single arm runs away with it.
  function pickReliever(pitId, inning, lead){
    const pen = arms[pitId].pen; if(!pen.length) return cur[pitId].p||null;
    const curId = cur[pitId].p ? cur[pitId].p.id : null;
    const closer = pen[0];
    // save situation: the closer finishes a 9th-inning (or later) lead of 1-3
    if(inning>=9 && lead>0 && lead<=3 && closer && closer.id!==curId) return closer;
    const tierCount = Math.max(1, Math.ceil(pen.length*0.55));
    const setup = pen.slice(1, 1+tierCount);          // best non-closer arms = high-leverage tier
    const low   = pen.slice(1+tierCount);             // fringe/mop-up arms
    // blowout (either way): rest the good arms, let the fringe soak it up
    if(Math.abs(lead) >= 7 && low.length){
      const pool = low.filter(rp=>rp.id!==curId);
      return leastLoaded(pool.length?pool:low);
    }
    // normal relief: ride the setup tier, freshest first
    const tier = (setup.length?setup:pen.slice());
    const pool = tier.filter(rp=>rp.id!==curId);
    return leastLoaded(pool.length?pool:tier);
  }
  // decide whether to change pitchers before the next batter
  function changePitcher(batId, pitId, inning){
    const c = cur[pitId];
    if(c.gs){
      if(c.outs >= starterTarget(pitId)) bringIn(pitId, pickReliever(pitId, inning, score[pitId]-score[batId]));
      return;
    }
    if((c.segOuts||0) < 3) return;                   // only swap at an inning boundary
    const next = pickReliever(pitId, inning, score[pitId]-score[batId]);
    if(next && next.id!==c.p.id) bringIn(pitId, next);
  }

  function halfInning(batId, pitId, inning, isBottom){
    let outs=0; const bases=[null,null,null];
    const hitters = lineups[batId];
    while(outs<3){
      changePitcher(batId, pitId, inning);
      // stolen-base attempt: runner on first with second base open
      if(bases[0] && !bases[1]){
        const sp = n01(bases[0].spd);
        if(chance(clamp(0.05 + 0.28*(sp-0.5), 0, 0.22))){
          const pit = cur[pitId].p;
          if(chance(clamp(0.66 + 0.28*(sp-0.5), 0.45, 0.92))){
            bases[1]=bases[0]; bases[0]=null; bases[1].stats.SB++;      // safe
          } else {
            bases[0].stats.CS=(bases[0].stats.CS||0)+1;                // caught stealing
            bases[0]=null; outs++; cur[pitId].outs++;
            cur[pitId].segOuts=(cur[pitId].segOuts||0)+1; pit.stats.OUT++; gOuts[pit.id]=(gOuts[pit.id]||0)+1;
            if(outs>=3) break;
          }
        }
      }
      const pitcher = cur[pitId].p;
      const bat = hitters[order[batId] % hitters.length]; order[batId]++;
      const res = paOutcome(bat, pitcher, defN[pitId]);
      bat.stats.PA++;
      pitcher.stats.OUT; // noop
      if(res.o==="BB"){
        bat.stats.BB++; pitcher.stats.BB++;
        const r = advance(bases,"BB",bat);
        score[batId]+=r; bat.stats.RBI+=r; addRuns(bases, players, r);
        cur[pitId].er+=r; pitcher.stats.ER+=r;
      } else if(res.o==="K"){
        bat.stats.AB++; bat.stats.SO++; pitcher.stats.SO++;
        outs++; cur[pitId].outs++; cur[pitId].segOuts=(cur[pitId].segOuts||0)+1; pitcher.stats.OUT++; gOuts[pitcher.id]=(gOuts[pitcher.id]||0)+1;
      } else if(res.o==="OUT"){
        bat.stats.AB++;
        // small chance a baserunner scores on productive out
        outs++; cur[pitId].outs++; cur[pitId].segOuts=(cur[pitId].segOuts||0)+1; pitcher.stats.OUT++; gOuts[pitcher.id]=(gOuts[pitcher.id]||0)+1;
      } else {
        // hit
        bat.stats.AB++; bat.stats.H++; pitcher.stats.H++;
        if(res.o==="2B") bat.stats._2B++;
        if(res.o==="3B") bat.stats._3B++;
        if(res.o==="HR"){ bat.stats.HR++; pitcher.stats.HRA++; }
        const r = advance(bases, res.o, bat);
        score[batId]+=r; bat.stats.RBI+=r;
        cur[pitId].er+=r; pitcher.stats.ER+=r;
      }
    }
  }
  // helper to credit runs scored to runners (R stat) — approximate: credit batters who score
  function addRuns(){ /* R for scorers approximated below */ }

  // play 9 innings (or until decided in bottom 9 / extras)
  let inning=1;
  while(true){
    halfInning(away.id, home.id, inning, false);  // top
    if(inning>=9 && score[home.id]>score[away.id]) break; // walk-off not needed, home leads after top9
    halfInning(home.id, away.id, inning, true);   // bottom
    if(inning>=9 && score[home.id]!==score[away.id]) break;
    inning++;
    if(inning>20) break; // safety
  }
  score[home.id] = Math.max(score[home.id], 0);
  // approximate R (runs scored) by team: distribute = runs among hitters via RBI proportion (simplified)
  distributeRuns(home, players, score[home.id], idx);
  distributeRuns(away, players, score[away.id], idx);

  out.hs = score[home.id]; out.as = score[away.id];
  // decisions
  const winnerId = out.hs>out.as ? home.id : away.id;
  const loserId  = winnerId===home.id ? away.id : home.id;
  awardDecision(winnerId, loserId, arms, usedPen, players, {home,away,score});
  // credit Quality Starts: the starter went 6+ IP (18+ outs) allowing <=3 ER this game
  [home,away].forEach(t=>{
    const sp=arms[t.id].starter; if(!sp) return;
    const dout=sp.stats.OUT-startSnap[t.id].out, der=sp.stats.ER-startSnap[t.id].er;
    if(dout>=18 && der<=3) sp.stats.QS=(sp.stats.QS||0)+1;
  });
  // tag the teams pitchers actually threw for (for per-season history / multi-team years)
  [home,away].forEach(t=>{
    const lbl=teamLabel(t);
    if(arms[t.id].starter) tagTeam(arms[t.id].starter,lbl);
    (usedPen[t.id]||[]).forEach(id=>tagTeam(players[id],lbl));
  });
  return out;
}

function distributeRuns(team, players, runs, idx){
  // give R to hitters roughly weighted by OBP-ish (con+eye); simplistic but keeps totals sane
  const hs = teamRoster(players, team.id, idx).filter(p=>!p.isP && p.stats.PA>0);
  let remaining = runs;
  // HR already credited a run to batter; subtract those from pool
  const hrRuns = hs.reduce((s,h)=>s+(h._hrThisGame||0),0);
  for(let i=0;i<remaining;i++){
    const h = pick(hs.length?hs:[null]);
    if(h) h.stats.R++;
  }
}

function awardDecision(winnerId, loserId, arms, usedPen, players, ctx){
  const wStarter = arms[winnerId].starter;
  let winPitId;
  if(wStarter.stats.OUT>=15){ wStarter.stats.W++; winPitId=wStarter.id; }
  else {
    // give W to a used reliever, else starter
    const rp = (usedPen[winnerId]||[]).map(id=>players[id])[0];
    (rp||wStarter).stats.W++; winPitId=(rp||wStarter).id;
  }
  arms[loserId].starter.stats.L++;
  // save: closer = pen[0] (best/priority arm), if he finished a win of <=3
  const margin = Math.abs(ctx.score[winnerId]-ctx.score[loserId]);
  const pen = arms[winnerId].pen; const closer = pen[0];
  let saverId=null;
  if(closer && (usedPen[winnerId]||[]).includes(closer.id) && margin<=3 && closer.id!==wStarter.id){
    closer.stats.SV++; saverId=closer.id;
  }
  // holds: setup relievers who bridged a close win (not the winner, not the saver)
  if(margin<=3){
    (usedPen[winnerId]||[]).forEach(id=>{
      if(id===saverId || id===winPitId) return;
      const rp=players[id]; if(rp) rp.stats.HLD=(rp.stats.HLD||0)+1;
    });
  }
}

/* mark games-played for hitters in lineup */
// record (deduped) a team label a player actually suited up for this season
function tagTeam(p, lbl){ if(!p) return; if(!p._yrTeams) p._yrTeams=[]; if(!p._yrTeams.includes(lbl)) p._yrTeams.push(lbl); }
const teamLabel = t => t.abbr + (t.aaa?" AAA":"");
function markGamesPlayed(home, away, players, idx){
  [home,away].forEach(t=>{
    const lbl=teamLabel(t);
    lineupHitters(t,players,idx).forEach(h=>{ h.stats.G++; tagTeam(h,lbl); });
  });
}

/* ----------------------------- standings ------------------------------- */
function pct(t){ const g=t.w+t.l; return g? t.w/g : 0; }
function standings(teams){
  const byDiv = {};
  teams.forEach(t=>{
    const k=t.league+" "+t.division;
    (byDiv[k]=byDiv[k]||[]).push(t);
  });
  Object.values(byDiv).forEach(arr=>arr.sort((a,b)=>pct(b)-pct(a)||b.w-a.w));
  return byDiv;
}
function playoffSeeds(teams, league){
  const lt = teams.filter(t=>t.league===league);
  const byDiv={};
  lt.forEach(t=>(byDiv[t.division]=byDiv[t.division]||[]).push(t));
  const winners=[];
  Object.values(byDiv).forEach(arr=>{arr.sort((a,b)=>pct(b)-pct(a)); winners.push(arr[0]);});
  winners.sort((a,b)=>pct(b)-pct(a));
  const rest = lt.filter(t=>!winners.includes(t)).sort((a,b)=>pct(b)-pct(a));
  const wc = rest.slice(0,2);
  return [...winners, ...wc]; // 5 seeds: 0,1,2 div winners; 3,4 wild cards (play-in)
}

/* ----------------------------- derived stat display -------------------- */
const avg = s => s.AB? (s.H/s.AB) : 0;
const obp = s => (s.AB+s.BB)? (s.H+s.BB)/(s.AB+s.BB) : 0;
const slg = s => { const tb=(s.H-s._2B-s._3B-s.HR)+2*s._2B+3*s._3B+4*s.HR; return s.AB? tb/s.AB:0; };
const ops = s => obp(s)+slg(s);
const ip  = s => Math.floor(s.OUT/3) + (s.OUT%3)/10;
const era = s => s.OUT? (s.ER*27/s.OUT) : 0;
const whip= s => s.OUT? ((s.BB+s.H)/(s.OUT/3)) : 0;
const f3 = v => v.toFixed(3).replace(/^0/,"");
const f2 = v => v.toFixed(2);
const f1 = v => v.toFixed(1);

/* ----------------------------- contracts ------------------------------- */
// A contract is a per-year guaranteed-salary schedule `p.contract` (cap hits; length =
// years left), with `p.salary` mirroring contract[0] (the current-year hit everything
// reads). `p.incentives` is a list of off-cap, stat-based bonuses {stat, need, amount}.
const STAT_INCENTIVES = {
  HR:  {label:"HR",            hit:true,  get:s=>s.HR,    units:""},
  RBI: {label:"RBI",           hit:true,  get:s=>s.RBI,   units:""},
  H:   {label:"Hits",          hit:true,  get:s=>s.H,     units:""},
  R:   {label:"Runs",          hit:true,  get:s=>s.R,     units:""},
  SB:  {label:"Steals",        hit:true,  get:s=>s.SB,    units:""},
  AVG: {label:"AVG (pts)",     hit:true,  get:s=>Math.round(avg(s)*1000), units:" (e.g. 300)"},
  W:   {label:"Wins",          hit:false, get:s=>s.W,     units:""},
  SO:  {label:"Strikeouts",    hit:false, get:s=>s.SO,    units:""},
  SV:  {label:"Saves",         hit:false, get:s=>s.SV,    units:""},
  QS:  {label:"Quality Starts",hit:false, get:s=>s.QS||0, units:""},
  IP:  {label:"Innings",       hit:false, get:s=>Math.floor((s.OUT||0)/3), units:""},
};
function incentivesPerYear(p){ return (p.incentives||[]).reduce((a,i)=>a+(i.amount||0),0); }
function contractTotal(p){ return (p.contract||[p.salary]).reduce((a,b)=>a+b,0); }
// what the player is looking for (annual value + preferred length)
function contractAsk(p){
  return { fairAAV: salaryFor(p), years: p.age>=34?2 : p.age>=31?3 : 4 };
}
// What `aav`/yr the player requires for `years`, given a price `factor` (hometown
// discount <1 when winning, premium >1 when losing). Short deals push the AAV up.
function requiredAAV(p, years, factor){
  const ask=contractAsk(p);
  const yearAdj = clamp(1 + (ask.years - years)*0.04, 0.85, 1.20);
  return ask.fairAAV * (factor||1) * yearAdj;
}
// Will the player accept `aav`/yr for `years` with `incTotal`/yr of incentives?
// Incentives count at HALF toward his ask, so you can trade guaranteed $ for upside.
function willSign(p, aav, years, incTotal, factor){
  return (aav + 0.5*(incTotal||0)) >= requiredAAV(p, years, factor)*0.98;
}
// install a flat (even) contract schedule + incentives onto a player
function setContract(p, aav, years, incentives){
  p.salary = clamp(round(aav*10)/10, 0.5, 70);
  p.years = Math.max(1, years|0);
  p.contract = Array(p.years).fill(p.salary);
  p.incentives = incentives ? incentives.slice() : [];
  p.incentive = incentivesPerYear(p);   // back-compat aggregate (Finances/PlayerModal)
}
// ensure a player has the per-year contract fields (migration / freshly-generated)
function ensureContract(p){
  if(!Array.isArray(p.contract) || p.contract.length===0)
    p.contract = Array(Math.max(1, p.years||1)).fill(p.salary!=null?p.salary:0.7);
  p.years = p.contract.length;
  p.salary = p.contract[0];
  if(!Array.isArray(p.incentives))
    p.incentives = (p.incentive>0) ? [{stat:"_flat", need:0, amount:p.incentive, label:"bonus"}] : [];
  p.incentive = incentivesPerYear(p);
}
// a label like "4y · $20.3M/yr ($81.2M)"
function contractLabel(p){
  const yrs=p.years||(p.contract?p.contract.length:1);
  const tot=contractTotal(p);
  return `${yrs}y · ${money(p.salary)}/yr${yrs>1?` (${money(tot)})`:""}`;
}

/* ----------------------------- save/load ------------------------------- */
const SAVE_KEY = "pocketgm_baseball_v2";
const SAVE_VERSION = 4;
function saveGame(G){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(G)); }catch(e){} }
function loadGame(){ try{ const s=localStorage.getItem(SAVE_KEY); return s?migrate(JSON.parse(s)):null; }catch(e){ return null; } }
function clearSave(){ localStorage.removeItem(SAVE_KEY); }

// League news / transaction wire. Every notable move (signing, trade, call-up,
// draft pick, award, title) is logged here so the franchise keeps a persistent,
// scrollable history. Newest first; capped so saves stay small.
function logNews(G, type, msg, teamId){
  if(!G) return;
  if(!Array.isArray(G.news)) G.news=[];
  G.news.unshift({ season:G.season, day:(G.day||0)+1, phase:G.phase, type, msg, teamId: teamId==null?null:teamId });
  if(G.news.length>250) G.news.length=250;
}

// Forward-compatibility: backfill fields added by newer versions so an existing
// franchise keeps loading (and playing) across updates instead of being wiped.
function migrate(G){
  if(!G || !Array.isArray(G.teams)) return G;
  try{
    // CRITICAL: resume the in-memory uid() counter past every id already in this save,
    // BEFORE anything generates new players. uid() restarts at 1 each page load; without
    // this, draft/refill/FA players reuse low ids and overwrite existing players in the
    // dict (the "my players disappear every season" bug). Scan rostered players + draft class.
    let maxId = 0;
    Object.values(G.players||{}).forEach(p=>{ if(typeof p.id==="number" && p.id>maxId) maxId=p.id; });
    (G.draftClass||[]).forEach(p=>{ if(p && typeof p.id==="number" && p.id>maxId) maxId=p.id; });
    uid.atLeast(maxId);
    if(!G.aaaTeams){ G.aaaTeams = G.teams.map(t=>makeAAATeam(t)); }
    if(!G.aaaSchedule) G.aaaSchedule = buildSchedule(G.aaaTeams);
    if(!G.picks) G.picks = buildPicks((G.season||2026)+1, G.teams);
    if(!Array.isArray(G.draftPicks)) G.draftPicks = [];
    if(!Array.isArray(G.awardHistory)) G.awardHistory = [];
    if(!Array.isArray(G.news)) G.news = [];
    if(!Array.isArray(G.tradeOffers)) G.tradeOffers = [];
    if(!Array.isArray(G.waivers)) G.waivers = [];
    if(G.tradeDeadline==null) G.tradeDeadline = Math.round((G.schedule?G.schedule.length:224)*0.58);
    if(!Array.isArray(G.hof)) G.hof = [];
    if(!Array.isArray(G.champions)) G.champions = G.champion ? [{season:G.champion.season, id:G.champion.id}] : [];
    // de-dupe any accidental repeat champions (one entry per season; keep the winner)
    if(Array.isArray(G.champions)){
      const seen=new Set();
      G.champions = G.champions.filter(c=>{ if(c==null||seen.has(c.season)) return false; seen.add(c.season); return true; });
    }
    if(G.teams.some(t=>t.rivalId==null)) assignRivals(G.teams);
    Object.values(G.players||{}).forEach(p=>{ if(p.peakOvr==null) p.peakOvr=p.ovr; ensureContract(p); });
    const fixTeam = t=>{
      if(!t.pos) t.pos = {};
      if(!Array.isArray(t.lineup)) t.lineup = [];
      if(!Array.isArray(t.rotation)) t.rotation = [];
      if(!Array.isArray(t.history)) t.history = [];
      // guarantee a 5-man rotation and a bullpen priority list for older saves
      if(t.rotation.length<5 || !t.bullpen) ensureLineup(t, G.players);
      if(!t.bullpen) t.bullpen = bullpenOrder(t, G.players);
    };
    G.teams.forEach(fixTeam);
    G.aaaTeams.forEach(fixTeam);
    // one-time AI roster cleanup: promote each AI org's best talent out of AAA (skip the
    // user's club so their own call-up decisions stand). Re-set the touched lineups.
    if(!G._aiAligned){
      G.teams.forEach(t=>{ if(t.id!==G.userTeamId){ aiAlignOrg(G, t.id); autoSetLineups(t, G.players); autoSetLineups(G.aaaTeams[t.id], G.players); } });
      G._aiAligned = true;
    }
    // one-time cleanup for saves bloated by seasons of un-pruned free agents/prospects
    // (sim speed scales with total player count). Only fires on an already-large pool.
    if(Array.isArray(G.freeAgents) && Object.keys(G.players).length>2800){
      G.aaaTeams.forEach(t=>{ if(typeof AAA_CAP!=="undefined") trimRoster(G,t,AAA_CAP); });
      pruneFreeAgents(G);
    }
    // normalize playoff series to the game-by-game shape (hw/lw/games)
    if(G.playoffs){
      const po=G.playoffs;
      const norm=(s,need)=>{ if(!s) return;
        if(!Array.isArray(s.games)) s.games=[];
        if(typeof s.hw!=='number') s.hw = (s.done&&s.winner===s.hi)?need:0;
        if(typeof s.lw!=='number') s.lw = (s.done&&s.winner===s.lo)?need:0;
      };
      ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg]; if(b){ (b.wc||[]).forEach(s=>norm(s,1)); (b.ds||[]).forEach(s=>norm(s,3)); norm(b.cs,4); } });
      norm(po.ws,4);
    }
    G.version = SAVE_VERSION;
  }catch(e){ /* best-effort: a partial migration still beats a crash */ }
  return G;
}

// Manual backup: download the whole franchise as a JSON file (user-initiated click)
function exportSave(G){
  try{
    const data = JSON.stringify(G);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const u = G.teams[G.userTeamId];
    a.href = url;
    a.download = `pocketgm-${u?u.abbr:"save"}-${G.season}-day${(G.day||0)+1}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    return true;
  }catch(e){ return false; }
}
function importSave(file, onLoad){
  const r = new FileReader();
  r.onload = e=>{
    try{ const g = migrate(JSON.parse(e.target.result));
      if(g && Array.isArray(g.teams)){ onLoad(g); } else { alert("That file isn't a valid Pocket GM save."); }
    }catch(err){ alert("Couldn't read that save file."); }
  };
  r.readAsText(file);
}

/* ----------------------------- new game -------------------------------- */
function newGame(userTeamId, opts={}){
  const { teams, aaaTeams, players } = generateLeague(userTeamId, opts);
  assignRivals(teams);
  const schedule = buildSchedule(teams);
  const aaaSchedule = buildSchedule(aaaTeams);
  padSchedules(schedule, aaaSchedule);
  return {
    season: 2026, day: 0, phase: "regular", version: SAVE_VERSION,
    seed: (opts && opts.seed!=null && !Number.isNaN(opts.seed)) ? (opts.seed>>>0) : null,
    userTeamId, teams, aaaTeams, players, schedule, aaaSchedule,
    picks: buildPicks(2027, teams),
    freeAgents: [], draftClass: [], draftPicks: [], draftPick: 0,
    playoffs: null, champion: null, champions: [], hof: [], log: [], news: [],
    tradeDeadline: Math.round(schedule.length*0.58), tradeOffers: [], waivers: [],
  };
}

// pair up teams into rivalries: two pairs within each division, plus the odd-team-out
// in each division gets a cross-league rival in the mirror division.
function assignRivals(teams){
  const byDiv={};
  teams.forEach(t=>{ const k=t.league+"|"+t.division; (byDiv[k]=byDiv[k]||[]).push(t); });
  Object.values(byDiv).forEach(arr=>{
    arr.sort((a,b)=>a.id-b.id);
    if(arr[0]&&arr[1]){ arr[0].rivalId=arr[1].id; arr[1].rivalId=arr[0].id; }
    if(arr[2]&&arr[3]){ arr[2].rivalId=arr[3].id; arr[3].rivalId=arr[2].id; }
  });
  ["East","Central","West"].forEach(d=>{
    const a=byDiv["Empire|"+d], b=byDiv["Pioneer|"+d];
    if(a&&b&&a[4]&&b[4]){ a[4].rivalId=b[4].id; b[4].rivalId=a[4].id; }
  });
  teams.forEach(t=>{ if(t.rivalId==null){ const dm=teams.find(o=>o.id!==t.id && o.league===t.league && o.division===t.division); if(dm) t.rivalId=dm.id; } });
}

// turn an arbitrary text seed into a 32-bit number (so seeds can be words too)
function hashSeed(str){
  let h = 2166136261 >>> 0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

/* ----------------------------- Hub / sim ------------------------------- */
function simDay(G){
  let idx = rosterIndex(G.players);             // build the team→players index ONCE for the whole day
  // safety net: a team that can't field a lineup/staff would crash simGame and hang the
  // whole Sim loop. Refill any depleted MLB/AAA roster to a playable minimum first.
  let repaired=false;
  for(const t of G.teams){ const r=idx[t.id]||[]; if(r.filter(p=>!p.isP).length<9 || r.filter(p=>p.isP).length<1){ refillRoster(G,t.id,14,12,[23,33],0); ensureLineup(t,G.players); repaired=true; } }
  for(const t of G.aaaTeams){ const r=idx[t.id]||[]; if(r.filter(p=>!p.isP).length<9 || r.filter(p=>p.isP).length<1){ refillRoster(G,t.id,12,9,[19,26],-6); autoSetLineups(t,G.players); repaired=true; } }
  if(repaired) idx = rosterIndex(G.players);     // rebuild after adding players
  const playDay = (sched) => {
    const day = sched[G.day];
    if(!day) return;
    day.forEach(g=>{
      if(g.played) return;
      const home=teamById(G,g.home), away=teamById(G,g.away);
      const res = simGame(home, away, G.players, idx);
      markGamesPlayed(home, away, G.players, idx);
      g.played=true; g.hs=res.hs; g.as=res.as;
      if(res.hs>res.as){ home.w++; away.l++; } else { away.w++; home.l++; }
      home.rs+=res.hs; home.ra+=res.as; away.rs+=res.as; away.ra+=res.hs;
    });
  };
  playDay(G.schedule);                          // MLB
  if(G.aaaSchedule) playDay(G.aaaSchedule);      // AAA affiliates
  G.day++;
  // trade market: drop offers once they're stale or the deadline passes; before the
  // deadline an AI club occasionally pitches the user a deal.
  if(!Array.isArray(G.tradeOffers)) G.tradeOffers=[];
  if(G.day>G.tradeDeadline){ G.tradeOffers=[]; }
  else {
    G.tradeOffers = G.tradeOffers.filter(o=>(G.day-o.day)<=12);
    if(G.tradeOffers.length<2 && chance(0.045)){ const off=makeAITradeOffer(G); if(off) G.tradeOffers.push(off); }
  }
  // waiver wire: occasional AI cuts + claim processing
  maybeAIWaive(G); processWaivers(G);
  if(G.day>=G.schedule.length){ enterPlayoffs(G); }
}

function userNextGame(G){
  for(let d=G.day; d<G.schedule.length; d++){
    const g = G.schedule[d].find(x=>(x.home===G.userTeamId||x.away===G.userTeamId));
    if(g && !g.played) return {day:d, g};
  }
  return null;
}

function Hub({G, commit, tShow, setTab}){
  const user = G.teams[G.userTeamId];
  const [busy,setBusy]=useState(false);
  const lastDay = G.day>0 ? G.schedule[G.day-1] : null;

  const next = userNextGame(G);

  const acceptOffer=(i)=>{
    const o=(G.tradeOffers||[])[i]; if(!o) return;
    const other=G.teams[o.fromId];
    const getDesc=o.give.map(id=>G.players[id]&&G.players[id].name).filter(Boolean).join(", ");
    const giveDesc=o.get.map(id=>G.players[id]&&G.players[id].name).filter(Boolean).join(", ");
    executeOffer(G,o);
    logNews(G,"trade",`${user.abbr} acquired ${getDesc} from ${other.abbr} for ${giveDesc}`, user.id);
    G.tradeOffers.splice(i,1); commit(G); tShow("✅ Trade completed!");
  };
  const rejectOffer=(i)=>{ if(!G.tradeOffers) return; G.tradeOffers.splice(i,1); commit(G); tShow("Offer turned down"); };

  const runDays = (count)=>{
    setBusy(true);
    setTimeout(()=>{
      const g = G;
      for(let i=0;i<count && g.phase==="regular" && g.day<g.schedule.length;i++) simDay(g);
      commit(g); setBusy(false);
    },10);
  };

  if(G.phase==="playoffs"){
    return <Card><div className="text-lg font-bold mb-2">🏆 Postseason is here!</div>
      <p className="text-slate-300 mb-3">The regular season is complete. Head to the Playoffs tab to advance the bracket.</p>
      <button onClick={()=>setTab("playoffs")} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Go to Playoffs →</button></Card>;
  }
  if(G.phase==="offseason"){
    return <OffseasonHub G={G} commit={commit} tShow={tShow} setTab={setTab} />;
  }

  const div = standings(G.teams)[user.league+" "+user.division];
  const rank = div.findIndex(t=>t.id===user.id)+1;

  return (
    <div className="space-y-4">
      <div className="grid sm:grid-cols-3 gap-3">
        <Card><div className="text-slate-400 text-xs">RECORD</div><div className="text-2xl font-bold tnum">{user.w}-{user.l}</div><div className="text-xs text-slate-500">{f3(pct(user))} · {user.division} #{rank}</div></Card>
        <Card><div className="text-slate-400 text-xs">RUN DIFF</div><div className={"text-2xl font-bold tnum "+((user.rs-user.ra)>=0?"text-emerald-400":"text-red-400")}>{user.rs-user.ra>=0?"+":""}{user.rs-user.ra}</div><div className="text-xs text-slate-500">{user.rs} RS / {user.ra} RA</div></Card>
        <Card><div className="text-slate-400 text-xs">PAYROLL</div><div className="text-2xl font-bold tnum">{money(payroll(G,user.id))}</div><div className="text-xs text-slate-500">Budget {money(user.budget)}</div></Card>
      </div>

      {(G.tradeOffers&&G.tradeOffers.length>0) && <Card className="border-sky-700/50">
        <div className="text-xs font-semibold text-sky-300 mb-2">📨 Trade Offers ({G.tradeOffers.length})</div>
        <div className="space-y-2">
          {G.tradeOffers.map((o,i)=>{
            const other=G.teams[o.fromId];
            const youGet=o.give.map(id=>G.players[id]).filter(Boolean);
            const youGive=o.get.map(id=>G.players[id]).filter(Boolean);
            const desc=arr=>arr.map(p=>`${p.pos} ${p.name} (${p.ovr}→${p.pot})`).join(", ")||"—";
            return (
              <div key={i} className="bg-[#13203a] rounded p-2">
                <div className="text-xs text-slate-400 mb-1">{other.name} propose:</div>
                <div className="text-sm"><span className="text-emerald-400 text-xs">You get </span>{desc(youGet)}</div>
                <div className="text-sm"><span className="text-red-400 text-xs">You give </span>{desc(youGive)}</div>
                <div className="flex gap-2 mt-2">
                  <button onClick={()=>acceptOffer(i)} className="px-3 py-1 bg-emerald-500 text-slate-900 rounded text-xs font-semibold hover:bg-emerald-400">Accept</button>
                  <button onClick={()=>rejectOffer(i)} className="px-3 py-1 bg-[#16213a] rounded text-xs hover:bg-[#1c2c4a]">Reject</button>
                </div>
              </div>
            );
          })}
        </div>
      </Card>}

      {(()=>{
        const rival = user.rivalId!=null ? G.teams[user.rivalId] : null;
        if(!rival) return null;
        let rw=0, rl=0;
        G.schedule.forEach(day=>day.forEach(g=>{
          if(!g.played) return;
          const u = g.home===user.id || g.away===user.id, r = g.home===rival.id || g.away===rival.id;
          if(u && r){ const userHome=g.home===user.id; const won = userHome ? g.hs>g.as : g.as>g.hs; if(won) rw++; else rl++; }
        }));
        const nextRival = (()=>{ for(let d=G.day; d<G.schedule.length; d++){ const g=G.schedule[d].find(x=>(x.home===user.id&&x.away===rival.id)||(x.away===user.id&&x.home===rival.id)); if(g&&!g.played) return d; } return null; })();
        return (
          <Card className="border-rose-800/40">
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div>
                <div className="text-xs font-semibold text-rose-300">⚔ Rivalry — {rival.city} {rival.nick}</div>
                <div className="text-sm text-slate-200">Season series: <b className="tnum">{rw}–{rl}</b>{(rw+rl)===0?" (not played yet)":""}{nextRival!=null?` · next meeting Day ${nextRival+1}`:""}</div>
              </div>
              <OvrPill v={Math.round(rosterOf(G,rival.id).reduce((s,p)=>s+p.ovr,0)/Math.max(1,rosterOf(G,rival.id).length))}/>
            </div>
          </Card>
        );
      })()}

      {(()=>{
        const expiring = rosterOf(G,user.id).filter(p=>p.years<=1).sort((a,b)=>b.ovr-a.ovr);
        if(!expiring.length) return null;
        const late = G.day>=120;
        return (
          <Card className={late?"border-amber-600/60":""}>
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div>
                <div className="text-xs font-semibold text-amber-300">{late?"⏰ Season winding down — re-sign before they walk":"Contract watch"}</div>
                <div className="text-sm text-slate-200">{expiring.length} player{expiring.length>1?"s are":" is"} in a contract year and will hit free agency after the season.</div>
                <div className="text-xs text-slate-500 mt-0.5">{expiring.slice(0,4).map(p=>p.name).join(", ")}{expiring.length>4?` +${expiring.length-4} more`:""}</div>
              </div>
              <button onClick={()=>setTab("finances")} className="px-3 py-2 bg-amber-600 hover:bg-amber-500 text-slate-900 rounded-lg text-sm font-semibold whitespace-nowrap">Re-sign players →</button>
            </div>
          </Card>
        );
      })()}

      {(G.news&&G.news.length>0) && <Card>
        <div className="flex items-center justify-between mb-1">
          <div className="text-xs font-semibold text-slate-300">📰 Around the League</div>
          <button onClick={()=>setTab("news")} className="text-xs text-emerald-400 hover:text-emerald-300">full wire →</button>
        </div>
        <div className="space-y-0.5">
          {G.news.slice(0,5).map((n,i)=>(
            <div key={i} className="flex items-center gap-2 text-xs">
              <span className="w-1.5 h-1.5 rounded-full bg-emerald-400/70 flex-shrink-0"></span>
              <span className="flex-1 truncate text-slate-300">{n.msg}</span>

      </Card>}

      {userLast && <Card>
        <div className="text-xs text-slate-400 mb-1">LAST GAME</div>
        <GameLine G={G} g={userLast} />
      </Card>}

      {next && <Card>
        <div className="text-xs text-slate-400 mb-1">NEXT UP{next.day>G.day?` (Day ${next.day+1})`:""}</div>
        <GameLine G={G} g={next.g} preview />
      </Card>}

      <Card>
        <div className="flex flex-wrap gap-2">
          <button disabled={busy} onClick={()=>runDays(1)} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold disabled:opacity-50">Sim 1 Day</button>
          <button disabled={busy} onClick={()=>runDays(7)} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] disabled:opacity-50">Sim 1 Week</button>
          <button disabled={busy} onClick={()=>runDays(30)} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] disabled:opacity-50">Sim 1 Month</button>

        <div className="text-xs text-slate-500 mt-2">
          {G.day>G.tradeDeadline

      </Card>
    </div>
  );

function GameLine({G, g, preview}){
  const home=G.teams[g.home], away=G.teams[g.away];

/* ----------------------------- Roster ---------------------------------- */
function rosterOf(G, teamId){ return Object.values(G.players).filter(p=>p.teamId===teamId); }
function payroll(G, teamId){ return rosterOf(G,teamId).reduce((s,p)=>s+p.salary,0); }

function Roster({G, team, commit}){
  const [sel, setSel] = useState(null);
  const ros = rosterOf(G, team.id);
  const aaa = G.aaaTeams[team.id];
  const aaaRos = rosterOf(G, aaaIdOf(team.id)).sort((a,b)=>b.ovr-a.ovr);
  const release = (p)=>{
    const inSeason = G.phase==="regular";
    if(!confirm(inSeason?`Place ${p.name} on waivers? Other clubs may claim him; if he clears he becomes a free agent.`:`Release ${p.name}? He becomes a free agent.`)) return;
    if(inSeason){ placeOnWaivers(G, p, team.id); logNews(G,"roster",`${team.abbr} placed ${p.pos} ${p.name} (${p.ovr}) on waivers`, team.id); }
    else { movePlayerToFA(G, p); logNews(G,"roster",`${team.abbr} released ${p.pos} ${p.name} (${p.ovr})`, team.id); }
    commit(G);
  };
  const sendDown = (p)=>{                         // MLB -> AAA
    flushLevel(p);                                // bank his MLB stats before he changes level
    movePlayer(G, p, team.id); p.teamId = aaaIdOf(team.id);
    autoSetLineups(aaa, G.players); ensureLineup(team, G.players);
    logNews(G,"roster",`${team.abbr} optioned ${p.pos} ${p.name} (${p.ovr}) to AAA`, team.id);
    commit(G);
  };
  const callUp = (p)=>{                           // AAA -> MLB
    flushLevel(p);                                // bank his AAA stats before he changes level
    movePlayer(G, p, team.id);                    // movePlayer keeps level; override to MLB
    p.teamId = team.id;
    autoSetLineups(aaa, G.players);
    logNews(G,"roster",`${team.abbr} called up ${p.pos} ${p.name} (${p.ovr}) from AAA`, team.id);
    commit(G);
  };

  // hitters: starting lineup (in batting order) vs bench
  const lineupHits = team.lineup.map(id=>G.players[id]).filter(p=>p&&!p.isP);
  const benchHits = ros.filter(p=>!p.isP && !team.lineup.includes(p.id)).sort((a,b)=>b.ovr-a.ovr);
  // pitchers: rotation vs closer vs bullpen (bullpen follows the user's priority order)
  const rotation = team.rotation.map(id=>G.players[id]).filter(p=>p&&p.isP);
  const relievers = bullpenOrder(team, G.players).map(id=>G.players[id]).filter(Boolean);
  const closer = relievers[0] || null;
  const bullpen = closer ? relievers.slice(1) : relievers;
  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const aaaHits = aaaRos.filter(p=>!p.isP), aaaArms = aaaRos.filter(p=>p.isP);

  const open = p=>setSel(p);
  return (
    <div className="space-y-4">
      <Card>
        <div className="flex justify-between items-center mb-2">
          <h3 className="font-bold">Starting Lineup <span className="text-slate-500 text-sm">({lineupHits.length})</span></h3>
          <span className="text-xs text-slate-500">Payroll {money(payroll(G,team.id))} / {money(team.budget)}</span>
        </div>
        <HitterTable players={lineupHits} onRelease={release} onSend={sendDown} bo onName={open} posMap={team.pos} />
        <p className="text-xs text-slate-500 mt-2">Amber position = playing out of his natural spot (defensive penalty). Set positions in the Lineup tab.</p>
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Bench <span className="text-slate-500 text-sm">({benchHits.length})</span></h3>
        {benchHits.length
          ? <HitterTable players={benchHits} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No bench hitters.</div>}
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Starting Rotation <span className="text-slate-500 text-sm">({rotation.length})</span></h3>
        <PitcherTable players={rotation} onRelease={release} onSend={sendDown} slots={rotSlots} onName={open} />
      </Card>
      {closer && <Card>
        <h3 className="font-bold mb-2">Closer</h3>
        <PitcherTable players={[closer]} onRelease={release} onSend={sendDown} slots={["CL"]} onName={open} />
        <p className="text-xs text-slate-500 mt-2">Closes save situations. Reorder the bullpen in the Lineup tab to pick your closer &amp; setup man.</p>
      </Card>}
      <Card>
        <h3 className="font-bold mb-2">Bullpen <span className="text-slate-500 text-sm">({bullpen.length})</span></h3>
        {bullpen.length
          ? <PitcherTable players={bullpen} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No other relievers.</div>}
      </Card>

      <Card className="border-amber-700/40">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-bold text-amber-300">AAA Affiliate — {team.nick} <span className="text-slate-500 text-sm">({aaaRos.length})</span></h3>
          <span className="text-xs text-slate-500">{aaa.w}-{aaa.l} · use ↑ up to call players to the bigs</span>
        </div>
        {aaaHits.length>0 && <div className="mb-3"><div className="text-xs text-slate-400 mb-1">Hitters</div>
          <HitterTable players={aaaHits} onCallUp={callUp} onName={open} /></div>}
        {aaaArms.length>0 && <div><div className="text-xs text-slate-400 mb-1">Pitchers</div>
          <PitcherTable players={aaaArms} onCallUp={callUp} onName={open} /></div>}
        {aaaRos.length===0 && <div className="text-sm text-slate-500">Your AAA roster is empty. Draft picks report here, or send big-leaguers down.</div>}
      </Card>

      {sel && <PlayerModal p={sel} team={teamById(G, sel.teamId)} onClose={()=>setSel(null)} />}
    </div>
  );
}
// move a player to free agency, cleaning any lineup/rotation references
function movePlayerToFA(G, p){
  const t = teamById(G, p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
}

// ---- Waiver wire -------------------------------------------------------
// A cut/surplus player goes on waivers (off all rosters) before reaching free
// agency, giving other clubs — and the user — a chance to claim him cheaply.
function placeOnWaivers(G, p, fromId){
  const t=teamById(G,p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!Array.isArray(G.waivers)) G.waivers=[];
  if(!G.waivers.some(w=>w.id===p.id)) G.waivers.push({id:p.id, day:G.day||0, season:G.season, fromId});
  G.freeAgents=(G.freeAgents||[]).filter(id=>id!==p.id);
}
// AI clubs (worst record = first priority) claim useful waived players they can
// fit; players unclaimed after the window clear to free agency. The user gets a
// 2-day head start to claim from the Free Agency tab before AI can.
function processWaivers(G){
  if(!Array.isArray(G.waivers) || !G.waivers.length) return;
  const order=[...G.teams].sort((a,b)=>pct(a)-pct(b));   // worst record claims first
  const remaining=[];
  G.waivers.forEach(w=>{
    const p=G.players[w.id];
    if(!p || p.teamId!=null) return;                      // claimed/gone already
    const age=(G.day||0)-w.day;
    if(age<2){ remaining.push(w); return; }               // user's head-start window
    let claimed=null;
    for(const t of order){
      if(t.id===G.userTeamId || t.id===w.fromId) continue;
      if(rosterOf(G,t.id).length>=ROSTER_CAP) continue;
      if(p.salary > t.budget-payroll(G,t.id)) continue;
      if(p.ovr<58) continue;                              // only claim useful arms/bats
      claimed=t; break;
    }
    if(claimed){
      p.teamId=claimed.id; autoSetLineups(claimed,G.players);
      logNews(G,"roster",`${claimed.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, claimed.id);
    } else if(age>=4){
      if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);  // cleared waivers → FA
    } else remaining.push(w);
  });
  G.waivers=remaining;
}
// occasional in-season churn: a deep AI roster waives a low-value spare part,
// so the waiver wire has something on it for the user to browse/claim.
function maybeAIWaive(G){
  if(!chance(0.04)) return;
  const t=pick(G.teams.filter(x=>x.id!==G.userTeamId));
  const ros=rosterOf(G,t.id);
  if(ros.length<=27) return;
  const cand=ros.filter(p=>!t.lineup.includes(p.id) && !t.rotation.includes(p.id))
    .sort((a,b)=>playerValue(a)-playerValue(b))[0];
  if(cand && cand.ovr<=66){
    placeOnWaivers(G,cand,t.id); ensureLineup(t,G.players);
    logNews(G,"roster",`${t.abbr} waived ${cand.pos} ${cand.name} (${cand.ovr})`, t.id);
  }
}

                    const teamTxt = (h.teams&&h.teams.length) ? h.teams.map(t=>t.replace(/ AAA$/,"")).join("/") : "—";

    </div>
  );
}

/* ----------------------------- Lineup editor --------------------------- */
// Put a player at a defensive position, keeping the lineup valid and positions
// glued to players. If he's already batting, swap defensive spots with whoever
// holds the target slot; if he's on the bench, he takes over that fielder's
// batting-order slot (the displaced man goes to the bench).
function placeAtPosition(team, players, playerId, position){
  const ALL = FIELD_POS.concat(["DH"]);
  if(!ALL.includes(position)) return;
  const lineup = (team.lineup||[]).slice();
  const pos = {...(team.pos||{})};
  const occupant = lineup.find(id=>id!==playerId && pos[id]===position);
  if(lineup.includes(playerId)){
    if(occupant!=null) pos[occupant]=pos[playerId];   // swap the two players' positions
    pos[playerId]=position;
  } else {
    if(occupant!=null){ lineup[lineup.indexOf(occupant)]=playerId; delete pos[occupant]; }
    else {
      const orphan = lineup.findIndex(id=>!ALL.includes(pos[id]));
      if(orphan>=0){ delete pos[lineup[orphan]]; lineup[orphan]=playerId; }
      else if(lineup.length<9) lineup.push(playerId);
      else { delete pos[lineup[8]]; lineup[8]=playerId; }
    }
    pos[playerId]=position;
  }
  team.lineup=lineup; team.pos=pos;
}
// pixel-ish coordinates (% of the field box) for each spot on the diamond
const FIELD_COORD = { CF:[50,11], LF:[20,26], RF:[80,26], SS:[37,45], "2B":[63,45],
  "3B":[24,64], "1B":[76,64], P:[50,63], C:[50,87] };

function LineupEditor({G, commit, tShow}){
  const team = G.teams[G.userTeamId];
  const ros = rosterOf(G, team.id);
  const hitters = ros.filter(p=>!p.isP);
  const allPitchers = ros.filter(p=>p.isP).sort((a,b)=>b.ovr-a.ovr); // any arm can be a starter
  const penIds = bullpenOrder(team, G.players);                       // live bullpen priority
  const move = (arr, i, dir)=>{ const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; commit(G); };
  const moveBull = (i, dir)=>{ const arr=penIds.slice(); const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; team.bullpen=arr; commit(G); };
  const setRot = (slot, newId)=>{
    const existing = team.rotation.indexOf(Number(newId));
    const cur = team.rotation[slot];
    if(existing>=0) team.rotation[existing]=cur;
    team.rotation[slot]=Number(newId);
    commit(G);
  };
  const [picked, setPicked] = useState(null);   // player "in hand" (click or drag)
  const place = (pid, position)=>{ if(pid==null) return; placeAtPosition(team, G.players, Number(pid), position); setPicked(null); commit(G); };
  const clickSlot = (position, id)=>{ if(picked!=null) place(picked, position); else if(id!=null) setPicked(id); };
  const clickPlayer = id=>setPicked(picked===id?null:id);
  const onDragStart = (e,id)=>{ e.dataTransfer.setData("text/plain", String(id)); e.dataTransfer.effectAllowed="move"; setPicked(id); };
  const onDropPos = (e,position)=>{ e.preventDefault(); const id=e.dataTransfer.getData("text/plain"); place(id, position); };
  const allow = e=>e.preventDefault();

  const ALLPOS = FIELD_POS.concat(["DH"]);
  const assignedCounts = {}; team.lineup.forEach(id=>{ const a=(team.pos||{})[id]; if(a) assignedCounts[a]=(assignedCounts[a]||0)+1; });
  const missing = ALLPOS.filter(x=>!assignedCounts[x]);
  const dupes = ALLPOS.filter(x=>assignedCounts[x]>1);
  const valid = missing.length===0 && dupes.length===0;
  const benchHitters = hitters.filter(h=>!team.lineup.includes(h.id));
  const todayStarter = G.players[(team.rotation||[])[(team.w+team.l)%Math.max(1,(team.rotation||[]).length)]];

  // a player chip used on the field, the DH box, and the bench
  const chip = (p, position, opts={})=>{
    const oop = p && position && position!=="DH" && position!=="P" && p.pos!==position;
    const isPicked = p && picked===p.id;
    return (
      <div
        draggable={!!p}
        onDragStart={e=>p&&onDragStart(e,p.id)}
        onClick={()=> position ? clickSlot(position, p?p.id:null) : (p&&clickPlayer(p.id))}
        onDragOver={position?allow:undefined}
        onDrop={position?(e=>onDropPos(e,position)):undefined}
        title={p?`${p.name} — ${p.pos} (${p.ovr})`:"empty"}
        className={"select-none cursor-pointer rounded-md px-1.5 py-1 text-center border transition "+
          (isPicked?"ring-2 ring-emerald-400 ":"")+
          (p? (oop?"bg-amber-900/40 border-amber-600/60":"bg-[#16223c] border-[#27375c]")
            : "bg-[#0e1830] border-dashed border-[#2a3a5c] text-slate-600")+
          (picked!=null&&position?" hover:border-emerald-400":"")}
        style={opts.style}
      >
        {position && <div className={"text-[10px] font-bold leading-none mb-0.5 "+(opts.posColor||"text-slate-400")}>{position}</div>}
        {p ? <>
          <div className="leading-none"><OvrPill v={p.ovr}/></div>
          <div className="text-[11px] truncate max-w-[68px] mt-0.5">{p.name.split(" ").slice(-1)[0]}</div>
        </> : <div className="text-[11px] py-2">{position||"—"}</div>}
      </div>
    );
  };
  const fielderAt = position => { const id=team.lineup.find(x=>(team.pos||{})[x]===position); return id!=null?G.players[id]:null; };

  return (
    <div className="space-y-4">
      <Card>
        <div className="flex items-baseline justify-between mb-1">
          <h3 className="font-bold">Set Your Defense</h3>
          <span className={"text-xs "+(valid?"text-emerald-400":"text-amber-400")}>
            {valid ? "✓ all 8 positions + DH set"
                   : `⚠ ${missing.length?`missing ${missing.join(", ")}`:""}${missing.length&&dupes.length?" · ":""}${dupes.length?`dup ${dupes.join(", ")}`:""}`}
          </span>
        </div>
        <p className="text-xs text-slate-500 mb-3">Drag a player onto a spot — or <b>tap a player, then tap a spot</b>. Drop a bench bat on a fielder to swap them in. Out-of-position players are <span className="text-amber-400">amber</span> (they take a fielding penalty).</p>
        <div className="grid lg:grid-cols-[1fr_220px] gap-4">
          {/* the field */}
          <div className="relative rounded-xl overflow-hidden border border-[#1d2940]"
               style={{height:340, background:"radial-gradient(circle at 50% 30%, #14361f 0%, #0e2417 55%, #0b1a12 100%)"}}>
            {/* infield diamond */}
            <div className="absolute border-2 border-emerald-200/15"
                 style={{width:150,height:150,left:"50%",top:"62%",transform:"translate(-50%,-50%) rotate(45deg)",background:"rgba(120,90,50,0.10)"}} />
            {Object.entries(FIELD_COORD).map(([position,[x,y]])=>{
              if(position==="P"){ // pitcher: shows today's starter, informational
                return <div key="P" className="absolute" style={{left:x+"%",top:y+"%",transform:"translate(-50%,-50%)"}}>
                  <div className="rounded-md px-1.5 py-1 text-center border bg-[#1a2540] border-[#33436a]" title="Today's starting pitcher">
                    <div className="text-[10px] font-bold leading-none mb-0.5 text-sky-300">P</div>
                    {todayStarter?<><div><OvrPill v={todayStarter.ovr}/></div><div className="text-[11px] truncate max-w-[68px] mt-0.5">{todayStarter.name.split(" ").slice(-1)[0]}</div></>:<div className="text-[11px] py-2 text-slate-500">—</div>}
                  </div>
                </div>;
              }
              return <div key={position} className="absolute" style={{left:x+"%",top:y+"%",transform:"translate(-50%,-50%)",width:78}}>
                {chip(fielderAt(position), position)}
              </div>;
            })}
            {/* DH box, off to the side */}
            <div className="absolute" style={{left:8,top:10,width:80}}>
              {chip(fielderAt("DH"),"DH",{posColor:"text-fuchsia-300"})}
            </div>
          </div>
          {/* batting order */}
          <div>
            <div className="text-xs text-slate-400 mb-1 font-semibold">Batting Order</div>
            <div className="space-y-1">
              {team.lineup.map((id,i)=>{
                const p=G.players[id]; const ap=(team.pos||{})[id]||"—";
                const oop = p && ap!==p.pos && ap!=="DH";
                return (
                  <div key={i} className={"flex items-center gap-1.5 rounded px-1.5 py-1 "+(picked===id?"ring-1 ring-emerald-400 ":"")+"bg-[#13203a]"}>
                    <span className="w-4 text-slate-500 text-xs">{i+1}</span>
                    <OvrPill v={p?p.ovr:0}/>
                    <span className="flex-1 text-xs truncate cursor-pointer" onClick={()=>p&&clickPlayer(id)}>{p?p.name.split(" ").slice(-1)[0]:"—"}</span>
                    <span className={"text-[10px] w-7 text-center "+(oop?"text-amber-400":"text-slate-500")}>{ap}</span>
                    <div className="flex flex-col">
                      <button onClick={()=>move(team.lineup,i,-1)} className="text-[10px] text-slate-400 leading-none">▲</button>
                      <button onClick={()=>move(team.lineup,i,1)} className="text-[10px] text-slate-400 leading-none">▼</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        {/* bench */}
        <div className="mt-3 pt-3 border-t border-[#1d2940]" onDragOver={allow}>
          <div className="text-xs text-slate-400 mb-1 font-semibold">Bench <span className="text-slate-600">({benchHitters.length}) — drag onto a spot to sub in</span></div>
          <div className="flex flex-wrap gap-1.5">
            {benchHitters.length?benchHitters.map(p=><div key={p.id} style={{width:78}}>{chip(p,null)}<div className="text-[9px] text-slate-500 text-center">{p.pos}</div></div>)
              :<div className="text-xs text-slate-600">No spare position players.</div>}
          </div>
        </div>
      </Card>
      <div className="grid md:grid-cols-2 gap-4">
      <Card>
        <h3 className="font-bold mb-2">Starting Rotation</h3>
        <div className="space-y-1">
          {team.rotation.map((id,i)=>{
            const p=G.players[id];
            return (
              <div key={i} className="flex items-center gap-2 bg-[#13203a] rounded px-2 py-1">
                <span className="w-8 text-slate-500 text-sm">SP{i+1}</span>
                <OvrPill v={p?p.ovr:0}/>
                <select value={id} onChange={e=>setRot(i, e.target.value)} className="bg-[#0b1220] rounded px-1 py-0.5 text-sm flex-1 border border-[#1d2940]">
                  {allPitchers.map(h=><option key={h.id} value={h.id}>{h.role} {h.name} ({h.ovr})</option>)}
                </select>
                <div className="flex flex-col">
                  <button onClick={()=>move(team.rotation,i,-1)} className="text-xs text-slate-400 leading-none">▲</button>
                  <button onClick={()=>move(team.rotation,i,1)} className="text-xs text-slate-400 leading-none">▼</button>
                </div>
              </div>
            );
          })}
        </div>
        <p className="text-xs text-slate-500 mt-2">Every team carries 5 starters; each pitches every 5th game. Any arm can be slotted as a starter.</p>
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Bullpen Priority</h3>
        <div className="space-y-1">
          {penIds.map((id,i)=>{
            const p=G.players[id];
            const role = i===0?"CL":i===1?"SU":"RP";
            return (
              <div key={id} className="flex items-center gap-2 bg-[#13203a] rounded px-2 py-1">
                <span className={"w-8 text-xs font-bold "+(i===0?"text-emerald-400":i===1?"text-lime-400":"text-slate-500")}>{role}</span>
                <OvrPill v={p?p.ovr:0}/>
                <span className="flex-1 text-sm truncate">{p?p.name:"—"}</span>
                <div className="flex flex-col">
                  <button onClick={()=>moveBull(i,-1)} className="text-xs text-slate-400 leading-none">▲</button>
                  <button onClick={()=>moveBull(i,1)} className="text-xs text-slate-400 leading-none">▼</button>
                </div>
              </div>
            );
          })}
          {penIds.length===0 && <div className="text-sm text-slate-500">No relievers — your whole staff is in the rotation.</div>}
        </div>
        <p className="text-xs text-slate-500 mt-2">Order = leverage. <b className="text-emerald-400">CL</b> closes the 9th of save games, <b className="text-lime-400">SU</b> sets up the 8th, and your best arms work close, late innings. Mop-up arms (bottom) take blowouts.</p>
      </Card>
      </div>
    </div>
  );
}

function TeamRosterModal({G, team, onClose}){
  const [sel,setSel]=useState(null);
  const ros = rosterOf(G, team.id);
  const lineupHits = (team.lineup||[]).map(id=>G.players[id]).filter(p=>p&&!p.isP);
  const benchHits = ros.filter(p=>!p.isP && !(team.lineup||[]).includes(p.id)).sort((a,b)=>b.ovr-a.ovr);
  const rotation = (team.rotation||[]).map(id=>G.players[id]).filter(p=>p&&p.isP);

  const closer = relievers[0]||null;

  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const open = p=>setSel(p);
