/* =========================================================================
   POCKET GM — BASEBALL   (single-file React)
   Full GM suite: roster, lineup/rotation, season sim, standings, stat

/* ----------------------------- RNG / utils ----------------------------- */
// Pluggable RNG: defaults to Math.random, but league generation can swap in a
// seeded PRNG (mulberry32) for reproducible/shareable leagues, then restore.
let _rng = Math.random;
function setRng(fn){ _rng = fn || Math.random; }
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rint = (a, b) => Math.floor(_rng() * (b - a + 1)) + a;
const pick = arr => arr[Math.floor(_rng() * arr.length)];
const chance = p => _rng() < p;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const round = Math.round;
function gauss(mean, sd) {
  let u = 0, v = 0;
  while (u === 0) u = _rng();
  while (v === 0) v = _rng();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rateGauss = (mean, sd) => clamp(round(gauss(mean, sd)), 20, 99);
const n01 = r => (r - 20) / 79; // normalize 20..99 -> 0..1
const money = m => (m >= 1 ? "$" + m.toFixed(1) + "M" : "$" + round(m * 1000) + "K");
// Player-id generator. NOTE: this counter lives in memory and resets to 1 on every
// page load, but player ids are persisted in the save. After loading a franchise we
// MUST resume it past the highest existing id (see uid.atLeast in migrate) — otherwise
// freshly generated players (draft, AAA refill, FA fill) reuse low ids and silently
// OVERWRITE existing players in the G.players dict. That was the "my players keep
// disappearing every season" bug (your oldest = lowest-id starters got clobbered first).
const uid = (() => { let i = 1; const f = () => i++; f.atLeast = n => { if(Number.isFinite(n) && n >= i) i = n + 1; }; return f; })();

const FIELD_POS = ["C","1B","2B","3B","SS","LF","CF","RF"]; // 8 defensive slots (+ DH = 9th batter)

/* Team-id namespace (a player's teamId tells you which roster AND level he's on):
   MLB  0..29   · AAA 30..59 (id = 30 + parentId) · College 60..83 (24 amateur clubs).
   College is a standalone amateur league that feeds the draft — NOT an MLB affiliate. */
const AAA_OFFSET = 30;
const COLLEGE_OFFSET = 60;
const isAAAId = id => id!=null && id>=AAA_OFFSET && id<COLLEGE_OFFSET;
const isCollegeId = id => id!=null && id>=COLLEGE_OFFSET;
const isMlbId = id => id!=null && id<AAA_OFFSET;
const aaaIdOf = mlbId => mlbId + AAA_OFFSET;
const parentIdOf = aaaId => aaaId - AAA_OFFSET;
const collegeIdOf = i => COLLEGE_OFFSET + i;
const levelOf = id => id==null?"FA":(id>=COLLEGE_OFFSET?"COL":(id>=AAA_OFFSET?"AAA":"MLB"));
function teamById(G, id){ return id==null?null
  : (id>=COLLEGE_OFFSET ? (G.collegeTeams||[])[id-COLLEGE_OFFSET]
  : (id>=AAA_OFFSET ? G.aaaTeams[id-AAA_OFFSET] : G.teams[id])); }

/* ----------------------------- player gen ------------------------------ */
function emptyHitStats(){return{G:0,PA:0,AB:0,H:0,_2B:0,_3B:0,HR:0,R:0,RBI:0,BB:0,SO:0,SB:0,CS:0,SF:0,HBP:0,GIDP:0,TC:0,E:0};}
function emptyPitStats(){return{G:0,GS:0,OUT:0,H:0,R:0,ER:0,BB:0,SO:0,W:0,L:0,SV:0,HRA:0,QS:0,HLD:0,HBP:0,WP:0,BK:0,GO:0,AO:0,TC:0,E:0,CG:0,SHO:0};}
// Per-level (MLB vs AAA) stat splitting for the year-by-year history. The sim
// pools everything into p.stats; we snapshot at each level change (call-up / send-down)
// and at season end, attributing the delta since the last snapshot to the level the
// player was just at. So a season split between the bigs and AAA yields two history rows.
function flushLevel(p){
  if(!p || !p.stats) return;
  const lvl = levelOf(p.teamId)==="FA" ? "MLB" : levelOf(p.teamId);
  if(!p._levelStats) p._levelStats = {};
  if(!p._levelStats[lvl]) p._levelStats[lvl] = p.isP?emptyPitStats():emptyHitStats();
  const snap = p._levelSnap || {}, bucket = p._levelStats[lvl];
  for(const k in p.stats) bucket[k] = (bucket[k]||0) + (p.stats[k] - (snap[k]||0));
  p._levelSnap = Object.assign({}, p.stats);
}
// A player's CURRENT-season stats accrued at one level only (MLB / AAA / COL). Combines the
// banked _levelStats buckets (flushed at each call-up/send-down) with the un-flushed current
// stint (p.stats − _levelSnap). So a guy called up mid-year shows ONLY his MLB line on the
// MLB board and ONLY his AAA line on the AAA board (and two separate year-by-year rows).
function levelStats(p, level){
  const out = (p._levelStats && p._levelStats[level]) ? Object.assign({}, p._levelStats[level])
                                                      : (p.isP?emptyPitStats():emptyHitStats());
  if(levelOf(p.teamId)===level){
    const snap = p._levelSnap || {};
    for(const k in p.stats) out[k] = (out[k]||0) + (p.stats[k] - (snap[k]||0));
  }
  return out;
}

function makeHitter(pos, ageRange, meanAdj=0){
  const age = rint(ageRange[0], ageRange[1]);
  let con = rateGauss(57+meanAdj,14), pow = rateGauss(52+meanAdj,15), eye = rateGauss(53+meanAdj,13);
  let spd = rateGauss(pos==="CF"?62:50, 14);
  let def = rateGauss(["SS","CF","C","2B"].includes(pos)?60:50, 13);
  // ~8% of players are "stars" — a fat top end so elite talent stands out
  if(chance(0.08)){
    const b = rint(8,18);
    con = clamp(con+b,20,99); pow = clamp(pow+b,20,99); eye = clamp(eye+round(b/2),20,99);
  }
  const p = {
    id: uid(), name: genName(), age, pos, isP:false,
    bats: chance(0.72)?"R":(chance(0.85)?"L":"S"),
    num: rint(1,99),
    con, pow, eye, spd, def,
    stats: emptyHitStats(), career: emptyHitStats(),
  };
  computeOvr(p); setPotential(p); p.peakOvr = p.ovr; p.salary = salaryFor(p); p.years = rint(1,5);
  ensureContract(p);
  return p;
}
function makePitcher(role, ageRange, meanAdj=0){
  const age = rint(ageRange[0], ageRange[1]);
  let stu = rateGauss((role==="SP"?58:60)+meanAdj, 14);
  let ctl = rateGauss(56+meanAdj,13);
  let stm = rateGauss(role==="SP"?62:40, 12);
  // ~8% of arms are "stars"
  if(chance(0.08)){
    const b = rint(8,18);
    stu = clamp(stu+b,20,99); ctl = clamp(ctl+round(b/2),20,99);
  }
  const p = {
    id: uid(), name: genName(), age, pos: role, role, isP:true,
    throws: chance(0.7)?"R":"L",
    num: rint(1,99),
    gb: +clamp(gauss(0.48,0.07),0.30,0.66).toFixed(3),   // groundball tendency (0.30 flyball ↔ 0.66 groundball; mean ~0.48 = neutral)
    stu, ctl, stm,
    stats: emptyPitStats(), career: emptyPitStats(),
  };
  computeOvr(p); setPotential(p); p.peakOvr = p.ovr; p.salary = salaryFor(p); p.years = rint(1,5);
  ensureContract(p);
  return p;
}
function computeOvr(p){
  if(p.isP){
    const w = p.role==="SP"?[.42,.36,.22]:[.50,.40,.10];
    p.ovr = round(w[0]*p.stu + w[1]*p.ctl + w[2]*p.stm);
  } else {
    p.ovr = round(.30*p.con + .30*p.pow + .14*p.eye + .10*p.spd + .16*p.def);
  }
  p.ovr = clamp(p.ovr,20,99);
  return p.ovr;
}
function setPotential(p){
  // younger players have more growth room
  const room = clamp(round((26 - p.age) * 1.6 + gauss(2,4)), -4, 24);
  p.pot = clamp(p.ovr + Math.max(0, room), p.ovr, 99);
  // rare "boom" prospect: a raw, low-rated youngster with a sky-high ceiling — a long
  // grind that occasionally turns into a star (e.g. a 55 OVR with 85 potential).
  if(p.age<=22 && chance(0.035)){
    p.pot = clamp(p.pot + rint(14,28), p.ovr, 99);
  }
}
function salaryFor(p){
  const o = p.ovr;
  let s = Math.pow(Math.max(0,o-40)/59, 2) * 36;
  if(p.age < 25) s *= 0.45;          // pre-arb cheap
  else if(p.age < 28) s *= 0.8;
  return clamp(round(s*10)/10, 0.7, 45);
}
// Convex ability->value curve. Steep on purpose: a star is worth FAR more than a
// pile of scrubs (you can't bundle ten 50s to equal an 85). Roughly:
// 50->~2, 60->~6, 70->~17, 75->~28, 80->~42, 85->~60, 90->~83, 95->~110.
function abilityValue(o){ return Math.pow(Math.max(0,o-35)/45, 2.6) * 55; }
function playerValue(p){
  const pot = p.pot || p.ovr;
  const cur = abilityValue(p.ovr);
  // youth = share of the gap-to-potential we expect a player to actually realize
  // (1.0 for a teenager, fading to 0 by ~28 — old players won't reach their ceiling)
  const youth = clamp((28 - p.age) / 13, 0, 1);
  const projOvr = p.ovr + (pot - p.ovr) * youth;   // expected peak ability
  const fut = abilityValue(projOvr);
  // young players are valued mostly on projection (prospect premium); vets on the now
  const w = 0.30 + 0.50 * youth;                    // 0.30 (vet) .. ~0.80 (teen)
  let v = cur * (1 - w) + fut * w;
  // small decline tax once a player is past his prime and clearly fading
  if(p.age >= 31) v *= clamp(1 - (p.age - 30) * 0.05, 0.55, 1);
  v -= p.salary * 0.18;                             // contract drag (cheap = bonus)
  return Math.max(0.3, round(v * 10) / 10);
}
// How well a player performed this past season, used to drive development.
// score: -1.5 (awful) .. +1.5 (elite), 0 if he barely played.
// weight: how much to trust it (more PA/IP = more weight).
function seasonPerf(p){
  const s = p.stats;
  if(p.isP){
    const ipv = s.OUT/3;
    if(ipv < 15) return {score:0, weight:0};
    return { score: clamp((4.35 - era(s))/1.4, -1.5, 1.5), weight: clamp(ipv/150, 0.15, 1) };
  }
  if(s.PA < 60) return {score:0, weight:0};
  return { score: clamp((ops(s) - 0.715)/0.16, -1.5, 1.5), weight: clamp(s.PA/500, 0.15, 1) };
}

/* ----------------------------- league gen ------------------------------ */
// Ballparks: each MLB club gets a named park with a park factor (pf) centered on 1.0.
// pf>1 = hitter-friendly, pf<1 = pitcher-friendly. The 30 factors are a symmetric spread
// (avg exactly 1.0) so the LEAGUE-WIDE run environment is unchanged — parks just move WHERE
// runs are scored. (A game's park nudges both clubs equally, so W/L balance is untouched.)
const BALLPARK_NAMES = [
  "Liberty Park","Harborview Field","Summit Stadium","Cascade Park","Ironside Field",
  "Bayfront Park","Granite Stadium","Sunset Field","Riverside Park","Highland Field",
  "Coronado Park","Thunderdome Field","Pioneer Park","Maple Grove Stadium","Coastline Field",
  "Crestwood Park","Union Stadium","Lakeshore Field","Diamond Heights","Copperline Park",
  "Frontier Field","Sequoia Stadium","Beacon Park","Stonewall Field","Meridian Park",
  "Cedar Ridge Stadium","Saltflats Field","Vanguard Park","Northgate Stadium","Emerald Field",
];
function parkFactorFor(idx){ return Math.round((1.0 + ((idx-14.5)/14.5)*0.06)*1000)/1000; }   // ~0.94..1.06, avg 1.0
// Handedness bias derived from the SAME drawn outfield geometry (seeded by the park name): a
// shorter right field (vs left) means a short porch that helps LHB → positive; shorter left
// → helps RHB → negative. ~0 for the (symmetric) majority. Feeds paOutcome's HR nudge.
function ballparkHand(name){
  const g=ballparkGeom(hashSeed(name||"park")), W=g.wall, n=W.length;
  const d=p=>Math.hypot(p.x-180,p.y-150), mid=(n-1)/2;
  let lS=0,lc=0,rS=0,rc=0;
  W.forEach((p,i)=>{ if(i<mid){lS+=d(p);lc++;} else if(i>mid){rS+=d(p);rc++;} });
  const lAvg=lc?lS/lc:0, rAvg=rc?rS/rc:0;
  return clamp(Math.round((lAvg-rAvg)/90*100)/100, -1, 1);   // RF shorter → + (favors LHB)
}
function makeBallpark(idx){ const name=BALLPARK_NAMES[idx%BALLPARK_NAMES.length]; return { name, pf: parkFactorFor(idx), hand: ballparkHand(name), capacity: rint(33,47)*1000 }; }
// average home attendance from a club's success + ballpark capacity (the market size). Winning fills
// seats; a sustained winner draws more. Returns {att, fill}. Drives revenue/budget at the rollover.
function computeAttendance(t){
  const cap=(t.ballpark&&t.ballpark.capacity)||40000;
  const wp=(t.w+t.l)? t.w/(t.w+t.l) : 0.5;
  const hist=(t.history||[]).slice(-3);
  const recentWp = hist.length ? hist.reduce((a,h)=>a+((h.w+h.l)?h.w/(h.w+h.l):0.5),0)/hist.length : wp;
  const made = hist.length && hist[hist.length-1].made;
  const champ = hist.length && hist[hist.length-1].champ;
  const fill = clamp(0.52 + (wp-0.5)*1.5 + (recentWp-0.5)*0.4 + (made?0.05:0) + (champ?0.05:0), 0.28, 1.0);
  return { att: Math.round(cap*fill/100)*100, fill };
}
function parkLabel(pf){ const d=Math.round((pf-1)*100); return d>=2?`Hitter-friendly (+${d}%)`:d<=-2?`Pitcher-friendly (${d}%)`:"Neutral park"; }
function parkHandLabel(hand){ return hand>=0.12?"Short RF porch — favors LHB":hand<=-0.12?"Short LF porch — favors RHB":"Balanced field — no platoon lean"; }
function pitcherType(gb){ return gb>=0.55?"Groundball":gb<=0.42?"Flyball":"Balanced"; }

function makeTeam(def, idx){
  const [city,nick,abbr,league,division] = def;
  const t = { id: idx, city, nick, abbr, league, division,
    name: city+" "+nick, w:0, l:0, rs:0, ra:0, ballpark: makeBallpark(idx),
    budget: rint(120,225), lineup:[], rotation:[], userControlled:false };
  const players = [];
  // position players: 1 starter each (9) + 7 bench/reserve = 16 hitters
  HIT_POS.forEach(pos => players.push(makeHitter(pos,[23,33])));
  for(let i=0;i<7;i++) players.push(makeHitter(pick(INF_OF),[22,34]));
  // pitchers: 5 SP + 9 RP = 14 arms  (30-man roster overall)
  for(let i=0;i<5;i++) players.push(makePitcher("SP",[23,34]));
  for(let i=0;i<9;i++) players.push(makePitcher("RP",[22,34]));
  players.forEach(p=>p.teamId=idx);
  t._players = players;
  return t;
}

/* ----------------------------- AAA affiliate --------------------------- */
function makeAAATeam(parent){
  return { id: aaaIdOf(parent.id), parent: parent.id,
    city: parent.city, nick: parent.nick, abbr: parent.abbr,
    league: parent.league, division: parent.division,
    name: parent.name+" (AAA)", aaa:true,
    w:0, l:0, rs:0, ra:0, lineup:[], rotation:[], pos:{},
    userControlled: parent.userControlled };
}
// younger, a notch weaker than the bigs, but full of high-ceiling prospects
function buildAAARoster(aaaId){
  const players=[];
  FIELD_POS.forEach(pos => players.push(makeHitter(pos,[19,25],-6)));
  for(let i=0;i<5;i++) players.push(makeHitter(pick(INF_OF),[19,26],-6)); // 14 hitters
  for(let i=0;i<5;i++) players.push(makePitcher("SP",[19,25],-6));
  for(let i=0;i<8;i++) players.push(makePitcher("RP",[19,26],-6));        // 13 arms (deep enough pen)
  players.forEach(p=>{ p.teamId=aaaId; setContract(p, Math.min(p.salary,0.7), p.years, []); });
  return players;
}
/* ----------------------------- college (amateur) ---------------------- */
function makeCollegeTeam(def, i){
  const [city,nick,abbr,league,division] = def;
  return { id: collegeIdOf(i), city, nick, abbr, league, division,
    name: city+" "+nick, college:true, w:0, l:0, rs:0, ra:0,
    lineup:[], rotation:[], pos:{}, userControlled:false };
}
// Amateur talent: 17–21yo, raw (low current OVR) but high ceiling — these players are the
// draft pipeline. No pro contract (amateurs); marked p.amateur so the offseason/economy skip them.
function buildCollegeRoster(collegeId){
  const players=[];
  FIELD_POS.forEach(pos => players.push(makeHitter(pos,[17,21],-12)));
  for(let i=0;i<6;i++) players.push(makeHitter(pick(INF_OF),[17,21],-12));   // 14 hitters
  for(let i=0;i<5;i++) players.push(makePitcher("SP",[17,21],-12));
  for(let i=0;i<6;i++) players.push(makePitcher("RP",[17,21],-12));          // 11 arms
  players.forEach(p=>{ p.teamId=collegeId; p.amateur=true; p.salary=0; p.contract=[]; p.years=0;
    p.classYr = 21-p.age; });   // 0=senior .. up to ~4 (freshman); used for draft eligibility
  return players;
}

// Repair a depleted roster up to a fieldable minimum. Over many seasons, call-ups,
// trades, and lopsided draft classes can drain a roster (esp. AAA) below what a game
// needs — a team with no pitcher or no hitters used to CRASH the sim mid-day, hanging
// the whole "Sim" loop. This guarantees every club can always field a game.
function refillRoster(G, teamId, minH, minP, ageRange, meanAdj){
  const ros=Object.values(G.players).filter(p=>p.teamId===teamId);
  let h=ros.filter(p=>!p.isP).length, pi=ros.filter(p=>p.isP).length;
  while(h<minH){ const p=makeHitter(FIELD_POS[h%FIELD_POS.length],ageRange,meanAdj||0); p.teamId=teamId; if(meanAdj<0) setContract(p,Math.min(p.salary,0.7),p.years,[]); G.players[p.id]=p; h++; }
  while(pi<minP){ const p=makePitcher(pi<5?"SP":"RP",ageRange,meanAdj||0); p.teamId=teamId; if(meanAdj<0) setContract(p,Math.min(p.salary,0.7),p.years,[]); G.players[p.id]=p; pi++; }
}

/* ----------------------------- draft picks ----------------------------- */
// Each MLB team owns 5 future picks (one per round). Picks are tradeable; the
// draft order within a round follows the ORIGINAL team's reverse standings.
function buildPicks(season, teams){
  const picks=[];
  for(let round=1; round<=5; round++){
    teams.forEach(t=>picks.push({ id:"pk"+season+"-"+round+"-"+t.id, season, round, orig:t.id, owner:t.id }));
  }
  return picks;
}
const PICK_YEARS = 3;   // how many future drafts' picks are tradeable at once
function buildPicksMulti(startSeason, teams, years=PICK_YEARS){
  let all=[]; for(let y=0;y<years;y++) all=all.concat(buildPicks(startSeason+y, teams)); return all;
}
function pickSlot(G, origId){ // 0 = projected worst team = first pick
  return [...G.teams].sort((a,b)=>pct(a)-pct(b)).map(t=>t.id).indexOf(origId);
}
function pickValue(G, pick){
  const slot = pickSlot(G, pick.orig);            // 0..29 (0 best)
  // a top-of-round pick yields a blue-chip prospect, so value it like one
  const roundBase = [0,24,12,6.5,3.6,2][pick.round] || 1.2;
  const v = roundBase * (1 - slot/40);            // earlier slot worth more
  return Math.max(0.3, round(v*10)/10);
}

function autoSetLineups(team, players){
  const all = Array.isArray(players) ? players : Object.values(players);
  const roster = all.filter(p=>p.teamId===team.id);
  const hitters = roster.filter(p=>!p.isP).sort((a,b)=>b.ovr-a.ovr);
  const pitchers = roster.filter(p=>p.isP);
  // pick best at each defensive slot, then DH = best leftover; record assignments
  const used = new Set(); const lineup = []; const posMap = {};
  FIELD_POS.forEach(pos=>{
    let best=null;
    for(const h of hitters){ if(used.has(h.id)) continue; if(h.pos===pos){best=h;break;} }
    if(!best){ for(const h of hitters){ if(!used.has(h.id)){best=h;break;} } }
    if(best){ used.add(best.id); lineup.push(best.id); posMap[best.id]=pos; }
  });
  const dh = hitters.find(h=>!used.has(h.id)); if(dh){used.add(dh.id);lineup.push(dh.id);posMap[dh.id]="DH";}
  // order by a rough lineup logic: speed/eye top, power middle
  const ids = lineup.slice();
  ids.sort((a,b)=>{
    const pa=all.find(x=>x.id===a),pb=all.find(x=>x.id===b);
    return (pb.con+pb.eye) - (pa.con+pa.eye);
  });
  team.lineup = ids.slice(0,9);
  team.pos = posMap;
  // ALWAYS field a 5-man rotation: real SPs first, then promote the best other arms if short
  let sp = pitchers.filter(p=>p.role==="SP").sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
  if(sp.length<5){
    const extra = pitchers.filter(p=>!sp.includes(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
    sp = sp.concat(extra);
  }
  team.rotation = sp.slice(0,5);
  // default bullpen priority: everyone not starting, best arm (closer) first
  const inRot = new Set(team.rotation);
  team.bullpen = pitchers.filter(p=>!inRot.has(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
}

// Keep an organization's BEST players on the big-league club (AI roster management).
// Without this, randomly-generated/aged orgs can leave 70+ OVR talent rotting in AAA
// behind worse MLB scrubs. Promotes by OVR while guaranteeing a natural fielder at
// every position and a 5-man-capable staff; everyone else is sent to the affiliate.
function aiAlignOrg(G, mlbId){
  const aaaId = aaaIdOf(mlbId);
  const org = Object.values(G.players).filter(p=>p.teamId===mlbId || p.teamId===aaaId);
  if(!org.length) return;
  const hitters = org.filter(p=>!p.isP);
  const pitchers = org.filter(p=>p.isP);
  // hitters: first guarantee the best natural starter at each field position is up,
  // then fill the rest of the (up to 16) hitter slots with the best remaining by OVR.
  const upH = new Set();
  FIELD_POS.forEach(pos=>{
    const best = hitters.filter(p=>p.pos===pos && !upH.has(p.id)).sort((a,b)=>b.ovr-a.ovr)[0];
    if(best) upH.add(best.id);
  });
  hitters.slice().sort((a,b)=>b.ovr-a.ovr).forEach(p=>{ if(upH.size<16 && !upH.has(p.id)) upH.add(p.id); });
  hitters.forEach(p=>{ p.teamId = upH.has(p.id) ? mlbId : aaaId; });
  // pitchers: keep the 5 best starters up, then the best arms overall (up to 14 total).
  const upP = new Set();
  pitchers.filter(p=>p.role==="SP").sort((a,b)=>b.ovr-a.ovr).slice(0,5).forEach(p=>upP.add(p.id));
  pitchers.slice().sort((a,b)=>b.ovr-a.ovr).forEach(p=>{ if(upP.size<14 && !upP.has(p.id)) upP.add(p.id); });
  pitchers.forEach(p=>{ p.teamId = upP.has(p.id) ? mlbId : aaaId; });
}

// Shuffle which city/nickname identities land in which league+division slot,
// keeping the league/division structure (15+15, 5 per division) fixed and the
// user's selected franchise pinned to its index so userTeamId stays valid.
function shuffledTeamDefs(pinIdx){
  const defs = TEAM_DEFS.map(d=>d.slice());
  const slots = defs.map((_,i)=>i).filter(i=>i!==pinIdx);
  const ids = slots.map(i=>[defs[i][0],defs[i][1],defs[i][2]]);
  for(let i=ids.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
  slots.forEach((slot,k)=>{ defs[slot][0]=ids[k][0]; defs[slot][1]=ids[k][1]; defs[slot][2]=ids[k][2]; });
  return defs;
}

function generateLeague(userTeamId, opts={}){
  const { seed=null, shuffle=false } = opts;
  // Seed only the league build; restore Math.random afterward so the season
  // sim stays genuinely random even for a reproducible league.
  if(seed!=null && !Number.isNaN(seed)) setRng(mulberry32(seed >>> 0));
  const defs = shuffle ? shuffledTeamDefs(userTeamId) : TEAM_DEFS;
  const teams = defs.map((d,i)=>makeTeam(d,i));
  teams[userTeamId].userControlled = true;
  const players = {};
  teams.forEach(t=>{ t._players.forEach(p=>players[p.id]=p); delete t._players; });
  // AAA affiliates: one per MLB team, each with its own prospect-laden roster
  const aaaTeams = teams.map(t=>makeAAATeam(t));
  aaaTeams.forEach(at=>buildAAARoster(at.id).forEach(p=>players[p.id]=p));
  // sort each org so its best talent starts on the big-league club, not buried in AAA
  const Gtmp = { players };
  teams.forEach(t=>aiAlignOrg(Gtmp, t.id));
  teams.forEach(t=>autoSetLineups(t, players));
  aaaTeams.forEach(at=>autoSetLineups(at, players));
  // amateur college league (the draft pipeline)
  const collegeTeams = COLLEGE_DEFS.map((d,i)=>makeCollegeTeam(d,i));
  collegeTeams.forEach(ct=>buildCollegeRoster(ct.id).forEach(p=>players[p.id]=p));
  collegeTeams.forEach(ct=>autoSetLineups(ct, players));
  setRng(null);
  return { teams, aaaTeams, collegeTeams, players };
}

/* ----------------------------- schedule -------------------------------- */
// games each pair plays: division rivals most, same-league moderate, interleague rare.
// (4 div × 18) + (10 same-league × 8) + (5 mirror-division interleague × 2) = 162 per team.
function gamesBetween(a, b){
  if(a.league===b.league) return a.division===b.division ? 18 : 8;
  return a.division===b.division ? 2 : 0;          // interleague only vs the mirror division
}
// lighter amateur slate (~50 games): college seasons are short
function collegeGamesBetween(a, b){
  if(a.league===b.league) return a.division===b.division ? 6 : 3;
  return a.division===b.division ? 2 : 0;
}
// How to split a pair's N games into real back-to-back series (whole series at one venue).
// gamesBetween only yields 18 / 8 / 2, each mapped to a plan that keeps home/away balanced:
// 18 → six 3-gamers (host alternates → 9/9), 8 → two 4-gamers (4/4), 2 → one 2-gamer.
const SERIES_PLAN = { 18:[3,3,3,3,3,3], 8:[4,4], 2:[2] };
function seriesPlan(n){
  if(SERIES_PLAN[n]) return SERIES_PLAN[n];
  const out=[]; let rem=n; while(rem>0){ const c=rem===4?4:rem<3?rem:3; out.push(c); rem-=c; } return out; // generic fallback
}
// Build a 162-game schedule as a slate of 2–4 game SERIES (the whole set played at one park),
// spread over the calendar WITH off days. Returns an array of days, each an array of
// {home,away,played,hs,as}. A series occupies consecutive days; home stays the host all series.
function buildSchedule(teams, gb=gamesBetween){
  // 1) turn every matchup into a list of series {host, visitor, length}
  const allSeries=[];
  for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++){
    const a=teams[i], b=teams[j], n=gb(a,b); if(!n) continue;
    const plan=seriesPlan(n);
    plan.forEach((len,k)=>{
      // alternate the host across a pair's series (balanced); a lone series picks by parity
      const aHosts = plan.length>1 ? (k%2===0) : ((i+j)%2===0);
      allSeries.push({ host: aHosts?a.id:b.id, visitor: aHosts?b.id:a.id, length:len });
    });
  }
  // shuffle so a club's opponents vary through the year instead of clustering
  for(let i=allSeries.length-1;i>0;i--){ const j=Math.floor(_rng()*(i+1)); [allSeries[i],allSeries[j]]=[allSeries[j],allSeries[i]]; }
  // 2) greedily place each series at the earliest day BOTH clubs are free (so a team's series
  // never overlap and nobody plays twice in a day). Repeatedly take the series that can start
  // soonest, keeping all clubs' calendars roughly in lockstep. A small per-club gap = off days.
  const free={}; teams.forEach(t=>free[t.id]=0);
  const pending=allSeries.slice();
  const placed=[];
  while(pending.length){
    let bi=0, bstart=Infinity;
    for(let i=0;i<pending.length;i++){ const s=pending[i]; const st=Math.max(free[s.host],free[s.visitor]); if(st<bstart){ bstart=st; bi=i; } }
    const s=pending.splice(bi,1)[0];
    const start=Math.max(free[s.host],free[s.visitor]);
    s.start=start;
    free[s.host]=start+s.length+(chance(0.4)?1:0);     // occasional off day after a series
    free[s.visitor]=start+s.length+(chance(0.4)?1:0);
    placed.push(s);
  }
  // 3) expand series into per-day game arrays
  const lastDay=placed.reduce((m,s)=>Math.max(m,s.start+s.length-1),0);
  const days=Array.from({length:lastDay+1},()=>[]);
  placed.forEach(s=>{ for(let k=0;k<s.length;k++) days[s.start+k].push({home:s.host, away:s.visitor, played:false, hs:0, as:0}); });
  while(days.length && days[days.length-1].length===0) days.pop();
  return days;
}
// keep all calendars (MLB / AAA / college) the same length so simDay can index by G.day
function padSchedules(...scheds){
  scheds=scheds.filter(Boolean);
  const len=Math.max(0,...scheds.map(s=>s.length));
  scheds.forEach(s=>{ while(s.length<len) s.push([]); });
}

/* ----------------------------- game sim -------------------------------- */
function teamDefRating(team, players){
  const pos = team.pos || {};
  let sum=0, n=0;
  team.lineup.forEach(id=>{
    const p = players[id]; if(!p || p.isP) return;
    const assigned = pos[id] || p.pos;
    if(assigned==="DH") return;                                  // DH doesn't field
    let d = p.def;
    if(assigned !== p.pos) d = Math.max(20, d - 12);             // out-of-position penalty
    sum += d; n++;
  });
  return n ? sum/n : 50;
}

function paOutcome(bat, pit, defN, park, parkHand){
  park = park||1; parkHand = parkHand||0;
  const bc=n01(bat.con), bp=n01(bat.pow), be=n01(bat.eye), bs=n01(bat.spd);
  // fatigue: a gassed arm loses a bit of stuff & command (mild, capped)
  const tired = clamp(((pit._tired||0)-0.8)*0.18, 0, 0.12);
  const ps=clamp(n01(pit.stu)-tired,0,1), pc=clamp(n01(pit.ctl)-tired,0,1);
  let kP = clamp(0.215 + 0.13*(ps-0.5) - 0.11*(bc-0.5) + 0.05*(pc-0.5), 0.04, 0.45);
  let bbP = clamp(0.085 + 0.08*(be-0.5) - 0.08*(pc-0.5) - 0.02*(ps-0.5), 0.02, 0.22);
  // HR needs power AND some contact — a one-dimensional slugger who can't make contact
  // shouldn't lead the league in homers, so a contact term gates the pure-power slope.
  // park factor nudges power most, contact a touch (both clubs share the park → balance kept).
  // handedness: a short porch helps a PULL hitter of the matching hand (RF short → LHB, LF short
  // → RHB) and mildly suppresses the opposite hand; switch hitters neutral. parkHand: +RF short.
  // switch-hitters bat from whichever side the porch favors → always the favorable nudge
  const hside = bat.bats==="S" ? Math.abs(parkHand) : bat.bats==="L" ? parkHand : -parkHand;
  // pitcher type: a flyball arm (low gb) yields more HR, a groundball arm fewer. Centered on the
  // ~0.48 league-mean gb so the average pitcher is neutral and total league HR is unchanged.
  const pgb = pit.gb!=null ? pit.gb : 0.48;
  let hrP = clamp((0.019 + 0.074*(bp-0.5) + 0.040*(bc-0.5) - 0.030*(ps-0.5)) * (1+(park-1)*1.6) * (1+hside*0.20) * (1+(0.48-pgb)*0.55), 0.002, 0.14);
  const hbpP = 0.009;  // hit by pitch — small, roughly real-life ~1% of PAs
  const r = Math.random();
  if(r < kP) return {o:"K"};
  if(r < kP+bbP) return {o:"BB"};
  if(r < kP+bbP+hbpP) return {o:"HBP"};
  if(r < kP+bbP+hbpP+hrP) return {o:"HR"};
  // ball in play
  let babip = clamp((0.304 + 0.11*(bc-0.5) - 0.05*(pc-0.5) - 0.06*(defN-0.5)) * (1+(park-1)*0.6), 0.19, 0.40);
  if(!chance(babip)) return {o:"OUT", ground: chance(0.40+0.30*pgb)};  // ground/air flag (pitcher gb tendency) for GIDP / SF / GO-AO
  // hit type
  const tripP = 0.018 + 0.04*bs;
  const rr = Math.random();
  if(rr < tripP) return {o:"3B"};
  if(rr < tripP + 0.21) return {o:"2B"};
  return {o:"1B"};
}

// advance runners; bases = [r1,r2,r3] holding batter objects or null. returns runs scored.
// Each runner who crosses the plate is credited an R (accurate runs-scored — the runner who
// actually scored, not a random hitter). The batter scores his own run on a HR.
function advance(bases, out, batter){
  let runs=0;
  const score = runner => { runs++; if(runner && runner.stats) runner.stats.R++; };
  if(out==="BB"){
    if(bases[0]){ if(bases[1]){ if(bases[2]){ score(bases[2]); } bases[2]=bases[1]; } bases[1]=bases[0]; }
    bases[0]=batter;
  } else if(out==="1B"){
    if(bases[2]){score(bases[2]); bases[2]=null;}
    if(bases[1]){score(bases[1]); bases[1]=null;}
    if(bases[0]){ bases[1]=bases[0]; bases[0]=null; }
    bases[0]=batter;
  } else if(out==="2B"){
    if(bases[2]){score(bases[2]);bases[2]=null;}
    if(bases[1]){score(bases[1]);bases[1]=null;}
    if(bases[0]){ bases[2]=bases[0]; bases[0]=null; }
    bases[1]=batter;
  } else if(out==="3B"){
    if(bases[2]){score(bases[2]);bases[2]=null;}
    if(bases[1]){score(bases[1]);bases[1]=null;}
    if(bases[0]){score(bases[0]);bases[0]=null;}
    bases[2]=batter;
  } else if(out==="HR"){
    if(bases[2]){score(bases[2]);bases[2]=null;}
    if(bases[1]){score(bases[1]);bases[1]=null;}
    if(bases[0]){score(bases[0]);bases[0]=null;}
    score(batter);
  }
  return runs;
}

// Accumulate a batter's PA delta into a split bucket (vs LHP/RHP, home/away). Current season
// only (reset at rollover); regular-season MLB games only (gated by simGame's recordSplits).
const SPLIT_KEYS=["PA","AB","H","_2B","_3B","HR","BB","SO","HBP","SF","RBI"];
function splitSnap(s){ const o={}; SPLIT_KEYS.forEach(k=>o[k]=s[k]||0); return o; }
function bumpSplit(bat, key, snap){
  const sp = bat._splits || (bat._splits={});
  const b = sp[key] || (sp[key]={PA:0,AB:0,H:0,_2B:0,_3B:0,HR:0,BB:0,SO:0,HBP:0,SF:0,RBI:0});
  SPLIT_KEYS.forEach(k=> b[k] += (bat.stats[k]||0)-snap[k]);
}
// Per-team roster index, built ONCE per sim-day so games don't each re-scan the
// entire (potentially thousands-large) player dict. Hot sim helpers take an
// optional `idx`; when absent they fall back to a full scan (fine for one-off UI).
function rosterIndex(players){
  const idx={};
  for(const id in players){ const p=players[id]; if(p.teamId==null) continue; (idx[p.teamId]=idx[p.teamId]||[]).push(p); }
  return idx;
}
const teamRoster = (players, teamId, idx) => idx ? (idx[teamId]||[]) : Object.values(players).filter(p=>p.teamId===teamId);

// ordered list of bullpen pitcher ids (everyone not in the rotation), honoring the
// user's saved priority (team.bullpen) and appending any new arms by OVR. best-first.
// an injured player can't take the field until his IL stint runs out (decremented in simDay)
function isInjured(p){ return !!(p && p.injury && p.injury.days>0); }
function bullpenOrder(team, players, idx){
  const ros = teamRoster(players, team.id, idx).filter(p=>p.isP && !isInjured(p));
  const inRot = new Set(team.rotation||[]);
  const pool = ros.filter(p=>!inRot.has(p.id));
  const listed = (team.bullpen||[]).filter(id=>pool.some(p=>p.id===id));
  const rest = pool.filter(p=>!listed.includes(p.id)).sort((a,b)=>b.ovr-a.ovr).map(p=>p.id);
  return listed.concat(rest);
}
function getPitchers(team, players, idx){
  const ros = teamRoster(players, team.id, idx).filter(p=>p.isP && !isInjured(p));
  const gi = team.w + team.l + (team.poGi||0);
  const rotIds = (team.rotation.length?team.rotation:ros.filter(p=>p.role==="SP").map(p=>p.id))
    .filter(id=>{ const p=players[id]; return p && !isInjured(p); });   // skip injured starters
  let starter = players[rotIds[gi % Math.max(1,rotIds.length)]] || ros.find(p=>p.role==="SP") || ros[0];
  // pen is best-first by priority; pen[0] is the closer
  const pen = bullpenOrder(team, players, idx).map(id=>players[id]).filter(Boolean);
  return { starter, pen };
}

function lineupHitters(team, players, idx){
  let hs = team.lineup.map(id=>players[id]).filter(p=>p&&!p.isP&&!isInjured(p));
  if(hs.length<9){
    const have=new Set(hs.map(p=>p.id));
    const extra = teamRoster(players, team.id, idx).filter(p=>!p.isP && !isInjured(p) && !have.has(p.id));
    extra.sort((a,b)=>b.ovr-a.ovr);
    hs = hs.concat(extra).slice(0,9);
  }
  return hs.slice(0,9);
}

// Day's batting order with the occasional platoon start: if a club HAS bench bats, spell a
// NON-STAR regular who's at a platoon DISadvantage vs the opposing starter with a comparable bench
// bat who holds the edge. Gives backups real playing time (they'd otherwise never bat). Stars
// (ovr>=72) always play, so it never dents the leaderboards; the engine run-environment is
// untouched (no platoon hit bonus), so it's balance-safe. The sub bats in the regular's order slot.
function platoonLineup(team, players, idx, oppStarter){
  const base = lineupHitters(team, players, idx);
  const used = new Set(base.map(p=>p.id));
  const bench = teamRoster(players, team.id, idx).filter(p=>!p.isP && !isInjured(p) && !used.has(p.id));
  if(!bench.length) return base;
  const oppHand = (oppStarter && oppStarter.throws) || "R";
  const hasEdge = h => h.bats==="S" || h.bats!==oppHand;   // platoon advantage vs this starter
  const out = base.slice(); let swaps=0;
  for(let i=0;i<out.length && swaps<2;i++){
    const s=out[i]; if(s.ovr>=72 || hasEdge(s)) continue;  // stars always play; skip if regular holds the edge
    let best=null;
    bench.forEach(b=>{ if(used.has(b.id) || !hasEdge(b) || b.ovr < s.ovr-3) return; if(!best || b.ovr>best.ovr) best=b; });
    if(best && chance(0.5)){ out[i]=best; used.add(best.id); swaps++; }
  }
  return out;
}

function simGame(home, away, players, idx, recordSplits){
  const out = { home, away };
  const park = (home && home.ballpark && home.ballpark.pf) || 1;   // home park nudges this game's run environment
  const parkHand = (home && home.ballpark && home.ballpark.hand) || 0;   // +RF short (favors LHB), −LF short (favors RHB)
  const arms = { [home.id]: getPitchers(home,players,idx), [away.id]: getPitchers(away,players,idx) };
  // platoon-aware batting orders (each club set vs the OPPOSING starter's hand; a user vs-LHP lineup wins)
  const oppStart = { [home.id]: arms[away.id].starter, [away.id]: arms[home.id].starter };
  const lineups = { [home.id]: dayLineup(home,players,idx,oppStart[home.id]),
                    [away.id]: dayLineup(away,players,idx,oppStart[away.id]) };
  const order = { [home.id]:0, [away.id]:0 };
  const defN = { [home.id]: n01(teamDefRating(home,players)), [away.id]: n01(teamDefRating(away,players)) };
  // position -> fielder for each club, so balls in play can be charged to a fielder
  // (a fielding chance, and sometimes an error). Built from the assigned defense (team.pos),
  // falling back to a player's natural position. The DH never fields.
  const fielderMap = t => { const m={}, pm=posMapFor(t, oppStart[t.id]);
    lineups[t.id].forEach(h=>{ const pos=pm[h.id]||h.pos; if(pos!=="DH" && !m[pos]) m[pos]=h; }); return m; };
  const fielders = { [home.id]: fielderMap(home), [away.id]: fielderMap(away) };
  // realistic distribution of where balls in play are handled (sums to 1)
  const FIELD_DIST = [["SS",.17],["CF",.16],["LF",.13],["RF",.13],["2B",.13],["3B",.12],["1B",.09],["C",.04],["P",.03]];
  // charge a fielding chance on a ball in play; `canErr` => an out the fielder could boot.
  function fieldChance(fieldTeamId, pitcher, canErr){
    let r=Math.random(), pos=null;
    for(const [ps,w] of FIELD_DIST){ if(r<w){ pos=ps; break; } r-=w; }
    if(!pos) pos="SS";
    const f = pos==="P" ? pitcher : fielders[fieldTeamId][pos];
    if(!f) return false;
    f.stats.TC=(f.stats.TC||0)+1;
    if(canErr){
      const dv = f.isP ? 0.5 : n01(f.def);
      const errP = clamp(0.040*(1-dv)+0.009, 0.005, 0.06);
      if(chance(errP)){ f.stats.E=(f.stats.E||0)+1; return true; }   // booted it → an error this inning
    }
    return false;
  }
  const cur = { [home.id]:{p:arms[home.id].starter, outs:0, er:0, idx:0, gs:true},
                [away.id]:{p:arms[away.id].starter, outs:0, er:0, idx:0, gs:true} };
  const starterTarget = id => 12 + round(n01(arms[id].starter.stm)*9); // ~12-21 outs (4-7 ip)
  const score = { [home.id]:0, [away.id]:0 };
  // per-game feat tracking: hits/baserunners ALLOWED by each club's pitching (no-hitter/perfect),
  // and each batter's hit types (cycle / multi-HR).
  const hitsAllowed = { [home.id]:0, [away.id]:0 };
  const reached = { [home.id]:0, [away.id]:0 };
  const gBat = {};   // batterId -> {b1,b2,b3,hr}
  const tallyHit = (batId, pitId, kind, batter) => {
    hitsAllowed[pitId]++; reached[pitId]++;
    const g = gBat[batter.id] || (gBat[batter.id]={b1:0,b2:0,b3:0,hr:0});
    if(kind==="2B") g.b2++; else if(kind==="3B") g.b3++; else if(kind==="HR") g.hr++; else g.b1++;
  };
  // mark GS
  cur[home.id].p.stats.GS++; cur[away.id].p.stats.GS++;
  cur[home.id].p.stats.G++; cur[away.id].p.stats.G++;
  // snapshot each starter's season line so we can credit a Quality Start (6+ IP, <=3 ER) afterward
  const startSnap = { [home.id]:{out:cur[home.id].p.stats.OUT, er:cur[home.id].p.stats.ER},
                      [away.id]:{out:cur[away.id].p.stats.OUT, er:cur[away.id].p.stats.ER} };
  const usedPen = { [home.id]:[], [away.id]:[] };
  const gOuts = {};   // outs each pitcher has recorded THIS game (for workload balancing)
  // snapshot season counters at game start so we can diff out each player's single-GAME
  // line afterward (for single-game records). Hitters in the lineup + both starters now;
  // relievers are snapshotted when they enter (in bringIn).
  // full start-of-game line for every player who appears, so we can diff out a complete
  // box-score line afterward (keys include HR/H/RBI/SO/OUT used by the single-game records).
  const snapH = h => ({AB:h.stats.AB,R:h.stats.R,H:h.stats.H,RBI:h.stats.RBI,BB:h.stats.BB,SO:h.stats.SO,HR:h.stats.HR});
  const snapP = p => ({OUT:p.stats.OUT,H:p.stats.H,R:p.stats.R||0,ER:p.stats.ER,BB:p.stats.BB,SO:p.stats.SO,HRA:p.stats.HRA});
  const gSnap = {};
  [home.id,away.id].forEach(tid=>{ lineups[tid].forEach(h=>{ gSnap[h.id]=snapH(h); });
    const sp=cur[tid].p; gSnap[sp.id]=snapP(sp); });

  // bring an arm into the game (counts an appearance the first time only this game)
  function bringIn(pitId, p){
    if(!p) return;
    const c = cur[pitId];
    if(c.p && c.p.id===p.id) return;
    c.p = p; c.gs = false; c.segOuts = 0;
    if(!usedPen[pitId].includes(p.id)){ usedPen[pitId].push(p.id); p.stats.G++; if(!gSnap[p.id]) gSnap[p.id]=snapP(p); }
  }
  // workload key: spread by what an arm has thrown THIS game, then FATIGUE, then season load —
  // so a gassed reliever sits and the freshest arm gets the ball.
  const loadKey = p => (gOuts[p.id]||0)*1e6 + (p._tired||0)*1000 + (p.stats.OUT||0);
  const leastLoaded = arr => arr.reduce((b,p)=> (b==null||loadKey(p)<loadKey(b))?p:b, null);
  // drop arms that are too gassed to pitch, IF any rested option remains
  const rested = arr => { const ok=arr.filter(p=>(p._tired||0)<1.2); return ok.length?ok:arr; };
  // Choose a reliever. pen is best-first (pen[0]=closer). Philosophy: LEAN ON THE
  // GOOD ARMS — the setup tier (best non-closers) carries the meaningful innings,
  // the closer locks down saves, and only the dregs mop up blowouts. Within those
  // roles we hand the ball to whoever's freshest (and not gassed).
  function pickReliever(pitId, inning, lead){
    const pen = arms[pitId].pen; if(!pen.length) return cur[pitId].p||null;
    const curId = cur[pitId].p ? cur[pitId].p.id : null;
    const closer = pen[0];
    // save situation: the closer finishes a 9th+ lead of 1-3 — unless he's gassed
    if(inning>=9 && lead>0 && lead<=3 && closer && closer.id!==curId && (closer._tired||0)<1.2) return closer;
    const tierCount = Math.max(1, Math.ceil(pen.length*0.55));
    const setup = pen.slice(1, 1+tierCount);          // best non-closer arms = high-leverage tier
    const low   = pen.slice(1+tierCount);             // fringe/mop-up arms
    // blowout (either way): rest the good arms, let the fringe soak it up
    if(Math.abs(lead) >= 7 && low.length){
      const pool = rested(low.filter(rp=>rp.id!==curId));
      return leastLoaded(pool.length?pool:low);
    }
    // normal relief: ride the setup tier, freshest (rested) first
    const tier = (setup.length?setup:pen.slice());
    const pool = rested(tier.filter(rp=>rp.id!==curId));
    return leastLoaded(pool.length?pool:tier);
  }
  // decide whether to change pitchers before the next batter
  function changePitcher(batId, pitId, inning){
    const c = cur[pitId];
    if(c.gs){
      if(c.outs >= starterTarget(pitId)){
        // A dominant starter earns a longer leash: while he's pitching a SHUTOUT he keeps going
        // (chasing the complete-game shutout), and even further if it's a no-hitter/perfect game.
        // The moment he gives up a run past his target, he's pulled at the next change.
        const runsAllowed = score[batId];
        const noHit = hitsAllowed[pitId]===0;
        const perfect = reached[pitId]===0;
        const cap = (perfect||noHit) ? 36 : (runsAllowed===0 ? 27 : starterTarget(pitId));
        if(!(runsAllowed===0 && c.outs < cap))
          bringIn(pitId, pickReliever(pitId, inning, score[pitId]-score[batId]));
      }
      return;
    }
    if((c.segOuts||0) < 3) return;                   // only swap at an inning boundary
    const next = pickReliever(pitId, inning, score[pitId]-score[batId]);
    if(next && next.id!==c.p.id) bringIn(pitId, next);
  }

  // Pitcher of record: each time a team TAKES the lead, remember its pitcher (the win
  // candidate) and the opponent's pitcher who surrendered the go-ahead run (the loss).
  // The last such change sticks → relievers can earn the W or the L, not just starters.
  let decisionRec = null;
  const plays = [];          // compact scoring-play log (every run-scoring event), for the game-log view
  let walkoff = false;       // home took the lead in the bottom of the 9th+ to end it
  const bumpScore = (batId, pitId, r) => {
    if(!r) return;
    const wasAhead = score[batId] > score[pitId];
    score[batId] += r;
    if(!wasAhead && score[batId] > score[pitId]){
      decisionRec = { winner:batId, loser:pitId,
        winPit: cur[batId].p?cur[batId].p.id:null,
        losePit: cur[pitId].p?cur[pitId].p.id:null };
    }
  };
  function halfInning(batId, pitId, inning, isBottom){
    let outs=0; const bases=[null,null,null];
    const hitters = lineups[batId];
    const recOut = pitcher => { outs++; cur[pitId].outs++; cur[pitId].segOuts=(cur[pitId].segOuts||0)+1; pitcher.stats.OUT++; gOuts[pitcher.id]=(gOuts[pitcher.id]||0)+1; };
    // wild pitch / balk: bump every runner up a base, scoring from third
    const wpAdvance = ()=>{ let r=0; if(bases[2]){r++; if(bases[2].stats) bases[2].stats.R++; bases[2]=null;} if(bases[1]){bases[2]=bases[1];bases[1]=null;} if(bases[0]){bases[1]=bases[0];bases[0]=null;} return r; };
    // record a run-scoring play (post-bump score) for the game log
    const logScore = (kind, batter, r) => { if(!r) return; plays.push({ i:inning, btm:isBottom?1:0, o:outs, b:batter?batter.id:null, p:cur[pitId].p?cur[pitId].p.id:null, k:kind, r, hs:score[home.id], as:score[away.id] }); };
    // charge runs to the current pitcher, splitting earned vs unearned. A small, DEFENSE-dependent
    // fraction of runs are unearned (sloppy clubs give up more) — so ERA < RA realistically. This is
    // a tagging-only abstraction (errors don't add baserunners here), so total runs / the tuned run
    // environment are completely unchanged; only the earned/unearned split moves.
    const ueRate = clamp(0.03 + 0.06*(1-(defN[pitId]||0.5)), 0.02, 0.12);
    const chargeRuns = r => { if(!r) return; const p=cur[pitId].p; p.stats.R=(p.stats.R||0)+r;
      let er=0; for(let i=0;i<r;i++){ if(!chance(ueRate)) er++; }
      p.stats.ER+=er; cur[pitId].er+=er; };
    while(outs<3){
      // walk-off: home (bottom half, 9th+) just took the lead → game over, end the half here
      if(isBottom && inning>=9 && score[batId] > score[pitId]){ walkoff=true; break; }
      changePitcher(batId, pitId, inning);
      // wild pitch / balk (only with a runner aboard) — credited to the pitcher
      if(bases[0]||bases[1]||bases[2]){
        const pit=cur[pitId].p;
        if(chance(0.018)){ pit.stats.WP=(pit.stats.WP||0)+1; const r=wpAdvance(); bumpScore(batId,pitId,r); logScore("WP",null,r); chargeRuns(r); }
        else if(chance(0.004)){ pit.stats.BK=(pit.stats.BK||0)+1; const r=wpAdvance(); bumpScore(batId,pitId,r); logScore("BK",null,r); chargeRuns(r); }
      }
      // stolen-base attempts (before the pitch). Steals of 2nd (runner on 1st) are most common;
      // steals of 3rd (runner on 2nd) are rarer; a double steal moves runners from 1st AND 2nd.
      const stealRate = (sp, third) => chance(clamp((third?0.020:0.05) + (third?0.10:0.28)*(sp-0.5), 0, third?0.07:0.22));
      const stealSafe = (sp, third) => chance(clamp((third?0.70:0.66) + 0.28*(sp-0.5), third?0.5:0.45, 0.94));
      if(bases[0] && bases[1] && !bases[2]){
        // double steal (runners on 1st & 2nd, 3rd open) — paced by the lead runner
        const lead=bases[1], trail=bases[0], sp=n01(lead.spd);
        if(chance(clamp(0.012 + 0.06*(sp-0.5), 0, 0.04))){
          if(stealSafe(sp,true)){ bases[2]=lead; bases[1]=trail; bases[0]=null; lead.stats.SB++; trail.stats.SB++; }   // both safe
          else { lead.stats.CS=(lead.stats.CS||0)+1; bases[1]=trail; bases[0]=null; recOut(cur[pitId].p); if(outs>=3) break; }   // lead out at 3rd, trail takes 2nd
        }
      } else if(bases[1] && !bases[2] && !bases[0]){
        // steal of 3rd (runner on 2nd only, 3rd open)
        const sp=n01(bases[1].spd);
        if(stealRate(sp,true)){
          if(stealSafe(sp,true)){ bases[2]=bases[1]; bases[1]=null; bases[2].stats.SB++; }
          else { bases[1].stats.CS=(bases[1].stats.CS||0)+1; bases[1]=null; recOut(cur[pitId].p); if(outs>=3) break; }
        }
      } else if(bases[0] && !bases[1]){
        // steal of 2nd (runner on 1st, 2nd open)
        const sp = n01(bases[0].spd);
        if(stealRate(sp,false)){
          if(stealSafe(sp,false)){ bases[1]=bases[0]; bases[0]=null; bases[1].stats.SB++; }
          else { bases[0].stats.CS=(bases[0].stats.CS||0)+1; bases[0]=null; recOut(cur[pitId].p); if(outs>=3) break; }
        }
      }
      const pitcher = cur[pitId].p;
      const bat = hitters[order[batId] % hitters.length]; order[batId]++;
      const res = paOutcome(bat, pitcher, defN[pitId], park, parkHand);
      const _ss = recordSplits ? splitSnap(bat.stats) : null;   // snapshot for platoon/venue splits
      bat.stats.PA++;
      if(res.o==="BB"){
        bat.stats.BB++; pitcher.stats.BB++; reached[pitId]++;
        const r = advance(bases,"BB",bat);
        bumpScore(batId,pitId,r); logScore("BB",bat,r); bat.stats.RBI+=r;
        chargeRuns(r);
      } else if(res.o==="HBP"){
        bat.stats.HBP=(bat.stats.HBP||0)+1; pitcher.stats.HBP=(pitcher.stats.HBP||0)+1; reached[pitId]++;
        const r = advance(bases,"BB",bat);   // hit-by-pitch advances like a walk
        bumpScore(batId,pitId,r); logScore("HBP",bat,r); bat.stats.RBI+=r;
        chargeRuns(r);
      } else if(res.o==="K"){
        bat.stats.AB++; bat.stats.SO++; pitcher.stats.SO++;
        recOut(pitcher);
      } else if(res.o==="OUT"){
        const ground = res.ground;
        if(ground && bases[0] && outs<2 && chance(0.185)){
          // grounded into double play — batter out + lead runner erased
          bat.stats.AB++; bat.stats.GIDP=(bat.stats.GIDP||0)+1; pitcher.stats.GO=(pitcher.stats.GO||0)+1;
          bases[0]=null; recOut(pitcher); recOut(pitcher);
          fieldChance(pitId, pitcher, true);
        } else if(!ground && bases[2] && outs<2 && chance(0.42)){
          // sacrifice fly — runner on third scores, batter charged no AB
          bat.stats.SF=(bat.stats.SF||0)+1; pitcher.stats.AO=(pitcher.stats.AO||0)+1;
          if(bases[2]&&bases[2].stats) bases[2].stats.R++;   // runner on third scores on the sac fly
          bases[2]=null; bumpScore(batId,pitId,1); logScore("SF",bat,1); bat.stats.RBI+=1; chargeRuns(1);
          recOut(pitcher); fieldChance(pitId, pitcher, true);
        } else {
          bat.stats.AB++;
          if(ground) pitcher.stats.GO=(pitcher.stats.GO||0)+1; else pitcher.stats.AO=(pitcher.stats.AO||0)+1;
          recOut(pitcher); fieldChance(pitId, pitcher, true);
        }
      } else {
        // hit
        bat.stats.AB++; bat.stats.H++; pitcher.stats.H++; tallyHit(batId, pitId, res.o, bat);
        if(res.o==="2B") bat.stats._2B++;
        if(res.o==="3B") bat.stats._3B++;
        if(res.o==="HR"){ bat.stats.HR++; pitcher.stats.HRA++; }
        else fieldChance(pitId, pitcher, false);   // a fielder handled it cleanly (no error)
        const r = advance(bases, res.o, bat);
        bumpScore(batId,pitId,r); logScore(res.o,bat,r); bat.stats.RBI+=r;
        chargeRuns(r);
      }
      // platoon (vs LHP/RHP) + venue (home/away) splits — regular-season MLB only
      if(_ss){ bumpSplit(bat, pitcher.throws==="L"?"vL":"vR", _ss); bumpSplit(bat, isBottom?"home":"away", _ss); }
    }
  }
  // play 9 innings (or until decided in bottom 9 / extras). Track runs per half-inning
  // for the box-score line score (away = top of each inning, home = bottom; null = didn't bat).
  const lineScore = { [home.id]:[], [away.id]:[] };
  let inning=1;
  while(true){
    let b=score[away.id]; halfInning(away.id, home.id, inning, false); lineScore[away.id].push(score[away.id]-b);  // top
    if(inning>=9 && score[home.id]>score[away.id]){ lineScore[home.id].push(null); break; } // home leads after top9 — no bottom
    b=score[home.id]; halfInning(home.id, away.id, inning, true); lineScore[home.id].push(score[home.id]-b);       // bottom
    if(inning>=9 && score[home.id]!==score[away.id]) break;
    inning++;
    if(inning>20) break; // safety
  }
  score[home.id] = Math.max(score[home.id], 0);
  // R (runs scored) is credited live to each runner who actually crossed the plate (see advance()
  // / the SF + WP/BK branches) — no more random distribution.
  out.hs = score[home.id]; out.as = score[away.id];
  out.plays = plays; out.walkoff = walkoff; out.finalInning = inning;   // scoring-play log for the game-log view
  // decisions
  const winnerId = out.hs>out.as ? home.id : away.id;
  const loserId  = winnerId===home.id ? away.id : home.id;
  const dec = awardDecision(winnerId, loserId, arms, usedPen, players, {home,away,score,decisionRec});
  // credit Quality Starts: the starter went 6+ IP (18+ outs) allowing <=3 ER this game
  [home,away].forEach(t=>{
    const sp=arms[t.id].starter; if(!sp) return;
    const dout=sp.stats.OUT-startSnap[t.id].out, der=sp.stats.ER-startSnap[t.id].er;
    if(dout>=18 && der<=3) sp.stats.QS=(sp.stats.QS||0)+1;
  });
  // complete games / shutouts / no-hitters / perfect games + hitter feats (cycle / multi-HR).
  // Feats are returned in out.feats; the caller (with G) records the accolade + logs the news.
  out.feats = [];
  [home,away].forEach(t=>{
    const tid=t.id, oppId = tid===home.id?away.id:home.id, sp=arms[tid].starter;
    if(!sp || (usedPen[tid]||[]).length>0) return;          // CG only if the starter went the distance
    sp.stats.CG=(sp.stats.CG||0)+1;
    if(score[oppId]===0) sp.stats.SHO=(sp.stats.SHO||0)+1;
    if(hitsAllowed[tid]===0) out.feats.push({pid:sp.id, isP:true, feat: reached[tid]===0?"Perfect Game":"No-Hitter"});
  });
  [home.id,away.id].forEach(tid=>{
    lineups[tid].forEach(h=>{ const g=gBat[h.id]; if(!g) return;
      if(g.b1>0&&g.b2>0&&g.b3>0&&g.hr>0) out.feats.push({pid:h.id, isP:false, feat:"Cycle"});
      else if(g.hr>=4) out.feats.push({pid:h.id, isP:false, feat:"4-HR Game"});
      else if(g.hr>=3) out.feats.push({pid:h.id, isP:false, feat:"3-HR Game"});
    });
  });
  // tag the teams pitchers actually threw for (for per-season history / multi-team years)
  [home,away].forEach(t=>{
    const lbl=teamLabel(t);
    if(arms[t.id].starter) tagTeam(arms[t.id].starter,lbl);
    (usedPen[t.id]||[]).forEach(id=>tagTeam(players[id],lbl));
  });
  // accumulate pitcher fatigue (~0.5 per inning thrown); it decays each day in simDay
  [arms[home.id].starter.id, ...usedPen[home.id], arms[away.id].starter.id, ...usedPen[away.id]].forEach(pid=>{
    const p=players[pid]; if(!p) return; p._tired = (p._tired||0) + (gOuts[pid]||0)/3 * 0.5;
  });
  // per-game stat lines (diff vs the start-of-game snapshot) for single-game records
  out.gameLines = [];
  [home.id,away.id].forEach(tid=>{
    lineups[tid].forEach(h=>{ const sn=gSnap[h.id]; if(!sn||sn.HR==null) return;
      out.gameLines.push({ pid:h.id, name:h.name, team:tid, isP:false, hr:h.stats.HR-sn.HR, h:h.stats.H-sn.H, rbi:h.stats.RBI-sn.RBI, ab:h.stats.AB-(sn.AB||0) }); });
    [arms[tid].starter.id, ...usedPen[tid]].forEach(pid=>{ const p=players[pid], sn=gSnap[pid]; if(!p||!sn||sn.SO==null) return;
      out.gameLines.push({ name:p.name, team:tid, isP:true, so:p.stats.SO-sn.SO, out:p.stats.OUT-sn.OUT }); });
  });
  // Full per-game box score (compact: player ids + ints, names resolved at view time) for the
  // Box Score viewer. Batting: [pid,AB,R,H,RBI,BB,SO,HR]; pitching: [pid,OUT,H,R,ER,BB,SO,HRA]
  // (R==ER — the sim treats every run as earned). Stored on the schedule/playoff game object.
  const batLine = tid => lineups[tid].map(h=>{ const sn=gSnap[h.id]||{};
    return [h.id, h.stats.AB-(sn.AB||0), h.stats.R-(sn.R||0), h.stats.H-(sn.H||0),

function awardDecision(winnerId, loserId, arms, usedPen, players, ctx){
  const wStarter = arms[winnerId].starter;
  const rec = ctx.decisionRec || {};
  // WIN — the winning team's pitcher of record when they took the lead for good. Exception:
  // a starter who left before 5 IP (OUT<15) cedes the win to a used reliever.
  let winPitId = rec.winPit;
  let winPit = winPitId!=null ? players[winPitId] : null;
  if(!winPit || winPit.teamId==null){ winPit=wStarter; winPitId=wStarter.id; }   // fallback
  if(winPit.id===wStarter.id && wStarter.stats.OUT<15){
    const rp = (usedPen[winnerId]||[]).map(id=>players[id]).filter(Boolean)[0];
    if(rp){ winPit=rp; winPitId=rp.id; }
  }
  winPit.stats.W++;
  // LOSS — the losing team's pitcher who surrendered the go-ahead run (often a reliever).
  let loserPitId = rec.losePit;
  let losePit = loserPitId!=null ? players[loserPitId] : null;
  if(!losePit){ losePit=arms[loserId].starter; loserPitId=losePit.id; }
  losePit.stats.L++;
  // save: closer = pen[0] (best/priority arm), if he finished a win of <=3
  const margin = Math.abs(ctx.score[winnerId]-ctx.score[loserId]);
  const pen = arms[winnerId].pen; const closer = pen[0];
  let saverId=null;
  if(closer && (usedPen[winnerId]||[]).includes(closer.id) && margin<=3 && closer.id!==wStarter.id && closer.id!==winPitId){
    closer.stats.SV++; saverId=closer.id;
  }
  // holds: setup relievers who bridged a close win (not the winner, not the saver)
  if(margin<=3){
    (usedPen[winnerId]||[]).forEach(id=>{
      if(id===saverId || id===winPitId) return;
      const rp=players[id]; if(rp) rp.stats.HLD=(rp.stats.HLD||0)+1;
    });
  }
  return { w:winPitId, l:loserPitId, s:saverId };   // decision ids for the box score
}

/* ----------------------------- standings ------------------------------- */

function standings(teams){

    const k=t.league+" "+t.division;
    (byDiv[k]=byDiv[k]||[]).push(t);
  });
  Object.values(byDiv).forEach(arr=>arr.sort((a,b)=>pct(b)-pct(a)||b.w-a.w));

  const lt = teams.filter(t=>t.league===league);

  const winners=[];
  Object.values(byDiv).forEach(arr=>{arr.sort((a,b)=>pct(b)-pct(a)); winners.push(arr[0]);});

  R:   {label:"Runs",          hit:true,  get:s=>s.R,     units:""},
  SB:  {label:"Steals",        hit:true,  get:s=>s.SB,    units:""},
  AVG: {label:"AVG (pts)",     hit:true,  get:s=>Math.round(avg(s)*1000), units:" (e.g. 300)"},
  W:   {label:"Wins",          hit:false, get:s=>s.W,     units:""},
  SO:  {label:"Strikeouts",    hit:false, get:s=>s.SO,    units:""},
  SV:  {label:"Saves",         hit:false, get:s=>s.SV,    units:""},
  QS:  {label:"Quality Starts",hit:false, get:s=>s.QS||0, units:""},

            if(data.position == 0){ data.position = resetValue; data.val = getNextValue(data.index++); }
            bits |= (resb > 0 ? 1 : 0) * power; power <<= 1;
          }
          dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
        case 1:
          bits = 0; maxpower = Math.pow(2, 16); power = 1;
          while(power != maxpower){
            resb = data.val & data.position; data.position >>= 1;
            if(data.position == 0){ data.position = resetValue; data.val = getNextValue(data.index++); }
            bits |= (resb > 0 ? 1 : 0) * power; power <<= 1;
          }
          dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
        case 2: return result.join('');
      }
      if(enlargeIn == 0){ enlargeIn = Math.pow(2, numBits); numBits++; }
      if(dictionary[c]) entry = dictionary[c];
      else { if(c === dictSize) entry = w + w.charAt(0); else return null; }
      result.push(entry);
      dictionary[dictSize++] = w + entry.charAt(0);
      enlargeIn--; w = entry;
      if(enlargeIn == 0){ enlargeIn = Math.pow(2, numBits); numBits++; }
    }
  }
  return {
    compressToUTF16: function(input){ if(input == null) return ""; return _compress(input, 15, function(a){ return f(a + 32); }) + " "; },
    decompressFromUTF16: function(compressed){ if(compressed == null) return ""; if(compressed == "") return null; return _decompress(compressed.length, 16384, function(index){ return compressed.charCodeAt(index) - 32; }); }
  };
})();

const SAVE_KEY = "pocketgm_baseball_v2";
const SAVE_VERSION = 4;
// New saves are written compressed with this marker prefix; legacy saves are plain JSON
// (which always start with "{"), so loadGame can tell them apart and read either.
const SAVE_LZ_PREFIX = "LZ16:";
// --- multi-slot saves: each franchise lives under its own key; an index lists them all ---
const SLOTS_KEY = "pocketgm_slots";
const slotKey = id => "pocketgm_slot_" + id;
function writeKey(key, G){
  try{ localStorage.setItem(key, SAVE_LZ_PREFIX + LZString.compressToUTF16(JSON.stringify(G))); return true; }
  catch(e){
    // last-ditch backstop on the ~5MB quota: aggressively trim, then retry; never lose data silently
    try{ trimHistories(G, 12, 1); if(typeof pruneFreeAgents==="function") pruneFreeAgents(G, 140);
      localStorage.setItem(key, SAVE_LZ_PREFIX + LZString.compressToUTF16(JSON.stringify(G))); return true; }
    catch(e2){ console.error("Save failed — storage full:", e2); return false; }
  }
}
function readKey(key){
  try{ const s=localStorage.getItem(key); if(!s) return null;
    const json = s.startsWith(SAVE_LZ_PREFIX) ? LZString.decompressFromUTF16(s.slice(SAVE_LZ_PREFIX.length)) : s;
    return json ? migrate(JSON.parse(json)) : null;
  }catch(e){ return null; }
}
function listSlots(){ try{ return JSON.parse(localStorage.getItem(SLOTS_KEY)||"[]"); }catch(e){ return []; } }
function writeSlotIndex(slots){ try{ localStorage.setItem(SLOTS_KEY, JSON.stringify(slots)); }catch(e){} }
// Save a game to ITS slot (creating one if needed) and refresh the slot index metadata.
function saveGame(G){
  if(!G) return false;
  if(!G.slotId) G.slotId = "s"+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);
  const ok = writeKey(slotKey(G.slotId), G);
  const u = G.teams && G.teams[G.userTeamId];
  const slots = listSlots().filter(s=>s.id!==G.slotId);
  slots.unshift({ id:G.slotId, name:(u?u.name:"Franchise"), abbr:(u?u.abbr:"?"),
    season:G.season, day:(G.day||0), phase:G.phase, ts:Date.now() });
  writeSlotIndex(slots);
  return ok;
}
function loadSlot(id){ return readKey(slotKey(id)); }
function deleteSlot(id){ try{ localStorage.removeItem(slotKey(id)); }catch(e){} writeSlotIndex(listSlots().filter(s=>s.id!==id)); }
// One-time migration: fold a pre-slots single autosave into a slot so existing franchises survive.
function migrateLegacySave(){
  if(listSlots().length) return;
  const g = readKey(SAVE_KEY);
  if(g){ g.slotId = g.slotId || "legacy"; saveGame(g); }
}
// legacy single-slot helpers (kept for back-compat / the old autosave key)
function loadGame(){ return readKey(SAVE_KEY); }
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// League news / transaction wire. Every notable move (signing, trade, call-up,
// draft pick, award, title) is logged here so the franchise keeps a persistent,
// scrollable history. Newest first; capped so saves stay small.
function logNews(G, type, msg, teamId){
  if(!G) return;
  if(!Array.isArray(G.news)) G.news=[];
  G.news.unshift({ season:G.season, day:(G.day||0)+1, phase:G.phase, type, msg, teamId: teamId==null?null:teamId });
  if(G.news.length>250) G.news.length=250;
}

// Forward-compatibility: backfill fields added by newer versions so an existing
// franchise keeps loading (and playing) across updates instead of being wiped.
function migrate(G){
  if(!G || !Array.isArray(G.teams)) return G;
  try{
    // CRITICAL: resume the in-memory uid() counter past every id already in this save,
    // BEFORE anything generates new players. uid() restarts at 1 each page load; without
    // this, draft/refill/FA players reuse low ids and overwrite existing players in the
    // dict (the "my players disappear every season" bug). Scan rostered players + draft class.
    let maxId = 0;
    Object.values(G.players||{}).forEach(p=>{ if(typeof p.id==="number" && p.id>maxId) maxId=p.id; });
    (G.draftClass||[]).forEach(p=>{ if(p && typeof p.id==="number" && p.id>maxId) maxId=p.id; });
    uid.atLeast(maxId);
    if(!G.aaaTeams){ G.aaaTeams = G.teams.map(t=>makeAAATeam(t)); }
    if(!G.aaaSchedule) G.aaaSchedule = buildSchedule(G.aaaTeams);
    // college league (amateur draft pipeline) — build it for saves created before this feature
    if(!Array.isArray(G.collegeTeams) || !G.collegeTeams.length){
      G.collegeTeams = COLLEGE_DEFS.map((d,i)=>makeCollegeTeam(d,i));
      G.collegeTeams.forEach(ct=>buildCollegeRoster(ct.id).forEach(p=>{ G.players[p.id]=p; }));
      G.collegeTeams.forEach(ct=>autoSetLineups(ct, G.players));
      G.collegeSchedule = buildSchedule(G.collegeTeams, collegeGamesBetween);
      padSchedules(G.schedule, G.aaaSchedule, G.collegeSchedule);
    }
    if(!G.collegeSchedule){ G.collegeSchedule = buildSchedule(G.collegeTeams, collegeGamesBetween); padSchedules(G.schedule, G.aaaSchedule, G.collegeSchedule); }
    if(!G.picks) G.picks = buildPicksMulti((G.season||2026)+1, G.teams);
    // backfill to 3 tradeable draft years for saves created before multi-year picks (preserves existing/traded picks)
    if(Array.isArray(G.picks) && G.picks.length){
      const minS=Math.min(...G.picks.map(p=>p.season));
      for(let y=minS; y<minS+PICK_YEARS; y++){ if(!G.picks.some(p=>p.season===y)) G.picks.push(...buildPicks(y, G.teams)); }
    }
    if(!Array.isArray(G.draftPicks)) G.draftPicks = [];
    if(!Array.isArray(G.awardHistory)) G.awardHistory = [];
    if(!Array.isArray(G.news)) G.news = [];
    if(!Array.isArray(G.tradeOffers)) G.tradeOffers = [];
    if(!Array.isArray(G.waivers)) G.waivers = [];
    if(!G.settings) G.settings = { injuries: true };
    if(G.gmStrikes==null) G.gmStrikes = 0;
    if(G.gmFired===undefined) G.gmFired = null;
    if(!G.ownerMandate && G.phase==="regular"){ try{ setOwnerMandate(G); }catch(e){} }   // backfill a mandate for in-season saves
    if(G.tradeDeadline==null) G.tradeDeadline = Math.round((G.schedule?G.schedule.length:224)*0.58);
    if(!Array.isArray(G.hof)) G.hof = [];
    if(!Array.isArray(G.hofBallot)) G.hofBallot = [];
    (G.teams||[]).forEach((t,i)=>{ if(!t.ballpark) t.ballpark = makeBallpark(i); else { if(t.ballpark.hand==null) t.ballpark.hand = ballparkHand(t.ballpark.name); if(t.ballpark.capacity==null) t.ballpark.capacity = rint(33,47)*1000; } });   // backfill ballparks (handedness + capacity)
    if(!Array.isArray(G.champions)) G.champions = G.champion ? [{season:G.champion.season, id:G.champion.id}] : [];
    // de-dupe any accidental repeat champions (one entry per season; keep the winner)
    if(Array.isArray(G.champions)){
      const seen=new Set();
      G.champions = G.champions.filter(c=>{ if(c==null||seen.has(c.season)) return false; seen.add(c.season); return true; });
    }
    if(G.teams.some(t=>t.rivalId==null)) assignRivals(G.teams);
    // One-time retroactive backfill for saves that predate rings/league records:
    // award championship rings from the teams a player actually suited up for (per
    // p.history) in each title season, and seed G.leagueRecords from the best of every
    // club's franchise records. Idempotent (rings dedupe via Set, league records only
    // fill empty slots). Flag is versioned: bump it to force a corrected re-run on saves
    // that already ran an earlier version (v2 adds the current/just-crowned champion).
    if(!G._honorsBackfilled2){
      const abbrById={}; G.teams.forEach(t=>abbrById[t.id]=t.abbr);
      const champBySeason={}; (G.champions||[]).forEach(c=>{ if(c) champBySeason[c.season]=abbrById[c.id]; });
      Object.values(G.players||{}).forEach(p=>{
        const got=new Set(p.rings||[]);
        (p.history||[]).forEach(e=>{
          const champ=champBySeason[e.season]; if(!champ) return;
          // an MLB stint (AAA labels end " AAA") with that year's champion = a ring
          if((e.teams||[]).some(tl=>!/ AAA$/.test(tl) && tl===champ)) got.add(e.season);
        });
        // the latest title may be crowned but not yet archived in history (offseason not
        // processed) — credit the current champion's current MLB roster for that season.
        if(G.champion && p.teamId===G.champion.id) got.add(G.champion.season);
        if(got.size) p.rings=[...got].sort((a,b)=>a-b);
      });
      const lr=G.leagueRecords=G.leagueRecords||{};
      ["teamWins","HR","RBI","H","R","SB","AVG","pW","pK","pSV","ERA"].forEach(k=>{
        let best=null,bteam=null;
        G.teams.forEach(t=>{ const r=(t.records||{})[k]; if(!r) return;
          const better = k==="ERA" ? (best==null||r.value<best.value) : (best==null||r.value>best.value);
          if(better){ best=r; bteam=t.abbr; }
        });
        if(best && !lr[k]) lr[k]={ value:best.value, holder:best.holder, team:bteam, season:best.season };
      });
      G._honorsBackfilled=true; G._honorsBackfilled2=true;
    }
    // Records v2: three tiers (game/season/career). Carry the old flat leagueRecords into
    // .season, seed .career from current players' running totals; .game fills in going forward.
    if(!G.records){
      G.records = { game:{}, season:(G.leagueRecords||{}), career:{} };
      recordCareerRecords(G);
    }
    Object.values(G.players||{}).forEach(p=>{ if(p.peakOvr==null) p.peakOvr=p.ovr; if(p.num==null) p.num=rint(1,99); if(p.isP && p.gb==null) p.gb=+clamp(gauss(0.48,0.07),0.30,0.66).toFixed(3); ensureContract(p); });
    const fixTeam = t=>{
      if(!t.pos) t.pos = {};
      if(!Array.isArray(t.lineup)) t.lineup = [];
      if(!Array.isArray(t.rotation)) t.rotation = [];
      if(!Array.isArray(t.history)) t.history = [];
      // guarantee a 5-man rotation and a bullpen priority list for older saves
      if(t.rotation.length<5 || !t.bullpen) ensureLineup(t, G.players);
      if(!t.bullpen) t.bullpen = bullpenOrder(t, G.players);
    };
    G.teams.forEach(fixTeam);
    G.aaaTeams.forEach(fixTeam);
    // one-time AI roster cleanup: promote each AI org's best talent out of AAA (skip the
    // user's club so their own call-up decisions stand). Re-set the touched lineups.
    if(!G._aiAligned){
      G.teams.forEach(t=>{ if(t.id!==G.userTeamId){ aiAlignOrg(G, t.id); autoSetLineups(t, G.players); autoSetLineups(G.aaaTeams[t.id], G.players); } });
      G._aiAligned = true;
    }
    // one-time cleanup for saves bloated by seasons of un-pruned free agents/prospects
    // (sim speed scales with total player count). Only fires on an already-large pool.
    if(Array.isArray(G.freeAgents) && Object.keys(G.players).length>2800){
      G.aaaTeams.forEach(t=>{ if(typeof AAA_CAP!=="undefined") trimRoster(G,t,AAA_CAP); });
      pruneFreeAgents(G);
    }
    // Shrink bloated saves on load: deep franchises accumulated unbounded per-player history that
    // blew past the localStorage quota (the "refresh reverts me to last season / deletes records"
    // bug). Trimming here rescues an existing save the first time it's reopened. Idempotent.
    trimHistories(G);
    // normalize playoff series to the game-by-game shape (hw/lw/games)
    if(G.playoffs){
      const po=G.playoffs;
      const norm=(s,need)=>{ if(!s) return;
        if(!Array.isArray(s.games)) s.games=[];
        if(typeof s.hw!=='number') s.hw = (s.done&&s.winner===s.hi)?need:0;
        if(typeof s.lw!=='number') s.lw = (s.done&&s.winner===s.lo)?need:0;
      };
      ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg]; if(b){ (b.wc||[]).forEach(s=>norm(s,1)); (b.ds||[]).forEach(s=>norm(s,3)); norm(b.cs,4); } });
      norm(po.ws,4);
    }
    G.version = SAVE_VERSION;
  }catch(e){ /* best-effort: a partial migration still beats a crash */ }
  return G;
}

// Manual backup: download the whole franchise as a JSON file (user-initiated click)
function exportSave(G){
  try{
    const data = JSON.stringify(G);
    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const u = G.teams[G.userTeamId];
    a.href = url;
    a.download = `pocketgm-${u?u.abbr:"save"}-${G.season}-day${(G.day||0)+1}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    return true;
  }catch(e){ return false; }
}
function importSave(file, onLoad){
  const r = new FileReader();
  r.onload = e=>{
    try{ const g = migrate(JSON.parse(e.target.result));
      if(g && Array.isArray(g.teams)){ onLoad(g); } else { alert("That file isn't a valid Pocket GM save."); }
    }catch(err){ alert("Couldn't read that save file."); }
  };
  r.readAsText(file);
}

/* ----------------------------- new game -------------------------------- */
function newGame(userTeamId, opts={}){
  const { teams, aaaTeams, collegeTeams, players } = generateLeague(userTeamId, opts);
  assignRivals(teams);
  const schedule = buildSchedule(teams);
  const aaaSchedule = buildSchedule(aaaTeams);
  const collegeSchedule = buildSchedule(collegeTeams, collegeGamesBetween);
  padSchedules(schedule, aaaSchedule, collegeSchedule);
  const G = {
    season: 2026, day: 0, phase: "regular", version: SAVE_VERSION,
    seed: (opts && opts.seed!=null && !Number.isNaN(opts.seed)) ? (opts.seed>>>0) : null,
    userTeamId, teams, aaaTeams, collegeTeams, players, schedule, aaaSchedule, collegeSchedule,
    picks: buildPicksMulti(2027, teams),   // next 3 drafts' picks are all tradeable
    freeAgents: [], draftClass: [], draftPicks: [], draftPick: 0,
    playoffs: null, champion: null, champions: [], hof: [], log: [], news: [],
    tradeDeadline: Math.round(schedule.length*0.58), tradeOffers: [], waivers: [],
    settings: { injuries: true }, gmStrikes: 0, gmFired: null,
  };
  setOwnerMandate(G);   // owner sets the first-season mandate
  return G;
}

// pair up teams into rivalries: two pairs within each division, plus the odd-team-out
// in each division gets a cross-league rival in the mirror division.
function assignRivals(teams){
  const byDiv={};
  teams.forEach(t=>{ const k=t.league+"|"+t.division; (byDiv[k]=byDiv[k]||[]).push(t); });
  Object.values(byDiv).forEach(arr=>{
    arr.sort((a,b)=>a.id-b.id);
    if(arr[0]&&arr[1]){ arr[0].rivalId=arr[1].id; arr[1].rivalId=arr[0].id; }
    if(arr[2]&&arr[3]){ arr[2].rivalId=arr[3].id; arr[3].rivalId=arr[2].id; }
  });
  ["East","Central","West"].forEach(d=>{
    const a=byDiv["Empire|"+d], b=byDiv["Pioneer|"+d];
    if(a&&b&&a[4]&&b[4]){ a[4].rivalId=b[4].id; b[4].rivalId=a[4].id; }
  });
  teams.forEach(t=>{ if(t.rivalId==null){ const dm=teams.find(o=>o.id!==t.id && o.league===t.league && o.division===t.division); if(dm) t.rivalId=dm.id; } });
}

function Badge({children}){ return <span className="px-2 py-1 rounded bg-[#16213a] text-slate-200 tnum text-xs">{children}</span>; }
function Card({children, className=""}){ return <div className={"bg-[#101a30] border border-[#1d2940] rounded-xl p-4 "+className}>{children}</div>; }
function OvrPill({v}){
  const c = v>=80?"bg-emerald-500 text-slate-900":v>=70?"bg-lime-500 text-slate-900":v>=60?"bg-yellow-500 text-slate-900":v>=50?"bg-orange-500 text-slate-900":"bg-slate-600 text-slate-100";

function PotPill({v}){

// OVR → POT pair, e.g. for tables/cards (small "→" between)
function OvrPot({p}){

}
// ---- Scouting fog: unproven players (draft prospects, raw youngsters) show a SCOUTED rating that
// can be off; it converges to the true value as they accumulate pro games. Deterministic per id.
function scoutGames(p){ let g=(p&&p.stats&&p.stats.G)||0; ((p&&p.history)||[]).forEach(h=>{ if((h.level==="MLB"||h.level==="AAA")&&h.stats) g+=h.stats.G||0; }); return g; }
function scoutConf(p){ if(!p||p.isP===undefined) return 1; let c=clamp(scoutGames(p)/170,0,1); if(p.amateur) c=Math.min(c,0.30); c=clamp(c+(p.age-18)*0.02,0,1); return c; }
function scoutBias(p){ return (mulberry32((p.id>>>0)||1)()*2-1)*9; }                 // a scout's fixed lean, ±9
function scoutedOvr(p){ const c=scoutConf(p); return clamp(Math.round(p.ovr + scoutBias(p)*(1-c)),20,99); }
function scoutedPot(p){ const c=scoutConf(p); return clamp(Math.round(p.pot + scoutBias(p)*(1-c)*1.1),20,99); }
function ScoutOvrPill({p}){ const c=scoutConf(p); if(c>=0.85) return <OvrPill v={p.ovr}/>;
  return <span className="inline-flex items-center" title={`Scouted estimate · ${Math.round(c*100)}% confidence — firms up with pro games`}><OvrPill v={scoutedOvr(p)}/><span className="text-slate-500 text-[9px] ml-0.5">~</span></span>; }
function ScoutPotPill({p}){ const c=scoutConf(p); if(c>=0.85) return <PotPill v={p.pot}/>;
  return <span className="inline-flex items-center" title={`Scouted ceiling · ${Math.round(c*100)}% confidence`}><PotPill v={scoutedPot(p)}/><span className="text-amber-500/60 text-[9px] ml-0.5">~</span></span>; }
function ScoutPot({p}){ const c=scoutConf(p); if(c>=0.85) return <OvrPot p={p}/>;
  return <span className="inline-flex items-center gap-1"><ScoutOvrPill p={p}/><span className="text-slate-600 text-[10px]">→</span><ScoutPotPill p={p}/></span>; }
function StatusPill({s}){
  const st = s==="ST";
  return <span className={"inline-block w-7 text-center rounded font-bold text-[10px] py-0.5 "+(st?"bg-emerald-600 text-white":"bg-slate-600 text-slate-200")}>{s}</span>;
}
