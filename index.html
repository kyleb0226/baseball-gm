// turn an arbitrary text seed into a 32-bit number (so seeds can be words too)
function hashSeed(str){
  let h = 2166136261 >>> 0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}

/* ----------------------------- injuries -------------------------------- */
const INJ_HIT = ["hamstring strain","oblique strain","sprained wrist","sore knee","back spasms","bruised hand","ankle sprain","shoulder strain","groin strain","concussion"];
const INJ_PIT = ["shoulder inflammation","elbow soreness","forearm strain","strained lat","blister","rotator cuff strain","oblique strain","sprained ankle","tired arm","back spasms"];
function injuryDuration(){
  const r=Math.random();
  if(r<0.45) return rint(2,6);      // day-to-day
  if(r<0.80) return rint(8,18);     // short IL
  if(r<0.95) return rint(25,50);    // medium
  return rint(60,110);              // long / season-ending
}
// Once per day: heal returning players, then roll new injuries among active MLB/AAA players.
// Injured players are auto-excluded from lineups/rotations (isInjured) and auto-return when healed.
function tickInjuries(G){
  if(G.settings && G.settings.injuries===false){          // injuries can be turned off in Settings
    for(const id in G.players){ if(G.players[id].injury) delete G.players[id].injury; }
    return;
  }
  const userMlb=G.userTeamId, userAaa=aaaIdOf(G.userTeamId);
  for(const id in G.players){ const p=G.players[id]; if(p.injury){
    p.injury.days--;
    if(p.injury.days<=0){
      delete p.injury;
      if(p.teamId===userMlb) logNews(G,"roster",`${p.pos} ${p.name} returns from the injured list`, userMlb);
    }
  }}
  Object.values(G.players).forEach(p=>{
    if(p.teamId==null || isCollegeId(p.teamId) || isInjured(p)) return;
    if(chance(p.isP?0.0017:0.0014)){
      p.injury = { days:injuryDuration(), desc:pick(p.isP?INJ_PIT:INJ_HIT), season:G.season };
      if(p.teamId===userMlb) logNews(G,"roster",`🤕 ${p.pos} ${p.name} injured (${p.injury.desc}) — out ~${p.injury.days} days`, userMlb);
    }
  });
}

/* ----------------------------- Hub / sim ------------------------------- */
// Trade rumor mill: flavor news in the run-up to the deadline, driven by team situations
// (sellers shop vets, buyers scout their needs) and player value — not random spam.
function tickTradeRumors(G){
  if(G.phase!=="regular") return;
  const dl=G.tradeDeadline||9999;
  if(G.day>dl || G.day < dl-28) return;        // only as the deadline approaches
  if(!chance(0.4)) return;                       // ~a few per week
  const teams=G.teams, sitOf=t=>teamSituation(G,t.id);
  // most valuable MLB player matching a filter (with a little randomness so it varies)
  const valuable=(filter)=>{ let best=null,bv=-1;
    teams.forEach(t=>rosterOf(G,t.id).forEach(p=>{ if(p.amateur) return; if(filter&&!filter(p,t)) return;
      const v=playerValue(p)*(0.75+Math.random()*0.5); if(v>bv){bv=v;best={p,t};} }));
    return best; };
  const r=Math.random(); let msg=null, tid=null, subj=null;
  if(r<0.34){
    // a seller (rebuild/retool club) shops a useful veteran
    const sellers=teams.filter(t=>{const m=sitOf(t).mode; return m==="Rebuild"||m==="Retool";});
    const t=pick(sellers.length?sellers:teams);
    const cand=rosterOf(G,t.id).filter(p=>!p.amateur && p.age>=29 && p.ovr>=66).sort((a,b)=>playerValue(b)-playerValue(a))[0];
    if(cand){ msg=`📋 ${t.abbr} reportedly making ${cand.pos} ${cand.name} (${cand.ovr} OVR) available ahead of the deadline`; tid=t.id; subj=cand.name; }
  } else if(r<0.67){
    // a star drawing interest as contenders circle
    const sel=valuable(p=>p.ovr>=72);
    if(sel){ msg=`👀 ${sel.p.pos} ${sel.p.name} (${sel.t.abbr}) is drawing trade interest as contenders circle`; tid=sel.t.id; subj=sel.p.name; }
  } else {
    // a buyer (win-now/contender) scouting a club to fill a need
    const buyers=teams.filter(t=>{const m=sitOf(t).mode; return m==="Win-now"||m==="Contender";});
    const b=pick(buyers.length?buyers:teams), need=(sitOf(b).needs||[])[0];
    let target=null;
    if(need) teams.forEach(t=>{ if(t.id===b.id) return; rosterOf(G,t.id).forEach(p=>{ if(p.amateur) return;
      const posOk = (need==="SP"||need==="RP") ? (p.isP&&p.role===need) : (!p.isP&&p.pos===need);
      if(posOk && p.ovr>=68 && (!target||p.ovr>target.p.ovr)) target={p,t}; }); });
    if(need && target){ msg=`🔎 ${b.abbr} scouts spotted watching ${target.t.abbr}'s ${target.p.pos} ${target.p.name} — hunting ${need} help`; tid=b.id; subj=target.p.name; }
    else { const sel=valuable(p=>p.ovr>=70); if(sel){ msg=`🔎 ${b.abbr} said to be aggressive on the market, eyeing ${sel.p.pos} ${sel.p.name} (${sel.t.abbr})`; tid=b.id; subj=sel.p.name; } }
  }
  if(!msg) return;
  G._rumorRecent = G._rumorRecent || [];
  if(subj && G._rumorRecent.includes(subj)) return;   // don't headline the same player back-to-back
  if(subj){ G._rumorRecent.push(subj); if(G._rumorRecent.length>6) G._rumorRecent.shift(); }
  logNews(G,"rumor",msg,tid);
}

/* ---- Player of the Month + monthly splits (the season is split into 6 "months") ---- */
const MONTH_NAMES=["April","May","June","July","August","September"];
const MHKEYS=["G","PA","AB","H","_2B","_3B","HR","R","RBI","BB","SO","SB","HBP","SF"];
const MPKEYS=["G","OUT","H","ER","BB","SO","W","L","SV","HRA"];
function monthIdx(G){ return Math.min(5, Math.floor(G.day / Math.max(1, G.schedule.length/6))); }
function snapshotMonth(G){ Object.values(G.players).forEach(p=>{ if(isMlbId(p.teamId)) p._monthSnap=Object.assign({}, p.stats); }); }
function finishMonth(G, m){
  const lg={Empire:{h:[],p:[]}, Pioneer:{h:[],p:[]}};
  Object.values(G.players).forEach(p=>{
    if(!isMlbId(p.teamId)) return; const t=teamById(G,p.teamId); if(!t||!lg[t.league]) return;
    const keys=p.isP?MPKEYS:MHKEYS, snap=p._monthSnap||{}, line={}; keys.forEach(k=>line[k]=(p.stats[k]||0)-(snap[k]||0));
    const played = p.isP ? line.OUT>0 : line.PA>0; if(!played) return;
    (p._monthly=p._monthly||[]).push({m, isP:p.isP, line}); if(p._monthly.length>6) p._monthly.shift();
    if(p.isP) lg[t.league].p.push({p,line}); else lg[t.league].h.push({p,line});
  });
  ["Empire","Pioneer"].forEach(L=>{
    const b=lg[L];
    // weight by playing time (mvpScore/cyScore scale with PA/IP) so a full-month regular/starter wins,
    // not a small-sample hot reliever or part-timer
    const bestH=b.h.filter(x=>x.line.PA>=40).reduce((a,c)=>(!a||mvpScore(c.line)>mvpScore(a.line))?c:a,null);
    const bestP=b.p.filter(x=>x.line.OUT>=30).reduce((a,c)=>(!a||cyScore(c.line)>cyScore(a.line))?c:a,null);
    if(bestH){ bestH.p.potm=(bestH.p.potm||0)+1; logNews(G,"award",`📅 ${MONTH_NAMES[m]} ${L} Player of the Month: ${bestH.p.name} (${f3(avg(bestH.line))}, ${bestH.line.HR} HR, ${bestH.line.RBI} RBI)`, bestH.p.teamId); }
    if(bestP){ bestP.p.potmP=(bestP.p.potmP||0)+1; logNews(G,"award",`📅 ${MONTH_NAMES[m]} ${L} Pitcher of the Month: ${bestP.p.name} (${bestP.line.W}-${bestP.line.L}, ${f2(era(bestP.line))} ERA, ${bestP.line.SO} K)`, bestP.p.teamId); }
  });
}
function tickMonthly(G){
  if(G.settings && G.settings.potm===false) return;
  const m=monthIdx(G);
  if(G._curMonth==null){ G._curMonth=m; snapshotMonth(G); return; }
  if(m!==G._curMonth){ finishMonth(G, G._curMonth); G._curMonth=m; snapshotMonth(G); }
}

function simDay(G){
  let idx = rosterIndex(G.players);             // build the team→players index ONCE for the whole day
  // safety net: a team that can't field a lineup/staff would crash simGame and hang the
  // whole Sim loop. Refill any depleted MLB/AAA roster to a playable minimum first.
  let repaired=false;
  for(const t of G.teams){ const r=idx[t.id]||[]; if(r.filter(p=>!p.isP).length<9 || r.filter(p=>p.isP).length<1){ refillRoster(G,t.id,14,12,[23,33],0); ensureLineup(t,G.players); repaired=true; } }
  for(const t of G.aaaTeams){ const r=idx[t.id]||[]; if(r.filter(p=>!p.isP).length<9 || r.filter(p=>p.isP).length<1){ refillRoster(G,t.id,12,9,[19,26],-6); autoSetLineups(t,G.players); repaired=true; } }
  for(const t of (G.collegeTeams||[])){ const r=idx[t.id]||[]; if(r.filter(p=>!p.isP).length<9 || r.filter(p=>p.isP).length<1){ refillRoster(G,t.id,12,9,[17,21],-12); autoSetLineups(t,G.players); repaired=true; } }
  if(repaired) idx = rosterIndex(G.players);     // rebuild after adding players
  const playDay = (sched, isMLB) => {
    const day = sched[G.day];
    if(!day) return;
    day.forEach(g=>{
      if(g.played) return;
      const home=teamById(G,g.home), away=teamById(G,g.away);
      const res = simGame(home, away, G.players, idx, isMLB);   // isMLB → record platoon/venue splits
      markGamesPlayed(home, away, G.players, idx);
      if(isMLB) updateGameRecords(G, res.gameLines, G.season);   // single-game records (MLB only)
      if(isMLB) updateHitStreaks(G, res.gameLines);              // active hitting streaks (MLB only)
      recordFeats(G, res);                                       // no-hitters / perfect games / cycles / multi-HR (all levels)
      g.played=true; g.hs=res.hs; g.as=res.as;
      if(isMLB){ g.box=res.box;   // full box score for every MLB game (this season's schedule only)
        // attach the scoring-play game log only to the USER's games (keeps the save bounded)
        if(g.home===G.userTeamId || g.away===G.userTeamId){ g.box.plays=res.plays; g.box.walkoff=res.walkoff; g.box.finalInning=res.finalInning; }
      }
      const homeWon=res.hs>res.as;
      if(homeWon){ home.w++; away.l++; } else { away.w++; home.l++; }
      home.streak = homeWon ? (home.streak>=0?(home.streak||0)+1:1) : (home.streak<=0?(home.streak||0)-1:-1);
      away.streak = homeWon ? (away.streak<=0?(away.streak||0)-1:-1) : (away.streak>=0?(away.streak||0)+1:1);
      home._wsMax = Math.max(home._wsMax||0, home.streak); away._wsMax = Math.max(away._wsMax||0, away.streak);
      home.rs+=res.hs; home.ra+=res.as; away.rs+=res.as; away.ra+=res.hs;
    });
  };
  playDay(G.schedule, true);                     // MLB
  if(G.aaaSchedule) playDay(G.aaaSchedule, false); // AAA affiliates
  if(G.collegeSchedule) playDay(G.collegeSchedule, false); // amateur college league
  // bullpen recovery: every arm sheds fatigue each day (≈3 days to recover from a heavy outing)
  for(const id in G.players){ const p=G.players[id]; if(p._tired){ p._tired=Math.max(0,p._tired-0.34); if(p._tired<0.05) delete p._tired; } }
  tickInjuries(G);                                // heal/return players, then roll new injuries
  G.day++;
  tickMonthly(G);   // Player/Pitcher of the Month + monthly splits at each "month" boundary
  // Mid-season All-Star Game (exhibition, ~season midpoint) — banked separately, no stat impact
  if((!G.allStarGame || G.allStarGame.season!==G.season) && G.day>=Math.floor(G.schedule.length*0.5)){
    try{ playAllStarGame(G); }catch(e){ /* never let the exhibition block the sim */ }
  }
  // BA Cup: a side knockout whose rounds are sprinkled through the season (no stat impact)
  ensureSeasonCup(G); tickBACup(G);
  // trade market: drop offers once they're stale or the deadline passes; before the
  // deadline an AI club occasionally pitches the user a deal.
  if(!Array.isArray(G.tradeOffers)) G.tradeOffers=[];
  if(G.day>G.tradeDeadline){ G.tradeOffers=[]; }
  else {
    G.tradeOffers = G.tradeOffers.filter(o=>(G.day-o.day)<=12);
    if(G.tradeOffers.length<2 && chance(0.045)){ const off=makeAITradeOffer(G); if(off) G.tradeOffers.push(off); }
    tickTradeRumors(G);   // flavor rumors building toward the deadline
  }
  // waiver wire: occasional AI cuts + claim processing
  maybeAIWaive(G); processWaivers(G);
  if(G.day>=G.schedule.length){ enterPlayoffs(G); }
}

function userNextGame(G){
  for(let d=G.day; d<G.schedule.length; d++){
    const g = G.schedule[d].find(x=>(x.home===G.userTeamId||x.away===G.userTeamId));
    if(g && !g.played) return {day:d, g};
  }
  return null;
}

  const [asgBox,setAsgBox]=useState(null);
  const lastDay = G.day>0 ? G.schedule[G.day-1] : null;
  const userLast = lastDay && lastDay.find(x=>x.home===G.userTeamId||x.away===G.userTeamId);
  const next = userNextGame(G);

  const acceptOffer=(i)=>{
    const o=(G.tradeOffers||[])[i]; if(!o) return;
    const other=G.teams[o.fromId];
    const getDesc=o.give.map(id=>G.players[id]&&G.players[id].name).filter(Boolean).join(", ");
    const giveDesc=o.get.map(id=>G.players[id]&&G.players[id].name).filter(Boolean).join(", ");
    executeOffer(G,o);
    logNews(G,"trade",`${user.abbr} acquired ${getDesc} from ${other.abbr} for ${giveDesc}`, user.id);
    G.tradeOffers.splice(i,1); commit(G); tShow("✅ Trade completed!");
  };
  const rejectOffer=(i)=>{ if(!G.tradeOffers) return; G.tradeOffers.splice(i,1); commit(G); tShow("Offer turned down"); };

  const runDays = (count)=>{
    setBusy(true);
    setTimeout(()=>{
      const g = G;
      for(let i=0;i<count && g.phase==="regular" && g.day<g.schedule.length;i++) simDay(g);
      commit(g); setBusy(false);

  };

  if(G.phase==="playoffs"){
    return <Card><div className="text-lg font-bold mb-2">🏆 Postseason is here!</div>

      {G.ownerMandate && (()=>{

                <div className="text-xs font-semibold text-amber-300">🏟️ Owner Mandate — {m.season}</div>

              </div>
            </div>
          </Card>
        );
      })()}

      {G.allStarGame && G.allStarGame.season===G.season && (()=>{
        const ag=G.allStarGame;
        return (
          <Card className="border-amber-600/40">
            <div className="flex items-center justify-between gap-3 flex-wrap">

      {userLast && <Card>

      {next && <Card>
        <div className="text-xs text-slate-400 mb-1">NEXT UP{next.day>G.day?` (Day ${next.day+1})`:""}</div>
        <GameLine G={G} g={next.g} preview />

      <Card>
        <div className="flex flex-wrap gap-2">
          <button disabled={busy} onClick={()=>runDays(1)} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold disabled:opacity-50">Sim 1 Day</button>

          <button disabled={busy} onClick={()=>runDays(30)} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] disabled:opacity-50">Sim 1 Month</button>
          <button disabled={busy} onClick={()=>runDays(400)} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] disabled:opacity-50">Sim to Playoffs</button>
        </div>
        {busy && <div className="text-xs text-slate-400 mt-2">Simulating…</div>}
        <div className="text-xs text-slate-500 mt-2">
          {G.day>G.tradeDeadline
            ? "🔒 Trade deadline has passed — the market is closed until the offseason"
            : `Trade deadline: Day ${G.tradeDeadline+1} (${G.tradeDeadline-G.day+1} days away)`}
        </div>
      </Card>
    </div>
  );
}

/* ----------------------------- Roster ---------------------------------- */
function rosterOf(G, teamId){ return Object.values(G.players).filter(p=>p.teamId===teamId); }
function payroll(G, teamId){ return rosterOf(G,teamId).reduce((s,p)=>s+p.salary,0); }

// Procedurally generate a ballpark's outfield wall — deterministic per park (seeded by the
// name) so each team's stadium is stable and distinct. Most are normal/symmetric; some are
// asymmetric; a few are quirky (a short porch + angular corner, Fenway-style). Returns the
// ordered wall points (left foul pole → right foul pole) + an outer ring for the grandstand.
const HX=180, HY=150;   // home plate
function ballparkGeom(seed){
  const rng=mulberry32((seed>>>0)||1);
  const push=(pt,d)=>{ const dx=pt.x-HX, dy=pt.y-HY, len=Math.hypot(dx,dy)||1; return {x:pt.x+dx/len*d, y:pt.y+dy/len*d}; };
  const base=[ {x:42,y:80},{x:96,y:40},{x:180,y:26},{x:264,y:40},{x:318,y:80} ];   // L pole, L gap, CF, R gap, R pole
  const roll=rng();
  let wall;
  if(roll<0.50){            // normal / symmetric — small mirrored jitter
    const dP=(rng()*2-1)*7, dG=(rng()*2-1)*9, dC=(rng()*2-1)*7;
    wall=[ push(base[0],dP), push(base[1],dG), push(base[2],dC), push(base[3],dG), push(base[4],dP) ];
  } else if(roll<0.85){     // asymmetric — independent jitter per point
    wall=base.map(pt=>push(pt,(rng()*2-1)*15));
  } else {                  // quirky — a short porch on one side + an angular corner
    wall=base.map(pt=>push(pt,(rng()*2-1)*9));
    const left=rng()<0.5, gi=left?1:3, fi=left?0:4;
    wall[gi]=push(base[gi], -(16+rng()*12));                          // pull the gap in (short porch)
    const corner={ x:(wall[fi].x+wall[gi].x)/2+(left?-12:12), y:(wall[fi].y+wall[gi].y)/2-12 };  // angular jut
    wall.splice(left?1:3, 0, corner);
  }
  wall.forEach(p=>{ p.x=clamp(p.x,16,344); p.y=clamp(p.y,16,118); });
  const outer=wall.map(p=>push(p,16));
  return { wall, outer };
}
// Stylized inline-SVG ballpark illustration (bottom of the Roster tab / team roster modal).
function BallparkView({team}){
  const bp = team.ballpark || {name:"Ballpark", pf:1};
  const pf = bp.pf||1;
  const accent = pf>=1.02 ? "#fbbf24" : pf<=0.98 ? "#38bdf8" : "#64748b";   // hitter=amber, pitcher=sky
  const labelColor = pf>=1.02 ? "text-amber-300" : pf<=0.98 ? "text-sky-300" : "text-slate-300";
  const geom = ballparkGeom(hashSeed(bp.name||"park"));
  const W=geom.wall, O=geom.outer, last=W.length-1;
  const pt=p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
  const grassPath = `M${HX} ${HY} L`+W.map(pt).join(" L ")+" Z";
  const wallLine = "M"+W.map(pt).join(" L ");
  const standsBand = "M"+W.map(pt).join(" L ")+" L "+O.slice().reverse().map(pt).join(" L ")+" Z";
  return (
    <Card>
      <h3 className="font-bold mb-2">🏟️ {bp.name}</h3>
      <div className="flex flex-col items-center">
        <svg viewBox="0 0 360 168" className="w-full" style={{maxWidth:440}} role="img" aria-label={bp.name}>
          <defs>
            <linearGradient id="bpSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#0b1830"/><stop offset="1" stopColor="#0f1f3a"/></linearGradient>
            <linearGradient id="bpGrass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#1f7a43"/><stop offset="1" stopColor="#15602f"/></linearGradient>
          </defs>
          <rect x="0" y="0" width="360" height="168" rx="12" fill="url(#bpSky)"/>
          {/* grandstands hugging the outfield wall */}
          <path d={standsBand} fill="#27344d"/>
          <path d={"M"+O.map(pt).join(" L ")} fill="none" stroke="#33425e" strokeWidth="2"/>
          {/* field grass (fan from home plate to the wall) */}
          <path d={grassPath} fill="url(#bpGrass)"/>
          {/* outfield wall accent (park character) */}
          <path d={wallLine} fill="none" stroke={accent} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"/>
          {/* infield dirt diamond */}
          <path d="M180 150 L222 120 L180 92 L138 120 Z" fill="#c39157"/>

function Roster({G, team, commit}){
  const [sel, setSel] = useState(null);
  const ros = rosterOf(G, team.id);
  const aaa = G.aaaTeams[team.id];
  const aaaRos = rosterOf(G, aaaIdOf(team.id)).sort((a,b)=>b.ovr-a.ovr);
  const release = (p)=>{
    const inSeason = G.phase==="regular";
    if(!confirm(inSeason?`Place ${p.name} on waivers? Other clubs may claim him; if he clears he becomes a free agent.`:`Release ${p.name}? He becomes a free agent.`)) return;
    if(inSeason){ placeOnWaivers(G, p, team.id); logNews(G,"roster",`${team.abbr} placed ${p.pos} ${p.name} (${p.ovr}) on waivers`, team.id); }
    else { movePlayerToFA(G, p); logNews(G,"roster",`${team.abbr} released ${p.pos} ${p.name} (${p.ovr})`, team.id); }
    commit(G);
  };
  const sendDown = (p)=>{                         // MLB -> AAA
    flushLevel(p);                                // bank his MLB stats before he changes level
    movePlayer(G, p, team.id); p.teamId = aaaIdOf(team.id);
    autoSetLineups(aaa, G.players); ensureLineup(team, G.players);
    logNews(G,"roster",`${team.abbr} optioned ${p.pos} ${p.name} (${p.ovr}) to AAA`, team.id);
    commit(G);
  };
  const callUp = (p)=>{                           // AAA -> MLB
    flushLevel(p);                                // bank his AAA stats before he changes level
    movePlayer(G, p, team.id);                    // movePlayer keeps level; override to MLB
    p.teamId = team.id;
    autoSetLineups(aaa, G.players);
    logNews(G,"roster",`${team.abbr} called up ${p.pos} ${p.name} (${p.ovr}) from AAA`, team.id);

  const closer = relievers[0] || null;
  const bullpen = closer ? relievers.slice(1) : relievers;
  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const aaaHits = aaaRos.filter(p=>!p.isP), aaaArms = aaaRos.filter(p=>p.isP);

  const open = p=>setSel(p);
  return (
    <div className="space-y-4">
      <Card>
        <div className="flex justify-between items-center mb-2">
          <h3 className="font-bold">Starting Lineup <span className="text-slate-500 text-sm">({lineupHits.length})</span></h3>
          <span className="text-xs text-slate-500">Payroll {money(payroll(G,team.id))} / {money(team.budget)}</span>
        </div>
        <HitterTable players={lineupHits} onRelease={release} onSend={sendDown} bo onName={open} posMap={team.pos} />
        <p className="text-xs text-slate-500 mt-2">Amber position = playing out of his natural spot (defensive penalty). Set positions in the Lineup tab.</p>
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Bench <span className="text-slate-500 text-sm">({benchHits.length})</span></h3>
        {benchHits.length
          ? <HitterTable players={benchHits} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No bench hitters.</div>}
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Starting Rotation <span className="text-slate-500 text-sm">({rotation.length})</span></h3>
        <PitcherTable players={rotation} onRelease={release} onSend={sendDown} slots={rotSlots} onName={open} />
      </Card>
      {closer && <Card>
        <h3 className="font-bold mb-2">Closer</h3>
        <PitcherTable players={[closer]} onRelease={release} onSend={sendDown} slots={["CL"]} onName={open} />
        <p className="text-xs text-slate-500 mt-2">Closes save situations. Reorder the bullpen in the Lineup tab to pick your closer &amp; setup man.</p>
      </Card>}
      <Card>
        <h3 className="font-bold mb-2">Bullpen <span className="text-slate-500 text-sm">({bullpen.length})</span></h3>
        {bullpen.length
          ? <PitcherTable players={bullpen} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No other relievers.</div>}
      </Card>

      <Card className="border-amber-700/40">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-bold text-amber-300">AAA Affiliate — {team.nick} <span className="text-slate-500 text-sm">({aaaRos.length})</span></h3>

  );
}
// move a player to free agency, cleaning any lineup/rotation references
function movePlayerToFA(G, p){
  const t = teamById(G, p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
}

// ---- Waiver wire -------------------------------------------------------
// A cut/surplus player goes on waivers (off all rosters) before reaching free
// agency, giving other clubs — and the user — a chance to claim him cheaply.
function placeOnWaivers(G, p, fromId){
  const t=teamById(G,p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!Array.isArray(G.waivers)) G.waivers=[];
  if(!G.waivers.some(w=>w.id===p.id)) G.waivers.push({id:p.id, day:G.day||0, season:G.season, fromId});
  G.freeAgents=(G.freeAgents||[]).filter(id=>id!==p.id);
}
// AI clubs (worst record = first priority) claim useful waived players they can
// fit; players unclaimed after the window clear to free agency. The user gets a
// 2-day head start to claim from the Free Agency tab before AI can.
function processWaivers(G){
  if(!Array.isArray(G.waivers) || !G.waivers.length) return;
  const order=[...G.teams].sort((a,b)=>pct(a)-pct(b));   // worst record claims first
  const remaining=[];
  G.waivers.forEach(w=>{
    const p=G.players[w.id];
    if(!p || p.teamId!=null) return;                      // claimed/gone already
    const age=(G.day||0)-w.day;
    if(age<2){ remaining.push(w); return; }               // user's head-start window
    let claimed=null;
    for(const t of order){
      if(t.id===G.userTeamId || t.id===w.fromId) continue;
      if(rosterOf(G,t.id).length>=ROSTER_CAP) continue;
      if(p.salary > t.budget-payroll(G,t.id)) continue;
      if(p.ovr<58) continue;                              // only claim useful arms/bats
      claimed=t; break;
    }
    if(claimed){
      p.teamId=claimed.id; autoSetLineups(claimed,G.players);
      logNews(G,"roster",`${claimed.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, claimed.id);
    } else if(age>=4){
      if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);  // cleared waivers → FA
    } else remaining.push(w);
  });
  G.waivers=remaining;
}
// occasional in-season churn: a deep AI roster waives a low-value spare part,
// so the waiver wire has something on it for the user to browse/claim.
function maybeAIWaive(G){
  if(!chance(0.04)) return;
  const t=pick(G.teams.filter(x=>x.id!==G.userTeamId));
  const ros=rosterOf(G,t.id);
  if(ros.length<=27) return;
  const cand=ros.filter(p=>!t.lineup.includes(p.id) && !t.rotation.includes(p.id))
    .sort((a,b)=>playerValue(a)-playerValue(b))[0];
  if(cand && cand.ovr<=66){
    placeOnWaivers(G,cand,t.id); ensureLineup(t,G.players);
    logNews(G,"roster",`${t.abbr} waived ${cand.pos} ${cand.name} (${cand.ovr})`, t.id);
  }
}

// small per-season award/ring chips for the year-by-year table (and elsewhere)
function honorBadges(season, accolades, ringSeasons){
  const out=[], seen=new Set();   // dedup identical awards within a season (e.g. double All-Star pick)
  (accolades||[]).filter(x=>x.season===season).forEach(x=>{
    if(seen.has(x.award)) return; seen.add(x.award);
    if(x.award==="MVP") out.push(["MVP","bg-amber-500/25 text-amber-300 border-amber-500/40"]);
    else if(x.award==="Cy Young") out.push(["CY","bg-violet-500/25 text-violet-300 border-violet-500/40"]);
    else if(x.award==="All-Star") out.push(["AS","bg-sky-500/25 text-sky-300 border-sky-500/40"]);
  });
  if((ringSeasons||[]).includes(season)) out.push(["💍","bg-yellow-500/15 text-yellow-200 border-yellow-500/30"]);
  return out;
}
// Year-by-year stat table with per-season honors — shared by PlayerModal and HofModal.
// `postStats` (career playoff totals) and `cupStats` (career BA Cup totals, MLB+AAA combined)
// render as single collective rows under the yearly lines.
function YearByYear({history, isP, accolades, ringSeasons, postStats, cupStats}){
  postStats = postStats||{};
  const specials = [
    ["MLB Playoffs", postStats.MLB, "PO", "text-sky-300 font-semibold"],
    ["AAA Playoffs", postStats.AAA, "PO", "text-amber-400 font-semibold"],
    ["College Playoffs", postStats.COL, "PO", "text-violet-300 font-semibold"],
    ["BA Cup", cupStats, "CUP", "text-yellow-300 font-semibold"],
  ];
  const anySpecial = specials.some(([,st])=>st && (isP?(st.OUT>0||st.G>0):(st.PA>0||st.G>0)));
  if((!history || !history.length) && !anySpecial) return null;
  history = history||[];
  const statCells = st => isP
    ? [`${st.W||0}-${st.L||0}`, st.OUT?f1(ip(st)):"0.0", st.OUT?f2(era(st)):"—", st.SO||0, st.SV||0, st.OUT?f2(whip(st)):"—"]
    : [st.G||0, st.HR||0, st.RBI||0, st.SB||0, st.AB?f3(avg(st)):"—", st.AB?f3(ops(st)):"—"];
  const hasPlay = st => st && (isP? (st.OUT>0||st.G>0) : (st.PA>0||st.G>0));
  const specialRow = (label, st, tag, cls, first) => hasPlay(st) ? (
    <tr key={label} className={first?"border-t-2 border-[#2a3a55]":"border-b border-[#15203a]"}>
      <td className="text-left py-1 font-semibold text-slate-200">{label}</td>
      <td></td>
      <td className="text-center"><span className={cls}>{tag}</span></td>
      <td className="text-left text-slate-500">career</td><td className="text-center">—</td><td className="text-center">—</td>
      {statCells(st).map((v,j)=><td key={j} className="text-center">{v}</td>)}
      <td className="text-center text-slate-600">—</td>
    </tr>
  ) : null;
  return (
    <div className="mt-4">
      <div className="text-xs text-slate-400 mb-1 font-semibold">Year by Year</div>
      <div className="overflow-x-auto">
        <table className="w-full text-xs tnum">
          <thead><tr className="text-slate-500 border-b border-[#1d2940]">
            <th className="text-left py-1">Yr</th><th></th><th>Lvl</th><th className="text-left">Team</th><th>Age</th><th>OVR</th>
            {(isP?[["W-L"],["IP"],["ERA"],["SO"],["SV"],["WHIP"]]:[["G"],["HR"],["RBI"],["SB"],["AVG"],["OPS"]]).map(([h])=><th key={h}>{h}</th>)}
            <th>WAR</th>
          </tr></thead>
          <tbody>
            {[...history].reverse().map((h,i)=>{ const st=h.stats;
              const lvl = h.level || ((h.teams||[]).length && (h.teams||[]).every(t=>/ AAA$/.test(t)) ? "AAA" : "MLB");
              const teamTxt = (h.teams&&h.teams.length) ? h.teams.map(t=>t.replace(/ AAA$/,"").replace(/ \(C\)$/,"")).join("/") : "—";
              const badges = lvl==="MLB" ? honorBadges(h.season, accolades, ringSeasons) : [];
              return (
              <tr key={i} className="border-b border-[#15203a]">
                <td className="text-left py-1">{h.season}</td>
                <td className="whitespace-nowrap pr-1">{badges.map((b,j)=><span key={j} className={"text-[9px] border rounded px-1 mr-0.5 "+b[1]} title={b[0]==="MVP"?"MVP":b[0]==="CY"?"Cy Young":b[0]==="AS"?"All-Star":"Championship"}>{b[0]}</span>)}</td>
                <td className="text-center"><span className={lvl==="AAA"?"text-amber-400 font-semibold":lvl==="COL"?"text-violet-300 font-semibold":lvl==="HS"?"text-rose-300 font-semibold":"text-sky-300"}>{lvl}</span></td>
                <td className="text-left text-slate-400">{teamTxt}</td>
                <td className="text-center">{h.age}</td>
                <td className="text-center text-slate-400">{h.ovr}</td>
                {isP
                  ? <>{[`${st.W}-${st.L}`, st.OUT?f1(ip(st)):"0.0", st.OUT?f2(era(st)):"—", st.SO, st.SV, st.OUT?f2(whip(st)):"—"].map((v,j)=><td key={j} className="text-center">{v}</td>)}</>
                  : <>{[st.G, st.HR, st.RBI, st.SB, st.AB?f3(avg(st)):"—", st.AB?f3(ops(st)):"—"].map((v,j)=><td key={j} className="text-center">{v}</td>)}</>}
                <td className="text-center text-emerald-300">{lvl==="MLB"&&typeof h.war==="number"?f1w(h.war):"—"}</td>
              </tr>
            );})}
            {(()=>{ let first=true; return specials.map(([label,st,tag,cls])=>{ if(!hasPlay(st)) return null; const row=specialRow(label,st,tag,cls,first); first=false; return row; }); })()}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PlayerModal({p, team, onClose, G}){
  const s=p.stats, c=p.career;
  // season WAR vs the player's CURRENT level's run environment (MLB/AAA/COL), on his level-only line
  const lvl = G ? levelOf(p.teamId) : "FA";
  const warCtx = (G && lvl!=="FA") ? leagueWarCtx(G, lvl) : null;
  const seasonWar = warCtx ? warOf(p, warCtx, levelStats(p, lvl)) : null;
  // career WAR = sum of per-season WAR stamped in history (older rows may predate WAR → skip)
  const careerWar = (p.history||[]).reduce((t,h)=>t+(typeof h.war==="number"?h.war:0), 0);
  // park- & league-adjusted index stats (100 = league avg) for the current season's level line
  const lvlS = warCtx ? levelStats(p, lvl) : null;
  const homePf = (G && teamById(G,p.teamId) && teamById(G,p.teamId).ballpark) ? teamById(G,p.teamId).ballpark.pf : 1;
  const opsP = (warCtx && !p.isP && lvlS.PA>=20) ? opsPlus(lvlS, warCtx, homePf) : null;
  const wrcP = (warCtx && !p.isP && lvlS.PA>=20) ? wrcPlus(lvlS, warCtx, homePf) : null;
  const eraP = (warCtx && p.isP && lvlS.OUT>=15) ? eraPlus(lvlS, warCtx, homePf) : null;
  // career totals split BY LEAGUE (MLB / AAA / College) from the per-season history,
  // plus the live season at the player's current level — so MLB and college totals stay separate.
  const LVLFULL = {MLB:"MLB", AAA:"AAA", COL:"College"};
  const careerByLevel = L => { const t = p.isP?emptyPitStats():emptyHitStats();
    (p.history||[]).forEach(h=>{ if(h.level===L && h.stats) for(const k in t) t[k]=(t[k]||0)+(h.stats[k]||0); });
    if(L===levelOf(p.teamId)){ const cs=levelStats(p,L); for(const k in t) t[k]=(t[k]||0)+(cs[k]||0); }

  const hasGames = st => p.isP ? (st.OUT>0||st.G>0) : (st.PA>0||st.G>0);

  const pitCols = [["G","G"],["GS","GS"],["QS","QS"],["CG","CG"],["SHO","SHO"],["W","W"],["L","L"],["SV","SV"],["HLD","HLD"],["H","H"],["BB","BB"],["SO","SO"],["ER","ER"],["HBP","HBP"],["WP","WP"],["BK","BK"]];
  const cols = p.isP?pitCols:hitCols;

    ? [["STU",p.stu],["CTL",p.ctl],["STM",p.stm]]
    : [["CON",p.con],["POW",p.pow],["EYE",p.eye],["SPD",p.spd],["DEF",p.def]];
  const slash = st => p.isP
    ? `${st.OUT?f1(ip(st)):"0.0"} IP · ${st.OUT?f2(era(st)):"—"} ERA · ${st.OUT?f2(whip(st)):"—"} WHIP`
    : `${st.AB?f3(avg(st)):".---"} / ${(st.AB+st.BB)?f3(obp(st)):".---"} / ${st.AB?f3(slg(st)):".---"}`;
  const adv = st => p.isP

    : (st.AB? `${f3(iso(st))} ISO · ${f3(babip(st))} BABIP · ${f3(woba(st))} wOBA` : "");
  const line = (label, st)=>(
    <div className="overflow-x-auto">

        <tbody><tr>{cols.map(([k])=><td key={k} className="text-center py-1">{st[k]||0}</td>)}</tr></tbody>
      </table>

  );
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>

/* ----------------------------- Lineup editor --------------------------- */
// Put a player at a defensive position, keeping the lineup valid and positions
// glued to players. If he's already batting, swap defensive spots with whoever
// holds the target slot; if he's on the bench, he takes over that fielder's
// batting-order slot (the displaced man goes to the bench).
function placeAtPosition(team, players, playerId, position, lk, pk){
  lk=lk||"lineup"; pk=pk||"pos";
  const ALL = FIELD_POS.concat(["DH"]);
  if(!ALL.includes(position)) return;
  const lineup = (team[lk]||[]).slice();
  const pos = {...(team[pk]||{})};
  const occupant = lineup.find(id=>id!==playerId && pos[id]===position);
  if(lineup.includes(playerId)){
    if(occupant!=null) pos[occupant]=pos[playerId];   // swap the two players' positions
    pos[playerId]=position;
  } else {
    if(occupant!=null){ lineup[lineup.indexOf(occupant)]=playerId; delete pos[occupant]; }
    else {
      const orphan = lineup.findIndex(id=>!ALL.includes(pos[id]));
      if(orphan>=0){ delete pos[lineup[orphan]]; lineup[orphan]=playerId; }
      else if(lineup.length<9) lineup.push(playerId);
      else { delete pos[lineup[8]]; lineup[8]=playerId; }
    }
    pos[playerId]=position;
  }
  team[lk]=lineup; team[pk]=pos;
}
// the day's batting order: vs a LHP starter use the user-set `lineupVsL` if valid, else the
// auto platoon lineup; AI clubs never set lineupVsL so they always auto-platoon.
function dayLineup(team, players, idx, oppStarter){
  if(oppStarter && oppStarter.throws==="L" && team.lineupVsL && team.lineupVsL.length){
    const hs=team.lineupVsL.map(id=>players[id]).filter(p=>p&&!p.isP&&!isInjured(p));
    if(hs.length>=9) return hs.slice(0,9);
  }
  return platoonLineup(team, players, idx, oppStarter);
}
function posMapFor(team, oppStarter){
  return (oppStarter && oppStarter.throws==="L" && team.lineupVsL && team.lineupVsL.length && team.posVsL) ? team.posVsL : (team.pos||{});
}
// pixel-ish coordinates (% of the field box) for each spot on the diamond
const FIELD_COORD = { CF:[50,11], LF:[20,26], RF:[80,26], SS:[37,45], "2B":[63,45],
  "3B":[24,64], "1B":[76,64], P:[50,63], C:[50,87] };

function LineupEditor({G, commit, tShow}){
  const team = G.teams[G.userTeamId];
  // which lineup is being edited: vs RHP (the default `lineup`/`pos`) or vs LHP (`lineupVsL`/`posVsL`)
  const [vsHand, setVsHand] = useState("R");
  const lk = vsHand==="L" ? "lineupVsL" : "lineup";
  const pk = vsHand==="L" ? "posVsL" : "pos";
  const switchHand = h => { if(h==="L" && !(team.lineupVsL&&team.lineupVsL.length)){ team.lineupVsL=[...(team.lineup||[])]; team.posVsL={...(team.pos||{})}; commit(G); } setVsHand(h); };
  const clearVsL = ()=>{ delete team.lineupVsL; delete team.posVsL; commit(G); setVsHand("R"); tShow("vs-LHP lineup cleared — auto-platoon vs lefties"); };
  const ros = rosterOf(G, team.id);
  const hitters = ros.filter(p=>!p.isP);
  const allPitchers = ros.filter(p=>p.isP).sort((a,b)=>b.ovr-a.ovr); // any arm can be a starter
  const penIds = bullpenOrder(team, G.players);                       // live bullpen priority
  const move = (arr, i, dir)=>{ const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; commit(G); };
  const moveBull = (i, dir)=>{ const arr=penIds.slice(); const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; team.bullpen=arr; commit(G); };
  const setRot = (slot, newId)=>{
    const existing = team.rotation.indexOf(Number(newId));
    const cur = team.rotation[slot];
    if(existing>=0) team.rotation[existing]=cur;
    team.rotation[slot]=Number(newId);
    commit(G);
  };
  const [picked, setPicked] = useState(null);   // player "in hand" (click or drag)
  const place = (pid, position)=>{ if(pid==null) return; placeAtPosition(team, G.players, Number(pid), position, lk, pk); setPicked(null); commit(G); };
  const clickSlot = (position, id)=>{ if(picked!=null) place(picked, position); else if(id!=null) setPicked(id); };
  const clickPlayer = id=>setPicked(picked===id?null:id);
  const onDragStart = (e,id)=>{ e.dataTransfer.setData("text/plain", String(id)); e.dataTransfer.effectAllowed="move"; setPicked(id); };
  const onDropPos = (e,position)=>{ e.preventDefault(); const id=e.dataTransfer.getData("text/plain"); place(id, position); };
  const allow = e=>e.preventDefault();

  const ALLPOS = FIELD_POS.concat(["DH"]);
  const assignedCounts = {}; (team[lk]||[]).forEach(id=>{ const a=(team[pk]||{})[id]; if(a) assignedCounts[a]=(assignedCounts[a]||0)+1; });
  const missing = ALLPOS.filter(x=>!assignedCounts[x]);
  const dupes = ALLPOS.filter(x=>assignedCounts[x]>1);
  const valid = missing.length===0 && dupes.length===0;
  const benchHitters = hitters.filter(h=>!(team[lk]||[]).includes(h.id));
  const todayStarter = G.players[(team.rotation||[])[(team.w+team.l)%Math.max(1,(team.rotation||[]).length)]];

  // a player chip used on the field, the DH box, and the bench
  const chip = (p, position, opts={})=>{
    const oop = p && position && position!=="DH" && position!=="P" && p.pos!==position;
    const isPicked = p && picked===p.id;
    return (
      <div
        draggable={!!p}
        onDragStart={e=>p&&onDragStart(e,p.id)}
        onClick={()=> position ? clickSlot(position, p?p.id:null) : (p&&clickPlayer(p.id))}
        onDragOver={position?allow:undefined}
        onDrop={position?(e=>onDropPos(e,position)):undefined}
        title={p?`${p.name} — ${p.pos} (${p.ovr})`:"empty"}
        className={"select-none cursor-pointer rounded-md px-1.5 py-1 text-center border transition "+
          (isPicked?"ring-2 ring-emerald-400 ":"")+
          (p? (oop?"bg-amber-900/40 border-amber-600/60":"bg-[#16223c] border-[#27375c]")
            : "bg-[#0e1830] border-dashed border-[#2a3a5c] text-slate-600")+
          (picked!=null&&position?" hover:border-emerald-400":"")}
        style={opts.style}
      >

// Read-only roster popover for any club — opened by clicking a team in the standings.
function TeamRosterModal({G, team, onClose}){
  const [sel,setSel]=useState(null);
  const ros = rosterOf(G, team.id);
  const lineupHits = (team.lineup||[]).map(id=>G.players[id]).filter(p=>p&&!p.isP);
  const benchHits = ros.filter(p=>!p.isP && !(team.lineup||[]).includes(p.id)).sort((a,b)=>b.ovr-a.ovr);
  const rotation = (team.rotation||[]).map(id=>G.players[id]).filter(p=>p&&p.isP);
  const relievers = bullpenOrder(team, G.players).map(id=>G.players[id]).filter(Boolean);
  const closer = relievers[0]||null;
  const bullpen = closer?relievers.slice(1):relievers;
  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const open = p=>setSel(p);
  const section = (title, body)=><div><div className="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wide">{title}</div>{body}</div>;
  return (<>
    <div className="fixed inset-0 z-40 bg-black/60 flex items-start justify-center p-4 overflow-y-auto" onClick={onClose}>
      <div className="bg-[#0d1526] border border-[#1d2940] rounded-xl p-4 w-full max-w-2xl my-8 space-y-3" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <div>
            <div className="font-black text-lg">{team.city} {team.nick}{team.aaa?" (AAA)":team.college?" (College)":""}</div>
            <div className="text-xs text-slate-400">{team.w}-{team.l} · {team.league} {team.division}{team.college?" · amateur":team.budget!=null?` · Payroll ${money(payroll(G,team.id))}/${money(team.budget)}`:""}</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none px-2">×</button>
        </div>
        {section("Starting Lineup", <HitterTable players={lineupHits} bo onName={open} posMap={team.pos} />)}
        {section("Bench", benchHits.length?<HitterTable players={benchHits} badge="BN" onName={open}/>:<div className="text-sm text-slate-500">—</div>)}
        {section("Rotation", <PitcherTable players={rotation} slots={rotSlots} onName={open} />)}
        {closer && section("Closer", <PitcherTable players={[closer]} slots={["CL"]} onName={open} />)}
        {section("Bullpen", bullpen.length?<PitcherTable players={bullpen} badge="BN" onName={open}/>:<div className="text-sm text-slate-500">—</div>)}
        {!team.aaa && !team.college && team.ballpark && <BallparkView team={team} />}
      </div>
    </div>
    {sel && <PlayerModal p={sel} team={teamById(G, sel.teamId)} G={G} onClose={()=>setSel(null)} />}
  </>);
}

function Standings({G}){
  const [selTeam, setSelTeam] = useState(null);
  const byDiv = standings(G.teams);
  const order = ["Empire East","Empire Central","Empire West","Pioneer East","Pioneer Central","Pioneer West"];
  const teamCell = t => (
    <button onClick={()=>setSelTeam(t)} className="text-left hover:text-emerald-300 hover:underline">{t.city} {t.nick}</button>
  );
  // wild-card race for a league: everyone who isn't leading their division, best record first.
  // The top 3 take the wild-card seeds (this league grants 3); a line marks the playoff cut.
  const wildCardRace = league => {
    const lt = G.teams.filter(t=>t.league===league);
    const byD={}; lt.forEach(t=>(byD[t.division]=byD[t.division]||[]).push(t));
    const winners=new Set();
    Object.values(byD).forEach(arr=>{ arr.sort((a,b)=>pct(b)-pct(a)); winners.add(arr[0].id); });
    return lt.filter(t=>!winners.has(t.id)).sort((a,b)=>pct(b)-pct(a));
  };
  const WILD = 2;   // wild-card spots per league (the two play-in teams)
  return (
    <div className="space-y-5">
      <div className="grid md:grid-cols-2 gap-4">
        {order.map(k=>(
          <Card key={k}>
            <h3 className="font-bold mb-2">{k}</h3>
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>STRK</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map((t,i)=>{
                  const lead=byDiv[k][0];
                  const gb=i===0?"—":(((lead.w-t.w)+(t.l-lead.l))/2).toFixed(1);
                  const sk=t.streak||0, skTxt=sk===0?"—":(sk>0?"W"+sk:"L"+(-sk));
                  return (
                    <tr key={t.id} className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")}>
                      <td className="text-left py-1">{i===0&&<span className="text-amber-400 mr-1" title="division leader">★</span>}{teamCell(t)}</td>
                      <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                      <td className="text-center">{f3(pct(t))}</td><td className="text-center">{gb}</td>
                      <td className={"text-center text-xs "+(sk>=3?"text-emerald-400":sk<=-3?"text-red-400":"text-slate-400")}>{skTxt}</td>
                      <td className={"text-center "+((t.rs-t.ra)>=0?"text-emerald-400":"text-red-400")}>{t.rs-t.ra>=0?"+":""}{t.rs-t.ra}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        ))}
      </div>

      {/* Wild Card races — one per league */}
      <div className="grid md:grid-cols-2 gap-4">
        {["Empire","Pioneer"].map(league=>{
          const race = wildCardRace(league);
          const cut = race[WILD-1];   // last team currently holding a wild-card spot
          return (
            <Card key={league}>
              <h3 className="font-bold mb-1">Wild Card — <span className="text-sky-300">{league} League</span></h3>
              <p className="text-[11px] text-slate-500 mb-2">Top {WILD} non-division-leaders grab the wild cards and meet in a 1-game play-in. GB is games behind the final wild-card spot.</p>
              <table className="w-full text-sm tnum">
                <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
                <tbody>
                  {race.slice(0,7).map((t,i)=>{
                    const inWC = i<WILD;
                    const gbNum = cut? (((cut.w-t.w)+(t.l-cut.l))/2) : 0;
                    const gb = i===WILD-1 ? "—" : (gbNum<=0 ? "+"+(-gbNum).toFixed(1) : gbNum.toFixed(1));
                    return (<React.Fragment key={t.id}>
                      <tr className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")+(inWC?" ":" text-slate-400")}>
                        <td className="text-left py-1">
                          {inWC && <span className="text-emerald-400 mr-1" title="in wild-card position">●</span>}
                          {teamCell(t)} <span className="text-slate-600 text-xs">{t.abbr}</span>
                        </td>
                        <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                        <td className="text-center">{f3(pct(t))}</td>
                        <td className={"text-center "+(inWC?"text-emerald-400":"text-slate-500")}>{gb}</td>
                      </tr>
                      {i===WILD-1 && <tr><td colSpan={5} className="border-t-2 border-dashed border-red-700/50 text-[10px] text-red-400/70 text-center py-0.5">playoff cut line</td></tr>}
                    </React.Fragment>);
                  })}
                </tbody>
              </table>
            </Card>
          );
        })}
      </div>

      {selTeam && <TeamRosterModal G={G} team={selTeam} onClose={()=>setSelTeam(null)} />}
    </div>
  );
}

// Scouting grade: ceiling matters most, then current ability, then youth (more
// time to develop = more valuable as a prospect).
function prospectGrade(p){ return p.pot*1.0 + p.ovr*0.45 + Math.max(0,24-p.age)*1.4; }
const prospectETA = p => p.ovr>=70?"ready":p.ovr>=63?"1 yr":p.ovr>=55?"2 yr":"3+ yr";
function AAALeague({G}){
  const aaaUserId = aaaIdOf(G.userTeamId);
  const byDiv = standings(G.aaaTeams);
  const order = ["Empire East","Empire Central","Empire West","Pioneer East","Pioneer Central","Pioneer West"];
  // league-wide prospect rankings: AAA players + young MLB rookies, by scouting grade
  const prospects = Object.values(G.players)
    .filter(p=>p.teamId!=null && (isAAAId(p.teamId) || p.age<=22))
    .sort((a,b)=>prospectGrade(b)-prospectGrade(a)).slice(0,30);
  const orgAbbr = p => { const id=isAAAId(p.teamId)?parentIdOf(p.teamId):p.teamId; return G.teams[id]?G.teams[id].abbr:"—"; };
  const [selTeam,setSelTeam]=useState(null);
  const [view,setView]=useState("Standings");
  // AAA leader pools — AAA-ONLY line per player (so a called-up player's MLB stats don't count here)
  const aaaPool=Object.values(G.players).filter(p=>!isCollegeId(p.teamId));
  const ml=new Map(); aaaPool.forEach(p=>ml.set(p.id, levelStats(p,"AAA")));
  const S=p=>ml.get(p.id)||p.stats;
  const gpMax=Math.max(1,...G.aaaTeams.map(t=>t.w+t.l));
  const hitters=aaaPool.filter(p=>!p.isP && S(p).PA>=Math.max(10,round(gpMax*2.2)));
  const pitchers=aaaPool.filter(p=>p.isP && S(p).OUT>=Math.max(15,round(gpMax*1.2)));
  const warCtx=leagueWarCtx(G,"AAA");
  const tn=id=>teamById(G,id)?teamById(G,id).abbr:"—";
  const topN=(list,key,n=5)=>[...list].sort((a,b)=>key(b)-key(a)).slice(0,n);
  const botN=(list,key,n=5)=>[...list].sort((a,b)=>key(a)-key(b)).slice(0,n);
  const board=(title,list,fmt)=>(
    <Card><h4 className="font-bold mb-2 text-sm">{title}</h4>
      <table className="w-full text-sm tnum"><tbody>
        {list.map((p,i)=>(<tr key={p.id} className="border-b border-[#15203a]">
          <td className="text-slate-500 w-5">{i+1}</td>
          <td className="text-left"><PlayerLink p={p} className="font-medium"/> <span className="text-slate-600 text-xs">{tn(p.teamId)}</span></td>
          <td className="text-right font-semibold">{fmt(p)}</td></tr>))}
        {!list.length && <tr><td className="text-slate-500 text-sm py-1">—</td></tr>}
      </tbody></table></Card>
  );
  return (
    <div className="space-y-4">
      <Card>
        <h3 className="font-bold text-amber-300 mb-1">AAA — Minor Leagues</h3>
        <p className="text-xs text-slate-400 mb-2">Every club runs a AAA affiliate that plays its own season. Click a team for its roster, or a name for full stats.</p>
        <SubTabs tabs={["Standings","Leaders","Prospects","Playoffs","Records"]} view={view} setView={setView}/>
      </Card>

      {view==="Standings" && <div className="grid md:grid-cols-2 gap-4">
        {order.map(k=>(
          <Card key={k}>
            <h3 className="font-bold mb-2">{k} <span className="text-amber-400/70 text-xs">AAA</span></h3>
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Affiliate</th><th>W</th><th>L</th><th>PCT</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map(t=>(
                  <tr key={t.id} className={"border-t border-[#15203a] hover:bg-[#13203a] "+(t.id===aaaUserId?"bg-amber-900/20 font-semibold":"")}>
                    <td className="text-left py-1"><button onClick={()=>setSelTeam(t)} className="hover:text-emerald-300 font-medium text-left">{t.city} {t.nick}</button></td>
                    <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                    <td className="text-center">{f3(pct(t))}</td>
                    <td className={"text-center "+((t.rs-t.ra)>=0?"text-emerald-400":"text-red-400")}>{t.rs-t.ra>=0?"+":""}{t.rs-t.ra}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        ))}
      </div>}

      {view==="Leaders" && <div className="grid md:grid-cols-3 gap-3">
        {board("WAR — Position", topN(hitters,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
        {board("WAR — Pitcher", topN(pitchers,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
        {board("AVG", topN(hitters,p=>avg(S(p))), p=>f3(avg(S(p))))}
        {board("Home Runs", topN(hitters,p=>S(p).HR), p=>S(p).HR)}
        {board("RBI", topN(hitters,p=>S(p).RBI), p=>S(p).RBI)}
        {board("OPS", topN(hitters,p=>ops(S(p))), p=>f3(ops(S(p))))}
        {board("Stolen Bases", topN(hitters.filter(p=>S(p).SB>0),p=>S(p).SB), p=>S(p).SB)}
        {board("Hits", topN(hitters,p=>S(p).H), p=>S(p).H)}
        {board("ERA", botN(pitchers,p=>era(S(p))), p=>f2(era(S(p))))}
        {board("Strikeouts", topN(pitchers,p=>S(p).SO), p=>S(p).SO)}
        {board("Wins", topN(pitchers,p=>S(p).W), p=>S(p).W)}
      </div>}

      {view==="Prospects" && <Card>
        <h3 className="font-bold mb-1">🔭 Top 30 Prospects (league-wide)</h3>
        <p className="text-xs text-slate-400 mb-2">Ranked by scouting grade — ceiling (POT), current ability, and how much time they have to develop. ETA estimates how soon they'll be MLB-ready.</p>
        <div className="overflow-x-auto">
        <table className="w-full text-sm tnum">
          <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="w-5">#</th><th className="text-left">Pos</th><th className="text-left">Name</th><th>Org</th><th>Lvl</th><th>Age</th><th>OVR</th><th>POT</th><th>Grade</th><th>ETA</th></tr></thead>
          <tbody>
            {prospects.map((p,i)=>(

/* ---- minor-league (AAA / college) finished-bracket display ---- */
function MinorBracket({G, br, champions, title}){
  const [boxGame,setBoxGame]=useState(null);
  if(!br || !br.leagues) return null;
  const tn = id => { const t=teamById(G,id); return t?t.abbr:"?"; };
  const tfull = id => { const t=teamById(G,id); return t?t.name.replace(" (AAA)",""):"?"; };
  const Series = ({s, label})=>{
    if(!s) return null;
    const hiW=s.winner===s.hi;
    return <div className="py-0.5">
      <div className="flex items-center gap-2 text-sm">
        <span className="text-slate-500 text-[10px] w-10 shrink-0">{label||""}</span>
        <span className={"w-12 text-right "+(hiW?"font-bold text-emerald-300":"text-slate-300")}>{tn(s.hi)}</span>
        <span className="tnum text-slate-400 w-8 text-center">{s.hw}–{s.lw}</span>
        <span className={"w-12 "+(!hiW?"font-bold text-emerald-300":"text-slate-300")}>{tn(s.lo)}</span>
      </div>
      {/* clickable per-game box scores */}
      <div className="flex flex-wrap gap-1 ml-12 mt-0.5">
        {(s.games||[]).map((g,i)=> g.box
          ? <button key={i} onClick={()=>setBoxGame(g.box)} title="View box score"
              className="text-[10px] tnum px-1 rounded bg-[#13203a] text-slate-400 hover:bg-[#1c3050] hover:text-emerald-300">G{i+1} {g.hs}-{g.as}</button>
          : <span key={i} className="text-[10px] tnum px-1 text-slate-600">G{i+1} {g.hs}-{g.as}</span>)}
      </div>
    </div>;
  };
  const champ = teamById(G, br.champion);
  return (
    <Card>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
        <h3 className="font-bold">🏆 {title||""} {br.season} Playoffs</h3>
        {champ && <span className="text-sm font-semibold text-amber-300">Champion: {tfull(br.champion)}</span>}
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        {br.leagues.map(lg=>(
          <div key={lg}>
            <div className="text-xs font-semibold text-slate-400 mb-1">{lg}</div>
            <Series s={br.wc[lg]} label="WC"/>
            {(br.ds[lg]||[]).map((s,i)=><Series key={i} s={s} label={i===0?"DS":""}/>)}
            <Series s={br.cs[lg]} label="CS"/>

        ))}
      </div>
      <div className="mt-3 pt-2 border-t border-[#1d2940]"><Series s={br.final} label="FINAL"/></div>
      <div className="text-[11px] text-slate-500 mt-1">Tap a game (G1, G2…) to open its box score.</div>
      {champions && champions.length>1 && <div className="text-xs text-slate-500 mt-2">Past champions: {champions.slice(-8).reverse().map(c=>`${c.season} ${tn(c.id)}`).join(" · ")}</div>}
      {boxGame && <BoxScore G={G} box={boxGame} onClose={()=>setBoxGame(null)} />}
    </Card>
  );
}

// Champions + single-season + career bests for a secondary league (its own "Hall of Fame").
function MinorRecords({G, store, champions, label}){
  const tfull=id=>{const t=teamById(G,id);return t?t.name.replace(" (AAA)",""):"?";};
  const S=store||{}, season=S.season||{}, career=S.career||{};
  const HIT=[["HR","Home Runs"],["RBI","RBI"],["H","Hits"],["R","Runs"],["SB","Stolen Bases"],["AVG","Batting Avg"]];
  const PIT=[["pW","Wins"],["pK","Strikeouts"],["pSV","Saves"],["ERA","Lowest ERA"]];
  const CAREER=[["cHR","Home Runs"],["cH","Hits"],["cRBI","RBI"],["cSB","Stolen Bases"],["cK","Strikeouts"],["cW","Wins"],["cSV","Saves"]];
  const fmt=(k,v)=>k==="AVG"?f3(v):k==="ERA"?f2(v):v;
  const rows=(defs,recs)=>defs.filter(([k])=>recs[k]).map(([k,lbl])=>{const r=recs[k];return (
    <div key={k} className="flex items-center gap-2 px-2 py-1 rounded bg-[#13203a] text-sm">
      <span className="text-slate-400 text-xs flex-1">{lbl}</span>
      <span className="font-bold tnum text-amber-300">{fmt(k,r.value)}</span>
      <span className="text-slate-500 text-xs truncate max-w-[140px]">{r.holder}{r.team?` (${r.team})`:""} '{String(r.season).slice(-2)}</span>
    </div>);});
  return (
   <div className="space-y-4">
     <Card>
       <h3 className="font-bold mb-2">🏆 {label} Champions</h3>
       {(champions&&champions.length)
         ? <div className="grid sm:grid-cols-2 gap-1">{champions.slice().reverse().map(c=>(
             <div key={c.season} className="flex items-center gap-2 px-2 py-1 rounded bg-[#13203a] text-sm">
               <span className="text-slate-500 tnum w-12">{c.season}</span><span className="text-amber-300">🏆</span>
               <span className="flex-1 font-semibold">{tfull(c.id)}</span></div>))}</div>
         : <div className="text-sm text-slate-500">No champions yet — finish a season to crown one.</div>}
     </Card>
     <Card>
       <h3 className="font-bold mb-2">📊 Single-Season Bests</h3>
       {(HIT.some(([k])=>season[k])||PIT.some(([k])=>season[k]))
         ? <div className="grid sm:grid-cols-2 gap-1">{rows(HIT,season)}{rows(PIT,season)}</div>
         : <div className="text-sm text-slate-500">Set after the first completed season.</div>}
     </Card>
     <Card>
       <h3 className="font-bold mb-2">🎖️ Career Bests <span className="text-slate-500 text-sm font-normal">— all-time {label}</span></h3>
       {CAREER.some(([k])=>career[k])
         ? <div className="grid sm:grid-cols-2 gap-1">{rows(CAREER,career)}</div>
         : <div className="text-sm text-slate-500">Accrues over multiple seasons.</div>}
     </Card>
   </div>
  );
}

/* ----------------------------- Leaders --------------------------------- */
function Leaders({G}){
  // MLB leaderboards use each player's MLB-ONLY line (a mid-season call-up's AAA stats
  // don't count here), so anyone with MLB time qualifies regardless of where he is now.
  const pool = Object.values(G.players).filter(p=>!isCollegeId(p.teamId));
  const ml = new Map(); pool.forEach(p=> ml.set(p.id, levelStats(p,"MLB")));
  const S = p => ml.get(p.id) || p.stats;
  // scale qualifier thresholds with games played so boards read right all season
  const gpMax = Math.max(1, ...G.teams.map(t=>t.w+t.l));
  const paQual = Math.max(20, round(gpMax*2.5));
  const outQual = Math.max(30, round(gpMax*1.5));
  const hitters = pool.filter(p=>!p.isP && S(p).PA>=paQual);
  const pitchers = pool.filter(p=>p.isP && S(p).OUT>=outQual);
  const all = pool;
  const tn = id => G.teams[id]?G.teams[id].abbr:(isAAAId(id)?(G.teams[parentIdOf(id)]?G.teams[parentIdOf(id)].abbr+" (AAA)":"AAA"):"FA");
  const board = (title, list, fmt) => (
    <Card><h3 className="font-bold mb-2">{title}</h3>
      <table className="w-full text-sm tnum"><tbody>
        {list.map((p,i)=>(
          <tr key={p.id} className="border-b border-[#15203a]">
            <td className="text-slate-500 w-5">{i+1}</td>
            <td className="text-left"><PlayerLink p={p} className="font-medium"/> <span className="text-slate-600 text-xs">{tn(p.teamId)}</span></td>
            <td className="text-right font-semibold">{fmt(p)}</td>
          </tr>
        ))}
      </tbody></table>
    </Card>
  );
  const top = (list, key, n=10) => [...list].sort((a,b)=>key(b)-key(a)).slice(0,n);
  const bot = (list, key, n=10) => [...list].sort((a,b)=>key(a)-key(b)).slice(0,n);
  const warCtx = leagueWarCtx(G,"MLB");
  const pfOf = p => { const t=G.teams[isAAAId(p.teamId)?parentIdOf(p.teamId):p.teamId]; return t&&t.ballpark?t.ballpark.pf:1; };
  return (
    <div className="grid md:grid-cols-3 gap-4">
      {board("WAR — Position", top(hitters,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
      {board("WAR — Pitcher", top(pitchers,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
      {board("AVG", top(hitters,p=>avg(S(p))), p=>f3(avg(S(p))))}
      {board("Home Runs", top(hitters,p=>S(p).HR), p=>S(p).HR)}
      {board("RBI", top(hitters,p=>S(p).RBI), p=>S(p).RBI)}
      {board("OBP", top(hitters,p=>obp(S(p))), p=>f3(obp(S(p))))}
      {board("SLG", top(hitters,p=>slg(S(p))), p=>f3(slg(S(p))))}
      {board("OPS", top(hitters,p=>ops(S(p))), p=>f3(ops(S(p))))}
      {board("OPS+", top(hitters,p=>opsPlus(S(p),warCtx,pfOf(p))), p=>opsPlus(S(p),warCtx,pfOf(p)))}
      {board("wRC+", top(hitters,p=>wrcPlus(S(p),warCtx,pfOf(p))), p=>wrcPlus(S(p),warCtx,pfOf(p)))}
      {board("Hits", top(hitters,p=>S(p).H), p=>S(p).H)}
      {board("Runs", top(hitters,p=>S(p).R), p=>S(p).R)}
      {board("Walks", top(hitters,p=>S(p).BB), p=>S(p).BB)}
      {board("Stolen Bases", top(hitters.filter(p=>S(p).SB>0),p=>S(p).SB), p=>S(p).SB)}
      {board("ERA", bot(pitchers,p=>era(S(p))), p=>f2(era(S(p))))}
      {board("ERA+", top(pitchers,p=>eraPlus(S(p),warCtx,pfOf(p))), p=>eraPlus(S(p),warCtx,pfOf(p)))}
      {board("Innings", top(pitchers,p=>S(p).OUT), p=>f1(ip(S(p))))}
      {board("Strikeouts", top(pitchers,p=>S(p).SO), p=>S(p).SO)}
      {board("K − BB", top(pitchers,p=>S(p).SO-S(p).BB), p=>S(p).SO-S(p).BB)}
      {board("Wins", top(pitchers,p=>S(p).W), p=>S(p).W)}
      {board("Quality Starts", top(pitchers.filter(p=>S(p).QS>0),p=>S(p).QS), p=>S(p).QS)}
      {board("Saves", top(pitchers.filter(p=>S(p).SV>0),p=>S(p).SV), p=>S(p).SV)}
      {board("Holds", top(all.filter(p=>p.isP&&S(p).HLD>0),p=>S(p).HLD), p=>S(p).HLD)}
      {board("WHIP", bot(pitchers,p=>whip(S(p))), p=>f2(whip(S(p))))}
      {board("Doubles", top(hitters,p=>S(p)._2B||0), p=>S(p)._2B||0)}
      {board("Triples", top(hitters.filter(p=>(S(p)._3B||0)>0),p=>S(p)._3B||0), p=>S(p)._3B||0)}
      {board("ISO", top(hitters,p=>iso(S(p))), p=>f3(iso(S(p))))}
      {board("wOBA", top(hitters,p=>woba(S(p))), p=>f3(woba(S(p))))}
      {board("BABIP", top(hitters,p=>babip(S(p))), p=>f3(babip(S(p))))}
      {board("FIP", bot(pitchers,p=>fip(S(p))), p=>f2(fip(S(p))))}
      {board("K/9", top(pitchers,p=>kp9(S(p))), p=>f2(kp9(S(p))))}
      {board("BB/9", bot(pitchers,p=>bb9(S(p))), p=>f2(bb9(S(p))))}
      {board("K/BB", top(pitchers,p=>kbb(S(p))), p=>f2(kbb(S(p))))}
    </div>
  );
}

/* ----------------------------- Schedule -------------------------------- */
// Full game box score: inning-by-inning line score + batting & pitching lines for both clubs.
// `box` is the compact shape saved by simGame (player ids + ints); names/teams resolve here.
function BoxScore({G, box, onClose}){
  if(!box) return null;
  const homeT=teamById(G,box.h)||box.homeT, awayT=teamById(G,box.a)||box.awayT;
  const nm = pid => { const p=G.players[pid]; return p?p.name:"—"; };
  const pos = pid => { const p=G.players[pid]; return p?p.pos:""; };
  const ip = outs => `${Math.floor(outs/3)}.${outs%3}`;
  const innings = Math.max((box.ls.h||[]).length, (box.ls.a||[]).length);
  const sumH = lines => lines.reduce((s,l)=>s+(l[3]||0),0);   // H is col index 3
  const dec = box.dec||{};
  const winSide = box.hs>box.as ? "h" : "a";

  const LineScore = ()=>(
    <div className="overflow-x-auto">
      <table className="text-sm tnum border-collapse">
        <thead><tr className="text-slate-400 text-xs">
          <th className="text-left pr-3 font-semibold"> </th>
          {Array.from({length:innings}).map((_,i)=><th key={i} className="px-1.5 w-6 text-center">{i+1}</th>)}
          <th className="px-2 text-center font-bold text-slate-200 border-l border-[#1d2940]">R</th>
          <th className="px-2 text-center font-bold text-slate-200">H</th>
        </tr></thead>
        <tbody>
          {[["a",awayT,box.ls.a,box.as,sumH(box.ab)],["h",homeT,box.ls.h,box.hs,sumH(box.hb)]].map(([side,t,ls,r,h])=>(
            <tr key={side} className={"border-t border-[#15203a] "+(winSide===side?"font-bold text-emerald-300":"text-slate-300")}>
              <td className="text-left pr-3 whitespace-nowrap">{t?t.abbr:"?"} {t?t.nick:""}</td>
              {Array.from({length:innings}).map((_,i)=>{ const v=(ls||[])[i];
                return <td key={i} className="px-1.5 text-center text-slate-300">{v==null?"–":v}</td>; })}
              <td className="px-2 text-center border-l border-[#1d2940]">{r}</td>
              <td className="px-2 text-center text-slate-400">{h}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  const decTag = pid => dec.w===pid?<span className="text-emerald-400 font-bold"> (W)</span>
    : dec.l===pid?<span className="text-red-400 font-bold"> (L)</span>
