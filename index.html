    </div>
  );
}

/* ----------------------------- BA Cup ---------------------------------- */
// A giant single-game knockout (FA-Cup style) open to ALL 60 clubs — every MLB team
// AND its AAA affiliate. Played as a standalone event from the BA Cup tab, independent
// of the league season. Games are scored by a lightweight strength model so cup play
// never pollutes league stats/records.
const BACUP_ROUND_NAMES = ["Round of 64","Round of 32","Round of 16","Quarterfinals","Semifinals","Final"];
function cupPower(G, tid){
  const ros = rosterOf(G, tid);
  const hits = ros.filter(p=>!p.isP).sort((a,b)=>b.ovr-a.ovr).slice(0,9);
  const arms = ros.filter(p=>p.isP).sort((a,b)=>b.ovr-a.ovr);
  const off = hits.length ? hits.reduce((s,p)=>s+p.ovr,0)/hits.length : 40;
  const ace = arms.length ? arms[0].ovr : 40;       // one game → they start their best arm
  const pen = arms.length>1 ? arms[1].ovr : ace;
  return { off, pitch: ace*0.7 + pen*0.3 };
}
function cupGame(G, aId, bId){
  const A=cupPower(G,aId), B=cupPower(G,bId);
  const exp = (off,pit)=> Math.max(0.5, 4.3 + (off-60)*0.12 - (pit-60)*0.14);
  let as = Math.max(0, Math.round(gauss(exp(A.off,B.pitch), 2.4)));
  let bs = Math.max(0, Math.round(gauss(exp(B.off,A.pitch), 2.4)));
  if(as===bs){ // no ties in a knockout — extra innings, the stronger side edges it (with luck)
    const edge = 0.5 + ((A.off+A.pitch)-(B.off+B.pitch))*0.012;
    if(chance(clamp(edge,0.2,0.8))) as++; else bs++;
  }
  return { a:aId, b:bId, as, bs, winner: as>bs?aId:bId, done:true };
}
// Real BA Cup game (so player cup stats accrue) — banks the line into p.cupStats, leaving
// regular-season p.stats untouched. The cup crosses levels (MLB vs AAA), so it's one combined total.
function cupGameSim(G, aId, bId){
  const home=teamById(G,aId), away=teamById(G,bId);
  if(!home||!away) return cupGame(G,aId,bId);
  const roster=[...rosterOf(G,aId), ...rosterOf(G,bId)];
  const snap={}; roster.forEach(p=>snap[p.id]=Object.assign({},p.stats));
  const r=simGame(home, away, G.players);
  markGamesPlayed(home, away, G.players);
  bankSeparate(roster, snap, cupBucket);
  return { a:aId, b:bId, as:r.hs, bs:r.as, winner: r.hs>r.as?aId:bId, done:true };
}
function mkCupMatch(a, b){ return { a, b, as:null, bs:null, winner: b==null?a:null, done: b==null }; }
function startBACup(G){
  const ids = [...G.teams.map(t=>t.id), ...G.aaaTeams.map(t=>t.id)];   // 30 MLB + 30 AAA = 60
  for(let i=ids.length-1;i>0;i--){ const j=rint(0,i); [ids[i],ids[j]]=[ids[j],ids[i]]; }   // shuffle the draw
  let size=1; while(size<ids.length) size*=2;          // 64
  const byes = size - ids.length;                      // 4 lucky clubs sit out round 1
  const matches=[]; let i=0;
  for(let b=0;b<byes;b++) matches.push(mkCupMatch(ids[i++], null));
  while(i<ids.length){ matches.push(mkCupMatch(ids[i], ids[i+1]!=null?ids[i+1]:null)); i+=2; }
  // spread the 6 rounds across the regular season so cup days are sprinkled through it
  const len = (G.schedule && G.schedule.length) || 224;
  const roundDays = [0.05,0.20,0.36,0.52,0.70,0.88].map(f=>Math.round(len*f));
  G.baCup = { season:G.season, roundIdx:0, matches, past:[], champion:null, roundDays };
}
// Make sure the current regular season has a live cup (auto-starts each year).
function ensureSeasonCup(G){
  if(G.phase!=="regular") return;
  if(!G.baCup || G.baCup.season!==G.season || !G.baCup.roundDays) startBACup(G);
}
// Play any cup round whose scheduled day has arrived (catches up if several are overdue).
function tickBACup(G){
  const c=G.baCup; if(!c || c.champion!=null || !c.roundDays) return;
  let guard=0;
  while(c.champion==null && c.roundIdx<c.roundDays.length && G.day>=c.roundDays[c.roundIdx] && c.matches.some(m=>!m.done) && guard++<8){
    simBACupRound(G);
    if(c.matches.every(m=>m.done)) advanceBACup(G); else break;
  }
}
// Safety: force the cup to finish (used when jumping into the playoffs).
function finishBACup(G){
  const c=G.baCup; if(!c || !c.roundDays) return; let guard=0;
  while(c.champion==null && guard++<10){ simBACupRound(G); if(c.matches.every(m=>m.done)) advanceBACup(G); else break; }
}
function simBACupRound(G){
  const c=G.baCup; if(!c||c.champion!=null) return;
  c.matches.forEach(m=>{ if(!m.done && m.b!=null){ const r=cupGameSim(G,m.a,m.b); m.as=r.as; m.bs=r.bs; m.winner=r.winner; m.done=true; } });
}
function advanceBACup(G){
  const c=G.baCup; if(!c||c.champion!=null||c.matches.some(m=>!m.done)) return;
  const winners=c.matches.map(m=>m.winner);
  c.past.push({ name: BACUP_ROUND_NAMES[c.roundIdx]||`Round ${c.roundIdx+1}`, matches:c.matches });
  if(winners.length===1){
    c.champion=winners[0];
    (G.baCupChampions=G.baCupChampions||[]).push({ season:c.season, id:winners[0] });
    const t=teamById(G,winners[0]);
    logNews(G,"champ",`🏆 ${t?teamLabel(t):"?"} won the ${c.season} BA Cup!`, isAAAId(winners[0])?parentIdOf(winners[0]):winners[0]);
    return;
  }
  const next=[];
  for(let i=0;i<winners.length;i+=2) next.push(mkCupMatch(winners[i], winners[i+1]!=null?winners[i+1]:null));
  c.matches=next; c.roundIdx++;
}

const BACUP_SHORT = {"Round of 64":"R64","Round of 32":"R32","Round of 16":"R16","Quarterfinals":"QF","Semifinals":"SF","Final":"Final"};
function BACup({G, commit, tShow}){
  const c=G.baCup;
  const tn=id=>id==null?null:teamById(G,id);
  const userTeams=[G.userTeamId, aaaIdOf(G.userTeamId)];
  const isMine=id=>userTeams.includes(id);
  const champs=(G.baCupChampions||[]).slice().reverse();
  const [roundView,setRoundView]=useState(null);

  // The Cup runs automatically through the season; auto-start this year's bracket if missing.
  useEffect(()=>{
    if(G.phase==="regular" && (!c || c.season!==G.season || !c.roundDays)){ startBACup(G); commit(G); }
  }, [G.season, G.phase]);

  const TeamChip=({id, win})=>{ const t=tn(id);
    if(!t) return <span className="text-slate-600 text-xs italic">bye</span>;
    return <span className={(win?"font-bold text-emerald-400 ":"")+(isMine(id)?"underline decoration-dotted ":"")}>

  const MatchRow=({m})=>(
    <div className={"flex items-center gap-2 px-2 py-1 rounded text-sm "+((isMine(m.a)||isMine(m.b))?"bg-emerald-900/25 border border-emerald-800/40":"bg-[#13203a]")}>

    </div>
  );
  const PastWinners = champs.length>0 ? (
    <Card>
      <h3 className="font-bold mb-2">🏆 Past BA Cup Winners</h3>
      <div className="grid sm:grid-cols-2 gap-1">
        {champs.map((w,i)=>{ const t=tn(w.id); return (
          <div key={i} className={"flex items-center gap-2 px-2 py-1 rounded text-sm "+(isMine(w.id)?"bg-emerald-900/30":"bg-[#13203a]")}>
            <span className="text-slate-500 tnum w-12">{w.season}</span><span className="text-amber-300">🏆</span>
            <span className="flex-1 font-semibold">{t?teamLabel(t):"?"}</span>
          </div>
        );})}
      </div>
    </Card>
  ) : null;

  // every round (completed + the live one) so all fixtures are browsable
  const roundName=c?(BACUP_ROUND_NAMES[c.roundIdx]||`Round ${c.roundIdx+1}`):"";
  const liveUnplayed=c&&c.champion==null&&c.matches?c.matches.some(m=>!m.done):false;
  const allRounds = c ? [
    ...(c.past||[]),
    ...(c.champion==null && c.matches && c.matches.length ? [{name:roundName, matches:c.matches, live:true}] : []),
  ] : [];
  const viewIdx = (roundView!=null && roundView<allRounds.length) ? roundView : allRounds.length-1;
  const FixturesCard = allRounds.length>0 ? (
    <Card>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h3 className="font-bold text-sm">Fixtures <span className="text-slate-500 font-normal">— all rounds</span></h3>
        <div className="flex gap-1 flex-wrap">
          {allRounds.map((rd,i)=>(
            <button key={i} onClick={()=>setRoundView(i)} className={"px-2 py-0.5 rounded text-xs "+(i===viewIdx?"bg-emerald-500 text-slate-900 font-semibold":"bg-[#16213a] text-slate-300 hover:bg-[#1c2c4a]")}>{BACUP_SHORT[rd.name]||rd.name}</button>
          ))}
        </div>
      </div>
      <div className="text-[11px] text-slate-500 mb-1">{allRounds[viewIdx].name} · {allRounds[viewIdx].matches.length} {allRounds[viewIdx].matches.length===1?"match":"matches"}{allRounds[viewIdx].live && liveUnplayed?" · upcoming":""}</div>
      <div className="space-y-1 max-h-[62vh] overflow-y-auto">
        {allRounds[viewIdx].matches.map((m,i)=><MatchRow key={i} m={m}/>)}
      </div>
    </Card>
  ) : null;

  // no live cup (offseason/playoffs) or this season's Cup already crowned
  if(!c || c.champion!=null){
    const t = (c&&c.champion!=null) ? tn(c.champion) : null;
    return (
      <div className="space-y-4">
        <Card>
          <h3 className="font-bold mb-1">⚾ BA Cup <span className="text-slate-400 font-normal text-sm">— the all-comers knockout</span></h3>
          <p className="text-sm text-slate-300 mb-3">A single-game knockout open to <b>all 60 clubs</b> — every MLB team and its AAA affiliate. Rounds are <b>sprinkled through the regular season</b> (a round every couple of weeks), playing automatically as you sim. One loss and you're out. Cup games don't affect league stats.</p>
          {t && <div className="text-center bg-[#13203a] rounded-lg py-3">
            <div className="text-3xl">🏆</div>
            <div className="font-black text-emerald-400 text-lg">{teamLabel(t)}</div>
            <div className="text-slate-400 text-sm">{c.season} BA Cup Champions</div>

        </Card>
        {FixturesCard}
        {PastWinners}
      </div>
    );
  }

  // live cup
  const nextDay=c.roundDays[c.roundIdx];
  const fireMsg=liveUnplayed ? `${roundName} fires ${G.day<nextDay?`around Day ${nextDay+1}`:"on your next sim day"}.` : `${roundName} is complete.`;
  const alive=new Set(c.matches.flatMap(m=>[m.a,m.b]).filter(x=>x!=null));
  const userAlive=userTeams.some(id=>alive.has(id));
  const myMatch=c.matches.find(m=>isMine(m.a)||isMine(m.b));
  let koRound=null;
  if(!userAlive){ for(const rd of c.past){ const m=rd.matches.find(x=>(isMine(x.a)||isMine(x.b)) && x.done && x.b!=null && !isMine(x.winner)); if(m){ koRound=rd.name; break; } } }
  return (
    <div className="space-y-4">
      <Card>
        <h3 className="font-bold">⚾ BA Cup {c.season} <span className="text-slate-400 font-normal">· {roundName}</span> <span className="text-slate-500 text-sm">({c.matches.length} {c.matches.length===1?"match":"matches"})</span></h3>
        <div className="text-xs mt-1 text-slate-400">Rounds play automatically as you sim the season — {fireMsg}</div>
        <div className="text-sm mt-2">
          {userAlive
            ? <span className="text-emerald-300">✅ Your club is still alive{myMatch?<> — {roundName}: <TeamChip id={myMatch.a} win={myMatch.done&&myMatch.winner===myMatch.a}/> <span className="text-slate-500">{myMatch.done&&myMatch.b!=null?`${myMatch.as}-${myMatch.bs}`:(myMatch.b==null?"(bye)":"vs")}</span> <TeamChip id={myMatch.b} win={myMatch.done&&myMatch.winner===myMatch.b}/></>:null}</span>
            : <span className="text-slate-400">❌ Knocked out{koRound?` in the ${koRound}`:""} — the Cup plays on to a champion.</span>}
        </div>
      </Card>
      {FixturesCard}
      {PastWinners}
    </div>
  );
}

/* ------------------- contract realism: arbitration + QOs ------------------- */
// Arbitration: a pre-FA, under-team-control MLB player gets a modest performance-based raise
// each offseason instead of a flat salary. Scaled by last season's WAR + OVR, bounded so
// budgets stay sane. Returns the raise applied (or 0). Run in the contract-advance loop.
function applyArbitration(G, p){
  if(!isMlbId(p.teamId) || p.amateur) return 0;
  if((p.years||0)<1) return 0;                 // expiring/FA handled elsewhere
  if(p.age>27) return 0;                        // veterans on guaranteed deals don't auto-bump
  const rows=(p.history||[]).filter(x=>x.level==="MLB");
  const last=rows[rows.length-1];
  const war=(last && last.season===G.season && typeof last.war==="number") ? Math.max(0,last.war) : 0;
  const market=requiredAAV(p,1,1);
  const target=market*clamp(0.30 + war*0.06 + (p.ovr-60)*0.01, 0.25, 0.85);
  const base=p.salary||0.7;
  const newSal=clamp(round(Math.max(base, target)*10)/10, base, base*1.5+1.5);   // raise only, bounded
  if(newSal <= base+0.05) return 0;
  p.contract = (Array.isArray(p.contract)&&p.contract.length) ? p.contract.map(s=>Math.max(s,newSal)) : [newSal];
  p.salary=p.contract[0]; p.years=p.contract.length;
  return round((newSal-base)*10)/10;
}
// Qualifying offer eligibility: a genuinely good MLB player about to hit free agency.
function qoEligible(p){ return isMlbId(p.teamId) && !p.amateur && (p.ovr>=76) && (p.age<=33); }
function qoAmount(G,p){ return clamp(round(requiredAAV(p,1,1)*0.9*10)/10, 6, 35); }
// Compensation pick: an extra supplemental (round-2) pick in the draft AFTER the upcoming one
// (so it survives the offseason rollover, is tradeable now, and enters that draft naturally).
function awardCompPick(G, teamId){
  const yrs=(G.picks||[]).map(p=>p.season);
  const compYear=(yrs.length?Math.min(...yrs):G.season+1)+1;
  const pk={ id:"comp"+compYear+"-"+teamId+"-"+round(Math.random()*1e6), season:compYear, round:2, orig:teamId, owner:teamId, comp:true };
  (G.picks=G.picks||[]).push(pk);
  return pk;
}
// Called whenever a free agent signs: if he declined a QO and signs ELSEWHERE, his old club
// gets a comp pick. Re-signing with the QO club (or signing after no QO) gives nothing.
function onFreeAgentSigned(G, p, newTeamId){
  if(p._qoFrom==null) return;
  if(p._qoFrom!==newTeamId){
    awardCompPick(G, p._qoFrom);
    const ot=G.teams[p._qoFrom], nt=G.teams[newTeamId];
    logNews(G,"draft",`🎟️ ${ot?ot.abbr:"?"} get a compensatory pick — ${p.pos} ${p.name} declined the QO, signed with ${nt?nt.abbr:"?"}`, p._qoFrom);
  }
  delete p._qoFrom;
}

/* ----------------------------- Offseason ------------------------------- */
function startOffseason(G){
  G.phase="offseason";
  G.offStep = "intro";
}

function OffseasonHub({G, commit, tShow, setTab}){
  const champ = G.champion? G.teams[G.champion.id]:null;
  const step = G.offStep||"intro";

  const doProgression = ()=>{
    const warCtx = leagueWarCtx(G);   // league avg wOBA/FIP for the season that just ended (before any reset)
    Object.values(G.players).forEach(p=>{
      recordSeasonHistory(p, G.season);   // log the year that just ended (team[s], stats) before aging
      // stamp WAR onto this season's MLB history row(s) using that season's league context
      p.history.filter(h=>h.season===G.season && h.level==="MLB").forEach(h=>{ h.war = +warOf(p, warCtx, h.stats).toFixed(1); });
      const before = p.ovr;
      p.age++;
      // Directed development: young players climb toward their potential; prospects in
      // AAA grow faster; performers (esp. promoted early) keep climbing; older players decline.
      const gap = p.pot - p.ovr;            // remaining room to ceiling
      const perf = seasonPerf(p);           // how he played this year
      let center;
      if(p.age<=23)      center = 1.5 + gap*0.16;            // fast risers
      else if(p.age<=26) center = 0.6 + gap*0.11;
      else if(p.age<=28) center = 0.05 + gap*0.05;           // last bit of growth, then peak
      else if(p.age<=30) center = -0.5;                      // gentle decline begins
      else if(p.age<=33) center = -1.1 - (p.age-30)*0.25;
      else               center = -2.2 - (p.age-33)*0.4;     // age cliff
      if((isAAAId(p.teamId)||isCollegeId(p.teamId)) && p.age<=25) center += 1.2;   // minors/college development boost
      // performance: young producers develop faster, vets who rake age gracefully, busts stall
      if(p.age<=27) center += perf.score * perf.weight * 1.6;
      else          center += perf.score * perf.weight * 0.7;
      center = clamp(center, -5, 4.5);
      const each = r=>{ if(p[r]!==undefined) p[r]=clamp(round(p[r]+gauss(center,1.2)),20,99); };
      (p.isP?["stu","ctl","stm"]:["con","pow","eye","spd","def"]).forEach(each);
      computeOvr(p);
      if(p.ovr > (p.peakOvr||0)) p.peakOvr = p.ovr;   // remember career-best OVR (for HoF)
      // a young breakout can raise his ceiling; everyone's ceiling erodes once past their prime
      if(p.age<=25 && (p.ovr>p.pot || (perf.score>0.7 && chance(0.5))))
        p.pot = clamp(Math.max(p.ovr, p.pot+rint(0,3)), p.ovr, 99);
      else if(p.age>=29) p.pot = Math.max(p.ovr, p.pot-1);
      p._lastDelta = p.ovr - before;        // for the offseason development report
      // reset season stats -> career. Amateur (college) stats live ONLY in history rows,
      // never in the pro career line, so a draftee's pro totals start clean.
      if(isCollegeId(p.teamId)) p.stats = p.isP?emptyPitStats():emptyHitStats();
      else mergeCareer(p);
      // a signed contract is fixed by its schedule — don't re-price it here
    });
    // retirements: driven by BOTH age and quality. Good players hang on (a 35+ vet who's
    // still ~62 OVR keeps grinding); washed-up players quit much earlier the older they get.
    // A stable per-player longevity factor adds variety so careers don't all end at once.
    const retired=[];
    Object.values(G.players).forEach(p=>{
      let retP;
      if(p.age<32) retP = 0;          // nobody retires young — careers end from age & decline only
      else {
        retP = (p.age-31)*0.06;                 // age ramp: 32→.06, 35→.24, 39→.48, 42→.66
        retP -= ((p.ovr-60)/100)*1.4;           // quality: stars (>60) hang on, scrubs (<60) leave sooner
        if(p.ovr<55) retP += (p.age-33)*0.05;   // genuinely bad + getting old → push them out
      }
      const lng = 0.78 + ((p.id*2654435761>>>0)%1000)/2273;   // ~0.78–1.22, stable per player
      retP = clamp(retP*lng, 0, 0.95);
      if(p.age>=44) retP = Math.max(retP, 0.9);                // almost nobody plays past 44
      if(chance(retP)){ retired.push(p.id); }
    });
    const retiredLog=[];
    retired.forEach(id=>{
      const p=G.players[id]; const t=teamById(G, p.teamId);
      nominateForHOF(G, p);                  // worthy careers go on the Hall of Fame ballot
      if(t){ t.lineup=t.lineup.filter(x=>x!==id); t.rotation=t.rotation.filter(x=>x!==id); if(t.pos) delete t.pos[id]; }
      G.freeAgents=G.freeAgents.filter(x=>x!==id);
      const tName=t?(t.aaa?G.teams[parentIdOf(t.id)].abbr:t.abbr):"FA";
      logNews(G,"roster",`${p.name} (${p.pos}, ${p.ovr} OVR, age ${p.age}) retired`, t?t.id:null);
      if(t && (t.id===G.userTeamId || t.id===aaaIdOf(G.userTeamId)))
        retiredLog.push({n:p.name, ovr:p.ovr, age:p.age, pos:p.pos});
      delete G.players[id];
    });
    runHofVote(G);                           // hold the Hall of Fame vote (new nominees + lingering ballot)
    // advance each rostered contract one year (drop the season just played), then expire to FA.
    // Free agents keep their ask intact — their "contract" is a demand, not a deal in progress.
    let userArbCount=0, userArbTotal=0;
    Object.values(G.players).forEach(p=>{
      if(isCollegeId(p.teamId)) return;             // amateurs: no pro contract to advance
      if(p.teamId==null){ ensureContract(p); return; }
      if(Array.isArray(p.contract) && p.contract.length) p.contract.shift();
      p.years = Array.isArray(p.contract) ? p.contract.length : Math.max(0, (p.years||1)-1);
      if(Array.isArray(p.contract) && p.contract.length){ p.salary = p.contract[0]; p.incentive = incentivesPerYear(p); }
      // arbitration: under-control MLB players get a performance-based raise (not a flat salary)
      const raise = applyArbitration(G, p);
      if(raise && p.teamId===G.userTeamId){ userArbCount++; userArbTotal=round((userArbTotal+raise)*10)/10; }
    });
    if(userArbCount>0) logNews(G,"signing",`⚖️ Arbitration: ${userArbCount} of your players earned raises (+${money(userArbTotal)} total payroll)`, G.userTeamId);
    const expiredLog=[];
    Object.values(G.players).forEach(p=>{
      if(isCollegeId(p.teamId)) return;             // amateurs don't expire to FA
      if(p.years<=0 && p.teamId!=null){
        // AAA prospects stay under org control until 28 (they're cheap, haven't hit arb yet)
        if(isAAAId(p.teamId) && p.age<28){ setContract(p, p.salary||0.7, rint(2,4), []); return; }
        const t=teamById(G, p.teamId);
        // Qualifying offer: a good MLB player about to walk gets a 1-year QO from his club.
        // Accept → 1yr at the QO (stays); decline → tests FA, club gets a comp pick if he signs
        // elsewhere (handled in onFreeAgentSigned).
        if(t && !t.aaa && qoEligible(p)){
          const qo=qoAmount(G,p), space=(t.budget - payroll(G,t.id)) + (p.salary||0);
          if(space>=qo){
            const declineP=clamp(0.30 + (p.ovr-76)*0.05 + (30-p.age)*0.03, 0.1, 0.95);
            if(chance(declineP)){
              p._qoFrom=t.id;   // declines → falls through to FA (skips AI auto-resign below)
              if(t.id===G.userTeamId) logNews(G,"signing",`You extended a QO to ${p.pos} ${p.name} (${p.ovr}); he declined to test free agency — comp pick if he signs elsewhere`, t.id);
            } else {
              setContract(p, qo, 1, []);
              logNews(G,"signing",`${t.abbr} extended a 1-yr QO to ${p.pos} ${p.name} (${p.ovr}); he accepted — ${money(qo)}`, t.id);
              return;   // stays on his club for one year
            }
          }
        }
        // AI clubs RE-SIGN their good, affordable players instead of letting them walk — the
        // better he is the more likely, but only if it fits the budget (won't wreck the team).
        // A QO-decliner is set on testing the market, so the AI doesn't just re-up him here.
        if(p._qoFrom==null && t && !t.aaa && t.id!==G.userTeamId){
          const aav=requiredAAV(p,3,1);
          const space=(t.budget - payroll(G,t.id)) + (p.salary||0);   // his expiring money frees up
          const keep = p.ovr>=80?0.97 : p.ovr>=74?0.82 : p.ovr>=68?0.55 : p.ovr>=62?0.22 : 0.05;
          if(space>=aav && chance(keep)){
            const yrs=clamp(p.age<28?rint(3,5):p.age<32?rint(2,4):rint(1,2),1,6);
            setContract(p, round(aav*10)/10, yrs, []);
            logNews(G,"signing",`${t.abbr} re-signed ${p.pos} ${p.name} (${p.ovr}) — ${yrs}y · ${money(aav)}/yr`, t.id);
            return;   // stays on his club
          }
        }
        if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
        logNews(G,"roster",`${p.name} (${p.pos}, ${p.ovr} OVR) contract expired — now a free agent`, t?t.id:null);
        if(t && (t.id===G.userTeamId || t.id===aaaIdOf(G.userTeamId)))
          expiredLog.push({n:p.name, ovr:p.ovr, age:p.age, pos:p.pos});
        p.teamId=null; setContract(p, salaryFor(p), rint(1,4), []);
        if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
      }
    });
    G._lastOffseasonDepartures = { retired: retiredLog, expired: expiredLog };
    G.offStep="draft-build";
    buildDraft(G);
    // open the free-agent market: rival clubs bid first (and a few early signings happen
    // before you even look — act fast or lose targets), then leave fresh offers on the board.
    processFAWave(G, 0.10); refreshFAMarket(G);
    commit(G);
    tShow("Players aged & contracts processed");
  };

  if(step==="intro"){
    return (
      <div className="space-y-4">
        {champ && <Card className="text-center">
          <div className="text-3xl mb-1">🏆</div>
          <div className="text-xl font-black text-emerald-400">{champ.name}</div>
          <div className="text-slate-400 text-sm">{G.champion.season} Champions</div>
        </Card>}
        {G.seasonRecap && (()=>{ const rc=G.seasonRecap, u=G.teams[G.userTeamId];
          const finish = rc.divWinner?`won the ${rc.division} (#1)`:rc.madePlayoffs?`made the playoffs (${rc.division} #${rc.place})`:`finished ${rc.division} #${rc.place}`;
          const champedHere = G.champion && G.champion.id===G.userTeamId;
          const ldr=(lbl,o)=> o?<div className="flex gap-2 text-sm"><span className="text-slate-400 text-xs w-10">{lbl}</span><span className="flex-1 truncate"><PlayerLink p={G.players[o.id]} text={o.name}/> <span className="text-slate-500 text-xs">{o.team}</span></span><span className="tnum text-amber-300 font-semibold">{o.val}</span></div>:null;
          return (
            <Card>
              <h3 className="font-bold mb-2">📰 {rc.season} Season Recap — {u.abbr}</h3>
              <div className="text-sm text-slate-300 mb-2">
                {champedHere ? <span className="text-emerald-300 font-semibold">🏆 World Series Champions!</span> : <span>Your club went <b className="tnum">{rc.userW}-{rc.userL}</b> ({rc.runDiff>=0?"+":""}{rc.runDiff} run diff) and {finish}.</span>}
              </div>
              {rc.userAwards.length>0 && <div className="text-sm text-amber-300 mb-2">🏅 {rc.userAwards.join(" · ")}</div>}
              <div className="grid sm:grid-cols-2 gap-3">
                <div>
                  <div className="text-xs font-semibold text-slate-400 mb-1">Your Top Performers</div>
                  {rc.userBestH && <div className="text-sm"><PlayerLink p={G.players[rc.userBestH.id]} text={rc.userBestH.name}/> <span className="text-slate-500 text-xs">{rc.userBestH.line}</span></div>}
                  {rc.userBestP && <div className="text-sm"><PlayerLink p={G.players[rc.userBestP.id]} text={rc.userBestP.name}/> <span className="text-slate-500 text-xs">{rc.userBestP.line}</span></div>}
                  {rc.hitStreak && <div className="text-xs text-slate-400 mt-1">🔥 Longest hitting streak: {rc.hitStreak.holder} ({rc.hitStreak.team}) — {rc.hitStreak.value} games</div>}
                  {rc.bestTeam && <div className="text-xs text-slate-400">🏟️ Best record: {rc.bestTeam.name} ({rc.bestTeam.w}-{rc.bestTeam.l})</div>}
                </div>
                <div>
                  <div className="text-xs font-semibold text-slate-400 mb-1">League Leaders</div>
                  {ldr("HR",rc.leaders.HR)}{ldr("AVG",rc.leaders.AVG)}{ldr("RBI",rc.leaders.RBI)}
                  {ldr("Wins",rc.leaders.W)}{ldr("K",rc.leaders.K)}{ldr("ERA",rc.leaders.ERA)}
                </div>
              </div>
            </Card>
          );
        })()}
        <Card>
          <h3 className="font-bold mb-2">Offseason — {G.season} → {G.season+1}</h3>
          <ol className="text-sm text-slate-300 list-decimal ml-5 space-y-1 mb-3">
            <li>Player aging, development & retirements</li>
            <li>Expiring contracts hit free agency</li>
            <li>Amateur Draft (Draft tab)</li>
            <li>Sign free agents (Free Agency tab)</li>
            <li>Start the new season</li>
          </ol>
          <button onClick={doProgression} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Process Offseason →</button>
        </Card>
      </div>
    );
  }
  // draft-build or later
  const orgIds=[G.userTeamId, aaaIdOf(G.userTeamId)];
  const dev=Object.values(G.players).filter(p=>orgIds.includes(p.teamId) && p._lastDelta!=null);
  const risers=[...dev].sort((a,b)=>b._lastDelta-a._lastDelta).slice(0,6).filter(p=>p._lastDelta>0);
  const fallers=[...dev].sort((a,b)=>a._lastDelta-b._lastDelta).slice(0,6).filter(p=>p._lastDelta<0);
  const devRow=p=>(
    <div key={p.id} className="flex items-center gap-2 text-sm">
      <OvrPill v={p.ovr}/>
      <span className="flex-1 truncate">{p.pos} <PlayerLink p={p} className="font-medium"/> <span className="text-slate-500 text-xs">{p.age}{isAAAId(p.teamId)?" · AAA":""}</span></span>
      <span className={"tnum font-semibold "+(p._lastDelta>0?"text-emerald-400":"text-red-400")}>{p._lastDelta>0?"+":""}{p._lastDelta}</span>
    </div>
  );
  const dep = G._lastOffseasonDepartures || {retired:[], expired:[]};
  return (
    <div className="space-y-4">
      {(dep.retired.length>0 || dep.expired.length>0) && <Card className="border-amber-700/40">
        <h3 className="font-bold mb-2 text-amber-300">⚠ Org Departures</h3>
        {dep.retired.length>0 && <div className="mb-2">
          <div className="text-xs font-semibold text-slate-400 mb-1">Retired</div>
          <div className="space-y-0.5">
            {dep.retired.map((p,i)=><div key={i} className="flex items-center gap-2 text-sm"><OvrPill v={p.ovr}/><span className="flex-1">{p.pos} {p.n} <span className="text-slate-500 text-xs">age {p.age}</span></span><span className="text-slate-400 text-xs">retired</span></div>)}
          </div>
        </div>}
        {dep.expired.length>0 && <div>
          <div className="text-xs font-semibold text-slate-400 mb-1">Contract expired → Free Agent</div>
          <div className="space-y-0.5">
            {dep.expired.map((p,i)=><div key={i} className="flex items-center gap-2 text-sm"><OvrPill v={p.ovr}/><span className="flex-1">{p.pos} {p.n} <span className="text-slate-500 text-xs">age {p.age}</span></span><button onClick={()=>setTab("fa")} className="text-xs text-emerald-400 hover:text-emerald-300">Re-sign →</button></div>)}
          </div>
        </div>}
      </Card>}
      {(risers.length||fallers.length)>0 && <Card>
        <h3 className="font-bold mb-1">Player Development — {G.season} → {G.season+1}</h3>
        <p className="text-xs text-slate-400 mb-3">OVR change from aging &amp; development across your organization. Young players climb toward their potential (faster in AAA and faster still when they produce); players 29+ start to decline.</p>
        <div className="grid sm:grid-cols-2 gap-4">
          <div><div className="text-xs text-emerald-300 font-semibold mb-1">📈 Risers</div><div className="space-y-1">{risers.length?risers.map(devRow):<div className="text-slate-500 text-sm">—</div>}</div></div>
          <div><div className="text-xs text-red-300 font-semibold mb-1">📉 Decliners</div><div className="space-y-1">{fallers.length?fallers.map(devRow):<div className="text-slate-500 text-sm">—</div>}</div></div>
        </div>
      </Card>}
      <Card>
        <h3 className="font-bold mb-2">Offseason Tasks</h3>
        <p className="text-sm text-slate-300 mb-3">Use the <b>Draft</b> and <b>Free Agency</b> tabs to improve your roster, then start the new season.</p>
        <div className="flex gap-2 flex-wrap">
          <button onClick={()=>setTab("draft")} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a]">Go to Draft</button>
          <button onClick={()=>setTab("fa")} className="px-4 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a]">Go to Free Agency</button>
          <button onClick={()=>{ startNewSeason(G); commit(G); tShow("Play ball! New season started."); setTab("hub"); }}
            className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Start {G.season+1} Season →</button>
        </div>
      </Card>
    </div>
  );
}

/* ----------------------------- Hall of Fame ---------------------------- */
const HOF_THRESHOLD = 175;
// a career score weighing counting stats plus a strong bonus for peak greatness,
// so only players who were genuinely elite (not just long-lived) get in.
// counts an award/honor across a player's career (accolades survive retirement)
function accCount(p, award){ return (p.accolades||[]).filter(a=>a.award===award).length; }
function ringCount(p){ return (p.rings||[]).length; }
function hofScore(p){
  const c=p.career||{}; const peak=p.peakOvr||p.ovr||0;
  const peakBonus = Math.max(0, peak-75)*4;
  // hardware & rings weigh heavily — a decorated career (MVPs, Cy Youngs, All-Star
  // selections, championships) is what separates a legend from a compiler.
  const accBonus = accCount(p,"MVP")*28 + accCount(p,"Cy Young")*24
                 + accCount(p,"All-Star")*7 + ringCount(p)*9;
  if(p.isP){
    const ip=(c.OUT||0)/3;
    return (c.W||0)*1.1 + (c.SV||0)*0.7 + (c.SO||0)*0.018 + ip*0.03 + peakBonus + accBonus;
  }
  return (c.HR||0)*0.45 + (c.H||0)*0.035 + (c.RBI||0)*0.032 + (c.SB||0)*0.12 + (c.R||0)*0.02 + peakBonus + accBonus;
}
// Self-contained career snapshot (the player is deleted from G.players on retirement, so the
// ballot/Hall must carry everything the plaque needs).
function hofSnapshot(G, p){
  const lt = (p.teamId!=null && !isAAAId(p.teamId) && G.teams[p.teamId]) ? G.teams[p.teamId].abbr
           : (p._yrTeams && p._yrTeams.length ? p._yrTeams[p._yrTeams.length-1] : "");
  // the franchise he played the most MLB seasons for → who retires his number
  const cnt={}; (p.history||[]).forEach(h=>{ if(h.level==="MLB") (h.teams||[]).forEach(tm=>{ cnt[tm]=(cnt[tm]||0)+1; }); });
  let primaryTeam=lt, bn=0; Object.keys(cnt).forEach(tm=>{ if(cnt[tm]>bn){bn=cnt[tm];primaryTeam=tm;} });
  return {
    name:p.name, pos:p.pos, isP:p.isP, peakOvr:p.peakOvr||p.ovr, num:p.num, primaryTeam,
    age:p.age, lastTeam:lt, seasons:(p.history?p.history.length:0),
    score:round(hofScore(p)),
    mvp:accCount(p,"MVP"), cy:accCount(p,"Cy Young"), allStar:accCount(p,"All-Star"), rings:ringCount(p),
    career:Object.assign({}, p.career||{}),
    history:(p.history||[]).map(h=>Object.assign({}, h)),
    accolades:(p.accolades||[]).map(a=>Object.assign({}, a)),
    ringSeasons:[...(p.rings||[])],
    postStats: p.postStats?Object.assign({},p.postStats):null,
    cupStats: p.cupStats?Object.assign({},p.cupStats):null,
  };
}
// HOF voting: on retirement, a worthy-enough career goes on the BALLOT (a lower bar than
// induction, so borderline guys can linger). Each offseason the ballot is voted: a vote%
// derived from hofScore (+ hardware/rings already baked into the score) + ballot momentum;
// 75%+ inducts (a 90%+ first-year vote is "first ballot"), and a candidate can wait a few
// years before getting in or falling off.
const HOF_BALLOT_FLOOR = 120;   // below this, a career never reaches the ballot
function nominateForHOF(G, p){
  if(hofScore(p) < HOF_BALLOT_FLOOR) return;
  const c = hofSnapshot(G, p); c.yearsOnBallot = 0; c.votePct = 0;
  (G.hofBallot = G.hofBallot || []).push(c);
}
// score 175 (old auto-induct bar) ≈ 75% first year; +0.42%/score-point; +4%/year of patience.
function hofVotePct(score, years){ return clamp(Math.round(75 + (score-175)*0.42 + (years||0)*4), 1, 99); }
function runHofVote(G){
  G.hof = G.hof || []; G.hofBallot = G.hofBallot || [];
  const remain=[];
  G.hofBallot.forEach(c=>{
    const pct = hofVotePct(c.score, c.yearsOnBallot);
    c.votePct = pct;
    if(pct>=75){
      c.firstBallot = (c.yearsOnBallot===0 && pct>=90);
      c.inducted = G.season;
      G.hof.push(c);
      // retire his number with the franchise he played the most for
      const tm = c.primaryTeam ? G.teams.find(t=>t.abbr===c.primaryTeam) : null;
      if(tm && c.num!=null){ tm.retired = tm.retired || [];
        if(!tm.retired.some(r=>r.num===c.num)){ tm.retired.push({num:c.num, name:c.name, pos:c.pos, season:G.season});
          logNews(G,"award",`🎽 ${tm.abbr} retire #${c.num} in honor of Hall of Famer ${c.name}`, tm.id); } }
      logNews(G,"award",`🎖️ ${c.name} (${c.lastTeam}) elected to the Hall of Fame${c.firstBallot?" — FIRST BALLOT!":""} — ${pct}% of the vote`, null);
    } else {
      c.yearsOnBallot++;
      if(c.yearsOnBallot<=5 && pct>=30) remain.push(c);   // else falls off the ballot, not inducted
    }
  });
  G.hofBallot = remain;
}

// snapshot the season that just ended into per-year history (with team[s] played for),
// then clear the year's team tags. Call BEFORE aging/development so age & OVR reflect the season.
function recordSeasonHistory(p, season){
  flushLevel(p);                                  // bank the final stint to its level
  const ls = p._levelStats || {};
  const yt = p._yrTeams || [];
  // team labels carry a " AAA" / " (C)" suffix; split a multi-level season by its labels
  const lvlOfLabel = lbl => / \(C\)$/.test(lbl)?"COL":(/ AAA$/.test(lbl)?"AAA":"MLB");
  const teamsFor = lvl => yt.filter(t => lvlOfLabel(t)===lvl);
  p.history = p.history||[];
  // one row per level actually played — so a season split MLB/AAA produces two rows
  ["MLB","AAA","COL"].forEach(lvl=>{
    const st = ls[lvl]; if(!st) return;
    const played = p.isP ? (st.OUT>0) : (st.PA>0);
    if(!played) return;
    p.history.push({ season, age:p.age, ovr:p.ovr, isP:p.isP, level:lvl,
      teams: teamsFor(lvl), stats: Object.assign({}, st) });
  });
  while(p.history.length>40) p.history.shift();    // ~20 yrs even if every year is split
  p._yrTeams=[]; p._levelStats=null; p._levelSnap=null;
}
function mergeCareer(p){
  const c=p.career, s=p.stats;
  Object.keys(s).forEach(k=>{ c[k]=(c[k]||0)+s[k]; });
  p.stats = p.isP?emptyPitStats():emptyHitStats();
}
// At season end, settle stat-based incentives. They're off-cap (don't count toward the
// in-season payroll), but the owner really pays them — so earned bonuses come out of the
// team's budget, leaving less to spend the following year.
function payIncentives(G){
  G.teams.forEach(t=>{ t.incentivesPaid = 0; });
  Object.values(G.players).forEach(p=>{
    if(!p.incentives || !p.incentives.length || p.teamId==null || isAAAId(p.teamId)) return;
    const t=G.teams[p.teamId]; if(!t) return;
    let earned=0; const hits=[];
    p.incentives.forEach(inc=>{
      const def=STAT_INCENTIVES[inc.stat];
      const got = def ? def.get(p.stats) : (inc.stat==="_flat"?inc.need:0);
      const met = inc.stat==="_flat" ? true : (got>=(inc.need||0));
      if(met){ earned+=inc.amount||0; hits.push(def?def.label:"bonus"); }
    });
    if(earned>0){
      t.incentivesPaid += earned;
      t.budget = clamp(round((t.budget - earned)*10)/10, 70, 290);   // owner pays — less budget next year
      if(p.teamId===G.userTeamId)
        logNews(G,"signing",`${t.abbr} paid ${p.name} ${money(earned)} in incentives (${hits.join(", ")}) — off this year's budget`, p.teamId);
    }
  });
}

// Assess a club's competitive situation: how strong it is, whether it's in win-now mode
// or rebuilding, and which positions it's thin at. Drives AI draft picks + pick trades and
// is shown to the user on the Draft tab.
function teamSituation(G, teamId){
  const t=G.teams[teamId];
  const mlb=rosterOf(G,teamId);
  const org=mlb.concat(rosterOf(G,aaaIdOf(teamId)));
  const top=mlb.slice().sort((a,b)=>b.ovr-a.ovr).slice(0,13);
  const strength=top.length? top.reduce((s,p)=>s+p.ovr,0)/top.length : 50;
  const age=top.length? top.reduce((s,p)=>s+p.age,0)/top.length : 27;
  const hist=t.history||[]; const last=hist[hist.length-1];
  const wp = last ? last.w/Math.max(1,last.w+last.l) : ((t.w+t.l)? t.w/(t.w+t.l) : 0.5);
  let mode;
  if(strength>=72 && wp>=0.5) mode="Win-now";
  else if(strength>=70) mode="Contender";
  else if((strength<66 && age<=27) || wp<0.43) mode="Rebuild";
  else mode="Retool";
  // positional needs: best org OVR at each lineup slot, plus rotation/bullpen depth
  const needs=[];
  ["C","1B","2B","3B","SS","LF","CF","RF"].forEach(pos=>{
    const best=org.filter(p=>!p.isP&&p.pos===pos).reduce((a,c)=>(!a||c.ovr>a.ovr)?c:a,null);
    const ovr=best?best.ovr:0; if(ovr<68) needs.push({pos, ovr, gap:68-ovr});
  });
  const sp=org.filter(p=>p.isP&&p.role==="SP").sort((a,b)=>b.ovr-a.ovr);
  const rp=org.filter(p=>p.isP&&p.role==="RP").sort((a,b)=>b.ovr-a.ovr);
  if(!sp[2]||sp[2].ovr<70) needs.push({pos:"SP", ovr:sp[2]?sp[2].ovr:0, gap:70-(sp[2]?sp[2].ovr:0)});
  if(!rp[2]||rp[2].ovr<68) needs.push({pos:"RP", ovr:rp[2]?rp[2].ovr:0, gap:68-(rp[2]?rp[2].ovr:0)});
  needs.sort((a,b)=>b.gap-a.gap);
  const needPos=needs.map(n=>n.pos);
  return { mode, strength:Math.round(strength), wp, age:Math.round(age), needs:needPos, topNeeds:needs.slice(0,3) };
}

/* ---- Owner expectations / GM hot seat (USER team only; AI clubs unaffected) ----
   Each preseason the owner sets a mandate from roster strength (teamSituation mode).
   Missing it BADLY three straight seasons gets the GM fired (game over). A met or merely
   close season resets the strike count, so a competitive club is safe even if it falls short. */
function ownerGoalFor(mode){
  if(mode==="Win-now")   return { goal:"division", label:"Win the division" };
  if(mode==="Contender") return { goal:"playoffs", label:"Make the playoffs" };
  if(mode==="Retool")    return { goal:"win500",   label:"Finish at or above .500" };
  return { goal:"develop", label:"Develop the young core" };   // Rebuild
}
function setOwnerMandate(G){
  const sit=teamSituation(G, G.userTeamId), g=ownerGoalFor(sit.mode);
  G.ownerMandate={ season:G.season, goal:g.goal, label:g.label, mode:sit.mode };
}
function evalOwnerMandate(G){
  const m=G.ownerMandate; if(!m || m.season!==G.season) return;
  const u=G.teams[G.userTeamId];
  const wp=(u.w+u.l)? u.w/(u.w+u.l) : 0;
  const seeds=playoffSeeds(G.teams, u.league).map(t=>t.id);
  const madePlayoffs=seeds.includes(u.id);
  const divWinner=seeds.slice(0,3).includes(u.id);
  let met=false, badly=false;
  if(m.goal==="division"){ met=divWinner; badly=!madePlayoffs && wp<0.475; }
  else if(m.goal==="playoffs"){ met=madePlayoffs; badly=!madePlayoffs && wp<0.460; }
  else if(m.goal==="win500"){ met=wp>=0.500; badly=wp<0.450; }
  else { met=wp>=0.450; badly=wp<0.385; }                       // develop: only a collapse is "bad"
  G.gmStrikes = badly ? (G.gmStrikes||0)+1 : 0;
  Object.assign(m, { met, badly, finalWp:+wp.toFixed(3), madePlayoffs, divWinner, strikes:G.gmStrikes });
  if(met) logNews(G,"award",`🏟️ Owner: mandate met — "${m.label}". The front office is pleased.`, u.id);
  else if(badly) logNews(G,"award",`🏟️ Owner: mandate missed badly — "${m.label}". The hot seat warms (${G.gmStrikes}/3).`, u.id);
  else logNews(G,"award",`🏟️ Owner: fell short of "${m.label}", but kept it respectable. No strike.`, u.id);
  if((G.gmStrikes||0)>=3 && !G.gmFired){
    G.gmFired={ season:G.season, label:m.label };
    logNews(G,"award",`🏟️ The owner has FIRED the GM after ${G.season} — three straight failed mandates.`, u.id);
  }
}

/* ---- Competitive free agency: AI clubs bid FIRST; players sign the best FIT ----
   Drives "teams send offers before me / steal players / some get many bids, some none". */
// How much a player likes an offer. Guaranteed money dominates, then years, then a nudge
// toward winners — so a contender can land a guy for slightly less ("better fit elsewhere").
function offerFit(p, offer, sit){
  const wp = sit ? sit.wp : 0.5, strength = sit ? sit.strength : 60;
  return (offer.aav||0)*1.0 + (offer.years||1)*0.25 + (wp-0.5)*5 + Math.max(0,strength-60)*0.06;
}
// Recompute the AI market for every free agent: interested clubs (need + can afford) and
// their offers. Stores p.offers (top few) + p.bestOffer for the FA tab + decision logic.
function refreshFAMarket(G){
  const sits={}; G.teams.forEach(t=>{ sits[t.id]=teamSituation(G,t.id); });
  (G.freeAgents||[]).forEach(id=>{
    const p=G.players[id]; if(!p) return;
    const ask=requiredAAV(p, 3, 1);
    const offers=[];
    G.teams.forEach(t=>{
      if(t.id===G.userTeamId) return;
      const space=t.budget - payroll(G,t.id);
      if(space < Math.max(0.6, ask*0.8)) return;            // can't afford → no offer
      const sit=sits[t.id]; const posKey=p.isP?p.role:p.pos;
      const needed = sit.needs.includes(posKey) || (!p.isP && sit.needs.includes(p.pos));
      const winNow = sit.mode==="Win-now"||sit.mode==="Contender";
      if(!(needed || (p.ovr>=74 && space>ask*1.4) || (winNow && p.ovr>=69))) return;  // not interested
      const mult = needed ? (1.0 + Math.random()*0.22) : (winNow?0.98:0.9);
      const aav = clamp(round(Math.min(space, ask*mult)*10)/10, 0.5, 70);
      const years = clamp(p.age<28?rint(3,5):p.age<32?rint(2,4):rint(1,2), 1, 6);
      offers.push({teamId:t.id, aav, years, fit:offerFit(p,{aav,years},sit)});
    });
    offers.sort((a,b)=>b.fit-a.fit);
    p.offers = offers.slice(0,4);
    p.bestOffer = offers[0] || null;
  });
}
// One wave of the market moving: each FA may sign his current best offer (AI clubs land
// their targets — this is how rivals "steal" a player before you act). Returns # signed.
function processFAWave(G, intensity){
  refreshFAMarket(G);
  let signed=0;
  (G.freeAgents||[]).slice().forEach(id=>{
    const p=G.players[id]; if(!p || !p.bestOffer) return;
    if(!chance(intensity)) return;
    const off=p.bestOffer, t=G.teams[off.teamId]; if(!t) return;
    if(off.aav > t.budget - payroll(G,t.id) + 0.001) return;     // cap moved since the bid
    setContract(p, off.aav, off.years, []); p.teamId=t.id;
    G.freeAgents=G.freeAgents.filter(x=>x!==p.id);
    p.bestOffer=null; p.offers=[];
    onFreeAgentSigned(G, p, t.id);   // comp pick if he declined a QO and signed elsewhere
    logNews(G,"signing",`${t.abbr} signed ${p.pos} ${p.name} (${p.ovr}) — ${off.years}y · ${money(off.aav)}/yr`, t.id);
    signed++;
  });
  G.teams.forEach(t=>{ if(t.id!==G.userTeamId) aiAlignOrg(G,t.id); });
  return signed;
}
// Score a prospect for a specific club: base talent, weighted by positional need and the
// club's mode (win-now favors ready bats/arms; rebuilders chase ceiling).
function aiDraftScore(G, p, sit){
  let s=prospectGrade(p);
  const posKey=p.isP?p.role:p.pos;
  if(sit.needs.includes(posKey)) s+=12; else if(!p.isP && sit.needs.includes(p.pos)) s+=8;
  if(sit.mode==="Win-now"||sit.mode==="Contender") s+=(p.ovr-55)*0.7;   // value readiness
  else s+=Math.max(0,p.pot-70)*0.6;                                     // value ceiling
  return s;
}
// AI pick for a club: among the top prospects by raw grade (so a blue-chipper never slides
// far), choose the best fit for this club's needs/mode.
function aiDraftSelect(G, ownerId){
  const avail=G.draftClass.map(id=>G.players[id]).filter(Boolean);
  if(!avail.length) return null;
  const sit=teamSituation(G, ownerId);
  const pool=avail.slice().sort((a,b)=>prospectGrade(b)-prospectGrade(a)).slice(0,15);
  let best=null,bs=-Infinity;
  pool.forEach(p=>{ const v=aiDraftScore(G,p,sit); if(v>bs){bs=v;best=p;} });
  return best?best.id:avail[0].id;
}
// Pre-draft AI-to-AI pick trades: win-now/contender clubs move UP (sending a package of
// later picks) for an early pick a rebuilder would rather flip for volume. Value-fair, bounded.
function aiDraftPickTrades(G){
  const aiTeams=G.teams.filter(t=>t.id!==G.userTeamId);
  const sit={}; aiTeams.forEach(t=>sit[t.id]=teamSituation(G,t.id));
  const dy = (G.picks&&G.picks.length) ? Math.min(...G.picks.map(p=>p.season)) : null;   // only the upcoming draft
  const yearPicks = (G.picks||[]).filter(p=>p.season===dy);
  let trades=0;
  for(let n=0;n<24 && trades<6;n++){
    const C=pick(aiTeams);
    if(!(sit[C.id].mode==="Win-now"||sit[C.id].mode==="Contender")) continue;
    if(!sit[C.id].needs.length) continue;                          // no glaring need → no reason to move up
    const early=yearPicks.filter(pk=>pk.round<=2 && pk.owner!==C.id && sit[pk.owner] && sit[pk.owner].mode==="Rebuild");
    if(!early.length) continue;
    const target=pick(early); const tv=pickValue(G,target); const R=G.teams[target.owner];
    const mine=yearPicks.filter(pk=>pk.owner===C.id && pk.id!==target.id).sort((a,b)=>pickValue(G,b)-pickValue(G,a));
    let give=[],acc=0;
    for(const pk of mine){ if(acc>=tv || give.length>=2) break; give.push(pk); acc+=pickValue(G,pk); }
    if(give.length<1 || acc < tv*0.9) continue;                   // couldn't put together a fair offer
    target.owner=C.id; give.forEach(pk=>pk.owner=R.id);
    logNews(G,"trade",`${C.abbr} (${sit[C.id].mode.toLowerCase()}) traded up to a Rd ${target.round} pick, sending ${R.abbr} ${give.length} later pick${give.length>1?"s":""}`, C.id);
    trades++;
  }
}

// Generate a fresh high-school stat line (we don't sim HS) — a single big amateur season
// scaled to the player's ratings, stored as an "HS" history row on the prospect.
function genHSLine(p, season){
  if(p.isP){
    const s=emptyPitStats(); const gs=rint(8,12); s.G=gs; s.GS=gs; s.OUT=gs*rint(15,20);
    const stu=n01(p.stu);
    s.SO=round(s.OUT/3 * (1.3+stu*0.9)); s.BB=round(s.OUT/3*(0.25+(1-n01(p.ctl))*0.5));
    s.H=round(s.OUT/3*(0.6+(1-stu)*0.5)); s.ER=round(s.OUT/3*(0.18+(1-stu)*0.35));
    s.HRA=rint(0,3); s.W=rint(round(gs*0.4),gs); s.L=gs-s.W; s.QS=round(gs*0.5);
    return s;
  }
  const s=emptyHitStats(); const g=rint(26,34); s.G=g; s.AB=g*rint(3,4); s.PA=round(s.AB*1.18);
  const con=n01(p.con), pow=n01(p.pow);
  s.H=round(s.AB*(0.34+con*0.22));                 // HS aces hit .380-.560
  s.HR=round((pow)*g*0.35); s._2B=round(s.H*0.22); s._3B=rint(1,4);
  s.RBI=round(s.H*0.7+s.HR); s.R=round(s.H*0.8); s.BB=round(s.PA*(0.08+n01(p.eye)*0.12));
  s.SO=round(s.AB*(0.10+(1-con)*0.12)); s.SB=round(n01(p.spd)*rint(8,22));
  return s;
}
function makeHSProspects(G, n){
  const out=[];
  for(let i=0;i<n;i++){
    const p = chance(0.45) ? makePitcher(chance(0.6)?"SP":"RP",[17,18],-14)
                           : makeHitter(pick(INF_OF.concat(["DH"])),[17,18],-14);
    // "very good for their age" — a fat ceiling so a HS phenom is worth an early pick
    p.pot = clamp(Math.max(p.pot, p.ovr+rint(16,32)), p.ovr, 99); setPotential(p); p.pot=clamp(Math.max(p.pot,p.ovr+rint(16,32)),p.ovr,99);
    p.teamId=null; p.amateur=true; p.fromHS=true; p.salary=0; p.contract=[]; p.years=0;
    p.history=[{ season:G.season, age:p.age, ovr:p.ovr, isP:p.isP, level:"HS", teams:["HS"], stats:genHSLine(p) }];
    out.push(p);
  }
  return out;
}
// Which college players declare for the draft this offseason (they leave school).
// Seniors (22+) must go; juniors usually do; underclassmen only if they're blue-chips
// ("declare whenever for whatever reason" — talent + a little randomness).
function collegeDeclarations(G){
  const declare=[];
  Object.values(G.players).filter(p=>isCollegeId(p.teamId)).forEach(p=>{
    const grade=prospectGrade(p);
    let prob;
    if(p.age>=22) prob=1;                                    // out of eligibility — must declare
    else if(p.age>=21) prob=0.70;                            // juniors mostly go
    else if(p.age>=20) prob=clamp((grade-58)/110, 0.04, 0.40);
    else prob=clamp((grade-80)/220, 0, 0.10);               // freshmen/sophs: only elite
    if(chance(prob)) declare.push(p);
  });
  return declare;
}
// Replace departed college players with fresh freshmen so each school stays ~25 deep.
function refillCollege(G){
  (G.collegeTeams||[]).forEach(t=>{
    let ros=Object.values(G.players).filter(p=>p.teamId===t.id);
    let h=ros.filter(p=>!p.isP).length, pi=ros.filter(p=>p.isP).length;
    const fresh=p=>{ p.teamId=t.id; p.amateur=true; p.salary=0; p.contract=[]; p.years=0; p.classYr=21-p.age; G.players[p.id]=p; };
    while(h<14){ const p=makeHitter(pick(INF_OF.concat(["DH"])),[17,18],-12); fresh(p); h++; }
    while(pi<11){ const p=makePitcher(pi<5?"SP":"RP",[17,18],-12); fresh(p); pi++; }
    autoSetLineups(t, G.players);   // drop departed ids, set freshmen lineups
  });
}
// Where a draft prospect came from: "HS" for high schoolers, else his college (abbr).
// Falls back to the most recent COL history row for prospects declared before fromSchool existed.
function prospectSchool(p){
  if(p.fromHS) return "HS";
  if(p.fromSchool) return p.fromSchool;
  const col=(p.history||[]).filter(h=>h.level==="COL");
  const last=col[col.length-1];
  if(last && last.teams && last.teams.length) return last.teams[last.teams.length-1].replace(/ \(C\)$/,"").replace(/ AAA$/,"");
  return "—";
}
function buildDraft(G){
  // The draft class = declared college players (carrying their COL stats) + a few elite HS
  // prospects (freshly generated HS stats), topped up with generics only if supply runs short.
  const cls=[];
  collegeDeclarations(G).forEach(p=>{ const sch=teamById(G,p.teamId); p.fromSchool = sch?sch.abbr:""; p.teamId=null; delete p.classYr; cls.push(p.id); });  // amateurs leave school (stay amateur until drafted)
  makeHSProspects(G, rint(16,26)).forEach(p=>{ G.players[p.id]=p; cls.push(p.id); });
  refillCollege(G);                       // freshmen replace those who left
  // safety: guarantee a full 150-pick board even if declarations were light
  while(cls.length<160){
    const p = chance(0.45)?makePitcher(chance(0.6)?"SP":"RP",[18,21]):makeHitter(pick(INF_OF.concat(["DH"])),[18,21]);
    p.teamId=null; p.amateur=true; p.salary=0; p.contract=[]; p.years=0; G.players[p.id]=p; cls.push(p.id);
  }
  aiDraftPickTrades(G);   // AI clubs swap picks (move up / accumulate) based on their situations
  // selection order from owned picks: by round, then the ORIGINAL team's
  // reverse-standings slot (so traded picks keep their original draft value)
  const worstFirst=[...G.teams].sort((a,b)=>pct(a)-pct(b)).map(t=>t.id);
  const slotOf=id=>worstFirst.indexOf(id);
  // only the SOONEST draft year is on the board now; later years stay tradeable in G.picks
  const draftYear = G.picks.length ? Math.min(...G.picks.map(p=>p.season)) : G.season+1;
  G.draftPicks=G.picks.filter(p=>p.season===draftYear).sort((a,b)=> a.round-b.round || slotOf(a.orig)-slotOf(b.orig));
  G.draftPick=0;
  G.draftClass=cls.sort((a,b)=>G.players[b].pot-G.players[a].pot);
}

const MODE_STYLE = { "Win-now":"text-emerald-300 bg-emerald-900/30", "Contender":"text-sky-300 bg-sky-900/30", "Retool":"text-amber-300 bg-amber-900/30", "Rebuild":"text-rose-300 bg-rose-900/30" };
function Draft({G, commit, tShow, setTab}){
  const [showSits,setShowSits]=useState(false);
  const situations = useMemo(()=>{ const m={}; G.teams.forEach(t=>{ m[t.id]=teamSituation(G,t.id); }); return m; }, [G.season]);
  const picksArr = G.draftPicks||[];
  // Keep the draft order's owners in sync with LIVE (tradeable) ownership: save/load
  // decouples G.draftPicks from G.picks (no shared refs through JSON), so a pick traded
  // mid-draft — including the one on the clock — would otherwise be missed and wasted.
  picksArr.forEach(dp=>{ const live=(G.picks||[]).find(p=>p.id===dp.id); if(live && dp.owner!==live.owner) dp.owner=live.owner; });
  if(!picksArr.length)
    return <Card>The draft isn't ready yet — process the offseason from the Hub first.</Card>;
  const totalPicks = picksArr.length;

  if(G.draftPick>=totalPicks){

      <p className="text-sm text-slate-300">Your picks report to your <b>AAA affiliate</b> (check the Roster → AAA section, then call up whoever's ready). Head to Free Agency or start the season from the Hub.</p></Card>;
  }

                  by:(g.teams[ownerId]?g.teams[ownerId].abbr:ownerId),

    p.amateur=false; delete p.classYr;            // turns pro on draft day
    setContract(p, 0.7, 4, []);                   // standard rookie-scale deal
    p.teamId=aaaIdOf(ownerId); };
  const draftPlayer=(pid)=>{
    if(!G.players[pid]) return;
    const p=G.players[pid];
    logNews(G,"draft",`${G.teams[onClock].abbr} drafted ${p.pos} ${p.name} (POT ${p.pot}) — Rd ${round}, #${G.draftPick+1}`, onClock);
    assign(G,pid,onClock);
    G.draftClass=G.draftClass.filter(x=>x!==pid);

  };
  const aiPick=()=>{ const best=aiDraftSelect(G, onClock); if(best!=null) draftPlayer(best); };
  const simToMe=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && picksArr[g.draftPick].owner!==g.userTeamId && guard<totalPicks){

    }
    commit(g);
  };
  const simAll=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && guard<totalPicks+5){
      const best=aiDraftSelect(g, picksArr[g.draftPick].owner); if(best==null) break;
      assign(g,best,picksArr[g.draftPick].owner);
      g.draftClass=g.draftClass.filter(x=>x!==best); g.draftPick++; guard++;
    }
    g.teams.forEach(t=>trimRoster(g,t));
    g.aaaTeams.forEach(t=>autoSetLineups(t,g.players)); // draftees joined AAA
    commit(g); tShow("Draft complete");
  };

  const myUpcoming = picksArr.filter((pk,i)=>i>=G.draftPick && pk.owner===G.userTeamId).length;

  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">

          <div className={"px-2 py-0.5 rounded text-sm font-semibold "+(isUser?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>
            On the clock: {G.teams[onClock].name}{isUser?" (YOU)":""}{traded?` (via ${G.teams[curPick.orig].abbr})`:""}
          </div>
          {(()=>{ const s=situations[onClock]; if(!s) return null;
            return <div className="text-xs flex items-center gap-1.5">
              <span className={"px-1.5 py-0.5 rounded font-semibold "+(MODE_STYLE[s.mode]||"")}>{s.mode}</span>
              <span className="text-slate-400">{s.needs.length?`needs ${s.needs.slice(0,3).join("/")}`:"well-rounded"}</span>
            </div>; })()}
          <div className="ml-auto flex gap-2">
            {setTab && <button onClick={()=>setTab("trades")} className="px-3 py-1 bg-amber-700 hover:bg-amber-600 rounded text-sm font-semibold">⇄ Trade Picks</button>}

        <Card className="lg:col-span-2">

          <div className="overflow-x-auto max-h-[65vh] overflow-y-auto">
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th className="text-left">From</th><th>Age</th><th>OVR</th><th>POT</th>{isUser&&<th></th>}</tr></thead>
              <tbody>
                {avail.slice(0,60).map(p=>(
                  <tr key={p.id} className="border-b border-[#15203a]">
                    <td className="text-slate-400">{p.pos}</td><td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                    <td className={"text-left text-xs "+(p.fromHS?"text-rose-300":"text-violet-300")}>{prospectSchool(p)}</td>
                    <td className="text-center">{p.age}</td><td className="text-center"><ScoutOvrPill p={p}/></td>
                    <td className="text-center"><ScoutPotPill p={p}/></td>
                    {isUser&&<td className="text-right"><button onClick={()=>draftPlayer(p.id)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500">Draft</button></td>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>

        {/* selections + draft order sidebar */}
        <div className="space-y-3">
        {(()=>{
          const draftYear = G.season+1;
          const userAbbr = G.teams[G.userTeamId] && G.teams[G.userTeamId].abbr;
          const selections = Object.values(G.players)
            .filter(p=>p.draftInfo && p.draftInfo.year===draftYear && p.draftInfo.overall!=null)
            .sort((a,b)=>b.draftInfo.overall-a.draftInfo.overall);   // newest pick first
          return (
            <Card>
              <div className="flex items-center justify-between mb-1">
                <div className="text-xs text-slate-400 font-semibold">Selections</div>
                <div className="text-[11px] text-slate-500">{selections.length} made</div>
              </div>
              {selections.length===0
                ? <div className="text-xs text-slate-500 py-2">No picks yet — the board is on the clock.</div>
                : <div className="max-h-[32vh] overflow-y-auto space-y-0.5 text-sm tnum">
                    {selections.map(p=>{ const mine=p.draftInfo.by===userAbbr;
                      return (
                        <div key={p.id} className={"flex items-center gap-2 px-2 py-1 rounded "+(mine?"bg-emerald-900/30":"bg-[#0e1830]")}>

                          <span className="text-slate-600 text-[10px] w-7 shrink-0">R{p.draftInfo.round}</span>

                          <span className="flex-1 truncate min-w-0"><PlayerLink p={p}/> <span className={"text-[10px] "+(p.fromHS?"text-rose-300":"text-violet-300")}>{prospectSchool(p)}</span></span>
                          <span className="text-slate-500 text-[10px] shrink-0"><span className="text-slate-400 font-semibold">{p.pos}</span> · {p.ovr}→<span className="text-amber-300">{p.pot}</span></span>
                        </div>
                      );
                    })}
                  </div>}
            </Card>
          );
        })()}
        <Card>
          <div className="flex items-center justify-between mb-1">
            <div className="text-xs text-slate-400 font-semibold">Draft Order</div>
            <div className="text-[11px] text-emerald-400">{myUpcoming} of your picks left</div>
          </div>
          {setTab && <button onClick={()=>setTab("trades")} className="w-full mb-2 px-2 py-1 bg-amber-700 hover:bg-amber-600 rounded text-xs font-semibold">⇄ Propose a pick trade</button>}
          <div className="max-h-[60vh] overflow-y-auto space-y-0.5 text-sm tnum">
            {picksArr.map((pk,i)=>{
              const done=i<G.draftPick, cur=i===G.draftPick, mine=pk.owner===G.userTeamId;
              const t=G.teams[pk.owner];
              return (
                <div key={i} className={"flex items-center gap-2 px-2 py-1 rounded "+
                  (cur?"bg-emerald-500/20 ring-1 ring-emerald-500":mine?"bg-emerald-900/25":done?"opacity-40":"bg-[#0e1830]")}>
                  <span className="text-slate-500 text-xs w-9 shrink-0">#{i+1}</span>
                  <span className="text-slate-600 text-[10px] w-7 shrink-0">R{pk.round}</span>

                    {pk.owner!==pk.orig && <span className="text-slate-500 text-[10px]"> (via {G.teams[pk.orig]?G.teams[pk.orig].abbr:"?"})</span>}

        </div>

          {G.teams.map(t=>{ const s=situations[t.id]; if(!s) return null;
            return (

                <span className="text-slate-400 text-xs flex-1 truncate">{s.needs.length?`needs ${s.needs.slice(0,3).join("/")}`:"deep roster"}</span>

const ROSTER_CAP = 32;
const AAA_CAP = 38;     // affiliates hold prospects but still need a ceiling
function trimRoster(G, team, cap=ROSTER_CAP){
  let ros=rosterOf(G,team.id).sort((a,b)=>b.ovr-a.ovr);
  // cap roster size (keep the best by OVR); supports the deeper 30-man rosters
  while(ros.length>cap){
    const cut=ros.pop();
    cut.teamId=null; if(!G.freeAgents.includes(cut.id)) G.freeAgents.push(cut.id);
  }
}
// Keep the free-agent pool (and thus the whole player dict) from growing without
// bound across seasons — sim speed scales with total player count. Keep the best
// ~220 free agents; delete the rest from the game entirely.
function pruneFreeAgents(G, keepN=220){
  if(!G.freeAgents || G.freeAgents.length<=keepN) return;
  const ranked = G.freeAgents.map(id=>G.players[id]).filter(Boolean).sort((a,b)=>playerValue(b)-playerValue(a));
  const keep = new Set(ranked.slice(0,keepN).map(p=>p.id));
  ranked.slice(keepN).forEach(p=>{ delete G.players[p.id]; });
  G.freeAgents = G.freeAgents.filter(id=>keep.has(id) && G.players[id]);
}

// Keep the autosave under the localStorage quota (~5MB). Per-player year-by-year history is by
// far the biggest contributor — it grows every season for ~1850 players, and a deep franchise
// used to blow past the quota mid-offseason, after which saveGame's setItem threw and (silently)
// dropped the write, so a refresh reverted the game to the last save that fit. Records, the Hall
// of Fame and the leaderboards all read from p.career / G.records / team.records, NOT from these
// arrays, so trimming filler players' history is lossless for everything the game computes. We
// keep a full career page for players the user actually visits — his own org, stars, the
// decorated — and a short recent window for everyone else.
function isNotablePlayer(G, p){
  const uid = G.userTeamId;
  if(p.teamId===uid || p.teamId===aaaIdOf(uid)) return true;     // anyone currently in the user's org
  if((p.peakOvr||p.ovr) >= 75) return true;                      // stars
  if((p.accolades && p.accolades.length) || (p.rings && p.rings.length)) return true;  // decorated
  return false;
}
function trimHistories(G, notableCap=25, fillerCap=3){
  Object.values(G.players||{}).forEach(p=>{
    if(!Array.isArray(p.history) || !p.history.length) return;
    const cap = isNotablePlayer(G,p) ? notableCap : fillerCap;
    if(p.history.length>cap) p.history = p.history.slice(p.history.length-cap);
  });
}

function startNewSeason(G){
  // Competitive AI free agency: several market waves where clubs land their best-FIT targets
  // (anyone the user didn't sign). Then a fallback fill guarantees playable AI rosters.
  for(let w=0; w<6; w++) processFAWave(G, 0.55);
  G.teams.forEach(t=>{
    if(t.id===G.userTeamId) return;
    let ros=rosterOf(G,t.id);
    let guard=0;
    while(ros.length<26 && G.freeAgents.length && guard<80){
      // fallback: best affordable FA at a fair price (the market may have left thin spots)
      const space=t.budget-payroll(G,t.id);
      const cand=G.freeAgents.map(id=>G.players[id]).filter(p=>p&&p.salary<=Math.max(space,1)).sort((a,b)=>b.ovr-a.ovr)[0];
      if(!cand) break;
      cand.teamId=t.id; G.freeAgents=G.freeAgents.filter(id=>id!==cand.id);
      onFreeAgentSigned(G, cand, t.id);   // comp pick if a QO-decliner lands here
      ros=rosterOf(G,t.id); guard++;
    }
    aiAlignOrg(G, t.id);          // promote the org's best to the bigs before trimming/lineups
    trimRoster(G,t);
    autoSetLineups(t, G.players);
  });
  // make sure user roster is valid for play
  const me=G.teams[G.userTeamId];
  ensureLineup(me, G.players);
  // AAA rosters changed (draft, call-ups/send-downs) — cap depth, top up thin affiliates
  // to a fieldable, prospect-developing minimum, then refresh lineups
  G.aaaTeams.forEach(t=>{ trimRoster(G, t, AAA_CAP); refillRoster(G, t.id, 12, 9, [19,26], -6); });
  G.aaaTeams.forEach(t=>autoSetLineups(t, G.players));
  // sweep any orphaned teamless players (e.g. leftover draft class, stray cuts) into
  // the FA pool, then prune — keeps the player dict bounded so sim speed stays flat.
  Object.values(G.players).forEach(p=>{ if(p.teamId==null && !G.freeAgents.includes(p.id)) G.freeAgents.push(p.id); });
  pruneFreeAgents(G);
  // archive the season that just finished into each team's record history
  const champId = G.champion ? G.champion.id : null;
  const empSeeds = playoffSeeds(G.teams,"Empire").map(t=>t.id);
  const pioSeeds = playoffSeeds(G.teams,"Pioneer").map(t=>t.id);
  G.teams.forEach(t=>{
    t.history = t.history||[];
    const made = (t.league==="Empire"?empSeeds:pioSeeds).includes(t.id);
    const champ = t.id===champId;
    t.history.push({ season:G.season, w:t.w, l:t.l, made, champ });
    // revenue/budget evolves with ATTENDANCE — winning (and a recent winner's momentum) fills seats —
    // but regresses gently toward a market mean so a dynasty can't run the payroll away forever.
    const a=computeAttendance(t); t.attendance=a.att; t.attFill=a.fill;
    let delta=(a.fill-0.52)*0.55; if(champ) delta+=0.04;
    const old=t.budget;
    t.budget=clamp(round(t.budget*(1+delta) - (t.budget-160)*0.06), 95, 290);
    t.budgetDelta=t.budget-old;
    if(t.id===G.userTeamId && t.budgetDelta!==0)
      logNews(G,"signing",`${t.abbr} drew ${(t.attendance/1000).toFixed(1)}K/game (${Math.round(a.fill*100)}% full) — payroll budget ${t.budgetDelta>0?"+":""}${t.budgetDelta} to ${money(t.budget)}`, t.id);
  });
  // reset records & stats (MLB + AAA + college)
  G.teams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0;t.poGi=0;t.streak=0;t._wsMax=0; });
  G.aaaTeams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0;t.poGi=0; });
  Object.values(G.players).forEach(p=>{ if(p.injury) delete p.injury; if(p._tired) delete p._tired; if(p._hitStreak) delete p._hitStreak; if(p._splits) delete p._splits; if(p._monthly) delete p._monthly; if(p._monthSnap) delete p._monthSnap; });   // offseason heals everyone; streaks/splits/monthly reset (career best kept)
  G._curMonth=null;
  (G.collegeTeams||[]).forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0;t.poGi=0; });
  G.schedule = buildSchedule(G.teams);
  G.aaaSchedule = buildSchedule(G.aaaTeams);
  G.collegeSchedule = G.collegeTeams ? buildSchedule(G.collegeTeams, collegeGamesBetween) : null;
  (G.collegeTeams||[]).forEach(t=>autoSetLineups(t, G.players));
  padSchedules(G.schedule, G.aaaSchedule, G.collegeSchedule);
  G.day=0; G.season++; G.phase="regular";
  startBACup(G);                                // fresh BA Cup bracket for the new season
  G.playoffs=null; G.draftClass=[]; G.draftPicks=[]; G.draftPick=0; G.offStep=null;
  // roll the tradeable pick pool: the just-drafted year is consumed; keep the remaining
  // future years (preserving any trades) and add a fresh far year, so 3 drafts stay tradeable
  const keepFrom = G.season+1;
  G.picks = (G.picks||[]).filter(p=>p.season>=keepFrom);
  for(let y=keepFrom; y<=G.season+PICK_YEARS; y++){ if(!G.picks.some(p=>p.season===y)) G.picks.push(...buildPicks(y, G.teams)); }
  G.tradeDeadline = Math.round(G.schedule.length*0.58);   // recompute for the new calendar
  G.tradeOffers = [];                                      // pending offers don't carry over
  G._rumorRecent = [];                                     // reset the rumor-mill dedup ring
  (G.waivers||[]).forEach(w=>{ const p=G.players[w.id]; if(p&&p.teamId==null&&!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id); });
  G.waivers = [];                                          // anyone still on the wire clears to FA
  setOwnerMandate(G);                                      // owner sets this season's mandate from the new roster
  trimHistories(G);                                        // cap per-player history so the save stays under quota
}

/* ----------------------------- Hall of Fame UI ------------------------- */
// Inductees are career snapshots (the player has retired / been pruned), so this renders
// from the stored snapshot rather than a live player object.
function HofModal({h, onClose}){
  // headline = MLB-only career (from the stored per-season history); legacy inductees
  // without history fall back to the pooled career total. AAA/college split shows below.
  const careerLvl = L => { const t=h.isP?emptyPitStats():emptyHitStats();
    (h.history||[]).forEach(r=>{ if(r.level===L && r.stats) for(const k in t) t[k]=(t[k]||0)+(r.stats[k]||0); }); return t; };
  const hasHist = h.history && h.history.length;
  const c = hasHist ? careerLvl("MLB") : (h.career||{});
  const careerLabel = hasHist ? "MLB Career" : "Career";
  const honors=[];
  if(h.rings) honors.push(`💍 ${h.rings}× Ring${h.rings>1?"s":""}`);
  if(h.mvp) honors.push(`🏆 ${h.mvp}× MVP`);
  if(h.cy) honors.push(`🏆 ${h.cy}× Cy Young`);

  const pitCols=[["W","W"],["L","L"],["SV","SV"],["SO","K"],["BB","BB"],["HRA","HR"]];

    : `${c.AB?f3(avg(c)):".---"} / ${(c.AB+c.BB)?f3(obp(c)):".---"} / ${c.AB?f3(slg(c)):".---"}`;
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>

        {honors.length>0 && <div className="flex gap-1 flex-wrap mb-3">

        </div>}
        <div className="text-xs text-slate-400 mb-1">{careerLabel} — <span className="text-slate-300">{slash}</span></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-500 text-xs border-b border-[#1d2940]">{cols.map(([k,l])=><th key={k}>{l}</th>)}</tr></thead>

        <div className="text-[11px] text-slate-500 mt-2">Career totals as of induction · HoF score {h.score}.</div>
      </div>
    </div>
  );
}
