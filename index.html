/* ----------------------------- Roster ---------------------------------- */
function rosterOf(G, teamId){ return Object.values(G.players).filter(p=>p.teamId===teamId); }
function payroll(G, teamId){ return rosterOf(G,teamId).reduce((s,p)=>s+p.salary,0); }

function Roster({G, team, commit}){
  const [sel, setSel] = useState(null);
  const ros = rosterOf(G, team.id);
  const aaa = G.aaaTeams[team.id];
  const aaaRos = rosterOf(G, aaaIdOf(team.id)).sort((a,b)=>b.ovr-a.ovr);
  const release = (p)=>{
    const inSeason = G.phase==="regular";
    if(!confirm(inSeason?`Place ${p.name} on waivers? Other clubs may claim him; if he clears he becomes a free agent.`:`Release ${p.name}? He becomes a free agent.`)) return;
    if(inSeason){ placeOnWaivers(G, p, team.id); logNews(G,"roster",`${team.abbr} placed ${p.pos} ${p.name} (${p.ovr}) on waivers`, team.id); }
    else { movePlayerToFA(G, p); logNews(G,"roster",`${team.abbr} released ${p.pos} ${p.name} (${p.ovr})`, team.id); }
    commit(G);
  };
  const sendDown = (p)=>{                         // MLB -> AAA
    flushLevel(p);                                // bank his MLB stats before he changes level
    movePlayer(G, p, team.id); p.teamId = aaaIdOf(team.id);
    autoSetLineups(aaa, G.players); ensureLineup(team, G.players);
    logNews(G,"roster",`${team.abbr} optioned ${p.pos} ${p.name} (${p.ovr}) to AAA`, team.id);
    commit(G);
  };
  const callUp = (p)=>{                           // AAA -> MLB
    flushLevel(p);                                // bank his AAA stats before he changes level
    movePlayer(G, p, team.id);                    // movePlayer keeps level; override to MLB
    p.teamId = team.id;
    autoSetLineups(aaa, G.players);
    logNews(G,"roster",`${team.abbr} called up ${p.pos} ${p.name} (${p.ovr}) from AAA`, team.id);
    commit(G);
  };

  // hitters: starting lineup (in batting order) vs bench
  const lineupHits = team.lineup.map(id=>G.players[id]).filter(p=>p&&!p.isP);
  const benchHits = ros.filter(p=>!p.isP && !team.lineup.includes(p.id)).sort((a,b)=>b.ovr-a.ovr);
  // pitchers: rotation vs closer vs bullpen (bullpen follows the user's priority order)
  const rotation = team.rotation.map(id=>G.players[id]).filter(p=>p&&p.isP);
  const relievers = bullpenOrder(team, G.players).map(id=>G.players[id]).filter(Boolean);
  const closer = relievers[0] || null;
  const bullpen = closer ? relievers.slice(1) : relievers;
  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const aaaHits = aaaRos.filter(p=>!p.isP), aaaArms = aaaRos.filter(p=>p.isP);

  const open = p=>setSel(p);
  return (
    <div className="space-y-4">
      <Card>
        <div className="flex justify-between items-center mb-2">
          <h3 className="font-bold">Starting Lineup <span className="text-slate-500 text-sm">({lineupHits.length})</span></h3>
          <span className="text-xs text-slate-500">Payroll {money(payroll(G,team.id))} / {money(team.budget)}</span>
        </div>
        <HitterTable players={lineupHits} onRelease={release} onSend={sendDown} bo onName={open} posMap={team.pos} />
        <p className="text-xs text-slate-500 mt-2">Amber position = playing out of his natural spot (defensive penalty). Set positions in the Lineup tab.</p>
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Bench <span className="text-slate-500 text-sm">({benchHits.length})</span></h3>
        {benchHits.length
          ? <HitterTable players={benchHits} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No bench hitters.</div>}
      </Card>
      <Card>
        <h3 className="font-bold mb-2">Starting Rotation <span className="text-slate-500 text-sm">({rotation.length})</span></h3>
        <PitcherTable players={rotation} onRelease={release} onSend={sendDown} slots={rotSlots} onName={open} />
      </Card>
      {closer && <Card>
        <h3 className="font-bold mb-2">Closer</h3>
        <PitcherTable players={[closer]} onRelease={release} onSend={sendDown} slots={["CL"]} onName={open} />
        <p className="text-xs text-slate-500 mt-2">Closes save situations. Reorder the bullpen in the Lineup tab to pick your closer &amp; setup man.</p>
      </Card>}
      <Card>
        <h3 className="font-bold mb-2">Bullpen <span className="text-slate-500 text-sm">({bullpen.length})</span></h3>
        {bullpen.length
          ? <PitcherTable players={bullpen} onRelease={release} onSend={sendDown} badge="BN" onName={open} />
          : <div className="text-sm text-slate-500">No other relievers.</div>}
      </Card>

      <Card className="border-amber-700/40">
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-bold text-amber-300">AAA Affiliate — {team.nick} <span className="text-slate-500 text-sm">({aaaRos.length})</span></h3>
          <span className="text-xs text-slate-500">{aaa.w}-{aaa.l} · use ↑ up to call players to the bigs</span>
        </div>
        {aaaHits.length>0 && <div className="mb-3"><div className="text-xs text-slate-400 mb-1">Hitters</div>
          <HitterTable players={aaaHits} onCallUp={callUp} onName={open} /></div>}
        {aaaArms.length>0 && <div><div className="text-xs text-slate-400 mb-1">Pitchers</div>
          <PitcherTable players={aaaArms} onCallUp={callUp} onName={open} /></div>}
        {aaaRos.length===0 && <div className="text-sm text-slate-500">Your AAA roster is empty. Draft picks report here, or send big-leaguers down.</div>}
      </Card>

      {sel && <PlayerModal p={sel} team={teamById(G, sel.teamId)} G={G} onClose={()=>setSel(null)} />}
    </div>
  );
}
// move a player to free agency, cleaning any lineup/rotation references
function movePlayerToFA(G, p){
  const t = teamById(G, p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
}

// ---- Waiver wire -------------------------------------------------------
// A cut/surplus player goes on waivers (off all rosters) before reaching free
// agency, giving other clubs — and the user — a chance to claim him cheaply.
function placeOnWaivers(G, p, fromId){
  const t=teamById(G,p.teamId);
  if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
  p.teamId=null;
  if(!Array.isArray(G.waivers)) G.waivers=[];
  if(!G.waivers.some(w=>w.id===p.id)) G.waivers.push({id:p.id, day:G.day||0, season:G.season, fromId});
  G.freeAgents=(G.freeAgents||[]).filter(id=>id!==p.id);
}
// AI clubs (worst record = first priority) claim useful waived players they can
// fit; players unclaimed after the window clear to free agency. The user gets a
// 2-day head start to claim from the Free Agency tab before AI can.
function processWaivers(G){
  if(!Array.isArray(G.waivers) || !G.waivers.length) return;
  const order=[...G.teams].sort((a,b)=>pct(a)-pct(b));   // worst record claims first
  const remaining=[];
  G.waivers.forEach(w=>{
    const p=G.players[w.id];
    if(!p || p.teamId!=null) return;                      // claimed/gone already
    const age=(G.day||0)-w.day;
    if(age<2){ remaining.push(w); return; }               // user's head-start window
    let claimed=null;
    for(const t of order){
      if(t.id===G.userTeamId || t.id===w.fromId) continue;
      if(rosterOf(G,t.id).length>=ROSTER_CAP) continue;
      if(p.salary > t.budget-payroll(G,t.id)) continue;
      if(p.ovr<58) continue;                              // only claim useful arms/bats
      claimed=t; break;
    }
    if(claimed){
      p.teamId=claimed.id; autoSetLineups(claimed,G.players);
      logNews(G,"roster",`${claimed.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, claimed.id);
    } else if(age>=4){
      if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);  // cleared waivers → FA
    } else remaining.push(w);
  });
  G.waivers=remaining;
}
// occasional in-season churn: a deep AI roster waives a low-value spare part,
// so the waiver wire has something on it for the user to browse/claim.
function maybeAIWaive(G){
  if(!chance(0.04)) return;
  const t=pick(G.teams.filter(x=>x.id!==G.userTeamId));
  const ros=rosterOf(G,t.id);
  if(ros.length<=27) return;
  const cand=ros.filter(p=>!t.lineup.includes(p.id) && !t.rotation.includes(p.id))
    .sort((a,b)=>playerValue(a)-playerValue(b))[0];
  if(cand && cand.ovr<=66){
    placeOnWaivers(G,cand,t.id); ensureLineup(t,G.players);
    logNews(G,"roster",`${t.abbr} waived ${cand.pos} ${cand.name} (${cand.ovr})`, t.id);
  }
}

// small per-season award/ring chips for the year-by-year table (and elsewhere)
function honorBadges(season, accolades, ringSeasons){
  const out=[], seen=new Set();   // dedup identical awards within a season (e.g. double All-Star pick)
  (accolades||[]).filter(x=>x.season===season).forEach(x=>{
    if(seen.has(x.award)) return; seen.add(x.award);
    if(x.award==="MVP") out.push(["MVP","bg-amber-500/25 text-amber-300 border-amber-500/40"]);
    else if(x.award==="Cy Young") out.push(["CY","bg-violet-500/25 text-violet-300 border-violet-500/40"]);
    else if(x.award==="All-Star") out.push(["AS","bg-sky-500/25 text-sky-300 border-sky-500/40"]);
  });
  if((ringSeasons||[]).includes(season)) out.push(["💍","bg-yellow-500/15 text-yellow-200 border-yellow-500/30"]);
  return out;
}
// Year-by-year stat table with per-season honors — shared by PlayerModal and HofModal.
// `postStats` (career playoff totals) and `cupStats` (career BA Cup totals, MLB+AAA combined)
// render as single collective rows under the yearly lines.
function YearByYear({history, isP, accolades, ringSeasons, postStats, cupStats}){
  postStats = postStats||{};
  const specials = [
    ["MLB Playoffs", postStats.MLB, "PO", "text-sky-300 font-semibold"],
    ["AAA Playoffs", postStats.AAA, "PO", "text-amber-400 font-semibold"],
    ["College Playoffs", postStats.COL, "PO", "text-violet-300 font-semibold"],
    ["BA Cup", cupStats, "CUP", "text-yellow-300 font-semibold"],
  ];
  const anySpecial = specials.some(([,st])=>st && (isP?(st.OUT>0||st.G>0):(st.PA>0||st.G>0)));
  if((!history || !history.length) && !anySpecial) return null;
  history = history||[];
  const statCells = st => isP
    ? [`${st.W||0}-${st.L||0}`, st.OUT?f1(ip(st)):"0.0", st.OUT?f2(era(st)):"—", st.SO||0, st.SV||0, st.OUT?f2(whip(st)):"—"]
    : [st.G||0, st.HR||0, st.RBI||0, st.SB||0, st.AB?f3(avg(st)):"—", st.AB?f3(ops(st)):"—"];
  const hasPlay = st => st && (isP? (st.OUT>0||st.G>0) : (st.PA>0||st.G>0));
  const specialRow = (label, st, tag, cls, first) => hasPlay(st) ? (
    <tr key={label} className={first?"border-t-2 border-[#2a3a55]":"border-b border-[#15203a]"}>
      <td className="text-left py-1 font-semibold text-slate-200">{label}</td>
      <td></td>
      <td className="text-center"><span className={cls}>{tag}</span></td>
      <td className="text-left text-slate-500">career</td><td className="text-center">—</td><td className="text-center">—</td>
      {statCells(st).map((v,j)=><td key={j} className="text-center">{v}</td>)}
      <td className="text-center text-slate-600">—</td>
    </tr>
  ) : null;
  return (

/* ----------------------------- Lineup editor --------------------------- */
// Put a player at a defensive position, keeping the lineup valid and positions
// glued to players. If he's already batting, swap defensive spots with whoever
// holds the target slot; if he's on the bench, he takes over that fielder's
// batting-order slot (the displaced man goes to the bench).
function placeAtPosition(team, players, playerId, position){
  const ALL = FIELD_POS.concat(["DH"]);
  if(!ALL.includes(position)) return;
  const lineup = (team.lineup||[]).slice();
  const pos = {...(team.pos||{})};
  const occupant = lineup.find(id=>id!==playerId && pos[id]===position);
  if(lineup.includes(playerId)){
    if(occupant!=null) pos[occupant]=pos[playerId];   // swap the two players' positions
    pos[playerId]=position;
  } else {
    if(occupant!=null){ lineup[lineup.indexOf(occupant)]=playerId; delete pos[occupant]; }
    else {
      const orphan = lineup.findIndex(id=>!ALL.includes(pos[id]));
      if(orphan>=0){ delete pos[lineup[orphan]]; lineup[orphan]=playerId; }
      else if(lineup.length<9) lineup.push(playerId);
      else { delete pos[lineup[8]]; lineup[8]=playerId; }
    }
    pos[playerId]=position;
  }
  team.lineup=lineup; team.pos=pos;
}
// pixel-ish coordinates (% of the field box) for each spot on the diamond
const FIELD_COORD = { CF:[50,11], LF:[20,26], RF:[80,26], SS:[37,45], "2B":[63,45],
  "3B":[24,64], "1B":[76,64], P:[50,63], C:[50,87] };

function LineupEditor({G, commit, tShow}){
  const team = G.teams[G.userTeamId];
  const ros = rosterOf(G, team.id);
  const hitters = ros.filter(p=>!p.isP);
  const allPitchers = ros.filter(p=>p.isP).sort((a,b)=>b.ovr-a.ovr); // any arm can be a starter
  const penIds = bullpenOrder(team, G.players);                       // live bullpen priority
  const move = (arr, i, dir)=>{ const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; commit(G); };
  const moveBull = (i, dir)=>{ const arr=penIds.slice(); const j=i+dir; if(j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; team.bullpen=arr; commit(G); };
  const setRot = (slot, newId)=>{
    const existing = team.rotation.indexOf(Number(newId));
    const cur = team.rotation[slot];
    if(existing>=0) team.rotation[existing]=cur;
    team.rotation[slot]=Number(newId);
    commit(G);
  };
  const [picked, setPicked] = useState(null);   // player "in hand" (click or drag)
  const place = (pid, position)=>{ if(pid==null) return; placeAtPosition(team, G.players, Number(pid), position); setPicked(null); commit(G); };
  const clickSlot = (position, id)=>{ if(picked!=null) place(picked, position); else if(id!=null) setPicked(id); };
  const clickPlayer = id=>setPicked(picked===id?null:id);
  const onDragStart = (e,id)=>{ e.dataTransfer.setData("text/plain", String(id)); e.dataTransfer.effectAllowed="move"; setPicked(id); };
  const onDropPos = (e,position)=>{ e.preventDefault(); const id=e.dataTransfer.getData("text/plain"); place(id, position); };
  const allow = e=>e.preventDefault();

  const ALLPOS = FIELD_POS.concat(["DH"]);
  const assignedCounts = {}; team.lineup.forEach(id=>{ const a=(team.pos||{})[id]; if(a) assignedCounts[a]=(assignedCounts[a]||0)+1; });
  const missing = ALLPOS.filter(x=>!assignedCounts[x]);
  const dupes = ALLPOS.filter(x=>assignedCounts[x]>1);
  const valid = missing.length===0 && dupes.length===0;
  const benchHitters = hitters.filter(h=>!team.lineup.includes(h.id));
  const todayStarter = G.players[(team.rotation||[])[(team.w+team.l)%Math.max(1,(team.rotation||[]).length)]];

  // a player chip used on the field, the DH box, and the bench
  const chip = (p, position, opts={})=>{
    const oop = p && position && position!=="DH" && position!=="P" && p.pos!==position;
    const isPicked = p && picked===p.id;
    return (
      <div
        draggable={!!p}
        onDragStart={e=>p&&onDragStart(e,p.id)}
        onClick={()=> position ? clickSlot(position, p?p.id:null) : (p&&clickPlayer(p.id))}
        onDragOver={position?allow:undefined}
        onDrop={position?(e=>onDropPos(e,position)):undefined}

        <p className="text-xs text-slate-500 mt-2">Every team carries 5 starters; each pitches every 5th game. Any arm can be slotted as a starter.</p>

      <Card>
        <h3 className="font-bold mb-2">Bullpen Priority</h3>
        <div className="space-y-1">

// Read-only roster popover for any club — opened by clicking a team in the standings.
function TeamRosterModal({G, team, onClose}){
  const [sel,setSel]=useState(null);
  const ros = rosterOf(G, team.id);
  const lineupHits = (team.lineup||[]).map(id=>G.players[id]).filter(p=>p&&!p.isP);
  const benchHits = ros.filter(p=>!p.isP && !(team.lineup||[]).includes(p.id)).sort((a,b)=>b.ovr-a.ovr);
  const rotation = (team.rotation||[]).map(id=>G.players[id]).filter(p=>p&&p.isP);
  const relievers = bullpenOrder(team, G.players).map(id=>G.players[id]).filter(Boolean);
  const closer = relievers[0]||null;
  const bullpen = closer?relievers.slice(1):relievers;
  const rotSlots = rotation.map((_,i)=>"SP"+(i+1));
  const open = p=>setSel(p);
  const section = (title, body)=><div><div className="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wide">{title}</div>{body}</div>;
  return (<>
    <div className="fixed inset-0 z-40 bg-black/60 flex items-start justify-center p-4 overflow-y-auto" onClick={onClose}>
      <div className="bg-[#0d1526] border border-[#1d2940] rounded-xl p-4 w-full max-w-2xl my-8 space-y-3" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between">
          <div>
            <div className="font-black text-lg">{team.city} {team.nick}{team.aaa?" (AAA)":team.college?" (College)":""}</div>
            <div className="text-xs text-slate-400">{team.w}-{team.l} · {team.league} {team.division}{team.college?" · amateur":team.budget!=null?` · Payroll ${money(payroll(G,team.id))}/${money(team.budget)}`:""}</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none px-2">×</button>
        </div>
        {section("Starting Lineup", <HitterTable players={lineupHits} bo onName={open} posMap={team.pos} />)}
        {section("Bench", benchHits.length?<HitterTable players={benchHits} badge="BN" onName={open}/>:<div className="text-sm text-slate-500">—</div>)}
        {section("Rotation", <PitcherTable players={rotation} slots={rotSlots} onName={open} />)}
        {closer && section("Closer", <PitcherTable players={[closer]} slots={["CL"]} onName={open} />)}
        {section("Bullpen", bullpen.length?<PitcherTable players={bullpen} badge="BN" onName={open}/>:<div className="text-sm text-slate-500">—</div>)}
      </div>
    </div>
    {sel && <PlayerModal p={sel} team={teamById(G, sel.teamId)} G={G} onClose={()=>setSel(null)} />}
  </>);
}

function Standings({G}){
  const [selTeam, setSelTeam] = useState(null);
  const byDiv = standings(G.teams);
  const order = ["Empire East","Empire Central","Empire West","Pioneer East","Pioneer Central","Pioneer West"];
  const teamCell = t => (
    <button onClick={()=>setSelTeam(t)} className="text-left hover:text-emerald-300 hover:underline">{t.city} {t.nick}</button>
  );
  // wild-card race for a league: everyone who isn't leading their division, best record first.
  // The top 3 take the wild-card seeds (this league grants 3); a line marks the playoff cut.
  const wildCardRace = league => {
    const lt = G.teams.filter(t=>t.league===league);
    const byD={}; lt.forEach(t=>(byD[t.division]=byD[t.division]||[]).push(t));
    const winners=new Set();
    Object.values(byD).forEach(arr=>{ arr.sort((a,b)=>pct(b)-pct(a)); winners.add(arr[0].id); });
    return lt.filter(t=>!winners.has(t.id)).sort((a,b)=>pct(b)-pct(a));
  };
  const WILD = 2;   // wild-card spots per league (the two play-in teams)
  return (
    <div className="space-y-5">
      <div className="grid md:grid-cols-2 gap-4">
        {order.map(k=>(
          <Card key={k}>
            <h3 className="font-bold mb-2">{k}</h3>
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>STRK</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map((t,i)=>{
                  const lead=byDiv[k][0];
                  const gb=i===0?"—":(((lead.w-t.w)+(t.l-lead.l))/2).toFixed(1);
                  const sk=t.streak||0, skTxt=sk===0?"—":(sk>0?"W"+sk:"L"+(-sk));
                  return (
                    <tr key={t.id} className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")}>
                      <td className="text-left py-1">{i===0&&<span className="text-amber-400 mr-1" title="division leader">★</span>}{teamCell(t)}</td>
                      <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                      <td className="text-center">{f3(pct(t))}</td><td className="text-center">{gb}</td>
                      <td className={"text-center text-xs "+(sk>=3?"text-emerald-400":sk<=-3?"text-red-400":"text-slate-400")}>{skTxt}</td>
                      <td className={"text-center "+((t.rs-t.ra)>=0?"text-emerald-400":"text-red-400")}>{t.rs-t.ra>=0?"+":""}{t.rs-t.ra}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        ))}
      </div>

      {/* Wild Card races — one per league */}
      <div className="grid md:grid-cols-2 gap-4">
        {["Empire","Pioneer"].map(league=>{
          const race = wildCardRace(league);
          const cut = race[WILD-1];   // last team currently holding a wild-card spot
          return (
            <Card key={league}>
              <h3 className="font-bold mb-1">Wild Card — <span className="text-sky-300">{league} League</span></h3>
              <p className="text-[11px] text-slate-500 mb-2">Top {WILD} non-division-leaders grab the wild cards and meet in a 1-game play-in. GB is games behind the final wild-card spot.</p>
              <table className="w-full text-sm tnum">
                <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
                <tbody>
                  {race.slice(0,7).map((t,i)=>{
                    const inWC = i<WILD;
                    const gbNum = cut? (((cut.w-t.w)+(t.l-cut.l))/2) : 0;
                    const gb = i===WILD-1 ? "—" : (gbNum<=0 ? "+"+(-gbNum).toFixed(1) : gbNum.toFixed(1));
                    return (<React.Fragment key={t.id}>
                      <tr className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")+(inWC?" ":" text-slate-400")}>
                        <td className="text-left py-1">
                          {inWC && <span className="text-emerald-400 mr-1" title="in wild-card position">●</span>}
                          {teamCell(t)} <span className="text-slate-600 text-xs">{t.abbr}</span>
                        </td>
                        <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                        <td className="text-center">{f3(pct(t))}</td>
                        <td className={"text-center "+(inWC?"text-emerald-400":"text-slate-500")}>{gb}</td>
                      </tr>
                      {i===WILD-1 && <tr><td colSpan={5} className="border-t-2 border-dashed border-red-700/50 text-[10px] text-red-400/70 text-center py-0.5">playoff cut line</td></tr>}
                    </React.Fragment>);
                  })}
                </tbody>
              </table>
            </Card>
          );
        })}
      </div>

      {selTeam && <TeamRosterModal G={G} team={selTeam} onClose={()=>setSelTeam(null)} />}
    </div>
  );
}

// Scouting grade: ceiling matters most, then current ability, then youth (more
// time to develop = more valuable as a prospect).
function prospectGrade(p){ return p.pot*1.0 + p.ovr*0.45 + Math.max(0,24-p.age)*1.4; }
const prospectETA = p => p.ovr>=70?"ready":p.ovr>=63?"1 yr":p.ovr>=55?"2 yr":"3+ yr";
function AAALeague({G}){
  const aaaUserId = aaaIdOf(G.userTeamId);
  const byDiv = standings(G.aaaTeams);
  const order = ["Empire East","Empire Central","Empire West","Pioneer East","Pioneer Central","Pioneer West"];
  // league-wide prospect rankings: AAA players + young MLB rookies, by scouting grade
  const prospects = Object.values(G.players)
    .filter(p=>p.teamId!=null && (isAAAId(p.teamId) || p.age<=22))
    .sort((a,b)=>prospectGrade(b)-prospectGrade(a)).slice(0,30);
  const orgAbbr = p => { const id=isAAAId(p.teamId)?parentIdOf(p.teamId):p.teamId; return G.teams[id]?G.teams[id].abbr:"—"; };
  const [selTeam,setSelTeam]=useState(null);
  const [view,setView]=useState("Standings");
  // AAA leader pools — AAA-ONLY line per player (so a called-up player's MLB stats don't count here)
  const aaaPool=Object.values(G.players).filter(p=>!isCollegeId(p.teamId));
  const ml=new Map(); aaaPool.forEach(p=>ml.set(p.id, levelStats(p,"AAA")));
  const S=p=>ml.get(p.id)||p.stats;
  const gpMax=Math.max(1,...G.aaaTeams.map(t=>t.w+t.l));
  const hitters=aaaPool.filter(p=>!p.isP && S(p).PA>=Math.max(10,round(gpMax*2.2)));
  const pitchers=aaaPool.filter(p=>p.isP && S(p).OUT>=Math.max(15,round(gpMax*1.2)));
  const warCtx=leagueWarCtx(G,"AAA");
  const tn=id=>teamById(G,id)?teamById(G,id).abbr:"—";
  const topN=(list,key,n=5)=>[...list].sort((a,b)=>key(b)-key(a)).slice(0,n);
  const botN=(list,key,n=5)=>[...list].sort((a,b)=>key(a)-key(b)).slice(0,n);
  const board=(title,list,fmt)=>(
    <Card><h4 className="font-bold mb-2 text-sm">{title}</h4>
      <table className="w-full text-sm tnum"><tbody>
        {list.map((p,i)=>(<tr key={p.id} className="border-b border-[#15203a]">
          <td className="text-slate-500 w-5">{i+1}</td>
          <td className="text-left"><PlayerLink p={p} className="font-medium"/> <span className="text-slate-600 text-xs">{tn(p.teamId)}</span></td>
          <td className="text-right font-semibold">{fmt(p)}</td></tr>))}
        {!list.length && <tr><td className="text-slate-500 text-sm py-1">—</td></tr>}
      </tbody></table></Card>
  );
  return (
    <div className="space-y-4">
      <Card>
        <h3 className="font-bold text-amber-300 mb-1">AAA — Minor Leagues</h3>
        <p className="text-xs text-slate-400 mb-2">Every club runs a AAA affiliate that plays its own season. Click a team for its roster, or a name for full stats.</p>
        <SubTabs tabs={["Standings","Leaders","Prospects","Playoffs","Records"]} view={view} setView={setView}/>
      </Card>

      {view==="Standings" && <div className="grid md:grid-cols-2 gap-4">
        {order.map(k=>(
          <Card key={k}>
            <h3 className="font-bold mb-2">{k} <span className="text-amber-400/70 text-xs">AAA</span></h3>
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Affiliate</th><th>W</th><th>L</th><th>PCT</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map(t=>(
                  <tr key={t.id} className={"border-t border-[#15203a] hover:bg-[#13203a] "+(t.id===aaaUserId?"bg-amber-900/20 font-semibold":"")}>
                    <td className="text-left py-1"><button onClick={()=>setSelTeam(t)} className="hover:text-emerald-300 font-medium text-left">{t.city} {t.nick}</button></td>
                    <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                    <td className="text-center">{f3(pct(t))}</td>
                    <td className={"text-center "+((t.rs-t.ra)>=0?"text-emerald-400":"text-red-400")}>{t.rs-t.ra>=0?"+":""}{t.rs-t.ra}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        ))}
      </div>}

      {view==="Leaders" && <div className="grid md:grid-cols-3 gap-3">
        {board("WAR — Position", topN(hitters,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
        {board("WAR — Pitcher", topN(pitchers,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
        {board("AVG", topN(hitters,p=>avg(S(p))), p=>f3(avg(S(p))))}
        {board("Home Runs", topN(hitters,p=>S(p).HR), p=>S(p).HR)}
        {board("RBI", topN(hitters,p=>S(p).RBI), p=>S(p).RBI)}
        {board("OPS", topN(hitters,p=>ops(S(p))), p=>f3(ops(S(p))))}
        {board("Stolen Bases", topN(hitters.filter(p=>S(p).SB>0),p=>S(p).SB), p=>S(p).SB)}
        {board("Hits", topN(hitters,p=>S(p).H), p=>S(p).H)}
        {board("ERA", botN(pitchers,p=>era(S(p))), p=>f2(era(S(p))))}
        {board("Strikeouts", topN(pitchers,p=>S(p).SO), p=>S(p).SO)}
        {board("Wins", topN(pitchers,p=>S(p).W), p=>S(p).W)}
      </div>}

      {view==="Prospects" && <Card>
        <h3 className="font-bold mb-1">🔭 Top 30 Prospects (league-wide)</h3>
        <p className="text-xs text-slate-400 mb-2">Ranked by scouting grade — ceiling (POT), current ability, and how much time they have to develop. ETA estimates how soon they'll be MLB-ready.</p>
        <div className="overflow-x-auto">
        <table className="w-full text-sm tnum">
          <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="w-5">#</th><th className="text-left">Pos</th><th className="text-left">Name</th><th>Org</th><th>Lvl</th><th>Age</th><th>OVR</th><th>POT</th><th>Grade</th><th>ETA</th></tr></thead>
          <tbody>
            {prospects.map((p,i)=>(
              <tr key={p.id} className="border-b border-[#15203a] hover:bg-[#13203a]">
                <td className="text-center text-slate-500">{i+1}</td>
                <td className="text-slate-400">{p.pos}</td>
                <td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                <td className="text-center text-slate-400">{orgAbbr(p)}</td>
                <td className="text-center text-slate-500 text-xs">{isAAAId(p.teamId)?"AAA":"MLB"}</td>
                <td className="text-center">{p.age}</td>

/* ---- minor-league (AAA / college) finished-bracket display ---- */
function MinorBracket({G, br, champions, title}){
  const [boxGame,setBoxGame]=useState(null);
  if(!br || !br.leagues) return null;
  const tn = id => { const t=teamById(G,id); return t?t.abbr:"?"; };
  const tfull = id => { const t=teamById(G,id); return t?t.name.replace(" (AAA)",""):"?"; };
  const Series = ({s, label})=>{
    if(!s) return null;
    const hiW=s.winner===s.hi;
    return <div className="py-0.5">
      <div className="flex items-center gap-2 text-sm">
        <span className="text-slate-500 text-[10px] w-10 shrink-0">{label||""}</span>
        <span className={"w-12 text-right "+(hiW?"font-bold text-emerald-300":"text-slate-300")}>{tn(s.hi)}</span>
        <span className="tnum text-slate-400 w-8 text-center">{s.hw}–{s.lw}</span>
        <span className={"w-12 "+(!hiW?"font-bold text-emerald-300":"text-slate-300")}>{tn(s.lo)}</span>
      </div>
      {/* clickable per-game box scores */}
      <div className="flex flex-wrap gap-1 ml-12 mt-0.5">
        {(s.games||[]).map((g,i)=> g.box
          ? <button key={i} onClick={()=>setBoxGame(g.box)} title="View box score"
              className="text-[10px] tnum px-1 rounded bg-[#13203a] text-slate-400 hover:bg-[#1c3050] hover:text-emerald-300">G{i+1} {g.hs}-{g.as}</button>
          : <span key={i} className="text-[10px] tnum px-1 text-slate-600">G{i+1} {g.hs}-{g.as}</span>)}
      </div>
    </div>;
  };
  const champ = teamById(G, br.champion);
  return (
    <Card>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
        <h3 className="font-bold">🏆 {title||""} {br.season} Playoffs</h3>
        {champ && <span className="text-sm font-semibold text-amber-300">Champion: {tfull(br.champion)}</span>}
      </div>
      <div className="grid sm:grid-cols-2 gap-4">
        {br.leagues.map(lg=>(
          <div key={lg}>
            <div className="text-xs font-semibold text-slate-400 mb-1">{lg}</div>
            <Series s={br.wc[lg]} label="WC"/>
            {(br.ds[lg]||[]).map((s,i)=><Series key={i} s={s} label={i===0?"DS":""}/>)}
            <Series s={br.cs[lg]} label="CS"/>

        ))}
      </div>
      <div className="mt-3 pt-2 border-t border-[#1d2940]"><Series s={br.final} label="FINAL"/></div>
      <div className="text-[11px] text-slate-500 mt-1">Tap a game (G1, G2…) to open its box score.</div>
      {champions && champions.length>1 && <div className="text-xs text-slate-500 mt-2">Past champions: {champions.slice(-8).reverse().map(c=>`${c.season} ${tn(c.id)}`).join(" · ")}</div>}
      {boxGame && <BoxScore G={G} box={boxGame} onClose={()=>setBoxGame(null)} />}
    </Card>
  );
}

// Champions + single-season + career bests for a secondary league (its own "Hall of Fame").
function MinorRecords({G, store, champions, label}){
  const tfull=id=>{const t=teamById(G,id);return t?t.name.replace(" (AAA)",""):"?";};
  const S=store||{}, season=S.season||{}, career=S.career||{};
  const HIT=[["HR","Home Runs"],["RBI","RBI"],["H","Hits"],["R","Runs"],["SB","Stolen Bases"],["AVG","Batting Avg"]];
  const PIT=[["pW","Wins"],["pK","Strikeouts"],["pSV","Saves"],["ERA","Lowest ERA"]];
  const CAREER=[["cHR","Home Runs"],["cH","Hits"],["cRBI","RBI"],["cSB","Stolen Bases"],["cK","Strikeouts"],["cW","Wins"],["cSV","Saves"]];
  const fmt=(k,v)=>k==="AVG"?f3(v):k==="ERA"?f2(v):v;
  const rows=(defs,recs)=>defs.filter(([k])=>recs[k]).map(([k,lbl])=>{const r=recs[k];return (
    <div key={k} className="flex items-center gap-2 px-2 py-1 rounded bg-[#13203a] text-sm">
      <span className="text-slate-400 text-xs flex-1">{lbl}</span>
      <span className="font-bold tnum text-amber-300">{fmt(k,r.value)}</span>
      <span className="text-slate-500 text-xs truncate max-w-[140px]">{r.holder}{r.team?` (${r.team})`:""} '{String(r.season).slice(-2)}</span>
    </div>);});
  return (
   <div className="space-y-4">
     <Card>
       <h3 className="font-bold mb-2">🏆 {label} Champions</h3>
       {(champions&&champions.length)
         ? <div className="grid sm:grid-cols-2 gap-1">{champions.slice().reverse().map(c=>(
             <div key={c.season} className="flex items-center gap-2 px-2 py-1 rounded bg-[#13203a] text-sm">
               <span className="text-slate-500 tnum w-12">{c.season}</span><span className="text-amber-300">🏆</span>
               <span className="flex-1 font-semibold">{tfull(c.id)}</span></div>))}</div>
         : <div className="text-sm text-slate-500">No champions yet — finish a season to crown one.</div>}
     </Card>
     <Card>
       <h3 className="font-bold mb-2">📊 Single-Season Bests</h3>
       {(HIT.some(([k])=>season[k])||PIT.some(([k])=>season[k]))
         ? <div className="grid sm:grid-cols-2 gap-1">{rows(HIT,season)}{rows(PIT,season)}</div>
         : <div className="text-sm text-slate-500">Set after the first completed season.</div>}
     </Card>
     <Card>
       <h3 className="font-bold mb-2">🎖️ Career Bests <span className="text-slate-500 text-sm font-normal">— all-time {label}</span></h3>
       {CAREER.some(([k])=>career[k])
         ? <div className="grid sm:grid-cols-2 gap-1">{rows(CAREER,career)}</div>
         : <div className="text-sm text-slate-500">Accrues over multiple seasons.</div>}
     </Card>
   </div>
  );
}

/* ----------------------------- Leaders --------------------------------- */
function Leaders({G}){
  // MLB leaderboards use each player's MLB-ONLY line (a mid-season call-up's AAA stats
  // don't count here), so anyone with MLB time qualifies regardless of where he is now.
  const pool = Object.values(G.players).filter(p=>!isCollegeId(p.teamId));
  const ml = new Map(); pool.forEach(p=> ml.set(p.id, levelStats(p,"MLB")));
  const S = p => ml.get(p.id) || p.stats;
  // scale qualifier thresholds with games played so boards read right all season
  const gpMax = Math.max(1, ...G.teams.map(t=>t.w+t.l));
  const paQual = Math.max(20, round(gpMax*2.5));
  const outQual = Math.max(30, round(gpMax*1.5));
  const hitters = pool.filter(p=>!p.isP && S(p).PA>=paQual);
  const pitchers = pool.filter(p=>p.isP && S(p).OUT>=outQual);
  const all = pool;
  const tn = id => G.teams[id]?G.teams[id].abbr:(isAAAId(id)?(G.teams[parentIdOf(id)]?G.teams[parentIdOf(id)].abbr+" (AAA)":"AAA"):"FA");
  const board = (title, list, fmt) => (
    <Card><h3 className="font-bold mb-2">{title}</h3>
      <table className="w-full text-sm tnum"><tbody>
        {list.map((p,i)=>(
          <tr key={p.id} className="border-b border-[#15203a]">
            <td className="text-slate-500 w-5">{i+1}</td>
            <td className="text-left"><PlayerLink p={p} className="font-medium"/> <span className="text-slate-600 text-xs">{tn(p.teamId)}</span></td>
            <td className="text-right font-semibold">{fmt(p)}</td>
          </tr>
        ))}
      </tbody></table>
    </Card>
  );
  const top = (list, key, n=10) => [...list].sort((a,b)=>key(b)-key(a)).slice(0,n);
  const bot = (list, key, n=10) => [...list].sort((a,b)=>key(a)-key(b)).slice(0,n);
  const warCtx = leagueWarCtx(G,"MLB");
  return (
    <div className="grid md:grid-cols-3 gap-4">
      {board("WAR — Position", top(hitters,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
      {board("WAR — Pitcher", top(pitchers,p=>warOf(p,warCtx,S(p))), p=>f1w(warOf(p,warCtx,S(p))))}
      {board("AVG", top(hitters,p=>avg(S(p))), p=>f3(avg(S(p))))}
      {board("Home Runs", top(hitters,p=>S(p).HR), p=>S(p).HR)}
      {board("RBI", top(hitters,p=>S(p).RBI), p=>S(p).RBI)}
      {board("OBP", top(hitters,p=>obp(S(p))), p=>f3(obp(S(p))))}
      {board("SLG", top(hitters,p=>slg(S(p))), p=>f3(slg(S(p))))}
      {board("OPS", top(hitters,p=>ops(S(p))), p=>f3(ops(S(p))))}
      {board("Hits", top(hitters,p=>S(p).H), p=>S(p).H)}
      {board("Runs", top(hitters,p=>S(p).R), p=>S(p).R)}
      {board("Walks", top(hitters,p=>S(p).BB), p=>S(p).BB)}
      {board("Stolen Bases", top(hitters.filter(p=>S(p).SB>0),p=>S(p).SB), p=>S(p).SB)}
      {board("ERA", bot(pitchers,p=>era(S(p))), p=>f2(era(S(p))))}
      {board("Innings", top(pitchers,p=>S(p).OUT), p=>f1(ip(S(p))))}
      {board("Strikeouts", top(pitchers,p=>S(p).SO), p=>S(p).SO)}
      {board("K − BB", top(pitchers,p=>S(p).SO-S(p).BB), p=>S(p).SO-S(p).BB)}
      {board("Wins", top(pitchers,p=>S(p).W), p=>S(p).W)}
      {board("Quality Starts", top(pitchers.filter(p=>S(p).QS>0),p=>S(p).QS), p=>S(p).QS)}
      {board("Saves", top(pitchers.filter(p=>S(p).SV>0),p=>S(p).SV), p=>S(p).SV)}
      {board("Holds", top(all.filter(p=>p.isP&&S(p).HLD>0),p=>S(p).HLD), p=>S(p).HLD)}
      {board("WHIP", bot(pitchers,p=>whip(S(p))), p=>f2(whip(S(p))))}
      {board("Doubles", top(hitters,p=>S(p)._2B||0), p=>S(p)._2B||0)}
      {board("Triples", top(hitters.filter(p=>(S(p)._3B||0)>0),p=>S(p)._3B||0), p=>S(p)._3B||0)}
      {board("ISO", top(hitters,p=>iso(S(p))), p=>f3(iso(S(p))))}
      {board("wOBA", top(hitters,p=>woba(S(p))), p=>f3(woba(S(p))))}
      {board("BABIP", top(hitters,p=>babip(S(p))), p=>f3(babip(S(p))))}
      {board("FIP", bot(pitchers,p=>fip(S(p))), p=>f2(fip(S(p))))}
      {board("K/9", top(pitchers,p=>kp9(S(p))), p=>f2(kp9(S(p))))}
      {board("BB/9", bot(pitchers,p=>bb9(S(p))), p=>f2(bb9(S(p))))}
      {board("K/BB", top(pitchers,p=>kbb(S(p))), p=>f2(kbb(S(p))))}
    </div>
  );
}

/* ----------------------------- Schedule -------------------------------- */
// Full game box score: inning-by-inning line score + batting & pitching lines for both clubs.
// `box` is the compact shape saved by simGame (player ids + ints); names/teams resolve here.
function BoxScore({G, box, onClose}){
  if(!box) return null;
  const homeT=teamById(G,box.h), awayT=teamById(G,box.a);
  const nm = pid => { const p=G.players[pid]; return p?p.name:"—"; };
  const pos = pid => { const p=G.players[pid]; return p?p.pos:""; };
  const ip = outs => `${Math.floor(outs/3)}.${outs%3}`;
  const innings = Math.max((box.ls.h||[]).length, (box.ls.a||[]).length);
  const sumH = lines => lines.reduce((s,l)=>s+(l[3]||0),0);   // H is col index 3
  const dec = box.dec||{};
  const winSide = box.hs>box.as ? "h" : "a";

  const LineScore = ()=>(
    <div className="overflow-x-auto">
      <table className="text-sm tnum border-collapse">
        <thead><tr className="text-slate-400 text-xs">
          <th className="text-left pr-3 font-semibold"> </th>
          {Array.from({length:innings}).map((_,i)=><th key={i} className="px-1.5 w-6 text-center">{i+1}</th>)}
          <th className="px-2 text-center font-bold text-slate-200 border-l border-[#1d2940]">R</th>
          <th className="px-2 text-center font-bold text-slate-200">H</th>
        </tr></thead>
        <tbody>
          {[["a",awayT,box.ls.a,box.as,sumH(box.ab)],["h",homeT,box.ls.h,box.hs,sumH(box.hb)]].map(([side,t,ls,r,h])=>(
            <tr key={side} className={"border-t border-[#15203a] "+(winSide===side?"font-bold text-emerald-300":"text-slate-300")}>
              <td className="text-left pr-3 whitespace-nowrap">{t?t.abbr:"?"} {t?t.nick:""}</td>
              {Array.from({length:innings}).map((_,i)=>{ const v=(ls||[])[i];
                return <td key={i} className="px-1.5 text-center text-slate-300">{v==null?"–":v}</td>; })}
              <td className="px-2 text-center border-l border-[#1d2940]">{r}</td>
              <td className="px-2 text-center text-slate-400">{h}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  const decTag = pid => dec.w===pid?<span className="text-emerald-400 font-bold"> (W)</span>
    : dec.l===pid?<span className="text-red-400 font-bold"> (L)</span>
    : dec.s===pid?<span className="text-sky-300 font-bold"> (S)</span> : null;

  const Batting = ({t, lines})=>{
    const tot=lines.reduce((a,l)=>[0,a[1]+l[1],a[2]+l[2],a[3]+l[3],a[4]+l[4],a[5]+l[5],a[6]+l[6],a[7]+l[7]],[0,0,0,0,0,0,0,0]);
    return (
      <div>
        <div className="text-xs font-bold text-slate-300 mb-1">{t?`${t.abbr} ${t.nick}`:"?"} — Batting</div>
        <table className="w-full text-sm tnum">
          <thead><tr className="text-slate-500 text-[11px] border-b border-[#1d2940]">
            <th className="text-left font-medium">Batter</th><th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>SO</th><th>HR</th></tr></thead>
          <tbody>
            {lines.map(l=>(

function Schedule({G}){
  const [boxGame,setBoxGame]=useState(null);
  const uid2=G.userTeamId;
  const rivalId=G.teams[uid2].rivalId;
  const games=[];
  G.schedule.forEach((day,di)=>{ const g=day.find(x=>x.home===uid2||x.away===uid2); if(g) games.push({di,g}); });
  const offDays = G.schedule.length - games.length;
  return (
    <Card>
      <div className="flex items-baseline justify-between mb-2">
        <h3 className="font-bold">Season Schedule — {G.teams[uid2].name}</h3>
        <span className="text-xs text-slate-500">{games.length} games · {offDays} off days · <span className="text-rose-300">⚔ rival</span></span>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-1 text-sm">
        {games.map(({di,g})=>{
          const home=g.home===uid2; const opp=G.teams[home?g.away:g.home];
          const win=g.played?((home?g.hs>g.as:g.as>g.hs)?"W":"L"):null;
          const isRival = opp.id===rivalId;
          const canBox = g.played && g.box;
          return (
            <div key={di} onClick={canBox?()=>setBoxGame(g.box):undefined}
              title={canBox?"View box score":undefined}
              className={"flex items-center gap-2 px-2 py-1 rounded "+(canBox?"cursor-pointer hover:ring-1 hover:ring-emerald-600/60 ":"")+(di===G.day?"bg-emerald-900/40":isRival?"bg-rose-950/40 border border-rose-900/40":"bg-[#13203a]")}>
              <span className="text-slate-500 text-xs w-8">{di+1}</span>

              <span className="flex-1 truncate">{isRival&&<span className="text-rose-400">⚔ </span>}{opp.abbr} {opp.nick}</span>

/* ----------------------------- Finances -------------------------------- */
// terms a player will re-sign for. winning teams get a hometown discount; losing
// teams pay a premium, and a star on a losing club would rather test free agency.
function extensionTerms(G, p){
  // for AAA players, resolve to the parent MLB team for win% discount logic
  const team = isAAAId(p.teamId) ? G.teams[parentIdOf(p.teamId)] : G.teams[p.teamId];
  // until there's a real sample of games, treat the club as neutral (.500)
  const wpct = (team && (team.w+team.l)>=20) ? pct(team) : 0.5;
  const market = salaryFor(p);
  const factor = clamp(1.18 - wpct*0.55, 0.80, 1.20);
  const salary = clamp(round(market*factor*10)/10, 0.7, 60);
  const years = p.age>=33 ? 2 : p.age>=30 ? 3 : 4;
  const refuses = wpct < 0.40 && p.ovr >= 75;
  return { market, salary, years, factor, refuses, discountPct: round((1-factor)*100) };
}

/* ---- Contract negotiation modal (sign a FA / extend your own player) ---- */
const DEFAULT_NEED = { HR:25, RBI:80, H:150, R:80, SB:25, AVG:290, W:14, SO:180, SV:30, QS:18, IP:180 };
function ContractModal({G, p, mode, capSpace, factor, refuses, onClose, onSign, tShow, bestOffer, userSit}){
  const ask=contractAsk(p);
  const [years,setYears]=useState(ask.years);
  const [aav,setAav]=useState(Math.max(0.5, round(ask.fairAAV*(factor||1)*10)/10));
  const [incs,setIncs]=useState([]);
  const isP=p.isP;
  const statOpts=Object.entries(STAT_INCENTIVES).filter(([k,v])=>v.hit!==isP);
  const addInc=()=>{ const d=statOpts[0]; setIncs([...incs,{stat:d[0], need:DEFAULT_NEED[d[0]]||10, amount:1.0}]); };
  const updInc=(i,k,v)=>{ const a=incs.slice(); a[i]={...a[i],[k]:v}; setIncs(a); };
  const delInc=(i)=>setIncs(incs.filter((_,j)=>j!==i));
  const incTotal=incs.reduce((s,x)=>s+(+x.amount||0),0);
  const required=requiredAAV(p, years, factor);
  const neededBase=Math.max(0.5, round((required-0.5*incTotal)*10)/10);
  const capProblem = mode==="sign" && +aav>capSpace+0.001;
  // competing market offer: the player picks the best FIT, so the user must out-bid (money/
  // years, with a slight winner nudge baked into offerFit) to beat a rival's standing offer.
  const rivalTeam = bestOffer ? teamById(G, bestOffer.teamId) : null;
  const userFit = (mode==="sign" && bestOffer) ? offerFit(p, {aav:+aav, years}, userSit) : null;
  const beatsMarket = !bestOffer || (userFit >= bestOffer.fit - 0.001);
  // he signs once the offer (base + half the incentives) meets his ask, fits the cap, AND beats the market
  const accepts = !refuses && +aav>=0.5 && willSign(p, +aav, years, incTotal, factor) && !capProblem && beatsMarket;
  const inp="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm";
  const offer=()=>{
    if(refuses){ tShow&&tShow(`${p.name} wants to test free agency`); return; }
    if(capProblem){ tShow&&tShow(`Not enough cap space (base ${money(+aav)})`); return; }
    if(!willSign(p, +aav, years, incTotal, factor)){ tShow&&tShow(`${p.name} wants more — try ~${money(neededBase)}/yr base`); return; }
    if(!beatsMarket){ tShow&&tShow(`${p.name} prefers ${rivalTeam?rivalTeam.abbr:"another club"}'s offer — beat ${bestOffer.years}y · ${money(bestOffer.aav)}/yr`); return; }
    onSign(+aav, years, incs.map(x=>({stat:x.stat, need:+x.need, amount:+x.amount, label:(STAT_INCENTIVES[x.stat]||{}).label||"bonus"})));
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-lg w-full max-h-[88vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1">
            <div className="font-bold">{mode==="sign"?"Sign":"Extend"} {p.name}</div>
            <div className="text-xs text-slate-400">{p.pos} · Age {p.age} · OVR {p.ovr} · POT {p.pot} · seeks ~{money(ask.fairAAV*(factor||1))}/yr</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {refuses && <div className="text-sm text-red-300 bg-red-900/20 border border-red-800/40 rounded p-2 mb-2">He won't talk extension on a losing club — win more, or let him test free agency.</div>}
        {bestOffer && rivalTeam && <div className={"text-xs rounded p-2 mb-2 border "+(beatsMarket?"text-emerald-300 bg-emerald-900/15 border-emerald-800/40":"text-amber-300 bg-amber-900/15 border-amber-800/40")}>
          💰 Competing offer — <b>{rivalTeam.abbr}</b>: {bestOffer.years}y · {money(bestOffer.aav)}/yr. {beatsMarket?"Your offer is winning the bidding.":"He prefers their deal — raise your salary/years to win him over."}
        </div>}
        <div className="grid grid-cols-2 gap-3 mb-3">
          <label className="text-xs text-slate-400">Years
            <div className="flex items-center gap-2 mt-1">
              <button onClick={()=>setYears(Math.max(1,years-1))} className="px-2 bg-[#16213a] rounded">−</button>
              <span className="tnum font-bold text-slate-100 w-6 text-center">{years}</span>
              <button onClick={()=>setYears(Math.min(8,years+1))} className="px-2 bg-[#16213a] rounded">+</button>
            </div>
          </label>
          <label className="text-xs text-slate-400">Salary $M/yr (base)
            <input type="number" step="0.1" min="0.5" value={aav} onChange={e=>setAav(e.target.value)} className={inp+" w-full mt-1"} />
          </label>
        </div>
        <div className="text-xs text-slate-400 mb-1 flex items-center justify-between">
          <span>Performance incentives <span className="text-slate-600">(off-cap; count ½ toward his ask)</span></span>
          <button onClick={addInc} className="px-2 py-0.5 bg-[#16213a] rounded hover:bg-[#1c2c4a] text-emerald-300">+ add</button>
        </div>
        <div className="space-y-1 mb-3">
          {incs.length===0 && <div className="text-xs text-slate-600">No incentives. Add stat bonuses to sweeten the deal for less guaranteed money.</div>}
          {incs.map((x,i)=>(
            <div key={i} className="flex items-center gap-1.5 text-xs bg-[#13203a] rounded px-2 py-1">
              <span className="text-emerald-400">+{money(+x.amount||0)}</span>
              <span className="text-slate-500">if</span>
              <select value={x.stat} onChange={e=>updInc(i,"stat",e.target.value)} className={inp}>
                {statOpts.map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
              <span className="text-slate-500">≥</span>
              <input type="number" value={x.need} onChange={e=>updInc(i,"need",e.target.value)} className={inp+" w-16"} />
              <span className="text-slate-500 ml-1">$</span>
              <input type="number" step="0.1" value={x.amount} onChange={e=>updInc(i,"amount",e.target.value)} className={inp+" w-14"} />
              <button onClick={()=>delInc(i)} className="ml-auto text-red-400 hover:text-red-300">×</button>
            </div>
          ))}
        </div>
        <div className="flex items-center justify-between text-sm border-t border-[#1d2940] pt-2 mb-2">
          <div className="text-slate-400 text-xs">
            Guaranteed <b className="text-slate-200">{money((+aav||0)*years)}</b> over {years}y
            {incTotal>0 && <span> · up to <b className="text-slate-200">{money(((+aav||0)+incTotal)*years)}</b> w/ incentives</span>}
          </div>
          <div className={accepts?"text-emerald-400 font-semibold":"text-amber-400"}>
            {refuses?"Refusing":accepts?"✅ He'll sign":capProblem?"⛔ Over budget":`💬 Wants ~${money(neededBase)}/yr`}
          </div>
        </div>
        <button onClick={offer} disabled={!accepts} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold disabled:opacity-40 disabled:cursor-not-allowed">
          {mode==="sign"?"Sign Contract":"Offer Extension"}
        </button>
      </div>
    </div>
  );
}

/* ---- Restructure modal: defer current-year money to later years (+premium) ---- */
function RestructureModal({G, p, onClose, onApply, tShow}){
  const cur=(p.contract||[p.salary]).slice();
  const laterYears=cur.length-1;
  const maxMove=Math.max(0, round((cur[0]-0.5)*10)/10);
  const [move,setMove]=useState(Math.round(maxMove*5)/10);  // default ~half
  const PREMIUM=0.10;
  const mv=clamp(+move||0, 0, maxMove);
  const deferred=mv*(1+PREMIUM);
  const perLater=laterYears>0?deferred/laterYears:0;
  const sched=cur.map((v,i)=> i===0 ? round((v-mv)*10)/10 : round((v+perLater)*10)/10);
  const apply=()=>{ if(laterYears<=0){ tShow&&tShow("Need 2+ years left to restructure"); return; } if(mv<=0){ tShow&&tShow("Move some money first"); return; } onApply(sched); };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-md w-full" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1"><div className="font-bold">Restructure {p.name}</div><div className="text-xs text-slate-400">Defer current-year salary to later years (+10% premium he pockets)</div></div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {laterYears<=0 ? <div className="text-sm text-slate-400">He's in the last year of his deal — nothing to restructure.</div> : <>
          <label className="text-xs text-slate-400">Move from this year: <b className="text-slate-100">{money(mv)}</b> (max {money(maxMove)})</label>
          <input type="range" min="0" max={maxMove} step="0.1" value={mv} onChange={e=>setMove(e.target.value)} className="w-full my-2" />
          <div className="grid grid-cols-2 gap-3 text-sm mb-3">
            <div><div className="text-xs text-slate-500 mb-1">Now</div>{cur.map((v,i)=><div key={i} className="tnum">Yr{i+1}: {money(v)}</div>)}</div>
            <div><div className="text-xs text-slate-500 mb-1">After</div>{sched.map((v,i)=><div key={i} className={"tnum "+(i===0?"text-emerald-400":"text-slate-300")}>Yr{i+1}: {money(v)}</div>)}</div>
          </div>
          <div className="text-xs text-slate-400 mb-2">Frees <b className="text-emerald-400">{money(mv)}</b> in cap now · adds {money(deferred)} (incl. +{money(deferred-mv)} premium) to later years. Total +{money(deferred-mv)}.</div>
          <button onClick={apply} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold">Restructure (he agrees)</button>
        </>}
      </div>
    </div>
  );
}

function Finances({G, commit, tShow}){
  const team=G.teams[G.userTeamId];
  // MLB + AAA org — users need to see and extend AAA players too
  const ros = rosterOf(G,team.id).concat(rosterOf(G,aaaIdOf(team.id))).sort((a,b)=>b.salary-a.salary);
  const total=payroll(G,team.id);
  const space=team.budget-total;
  const [extendT,setExtendT]=useState(null);       // player being extended (ContractModal)
  const [restructT,setRestructT]=useState(null);   // player being restructured
  const extFactor=p=>extensionTerms(G,p);
  const doExtend=(p, aav, years, incs)=>{
    const spaceAfter = team.budget - (payroll(G,team.id) - p.salary) - aav;
    if(spaceAfter<0){ tShow(`Not enough budget — that's ${money(aav)}/yr`); return; }
    setContract(p, aav, years, incs);
    const it=incentivesPerYear(p);
    logNews(G,"signing",`${team.abbr} extended ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}${it?` +${money(it)}/yr inc`:""}`, team.id);
    setExtendT(null); commit(G); tShow(`✅ ${p.name} extended`);
  };
  const doRestruct=(p, sched)=>{
    p.contract=sched.slice(); p.salary=sched[0]; p.years=sched.length; p.incentive=incentivesPerYear(p);
    logNews(G,"signing",`${team.abbr} restructured ${p.name}'s deal — ${money(sched[0])} cap hit this year`, team.id);
    setRestructT(null); commit(G); tShow(`✅ Restructured ${p.name}`);
  };
  return (
    <div className="space-y-4">
      <div className="grid sm:grid-cols-3 gap-3">
        <Card><div className="text-slate-400 text-xs">BUDGET</div><div className="text-2xl font-bold tnum">{money(team.budget)}</div>{team.budgetDelta?<div className={"text-xs "+(team.budgetDelta>0?"text-emerald-400":"text-red-400")}>{team.budgetDelta>0?"▲ +":"▼ "}{team.budgetDelta} vs last yr</div>:<div className="text-xs text-slate-500">revenue grows as you win</div>}</Card>
        <Card><div className="text-slate-400 text-xs">PAYROLL</div><div className="text-2xl font-bold tnum">{money(total)}</div>{team.incentivesPaid>0&&<div className="text-xs text-amber-400">+{money(team.incentivesPaid)} incentives paid</div>}</Card>
        <Card><div className="text-slate-400 text-xs">CAP SPACE</div><div className={"text-2xl font-bold tnum "+(space>=0?"text-emerald-400":"text-red-400")}>{money(space)}</div></Card>
      </div>
      <Card>
        <div className="flex items-baseline justify-between mb-2">
          <h3 className="font-bold">Contracts</h3>
          <span className="text-xs text-slate-500">Base = cap hit. Incentives are off-cap. Extend before FA · Restructure to free cap now.</span>
        </div>
        <div className="overflow-x-auto">
        <table className="w-full text-sm tnum">
          <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Player</th><th>Pos</th><th>Lvl</th><th>Age</th><th>OVR</th><th>POT</th><th>Yrs</th><th className="text-right">This yr</th><th className="text-right">Schedule</th><th className="text-right">Inc/yr</th><th></th></tr></thead>
          <tbody>
            {ros.map(p=>{ const aaa=isAAAId(p.teamId); const t=aaa?null:extFactor(p); return (
              <tr key={p.id} className={"border-b border-[#15203a] "+(aaa?"bg-amber-950/20":"")}>
                <td className="text-left py-1"><PlayerLink p={p} className="font-medium"/></td>
                <td className="text-center text-slate-400">{p.pos}</td>
                <td className="text-center text-xs text-slate-500">{aaa?"AAA":"MLB"}</td>
                <td className="text-center">{p.age}</td><td className="text-center"><OvrPill v={p.ovr}/></td>
                <td className="text-center text-amber-300/90">{p.pot}</td>
                <td className="text-center">{p.years}</td><td className="text-right">{money(p.salary)}</td>
                <td className="text-right text-slate-500 text-xs">{(p.contract||[p.salary]).map(v=>v.toFixed(0)).join("/")}</td>
                <td className="text-right text-slate-400">{incentivesPerYear(p)?money(incentivesPerYear(p)):"—"}</td>
                <td className="text-right whitespace-nowrap">
                  {aaa
                    ? <button onClick={()=>setExtendT(p)} className="px-2 py-0.5 bg-amber-700 rounded text-xs hover:bg-amber-600">Extend</button>
                    : <>
                        {p.years<=2 && (t.refuses
                          ? <span className="text-red-400 text-xs mr-1">wants out</span>
                          : <button onClick={()=>setExtendT(p)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500 mr-1">Extend</button>)}
                        {p.years>=2 && <button onClick={()=>setRestructT(p)} className="px-2 py-0.5 bg-[#16213a] rounded text-xs hover:bg-[#1c2c4a]">Restructure</button>}
                      </>
                  }
                </td>
              </tr>
            ); })}
          </tbody>
        </table>
        </div>
        <p className="text-xs text-slate-500 mt-2">Winning clubs get a hometown discount on extensions; a star on a losing team may refuse. Restructuring pushes this year's money to later years for a 10% premium he pockets.</p>
      </Card>
      {extendT && <ContractModal G={G} p={extendT} mode="extend" capSpace={space+extendT.salary}
        factor={extFactor(extendT).factor} refuses={extFactor(extendT).refuses}
        onClose={()=>setExtendT(null)} onSign={(a,y,inc)=>doExtend(extendT,a,y,inc)} tShow={tShow} />}
      {restructT && <RestructureModal G={G} p={restructT} onClose={()=>setRestructT(null)} onApply={(s)=>doRestruct(restructT,s)} tShow={tShow} />}
    </div>
  );
}

/* ----------------------------- Trades ---------------------------------- */
function Trades({G, commit, tShow, tradeFocus, setTradeFocus}){
  const me = G.teams[G.userTeamId];
  const [otherId, setOtherId] = useState(G.teams.find(t=>t.id!==me.id).id);
  const [give, setGive] = useState([]);      // player ids
  const [get, setGet] = useState([]);
  const [givePk, setGivePk] = useState([]);  // pick ids
  const [getPk, setGetPk] = useState([]);
  const [modal, setModal] = useState(null);  // player whose stats we're viewing
  const other = G.teams[otherId];
  const reset = ()=>{ setGive([]); setGet([]); setGivePk([]); setGetPk([]); };

  // Arrive here from the Players tab's "Trade" button: pre-select that player's
  // club and drop him straight into the "acquire" list — no re-searching.
  useEffect(()=>{
    if(tradeFocus==null) return;
    const p = G.players[tradeFocus];
    if(p && p.teamId!=null){
      const orgId = isAAAId(p.teamId) ? parentIdOf(p.teamId) : p.teamId;
      if(orgId!==me.id){ setOtherId(orgId); setGive([]); setGivePk([]); setGetPk([]); setGet([p.id]); }
    }
    if(setTradeFocus) setTradeFocus(null);
  }, [tradeFocus]);

  // players: MLB roster + AAA affiliate, AAA tagged
  const orgPlayers = mlbId => rosterOf(G,mlbId).concat(rosterOf(G,aaaIdOf(mlbId))).sort((a,b)=>b.ovr-a.ovr);
  const myRos = orgPlayers(me.id), otRos = orgPlayers(other.id);
  const myPicks = (G.picks||[]).filter(pk=>pk.owner===me.id).sort((a,b)=>a.round-b.round);
  const otPicks = (G.picks||[]).filter(pk=>pk.owner===other.id).sort((a,b)=>a.round-b.round);
  const toggle=(arr,set,id)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  const giveVal = give.reduce((s,id)=>s+playerValue(G.players[id]),0) + givePk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:me.id}),0);
  const getVal  = get.reduce((s,id)=>s+playerValue(G.players[id]),0)  + getPk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:other.id}),0);

  const deadlinePassed = G.phase==="regular" && G.day>G.tradeDeadline;
  const propose=()=>{
    if(deadlinePassed){ tShow("⛔ The trade deadline has passed"); return; }
    if(!give.length && !get.length && !givePk.length && !getPk.length){ tShow("Add players or picks to the trade"); return; }
    if(getVal===0){ tShow("Select something to acquire"); return; }
    if(giveVal >= getVal*0.97){
      give.forEach(id=>movePlayer(G, G.players[id], other.id));
      get.forEach(id=>movePlayer(G, G.players[id], me.id));
      givePk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=other.id; });
      getPk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=me.id; });
      autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
      ensureLineup(me, G.players); autoSetLineups(G.aaaTeams[me.id], G.players);
      const getDesc = get.map(id=>G.players[id].name).concat(getPk.length?[`${getPk.length} pick${getPk.length>1?"s":""}`]:[]).join(", ");
      const giveDesc = give.map(id=>G.players[id].name).concat(givePk.length?[`${givePk.length} pick${givePk.length>1?"s":""}`]:[]).join(", ");
      logNews(G,"trade",`${me.abbr} acquired ${getDesc||"picks"} from ${other.abbr} for ${giveDesc||"picks"}`, me.id);
      reset(); commit(G); tShow("✅ Trade accepted!");
    } else {
      const need = (getVal*0.97 - giveVal);
      tShow(`❌ Rejected — ${other.nick} want ~${need.toFixed(0)} more value`);
    }
  };

  // a compact one-line stat summary so you can judge a player without leaving the trade
  const statLine = p => p.isP
    ? (p.stats.OUT ? `${f1(ip(p.stats))} IP · ${f2(era(p.stats))} ERA · ${p.stats.W||0}-${p.stats.L||0} · ${p.stats.SO||0}K` : "no stats yet")
    : (p.stats.AB ? `${f3(avg(p.stats))}/${f3(obp(p.stats))}/${f3(slg(p.stats))} · ${p.stats.HR||0} HR · ${p.stats.RBI||0} RBI` : "no stats yet");
  const playerBox = (title, ros, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      <div className="max-h-72 overflow-y-auto space-y-0.5">
        {ros.map(p=>(
          <div key={p.id} className={"flex items-center gap-2 px-2 py-1 rounded text-sm "+(sel.includes(p.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" className="shrink-0" checked={sel.includes(p.id)} onChange={()=>toggle(sel,set,p.id)} />
            <OvrPot p={p}/>
            <button onClick={()=>setModal(p)} className="flex-1 text-left min-w-0">
              <div className="truncate">{p.pos} {p.name} {isAAAId(p.teamId)&&<span className="text-amber-400 text-[10px] font-bold">AAA</span>} <span className="text-slate-500">ⓘ</span></div>
              <div className="text-[11px] text-slate-500 truncate">age {p.age} · {money(p.salary)} · val {playerValue(p).toFixed(0)} · {statLine(p)}</div>
            </button>
          </div>
        ))}
      </div>
    </Card>
  );
  const pickBox = (title, picks, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      {picks.length? <div className="space-y-0.5">
        {picks.map(pk=>(
          <label key={pk.id} className={"flex items-center gap-2 px-2 py-1 rounded cursor-pointer text-sm "+(sel.includes(pk.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" checked={sel.includes(pk.id)} onChange={()=>toggle(sel,set,pk.id)} />
            <span className="flex-1">{pk.season} Round {pk.round}{pk.orig!==pk.owner?` (via ${G.teams[pk.orig].abbr})`:""}</span>
            <span className="text-emerald-400 text-xs">val {pickValue(G,pk)}</span>
          </label>
        ))}
      </div> : <div className="text-xs text-slate-500">No tradeable picks.</div>}
    </Card>
  );

  return (
    <div className="space-y-4">
      {deadlinePassed && <Card className="border-amber-600/60">
        <div className="text-sm text-amber-300 font-semibold">🔒 The trade deadline (Day {G.tradeDeadline+1}) has passed.</div>
        <div className="text-xs text-slate-400 mt-0.5">No more trades until the offseason. You can still browse rosters below.</div>
      </Card>}
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Trade with:</span>
          <select value={otherId} onChange={e=>{setOtherId(Number(e.target.value));setGet([]);setGetPk([]);}} className="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm">
            {G.teams.filter(t=>t.id!==me.id).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <div className="ml-auto text-xs text-slate-400">You give <b className="text-slate-200">{giveVal.toFixed(0)}</b> · You get <b className="text-slate-200">{getVal.toFixed(0)}</b></div>
        </div>
        <div className="text-xs text-slate-500 mt-1">Pick values reflect each team's projected finish — a pick from a struggling club is worth more.</div>
      </Card>
      <div className="grid md:grid-cols-2 gap-4">
        {playerBox(`Send from ${me.nick}`, myRos, give, setGive)}
        {playerBox(`Acquire from ${other.nick}`, otRos, get, setGet)}
        {pickBox(`${me.nick} picks to send`, myPicks, givePk, setGivePk)}
        {pickBox(`${other.nick} picks to acquire`, otPicks, getPk, setGetPk)}
      </div>
      <button onClick={propose} disabled={deadlinePassed} className="px-6 py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold disabled:opacity-40 disabled:cursor-not-allowed">{deadlinePassed?"Deadline Passed":"Propose Trade"}</button>
      {modal && <PlayerModal p={modal} team={teamById(G, modal.teamId)} G={G} onClose={()=>setModal(null)} />}
    </div>
  );
}
// move a player between organizations, preserving his MLB/AAA level and cleaning old lineup refs
function movePlayer(G, p, destMlbId){
  if(!p) return;
  const wasAAA = isAAAId(p.teamId);
  const from = teamById(G, p.teamId);
  if(from){ from.lineup=from.lineup.filter(x=>x!==p.id); from.rotation=from.rotation.filter(x=>x!==p.id); if(from.pos) delete from.pos[p.id]; }
  p.teamId = wasAAA ? aaaIdOf(destMlbId) : destMlbId;
}
function ensureLineup(team, players){
  const ros = rosterOf2(players, team.id);
  team.lineup = team.lineup.filter(id=>players[id] && players[id].teamId===team.id && !players[id].isP);
  team.rotation = team.rotation.filter(id=>players[id] && players[id].teamId===team.id && players[id].isP);
  if(team.lineup.length<9 || team.rotation.length<5) autoSetLineups(team, players);
}
function rosterOf2(players, teamId){ return Object.values(players).filter(p=>p.teamId===teamId); }

// An AI club proposes a trade to the user: it covets one of the user's useful
// (not untouchable) MLB players and assembles a package of comparable value from
// players it can spare. Returns an offer object or null. Roughly fair — the user
// decides whether the fit is worth it.
function makeAITradeOffer(G){
  const meId=G.userTeamId;
  const userMlb = rosterOf(G, meId);
  if(userMlb.length<11) return null;
  const targets = userMlb.filter(p=>p.ovr>=58 && p.ovr<=84);
  if(!targets.length) return null;
  const target = pick(targets);
  const tval = playerValue(target);
  if(tval<3) return null;
  const other = pick(G.teams.filter(t=>t.id!==meId));
  const otherOrg = rosterOf(G, other.id).concat(rosterOf(G, aaaIdOf(other.id)));
  if(otherOrg.length<12) return null;
  // pieces they'd part with — but never a single player worth far more than the target
  // (no gutting their roster for a mid player). Build a package of comparable value.
  const spare = otherOrg.map(p=>({p,v:playerValue(p)})).filter(c=>c.v<=tval*1.12).sort((a,b)=>b.v-a.v);
  let give=[], acc=0;
  for(const c of spare){
    if(acc>=tval*0.97 || give.length>=3) break;
    if(acc+c.v<=tval*1.15){ give.push(c.p.id); acc+=c.v; }
  }
  if(acc < tval*0.90 || give.length===0) return null;   // couldn't put together a fair package
  return { fromId:other.id, get:[target.id], give, givePk:[], getPk:[], season:G.season, day:G.day };
}
// Execute an accepted offer: AI's `give` players come to the user; the user's
// `get` players go to the AI. Levels (MLB/AAA) are preserved; lineups refreshed.
function executeOffer(G, o){
  const meId=G.userTeamId, other=G.teams[o.fromId];
  o.give.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,meId); });
  o.get.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,o.fromId); });
  (o.givePk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=meId; });
  (o.getPk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=o.fromId; });
  ensureLineup(G.teams[meId], G.players); autoSetLineups(G.aaaTeams[meId], G.players);
  autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
}

const FA_SORTS = {
  ovr: (a,b)=>b.ovr-a.ovr,
  pot: (a,b)=>b.pot-a.pot,
  age: (a,b)=>a.age-b.age || b.ovr-a.ovr,
  ask: (a,b)=>salaryFor(b)-salaryFor(a),
  val: (a,b)=>playerValue(b)-playerValue(a),
};
function FreeAgency({G, commit, tShow}){
  const me=G.teams[G.userTeamId];
  const [pos,setPos]=useState("ALL");
  const [sort,setSort]=useState("ovr");
  // Make sure the AI market has been computed at least once so the user sees rival offers
  // (they bid first). Runs once per season when offers are missing — no render loop.
  useEffect(()=>{
    if(G.freeAgents.length && !G.freeAgents.some(id=>G.players[id] && G.players[id].bestOffer!==undefined)){
      refreshFAMarket(G); commit(G);
    }
  }, [G.season]);
  const userSit = useMemo(()=>teamSituation(G, G.userTeamId), [G.season, G.day]);
  const fas = G.freeAgents.map(id=>G.players[id]).filter(Boolean)
    .filter(p=>pos==="ALL" || (pos==="P"?p.isP:(!p.isP && p.pos===pos)))
    .sort(FA_SORTS[sort]||FA_SORTS.ovr);
  const space = me.budget - payroll(G,me.id);
  const [negotiate, setNegotiate] = useState(null);   // FA being signed via ContractModal
  const doSign=(p, aav, years, incentives)=>{
    setContract(p, aav, years, incentives);
    p.teamId=me.id; G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    p.bestOffer=null; p.offers=[];
    const incTot=incentivesPerYear(p);
    logNews(G,"signing",`${me.abbr} signed ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}${incTot?` +${money(incTot)}/yr inc`:""}`, me.id);
    ensureLineup(me,G.players); refreshFAMarket(G); setNegotiate(null); commit(G); tShow(`✅ Signed ${p.name}`);
  };
  // let the market move: rival clubs sign their best-fit targets (they may steal a guy you wanted)
  const advanceMarket=()=>{
    const n=processFAWave(G, 0.5);
    commit(G); tShow(n>0?`📝 ${n} free agent${n>1?"s":""} signed elsewhere`:"Market quiet — no one signed");
  };
  const waived = (G.waivers||[]).map(w=>({w, p:G.players[w.id]})).filter(x=>x.p && x.p.teamId==null);
  const claim=(p)=>{
    if(p.salary>space){ tShow(`Not enough cap space (need ${money(p.salary)})`); return; }
    p.teamId=me.id;
    G.waivers=(G.waivers||[]).filter(w=>w.id!==p.id);
    ensureLineup(me,G.players);
    logNews(G,"roster",`${me.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, me.id);
    commit(G); tShow(`✅ Claimed ${p.name}`);
  };
  if(!G.freeAgents.length && !waived.length) return <Card>No free agents or waiver players available right now. They appear when teams make cuts mid-season, or after the season when contracts expire.</Card>;
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Cap space:</span>
          <b className={space>=0?"text-emerald-400":"text-red-400"}>{money(space)}</b>
          <button onClick={advanceMarket} className="px-2 py-1 rounded text-xs bg-amber-600/80 hover:bg-amber-500 text-slate-900 font-semibold" title="Rival clubs sign their targets — act fast or lose players">⏵ Let rivals sign</button>
          <div className="ml-auto flex gap-1 flex-wrap">
            {["ALL","C","1B","2B","3B","SS","LF","CF","RF","DH","P"].map(x=>(
              <button key={x} onClick={()=>setPos(x)} className={"px-2 py-0.5 rounded text-xs "+(pos===x?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>{x}</button>
            ))}
          </div>
        </div>
        <p className="text-[11px] text-slate-500 mt-1">Rival clubs bid on free agents based on their needs &amp; budget — you'll see the top competing offer. To sign a player you must beat it (players weigh money, years, and a winning club). Hit <b>Let rivals sign</b> to advance the market.</p>
      </Card>
      {waived.length>0 && <Card className="border-sky-700/40">
        <div className="text-sm font-semibold text-sky-300 mb-1">📋 Waiver Wire <span className="text-slate-500 text-xs font-normal">({waived.length})</span></div>
        <p className="text-xs text-slate-400 mb-2">Players just cut by other clubs. You have first crack for ~2 days before rival teams (worst record first) can claim them.</p>
        <div className="overflow-x-auto max-h-64 overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th>Age</th><th>OVR</th><th>POT</th><th>From</th><th className="text-right">Salary</th><th></th></tr></thead>
            <tbody>
              {waived.map(({w,p})=>(
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td>
                  <td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-slate-400">{p.pot}</td>
                  <td className="text-center text-slate-500 text-xs">{G.teams[w.fromId]?G.teams[w.fromId].abbr:"—"}</td>
                  <td className="text-right">{money(p.salary)}</td>
                  <td className="text-right"><button onClick={()=>claim(p)} className="px-2 py-0.5 bg-sky-600 rounded text-xs hover:bg-sky-500">Claim</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>}
      {G.freeAgents.length>0 && (()=>{
        const arrow = k => sort===k ? " ▾" : "";
        const SortTh = ({k, label, cls=""}) => (
          <th className={cls}><button onClick={()=>setSort(k)} className={"hover:text-slate-200 "+(sort===k?"text-emerald-400 font-semibold":"")}>{label}{arrow(k)}</button></th>
        );
        return <Card>
        <div className="text-xs text-slate-500 mb-1">{fas.length} free agent{fas.length!==1?"s":""} · tap a column to sort</div>
        <div className="overflow-x-auto max-h-[70vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]">
              <th className="text-left">Pos</th><th className="text-left">Name</th>
              <SortTh k="age" label="Age"/><SortTh k="ovr" label="OVR"/><SortTh k="pot" label="POT"/>
              <SortTh k="val" label="Val"/><SortTh k="ask" label="Ask" cls="text-right"/><th className="text-right">Top Offer</th><th></th>
            </tr></thead>
            <tbody>
              {fas.map(p=>{ const bo=p.bestOffer, rt=bo?teamById(G,bo.teamId):null; return (
                <tr key={p.id} className="border-b border-[#15203a]">
                  <td className="text-slate-400">{p.pos}</td>
                  <td className="text-left"><PlayerLink p={p} className="font-medium"/></td>
                  <td className="text-center">{p.age}</td>
                  <td className="text-center"><OvrPill v={p.ovr}/></td>
                  <td className="text-center text-amber-300/90 font-semibold">{p.pot}</td>
                  <td className="text-center text-slate-400">{playerValue(p).toFixed(0)}</td>
                  <td className="text-right text-slate-400">~{money(salaryFor(p))}/yr</td>
                  <td className="text-right text-xs whitespace-nowrap">{bo&&rt?<span className="text-amber-300">{rt.abbr} {bo.years}y·{money(bo.aav)}</span>:<span className="text-slate-600">no bids</span>}</td>
                  <td className="text-right pl-2 whitespace-nowrap">
                    <button onClick={()=>setNegotiate(p)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500">Negotiate</button>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </Card>;
      })()}
      {negotiate && <ContractModal G={G} p={negotiate} mode="sign" capSpace={space} factor={1} refuses={false}
        bestOffer={negotiate.bestOffer} userSit={userSit}
        onClose={()=>setNegotiate(null)} onSign={(a,y,inc)=>doSign(negotiate,a,y,inc)} tShow={tShow} />}
    </div>
  );
}
