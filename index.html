function Standings({G}){
  const [selTeam, setSelTeam] = useState(null);
  const byDiv = standings(G.teams);
  const order = ["Empire East","Empire Central","Empire West","Pioneer East","Pioneer Central","Pioneer West"];
  const teamCell = t => (
    <button onClick={()=>setSelTeam(t)} className="text-left hover:text-emerald-300 hover:underline">{t.city} {t.nick}</button>
  );
  // wild-card race for a league: everyone who isn't leading their division, best record first.
  // The top 3 take the wild-card seeds (this league grants 3); a line marks the playoff cut.
  const wildCardRace = league => {
    const lt = G.teams.filter(t=>t.league===league);
    const byD={}; lt.forEach(t=>(byD[t.division]=byD[t.division]||[]).push(t));
    const winners=new Set();
    Object.values(byD).forEach(arr=>{ arr.sort((a,b)=>pct(b)-pct(a)); winners.add(arr[0].id); });
    return lt.filter(t=>!winners.has(t.id)).sort((a,b)=>pct(b)-pct(a));
  };
  const WILD = 2;   // wild-card spots per league (the two play-in teams)
  return (
    <div className="space-y-5">
      <div className="grid md:grid-cols-2 gap-4">
        {order.map(k=>(
          <Card key={k}>
            <h3 className="font-bold mb-2">{k}</h3>
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map((t,i)=>{
                  const lead=byDiv[k][0];
                  const gb=i===0?"—":(((lead.w-t.w)+(t.l-lead.l))/2).toFixed(1);
                  return (
                    <tr key={t.id} className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")}>
                      <td className="text-left py-1">{i===0&&<span className="text-amber-400 mr-1" title="division leader">★</span>}{teamCell(t)}</td>
                      <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                      <td className="text-center">{f3(pct(t))}</td><td className="text-center">{gb}</td>
                      <td className={"text-center "+((t.rs-t.ra)>=0?"text-emerald-400":"text-red-400")}>{t.rs-t.ra>=0?"+":""}{t.rs-t.ra}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        ))}
      </div>

      {/* Wild Card races — one per league */}
      <div className="grid md:grid-cols-2 gap-4">
        {["Empire","Pioneer"].map(league=>{
          const race = wildCardRace(league);
          const cut = race[WILD-1];   // last team currently holding a wild-card spot
          return (
            <Card key={league}>
              <h3 className="font-bold mb-1">Wild Card — <span className="text-sky-300">{league} League</span></h3>
              <p className="text-[11px] text-slate-500 mb-2">Top {WILD} non-division-leaders grab the wild cards and meet in a 1-game play-in. GB is games behind the final wild-card spot.</p>
              <table className="w-full text-sm tnum">
                <thead><tr className="text-slate-400 text-xs"><th className="text-left">Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr></thead>
                <tbody>
                  {race.slice(0,7).map((t,i)=>{
                    const inWC = i<WILD;
                    const gbNum = cut? (((cut.w-t.w)+(t.l-cut.l))/2) : 0;
                    const gb = i===WILD-1 ? "—" : (gbNum<=0 ? "+"+(-gbNum).toFixed(1) : gbNum.toFixed(1));
                    return (<React.Fragment key={t.id}>
                      <tr className={"border-t border-[#15203a] "+(t.id===G.userTeamId?"bg-emerald-900/30 font-semibold":"")+(inWC?" ":" text-slate-400")}>
                        <td className="text-left py-1">
                          {inWC && <span className="text-emerald-400 mr-1" title="in wild-card position">●</span>}
                          {teamCell(t)} <span className="text-slate-600 text-xs">{t.abbr}</span>
                        </td>
                        <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                        <td className="text-center">{f3(pct(t))}</td>
                        <td className={"text-center "+(inWC?"text-emerald-400":"text-slate-500")}>{gb}</td>
                      </tr>
                      {i===WILD-1 && <tr><td colSpan={5} className="border-t-2 border-dashed border-red-700/50 text-[10px] text-red-400/70 text-center py-0.5">playoff cut line</td></tr>}
                    </React.Fragment>);
                  })}
                </tbody>
              </table>
            </Card>
          );
        })}
      </div>

      {selTeam && <TeamRosterModal G={G} team={selTeam} onClose={()=>setSelTeam(null)} />}
    </div>
  );
}

/* ----------------------------- AAA league ------------------------------ */
// Scouting grade: ceiling matters most, then current ability, then youth (more
// time to develop = more valuable as a prospect).
function prospectGrade(p){ return p.pot*1.0 + p.ovr*0.45 + Math.max(0,24-p.age)*1.4; }
const prospectETA = p => p.ovr>=70?"ready":p.ovr>=63?"1 yr":p.ovr>=55?"2 yr":"3+ yr";
function AAALeague({G}){

  const prospects = Object.values(G.players)
    .filter(p=>p.teamId!=null && (isAAAId(p.teamId) || p.age<=22))
    .sort((a,b)=>prospectGrade(b)-prospectGrade(a)).slice(0,30);

              <thead><tr className="text-slate-400 text-xs"><th className="text-left">Affiliate</th><th>W</th><th>L</th><th>PCT</th><th>DIFF</th></tr></thead>
              <tbody>
                {byDiv[k].map(t=>(
                  <tr key={t.id} className={"border-t border-[#15203a] "+(t.id===aaaUserId?"bg-amber-900/20 font-semibold":"")}>
                    <td className="text-left py-1">{t.city} {t.nick}</td>
                    <td className="text-center">{t.w}</td><td className="text-center">{t.l}</td>
                    <td className="text-center">{f3(pct(t))}</td>

          <tbody>

/* ----------------------------- Leaders --------------------------------- */
function Leaders({G}){
  // MLB leaderboards only — exclude AAA players
  const all = Object.values(G.players).filter(p=>!isAAAId(p.teamId));
  // scale qualifier thresholds with games played so boards read right all season
  const gpMax = Math.max(1, ...G.teams.map(t=>t.w+t.l));
  const paQual = Math.max(20, round(gpMax*2.5));
  const outQual = Math.max(30, round(gpMax*1.5));
  const hitters = all.filter(p=>!p.isP && p.stats.PA>=paQual);
  const pitchers = all.filter(p=>p.isP && p.stats.OUT>=outQual);
  const tn = id => G.teams[id]?G.teams[id].abbr:"FA";
  const board = (title, list, fmt) => (
    <Card><h3 className="font-bold mb-2">{title}</h3>
      <table className="w-full text-sm tnum"><tbody>
        {list.map((p,i)=>(
          <tr key={p.id} className="border-b border-[#15203a]">
            <td className="text-slate-500 w-5">{i+1}</td>
            <td className="text-left">{p.name} <span className="text-slate-600 text-xs">{tn(p.teamId)}</span></td>
            <td className="text-right font-semibold">{fmt(p)}</td>
          </tr>
        ))}
      </tbody></table>
    </Card>
  );
  const top = (list, key, n=10) => [...list].sort((a,b)=>key(b)-key(a)).slice(0,n);
  const bot = (list, key, n=10) => [...list].sort((a,b)=>key(a)-key(b)).slice(0,n);
  return (
    <div className="grid md:grid-cols-3 gap-4">
      {board("AVG", top(hitters,p=>avg(p.stats)), p=>f3(avg(p.stats)))}
      {board("Home Runs", top(hitters,p=>p.stats.HR), p=>p.stats.HR)}
      {board("RBI", top(hitters,p=>p.stats.RBI), p=>p.stats.RBI)}
      {board("OBP", top(hitters,p=>obp(p.stats)), p=>f3(obp(p.stats)))}
      {board("SLG", top(hitters,p=>slg(p.stats)), p=>f3(slg(p.stats)))}
      {board("OPS", top(hitters,p=>ops(p.stats)), p=>f3(ops(p.stats)))}
      {board("Hits", top(hitters,p=>p.stats.H), p=>p.stats.H)}
      {board("Runs", top(hitters,p=>p.stats.R), p=>p.stats.R)}
      {board("Walks", top(hitters,p=>p.stats.BB), p=>p.stats.BB)}
      {board("Stolen Bases", top(hitters.filter(p=>p.stats.SB>0),p=>p.stats.SB), p=>p.stats.SB)}
      {board("ERA", bot(pitchers,p=>era(p.stats)), p=>f2(era(p.stats)))}
      {board("Innings", top(pitchers,p=>p.stats.OUT), p=>f1(ip(p.stats)))}
      {board("Strikeouts", top(pitchers,p=>p.stats.SO), p=>p.stats.SO)}
      {board("K − BB", top(pitchers,p=>p.stats.SO-p.stats.BB), p=>p.stats.SO-p.stats.BB)}
      {board("Wins", top(pitchers,p=>p.stats.W), p=>p.stats.W)}
      {board("Quality Starts", top(pitchers.filter(p=>p.stats.QS>0),p=>p.stats.QS), p=>p.stats.QS)}
      {board("Saves", top(pitchers.filter(p=>p.stats.SV>0),p=>p.stats.SV), p=>p.stats.SV)}
      {board("Holds", top(all.filter(p=>p.isP&&p.stats.HLD>0),p=>p.stats.HLD), p=>p.stats.HLD)}
      {board("WHIP", bot(pitchers,p=>whip(p.stats)), p=>f2(whip(p.stats)))}
    </div>
  );
}

/* ----------------------------- Schedule -------------------------------- */
function Schedule({G}){
  const uid2=G.userTeamId;
  const rivalId=G.teams[uid2].rivalId;
  const games=[];
  G.schedule.forEach((day,di)=>{ const g=day.find(x=>x.home===uid2||x.away===uid2); if(g) games.push({di,g}); });
  const offDays = G.schedule.length - games.length;
  return (
    <Card>
      <div className="flex items-baseline justify-between mb-2">
        <h3 className="font-bold">Season Schedule — {G.teams[uid2].name}</h3>
        <span className="text-xs text-slate-500">{games.length} games · {offDays} off days · <span className="text-rose-300">⚔ rival</span></span>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-1 text-sm">
        {games.map(({di,g})=>{
          const home=g.home===uid2; const opp=G.teams[home?g.away:g.home];
          const win=g.played?((home?g.hs>g.as:g.as>g.hs)?"W":"L"):null;
          const isRival = opp.id===rivalId;
          return (
            <div key={di} className={"flex items-center gap-2 px-2 py-1 rounded "+(di===G.day?"bg-emerald-900/40":isRival?"bg-rose-950/40 border border-rose-900/40":"bg-[#13203a]")}>
              <span className="text-slate-500 text-xs w-8">{di+1}</span>
              <span className="text-slate-400 text-xs w-6">{home?"vs":"@"}</span>
              <span className="flex-1 truncate">{isRival&&<span className="text-rose-400">⚔ </span>}{opp.abbr} {opp.nick}</span>
              {g.played && <span className={"text-xs font-bold "+(win==="W"?"text-emerald-400":"text-red-400")}>{win} {home?g.hs:g.as}-{home?g.as:g.hs}</span>}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

/* ----------------------------- Finances -------------------------------- */
// terms a player will re-sign for. winning teams get a hometown discount; losing
// teams pay a premium, and a star on a losing club would rather test free agency.
function extensionTerms(G, p){
  // for AAA players, resolve to the parent MLB team for win% discount logic
  const team = isAAAId(p.teamId) ? G.teams[parentIdOf(p.teamId)] : G.teams[p.teamId];
  // until there's a real sample of games, treat the club as neutral (.500)
  const wpct = (team && (team.w+team.l)>=20) ? pct(team) : 0.5;
  const market = salaryFor(p);
  const factor = clamp(1.18 - wpct*0.55, 0.80, 1.20);
  const salary = clamp(round(market*factor*10)/10, 0.7, 60);
  const years = p.age>=33 ? 2 : p.age>=30 ? 3 : 4;
  const refuses = wpct < 0.40 && p.ovr >= 75;
  return { market, salary, years, factor, refuses, discountPct: round((1-factor)*100) };
}

/* ---- Contract negotiation modal (sign a FA / extend your own player) ---- */
const DEFAULT_NEED = { HR:25, RBI:80, H:150, R:80, SB:25, AVG:290, W:14, SO:180, SV:30, QS:18, IP:180 };
function ContractModal({G, p, mode, capSpace, factor, refuses, onClose, onSign, tShow}){
  const ask=contractAsk(p);
  const [years,setYears]=useState(ask.years);
  const [aav,setAav]=useState(Math.max(0.5, round(ask.fairAAV*(factor||1)*10)/10));
  const [incs,setIncs]=useState([]);
  const isP=p.isP;
  const statOpts=Object.entries(STAT_INCENTIVES).filter(([k,v])=>v.hit!==isP);
  const addInc=()=>{ const d=statOpts[0]; setIncs([...incs,{stat:d[0], need:DEFAULT_NEED[d[0]]||10, amount:1.0}]); };
  const updInc=(i,k,v)=>{ const a=incs.slice(); a[i]={...a[i],[k]:v}; setIncs(a); };
  const delInc=(i)=>setIncs(incs.filter((_,j)=>j!==i));
  const incTotal=incs.reduce((s,x)=>s+(+x.amount||0),0);
  const required=requiredAAV(p, years, factor);
  const neededBase=Math.max(0.5, round((required-0.5*incTotal)*10)/10);
  const capProblem = mode==="sign" && +aav>capSpace+0.001;
  // he signs once the offer (base + half the incentives) meets his ask and it fits the cap
  const accepts = !refuses && +aav>=0.5 && willSign(p, +aav, years, incTotal, factor) && !capProblem;
  const inp="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm";
  const offer=()=>{
    if(refuses){ tShow&&tShow(`${p.name} wants to test free agency`); return; }
    if(capProblem){ tShow&&tShow(`Not enough cap space (base ${money(+aav)})`); return; }
    if(!accepts){ tShow&&tShow(`${p.name} wants more — try ~${money(neededBase)}/yr base`); return; }
    onSign(+aav, years, incs.map(x=>({stat:x.stat, need:+x.need, amount:+x.amount, label:(STAT_INCENTIVES[x.stat]||{}).label||"bonus"})));
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-lg w-full max-h-[88vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1">
            <div className="font-bold">{mode==="sign"?"Sign":"Extend"} {p.name}</div>
            <div className="text-xs text-slate-400">{p.pos} · Age {p.age} · OVR {p.ovr} · POT {p.pot} · seeks ~{money(ask.fairAAV*(factor||1))}/yr</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {refuses && <div className="text-sm text-red-300 bg-red-900/20 border border-red-800/40 rounded p-2 mb-2">He won't talk extension on a losing club — win more, or let him test free agency.</div>}
        <div className="grid grid-cols-2 gap-3 mb-3">
          <label className="text-xs text-slate-400">Years
            <div className="flex items-center gap-2 mt-1">
              <button onClick={()=>setYears(Math.max(1,years-1))} className="px-2 bg-[#16213a] rounded">−</button>
              <span className="tnum font-bold text-slate-100 w-6 text-center">{years}</span>
              <button onClick={()=>setYears(Math.min(8,years+1))} className="px-2 bg-[#16213a] rounded">+</button>
            </div>
          </label>
          <label className="text-xs text-slate-400">Salary $M/yr (base)
            <input type="number" step="0.1" min="0.5" value={aav} onChange={e=>setAav(e.target.value)} className={inp+" w-full mt-1"} />
          </label>
        </div>
        <div className="text-xs text-slate-400 mb-1 flex items-center justify-between">
          <span>Performance incentives <span className="text-slate-600">(off-cap; count ½ toward his ask)</span></span>
          <button onClick={addInc} className="px-2 py-0.5 bg-[#16213a] rounded hover:bg-[#1c2c4a] text-emerald-300">+ add</button>
        </div>
        <div className="space-y-1 mb-3">
          {incs.length===0 && <div className="text-xs text-slate-600">No incentives. Add stat bonuses to sweeten the deal for less guaranteed money.</div>}
          {incs.map((x,i)=>(
            <div key={i} className="flex items-center gap-1.5 text-xs bg-[#13203a] rounded px-2 py-1">
              <span className="text-emerald-400">+{money(+x.amount||0)}</span>
              <span className="text-slate-500">if</span>
              <select value={x.stat} onChange={e=>updInc(i,"stat",e.target.value)} className={inp}>
                {statOpts.map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
              <span className="text-slate-500">≥</span>
              <input type="number" value={x.need} onChange={e=>updInc(i,"need",e.target.value)} className={inp+" w-16"} />
              <span className="text-slate-500 ml-1">$</span>
              <input type="number" step="0.1" value={x.amount} onChange={e=>updInc(i,"amount",e.target.value)} className={inp+" w-14"} />
              <button onClick={()=>delInc(i)} className="ml-auto text-red-400 hover:text-red-300">×</button>
            </div>
          ))}
        </div>
        <div className="flex items-center justify-between text-sm border-t border-[#1d2940] pt-2 mb-2">
          <div className="text-slate-400 text-xs">
            Guaranteed <b className="text-slate-200">{money((+aav||0)*years)}</b> over {years}y
            {incTotal>0 && <span> · up to <b className="text-slate-200">{money(((+aav||0)+incTotal)*years)}</b> w/ incentives</span>}
          </div>
          <div className={accepts?"text-emerald-400 font-semibold":"text-amber-400"}>
            {refuses?"Refusing":accepts?"✅ He'll sign":capProblem?"⛔ Over budget":`💬 Wants ~${money(neededBase)}/yr`}
          </div>
        </div>
        <button onClick={offer} disabled={!accepts} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold disabled:opacity-40 disabled:cursor-not-allowed">
          {mode==="sign"?"Sign Contract":"Offer Extension"}
        </button>
      </div>
    </div>
  );
}

/* ---- Restructure modal: defer current-year money to later years (+premium) ---- */
function RestructureModal({G, p, onClose, onApply, tShow}){
  const cur=(p.contract||[p.salary]).slice();
  const laterYears=cur.length-1;
  const maxMove=Math.max(0, round((cur[0]-0.5)*10)/10);
  const [move,setMove]=useState(Math.round(maxMove*5)/10);  // default ~half
  const PREMIUM=0.10;
  const mv=clamp(+move||0, 0, maxMove);
  const deferred=mv*(1+PREMIUM);
  const perLater=laterYears>0?deferred/laterYears:0;
  const sched=cur.map((v,i)=> i===0 ? round((v-mv)*10)/10 : round((v+perLater)*10)/10);
  const apply=()=>{ if(laterYears<=0){ tShow&&tShow("Need 2+ years left to restructure"); return; } if(mv<=0){ tShow&&tShow("Move some money first"); return; } onApply(sched); };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-4 max-w-md w-full" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-2">
          <OvrPill v={p.ovr}/>
          <div className="flex-1"><div className="font-bold">Restructure {p.name}</div><div className="text-xs text-slate-400">Defer current-year salary to later years (+10% premium he pockets)</div></div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none">×</button>
        </div>
        {laterYears<=0 ? <div className="text-sm text-slate-400">He's in the last year of his deal — nothing to restructure.</div> : <>
          <label className="text-xs text-slate-400">Move from this year: <b className="text-slate-100">{money(mv)}</b> (max {money(maxMove)})</label>
          <input type="range" min="0" max={maxMove} step="0.1" value={mv} onChange={e=>setMove(e.target.value)} className="w-full my-2" />
          <div className="grid grid-cols-2 gap-3 text-sm mb-3">
            <div><div className="text-xs text-slate-500 mb-1">Now</div>{cur.map((v,i)=><div key={i} className="tnum">Yr{i+1}: {money(v)}</div>)}</div>
            <div><div className="text-xs text-slate-500 mb-1">After</div>{sched.map((v,i)=><div key={i} className={"tnum "+(i===0?"text-emerald-400":"text-slate-300")}>Yr{i+1}: {money(v)}</div>)}</div>
          </div>
          <div className="text-xs text-slate-400 mb-2">Frees <b className="text-emerald-400">{money(mv)}</b> in cap now · adds {money(deferred)} (incl. +{money(deferred-mv)} premium) to later years. Total +{money(deferred-mv)}.</div>
          <button onClick={apply} className="w-full py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold">Restructure (he agrees)</button>
        </>}
      </div>
    </div>
  );
}

/* ----------------------------- Trades ---------------------------------- */
function Trades({G, commit, tShow, tradeFocus, setTradeFocus}){
  const me = G.teams[G.userTeamId];
  const [otherId, setOtherId] = useState(G.teams.find(t=>t.id!==me.id).id);
  const [give, setGive] = useState([]);      // player ids
  const [get, setGet] = useState([]);
  const [givePk, setGivePk] = useState([]);  // pick ids
  const [getPk, setGetPk] = useState([]);
  const [modal, setModal] = useState(null);  // player whose stats we're viewing
  const other = G.teams[otherId];
  const reset = ()=>{ setGive([]); setGet([]); setGivePk([]); setGetPk([]); };

  // Arrive here from the Players tab's "Trade" button: pre-select that player's
  // club and drop him straight into the "acquire" list — no re-searching.
  useEffect(()=>{
    if(tradeFocus==null) return;
    const p = G.players[tradeFocus];
    if(p && p.teamId!=null){
      const orgId = isAAAId(p.teamId) ? parentIdOf(p.teamId) : p.teamId;
      if(orgId!==me.id){ setOtherId(orgId); setGive([]); setGivePk([]); setGetPk([]); setGet([p.id]); }
    }
    if(setTradeFocus) setTradeFocus(null);
  }, [tradeFocus]);

  // players: MLB roster + AAA affiliate, AAA tagged
  const orgPlayers = mlbId => rosterOf(G,mlbId).concat(rosterOf(G,aaaIdOf(mlbId))).sort((a,b)=>b.ovr-a.ovr);
  const myRos = orgPlayers(me.id), otRos = orgPlayers(other.id);
  const myPicks = (G.picks||[]).filter(pk=>pk.owner===me.id).sort((a,b)=>a.round-b.round);
  const otPicks = (G.picks||[]).filter(pk=>pk.owner===other.id).sort((a,b)=>a.round-b.round);
  const toggle=(arr,set,id)=>set(arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]);

  const giveVal = give.reduce((s,id)=>s+playerValue(G.players[id]),0) + givePk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:me.id}),0);
  const getVal  = get.reduce((s,id)=>s+playerValue(G.players[id]),0)  + getPk.reduce((s,id)=>s+pickValue(G,(G.picks||[]).find(p=>p.id===id)||{round:5,orig:other.id}),0);

  const deadlinePassed = G.phase==="regular" && G.day>G.tradeDeadline;
  const propose=()=>{
    if(deadlinePassed){ tShow("⛔ The trade deadline has passed"); return; }
    if(!give.length && !get.length && !givePk.length && !getPk.length){ tShow("Add players or picks to the trade"); return; }
    if(getVal===0){ tShow("Select something to acquire"); return; }
    if(giveVal >= getVal*0.97){
      give.forEach(id=>movePlayer(G, G.players[id], other.id));
      get.forEach(id=>movePlayer(G, G.players[id], me.id));
      givePk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=other.id; });
      getPk.forEach(id=>{ const pk=G.picks.find(p=>p.id===id); if(pk) pk.owner=me.id; });
      autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
      ensureLineup(me, G.players); autoSetLineups(G.aaaTeams[me.id], G.players);
      const getDesc = get.map(id=>G.players[id].name).concat(getPk.length?[`${getPk.length} pick${getPk.length>1?"s":""}`]:[]).join(", ");
      const giveDesc = give.map(id=>G.players[id].name).concat(givePk.length?[`${givePk.length} pick${givePk.length>1?"s":""}`]:[]).join(", ");
      logNews(G,"trade",`${me.abbr} acquired ${getDesc||"picks"} from ${other.abbr} for ${giveDesc||"picks"}`, me.id);
      reset(); commit(G); tShow("✅ Trade accepted!");
    } else {
      const need = (getVal*0.97 - giveVal);
      tShow(`❌ Rejected — ${other.nick} want ~${need.toFixed(0)} more value`);
    }
  };

  // a compact one-line stat summary so you can judge a player without leaving the trade
  const statLine = p => p.isP
    ? (p.stats.OUT ? `${f1(ip(p.stats))} IP · ${f2(era(p.stats))} ERA · ${p.stats.W||0}-${p.stats.L||0} · ${p.stats.SO||0}K` : "no stats yet")
    : (p.stats.AB ? `${f3(avg(p.stats))}/${f3(obp(p.stats))}/${f3(slg(p.stats))} · ${p.stats.HR||0} HR · ${p.stats.RBI||0} RBI` : "no stats yet");
  const playerBox = (title, ros, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      <div className="max-h-72 overflow-y-auto space-y-0.5">
        {ros.map(p=>(
          <div key={p.id} className={"flex items-center gap-2 px-2 py-1 rounded text-sm "+(sel.includes(p.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" className="shrink-0" checked={sel.includes(p.id)} onChange={()=>toggle(sel,set,p.id)} />
            <OvrPot p={p}/>
            <button onClick={()=>setModal(p)} className="flex-1 text-left min-w-0">
              <div className="truncate">{p.pos} {p.name} {isAAAId(p.teamId)&&<span className="text-amber-400 text-[10px] font-bold">AAA</span>} <span className="text-slate-500">ⓘ</span></div>
              <div className="text-[11px] text-slate-500 truncate">age {p.age} · {money(p.salary)} · val {playerValue(p).toFixed(0)} · {statLine(p)}</div>
            </button>
          </div>
        ))}
      </div>
    </Card>
  );
  const pickBox = (title, picks, sel, set) => (
    <Card>
      <div className="font-bold mb-2 text-sm">{title}</div>
      {picks.length? <div className="space-y-0.5">
        {picks.map(pk=>(
          <label key={pk.id} className={"flex items-center gap-2 px-2 py-1 rounded cursor-pointer text-sm "+(sel.includes(pk.id)?"bg-emerald-900/40":"hover:bg-[#13203a]")}>
            <input type="checkbox" checked={sel.includes(pk.id)} onChange={()=>toggle(sel,set,pk.id)} />
            <span className="flex-1">{pk.season} Round {pk.round}{pk.orig!==pk.owner?` (via ${G.teams[pk.orig].abbr})`:""}</span>
            <span className="text-emerald-400 text-xs">val {pickValue(G,pk)}</span>
          </label>
        ))}
      </div> : <div className="text-xs text-slate-500">No tradeable picks.</div>}
    </Card>
  );

  return (
    <div className="space-y-4">
      {deadlinePassed && <Card className="border-amber-600/60">
        <div className="text-sm text-amber-300 font-semibold">🔒 The trade deadline (Day {G.tradeDeadline+1}) has passed.</div>
        <div className="text-xs text-slate-400 mt-0.5">No more trades until the offseason. You can still browse rosters below.</div>
      </Card>}
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Trade with:</span>
          <select value={otherId} onChange={e=>{setOtherId(Number(e.target.value));setGet([]);setGetPk([]);}} className="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm">
            {G.teams.filter(t=>t.id!==me.id).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <div className="ml-auto text-xs text-slate-400">You give <b className="text-slate-200">{giveVal.toFixed(0)}</b> · You get <b className="text-slate-200">{getVal.toFixed(0)}</b></div>
        </div>
        <div className="text-xs text-slate-500 mt-1">Pick values reflect each team's projected finish — a pick from a struggling club is worth more.</div>
      </Card>
      <div className="grid md:grid-cols-2 gap-4">
        {playerBox(`Send from ${me.nick}`, myRos, give, setGive)}
        {playerBox(`Acquire from ${other.nick}`, otRos, get, setGet)}
        {pickBox(`${me.nick} picks to send`, myPicks, givePk, setGivePk)}
        {pickBox(`${other.nick} picks to acquire`, otPicks, getPk, setGetPk)}
      </div>
      <button onClick={propose} disabled={deadlinePassed} className="px-6 py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold disabled:opacity-40 disabled:cursor-not-allowed">{deadlinePassed?"Deadline Passed":"Propose Trade"}</button>
      {modal && <PlayerModal p={modal} team={teamById(G, modal.teamId)} onClose={()=>setModal(null)} />}
    </div>
  );
}
// move a player between organizations, preserving his MLB/AAA level and cleaning old lineup refs
function movePlayer(G, p, destMlbId){
  if(!p) return;
  const wasAAA = isAAAId(p.teamId);
  const from = teamById(G, p.teamId);
  if(from){ from.lineup=from.lineup.filter(x=>x!==p.id); from.rotation=from.rotation.filter(x=>x!==p.id); if(from.pos) delete from.pos[p.id]; }
  p.teamId = wasAAA ? aaaIdOf(destMlbId) : destMlbId;
}
function ensureLineup(team, players){
  const ros = rosterOf2(players, team.id);
  team.lineup = team.lineup.filter(id=>players[id] && players[id].teamId===team.id && !players[id].isP);
  team.rotation = team.rotation.filter(id=>players[id] && players[id].teamId===team.id && players[id].isP);
  if(team.lineup.length<9 || team.rotation.length<5) autoSetLineups(team, players);
}
function rosterOf2(players, teamId){ return Object.values(players).filter(p=>p.teamId===teamId); }

// An AI club proposes a trade to the user: it covets one of the user's useful
// (not untouchable) MLB players and assembles a package of comparable value from
// players it can spare. Returns an offer object or null. Roughly fair — the user
// decides whether the fit is worth it.
function makeAITradeOffer(G){
  const meId=G.userTeamId;
  const userMlb = rosterOf(G, meId);
  if(userMlb.length<11) return null;
  const targets = userMlb.filter(p=>p.ovr>=58 && p.ovr<=84);
  if(!targets.length) return null;
  const target = pick(targets);
  const tval = playerValue(target);
  if(tval<3) return null;
  const other = pick(G.teams.filter(t=>t.id!==meId));
  const otherOrg = rosterOf(G, other.id).concat(rosterOf(G, aaaIdOf(other.id)));
  if(otherOrg.length<12) return null;
  // pieces they'd part with — but never a single player worth far more than the target
  // (no gutting their roster for a mid player). Build a package of comparable value.
  const spare = otherOrg.map(p=>({p,v:playerValue(p)})).filter(c=>c.v<=tval*1.12).sort((a,b)=>b.v-a.v);
  let give=[], acc=0;
  for(const c of spare){
    if(acc>=tval*0.97 || give.length>=3) break;
    if(acc+c.v<=tval*1.15){ give.push(c.p.id); acc+=c.v; }
  }
  if(acc < tval*0.90 || give.length===0) return null;   // couldn't put together a fair package
  return { fromId:other.id, get:[target.id], give, givePk:[], getPk:[], season:G.season, day:G.day };
}
// Execute an accepted offer: AI's `give` players come to the user; the user's
// `get` players go to the AI. Levels (MLB/AAA) are preserved; lineups refreshed.
function executeOffer(G, o){
  const meId=G.userTeamId, other=G.teams[o.fromId];
  o.give.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,meId); });
  o.get.forEach(id=>{ const p=G.players[id]; if(p) movePlayer(G,p,o.fromId); });
  (o.givePk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=meId; });
  (o.getPk||[]).forEach(id=>{ const pk=(G.picks||[]).find(p=>p.id===id); if(pk) pk.owner=o.fromId; });
  ensureLineup(G.teams[meId], G.players); autoSetLineups(G.aaaTeams[meId], G.players);
  autoSetLineups(other, G.players); autoSetLineups(G.aaaTeams[other.id], G.players);
}

/* ----------------------------- Free Agency ----------------------------- */
function FreeAgency({G, commit, tShow}){
  const me=G.teams[G.userTeamId];
  const [pos,setPos]=useState("ALL");
  const fas = G.freeAgents.map(id=>G.players[id]).filter(Boolean)
    .filter(p=>pos==="ALL" || (pos==="P"?p.isP:(!p.isP && p.pos===pos)))
    .sort((a,b)=>b.ovr-a.ovr);
  const space = me.budget - payroll(G,me.id);
  const [negotiate, setNegotiate] = useState(null);   // FA being signed via ContractModal
  const doSign=(p, aav, years, incentives)=>{
    setContract(p, aav, years, incentives);
    p.teamId=me.id; G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    const incTot=incentivesPerYear(p);
    logNews(G,"signing",`${me.abbr} signed ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}${incTot?` +${money(incTot)}/yr inc`:""}`, me.id);
    ensureLineup(me,G.players); setNegotiate(null); commit(G); tShow(`✅ Signed ${p.name}`);
  };
  const waived = (G.waivers||[]).map(w=>({w, p:G.players[w.id]})).filter(x=>x.p && x.p.teamId==null);
  const claim=(p)=>{
    if(p.salary>space){ tShow(`Not enough cap space (need ${money(p.salary)})`); return; }
    p.teamId=me.id;
    G.waivers=(G.waivers||[]).filter(w=>w.id!==p.id);
    ensureLineup(me,G.players);
    logNews(G,"roster",`${me.abbr} claimed ${p.pos} ${p.name} (${p.ovr}) off waivers`, me.id);
    commit(G); tShow(`✅ Claimed ${p.name}`);
  };
  if(!G.freeAgents.length && !waived.length) return <Card>No free agents or waiver players available right now. They appear when teams make cuts mid-season, or after the season when contracts expire.</Card>;
  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-sm text-slate-400">Cap space:</span>
          <b className={space>=0?"text-emerald-400":"text-red-400"}>{money(space)}</b>

/* ----------------------------- Playoffs -------------------------------- */
const SERIES_LEN = { wc:1, ds:5, cs:7, ws:7 };   // wild card is a single play-in game
function mkSeries(hi, lo){ return { hi, lo, hw:0, lw:0, games:[], done:false, winner:null }; }

/* ----------------------------- awards ---------------------------------- */
// MVP / Player-of-the-Year score: rate stats × playing time + counting punch
function mvpScore(p){ const s=p.stats; if(!s.AB) return -999;
  const pt=clamp(s.PA/550,0,1.15);
  return ((ops(s)-0.300)*55)*pt + s.HR*0.6 + s.RBI*0.22 + s.R*0.14 + s.SB*0.08; }
// Cy Young score: ERA/WHIP × innings + strikeouts/wins/saves
function cyScore(p){ const s=p.stats; const ipv=s.OUT/3; if(ipv<10) return -999;
  const pt=clamp(ipv/170,0,1.15);
  return ((4.40-era(s))*20 + (1.28-whip(s))*30)*pt + s.SO*0.10 + s.W*1.6 + s.SV*0.8 + ipv*0.04; }
function bestBy(arr,fn){ return arr.reduce((b,p)=>(b==null||fn(p)>fn(b))?p:b,null); }
function awardLine(p){ const s=p.stats; return p.isP
  ? `${s.W}-${s.L}, ${s.OUT?f2(era(s)):"—"} ERA, ${s.SO} K${s.SV?`, ${s.SV} SV`:""}`
  : `${f3(avg(s))}/${f3(obp(s))}/${f3(slg(s))}, ${s.HR} HR, ${s.RBI} RBI`; }
function addAccolade(p,season,award,league){ (p.accolades=p.accolades||[]).push({season,award,league}); }
// Hand out season awards (run at end of the regular season, before stats reset).
function computeAwards(G){
  const recOf=p=>p?{id:p.id,name:p.name,pos:p.pos,team:(teamById(G,p.teamId)||{}).abbr||"",ovr:p.ovr,line:awardLine(p)}:null;
  const out={season:G.season, leagues:{}};
  ["Empire","Pioneer"].forEach(lg=>{
    const pool=Object.values(G.players).filter(p=>{const t=teamById(G,p.teamId);return t&&!t.aaa&&t.league===lg;});
    const hitters=pool.filter(p=>!p.isP), pitchers=pool.filter(p=>p.isP);
    const mvp=bestBy(hitters,mvpScore), cy=bestBy(pitchers,cyScore);
    const asHit=[];
    ["C","1B","2B","3B","SS","LF","CF","RF","DH"].forEach(pos=>{
      const poolPos = pos==="DH" ? hitters.filter(p=>!asHit.includes(p))
                                 : hitters.filter(p=>p.pos===pos && !asHit.includes(p));
      const b=bestBy(poolPos,mvpScore); if(b) asHit.push(b);
    });
    const asPit=[...pitchers].sort((a,b)=>cyScore(b)-cyScore(a)).slice(0,6);
    out.leagues[lg]={ mvp:recOf(mvp), cy:recOf(cy), allStars:{hitters:asHit.map(recOf), pitchers:asPit.map(recOf)} };
    if(mvp){ addAccolade(mvp,G.season,"MVP",lg); logNews(G,"award",`🏅 ${mvp.name} won the ${lg} League MVP`, mvp.teamId); }
    if(cy){ addAccolade(cy,G.season,"Cy Young",lg); logNews(G,"award",`🏅 ${cy.name} won the ${lg} League Cy Young`, cy.teamId); }
    asHit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
    asPit.forEach(p=>addAccolade(p,G.season,"All-Star",lg));
  });
  G.awards=out;
  (G.awardHistory=G.awardHistory||[]).unshift(out);
  if(G.awardHistory.length>40) G.awardHistory.pop();
}

// Update each franchise's all-time, single-season record book. Run at season end
// (in enterPlayoffs, before stats reset). Each record is {value, holder, season}.
function recordFranchiseRecords(G){
  G.teams.forEach(t=>{
    const rec = t.records = t.records || {};
    const up = (key,value,holder)=>{ if(value==null||value<=0) return; if(!rec[key]||value>rec[key].value) rec[key]={value,holder,season:G.season}; };
    const lo = (key,value,holder)=>{ if(value==null) return; if(!rec[key]||value<rec[key].value) rec[key]={value,holder,season:G.season}; };
    up("teamWins", t.w, t.name);
    const ros = Object.values(G.players).filter(p=>p.teamId===t.id);
    const hitters = ros.filter(p=>!p.isP && p.stats.PA>=300);
    const pitchers = ros.filter(p=>p.isP && p.stats.OUT>=120);
    const bestH=(fn,key)=>{ const b=hitters.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(key,fn(b),b.name); };
    bestH(p=>p.stats.HR,"HR"); bestH(p=>p.stats.RBI,"RBI"); bestH(p=>p.stats.H,"H");
    bestH(p=>p.stats.R,"R"); bestH(p=>p.stats.SB,"SB"); bestH(p=>+avg(p.stats).toFixed(3),"AVG");
    const bestP=(fn,key)=>{ const b=pitchers.reduce((a,c)=>(!a||fn(c)>fn(a))?c:a,null); if(b) up(key,fn(b),b.name); };
    bestP(p=>p.stats.W,"pW"); bestP(p=>p.stats.SO,"pK"); bestP(p=>p.stats.SV,"pSV");
    const bERA=pitchers.reduce((a,c)=>(!a||era(c.stats)<era(a.stats))?c:a,null); if(bERA) lo("ERA",+era(bERA.stats).toFixed(2),bERA.name);
  });
}

function enterPlayoffs(G){
  computeAwards(G);   // hand out hardware while season stats are still live
  recordFranchiseRecords(G);   // update the all-time record book before stats reset
  payIncentives(G);   // settle stat-based contract bonuses (off-cap)
  G.phase="playoffs";
  const mk = league => {
    const seeds = playoffSeeds(G.teams, league).map(t=>t.id);
    // wild-card play-in (single game): the two wild cards (seeds 4 & 5) play once,
    // higher seed hosts; winner becomes the 4th team. Seeds 1-3 (div winners) wait.
    return { seeds, wc:[ mkSeries(seeds[3], seeds[4]) ], ds:null, cs:null };
  };
  G.playoffs = { Empire: mk("Empire"), Pioneer: mk("Pioneer"), round:"wc", wsWinner:null, ws:null };
}

function seriesGame(G, hiId, loId, hiHome){
  const home = hiHome? G.teams[hiId]:G.teams[loId];
  const away = hiHome? G.teams[loId]:G.teams[hiId];
  const r = simGame(home, away, G.players);
  markGamesPlayed(home, away, G.players);
  const winnerId = r.hs>r.as?home.id:away.id;
  return { winnerId, hs:r.hs, as:r.as, homeId:home.id, awayId:away.id };
}

// play a single game in one series (2-2-1 home pattern), updating its W tally
function playoffSeriesGame(G, s, bestOf){
  if(s.done) return;
  const need = Math.ceil(bestOf/2);
  const hiHome = s.games.length<2 || s.games.length>=4;
  const res = seriesGame(G, s.hi, s.lo, hiHome);
  if(res.winnerId===s.hi) s.hw++; else s.lw++;
  s.games.push(res);
  if(s.hw>=need){ s.done=true; s.winner=s.hi; }
  else if(s.lw>=need){ s.done=true; s.winner=s.lo; }
}

// the series currently being contested in this round
function activeSeriesList(po){
  if(po.round==="wc") return [...po.Empire.wc, ...po.Pioneer.wc];
  if(po.round==="ds") return [...po.Empire.ds, ...po.Pioneer.ds];
  if(po.round==="cs") return [po.Empire.cs, po.Pioneer.cs];
  if(po.round==="ws") return po.ws?[po.ws]:[];
  return [];
}

// once a round's series are all decided, build the next round's matchups
function buildNextRound(G){
  const po=G.playoffs;
  if(po.round==="wc"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg];
      // #1 seed draws the wild-card play-in winner; #2 and #3 meet in the other series
      b.ds=[ mkSeries(b.seeds[0], b.wc[0].winner), mkSeries(b.seeds[1], b.seeds[2]) ];
    });
    po.round="ds";
  } else if(po.round==="ds"){
    ["Empire","Pioneer"].forEach(lg=>{ const b=po[lg]; b.cs=mkSeries(b.ds[0].winner, b.ds[1].winner); });
    po.round="cs";
  } else if(po.round==="cs"){
    po.ws=mkSeries(po.Empire.cs.winner, po.Pioneer.cs.winner); po.round="ws";
  } else if(po.round==="ws"){
    if(po.wsWinner!=null) return;          // already crowned — guard against double-click
    po.wsWinner=po.ws.winner; G.champion={id:po.ws.winner, season:G.season};
    G.champions = G.champions||[];
    if(!G.champions.some(c=>c.season===G.season)) G.champions.push({season:G.season, id:po.ws.winner});
    logNews(G,"champ",`🏆 ${G.teams[po.ws.winner].name} won the ${G.season} World Series!`, po.ws.winner);
    startOffseason(G);
  }
}

function Playoffs({G, commit, tShow}){
  const po=G.playoffs;
  if(!po) return <Card>No active postseason.</Card>;
  const tn = id => G.teams[id];
  const round = po.round;
  const bestOf = SERIES_LEN[round] || 7;
  const active = activeSeriesList(po);
  const allDone = active.length>0 && active.every(s=>s.done);
  const roundName = {wc:"Wild Card",ds:"Division Series",cs:"League Championship",ws:"World Series"}[round];
  const nextName = {wc:"Division Series",ds:"League Championship",cs:"World Series"}[round];
  const userSeries = active.find(s=>s.hi===G.userTeamId||s.lo===G.userTeamId);

  const simGameStep = ()=>{ active.forEach(s=>{ if(!s.done) playoffSeriesGame(G,s,bestOf); }); commit(G); };
  const simRound = ()=>{ let guard=0; while(active.some(s=>!s.done) && guard<80){ active.forEach(s=>{ if(!s.done) playoffSeriesGame(G,s,bestOf); }); guard++; } commit(G); };
  const nextRound = ()=>{ buildNextRound(G); commit(G); if(po.round==="ws"||G.phase==="offseason") tShow("🏆 Champions crowned!"); };

  // one series row with its running W tally and game-by-game line scores
  const SeriesView = ({title, s, len})=>{
    if(!s) return null;
    const hiT=tn(s.hi), loT=tn(s.lo), isUser=s.hi===G.userTeamId||s.lo===G.userTeamId;
    return (
      <div className={"rounded px-2 py-1 "+(isUser?"bg-emerald-900/25 border border-emerald-800/50":"bg-[#13203a]")}>
        <div className="flex items-center gap-2 text-sm">
          <span className="text-slate-500 text-xs w-10">{title}</span>
          <span className={"flex-1 truncate "+(s.winner===s.hi?"font-bold text-emerald-400":"")}>{hiT?hiT.abbr+" "+hiT.nick:"—"}</span>
          <span className="tnum font-bold w-12 text-center">{s.hw}–{s.lw}</span>
          <span className={"flex-1 text-right truncate "+(s.winner===s.lo?"font-bold text-emerald-400":"")}>{loT?loT.abbr+" "+loT.nick:"—"}</span>
        </div>
        {s.games.length>0 && <div className="flex flex-wrap gap-1 mt-1 pl-12">
          {s.games.map((g,i)=>{
            const hiSc = g.homeId===s.hi? g.hs : g.as, loSc = g.homeId===s.lo? g.hs : g.as;
            const hiWon = g.winnerId===s.hi;
            return <span key={i} title={"Game "+(i+1)}
              className={"text-[10px] rounded px-1 tnum "+(hiWon?"bg-emerald-900/50 text-emerald-200":"bg-[#0b1220] text-slate-300")}>
              G{i+1} {hiSc}-{loSc}</span>;
          })}
          {!s.done && <span className="text-[10px] text-slate-500 px-1">best of {len} · {Math.ceil(len/2)-Math.max(s.hw,s.lw)} to clinch</span>}
        </div>}
      </div>
    );
  };

  return (
    <div className="space-y-4">
      <Card>
        <div className="flex items-center justify-between flex-wrap gap-2">
          <h3 className="font-bold">Postseason — {G.season} <span className="text-slate-400 font-normal">· {roundName}</span></h3>
          <div className="flex gap-2">
            {!po.wsWinner && !allDone && <>
              <button onClick={simGameStep} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Sim Next Game →</button>
              <button onClick={simRound} className="px-3 py-2 bg-[#16213a] rounded-lg hover:bg-[#1c2c4a] text-sm">Sim Whole {roundName}</button>
            </>}
            {!po.wsWinner && allDone && <button onClick={nextRound} className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">
              {round==="ws"?"Crown Champion 🏆":"Advance to "+nextName+" →"}</button>}
          </div>
        </div>
        {userSeries && <div className="text-xs text-emerald-300 mt-2">
          Your series: {tn(userSeries.hi).abbr} vs {tn(userSeries.lo).abbr} — {userSeries.done? (userSeries.winner===G.userTeamId?"you advance! ✅":"eliminated") : `${userSeries.hi===G.userTeamId?userSeries.hw:userSeries.lw}–${userSeries.hi===G.userTeamId?userSeries.lw:userSeries.hw}`}
        </div>}
      </Card>

      {po.wsWinner && <Card className="text-center">
        <div className="text-4xl mb-2">🏆</div>
        <div className="text-2xl font-black text-emerald-400">{tn(po.wsWinner).name}</div>
        <div className="text-slate-400">are your {G.season} World Champions!</div>
        <p className="text-slate-400 text-sm mt-2">Head to the Hub to run the offseason and start next year.</p>
      </Card>}

      <div className="grid md:grid-cols-2 gap-4">
        {["Empire","Pioneer"].map(lg=>{
          const b=po[lg];
          return (
            <Card key={lg}>
              <div className="font-bold text-emerald-300 mb-2">{lg} League</div>
              <div className="space-y-1">
                <div className="text-xs text-slate-500">Wild Card (1-game play-in)</div>
                {b.wc.map((m,i)=><SeriesView key={i} title="WC" s={m} len={1}/>)}
                {b.ds && <><div className="text-xs text-slate-500 mt-2">Division Series (Bo5)</div>
                  {b.ds.map((m,i)=><SeriesView key={i} title={"DS"+(i+1)} s={m} len={5}/>)}</>}

        <SeriesView title="WS" s={po.ws} len={7}/></Card>}
    </div>
  );
}

/* ----------------------------- Offseason ------------------------------- */
function startOffseason(G){
  G.phase="offseason";
  G.offStep = "intro";
}

function OffseasonHub({G, commit, tShow, setTab}){
  const champ = G.champion? G.teams[G.champion.id]:null;
  const step = G.offStep||"intro";

  const doProgression = ()=>{
    Object.values(G.players).forEach(p=>{
      recordSeasonHistory(p, G.season);   // log the year that just ended (team[s], stats) before aging
      const before = p.ovr;
      p.age++;
      // Directed development: young players climb toward their potential; prospects in
      // AAA grow faster; performers (esp. promoted early) keep climbing; older players decline.
      const gap = p.pot - p.ovr;            // remaining room to ceiling
      const perf = seasonPerf(p);           // how he played this year
      let center;
      if(p.age<=23)      center = 1.5 + gap*0.16;            // fast risers
      else if(p.age<=26) center = 0.6 + gap*0.11;
      else if(p.age<=28) center = 0.05 + gap*0.05;           // last bit of growth, then peak
      else if(p.age<=30) center = -0.5;                      // gentle decline begins
      else if(p.age<=33) center = -1.1 - (p.age-30)*0.25;
      else               center = -2.2 - (p.age-33)*0.4;     // age cliff
      if(isAAAId(p.teamId) && p.age<=25) center += 1.2;      // minors development boost
      // performance: young producers develop faster, vets who rake age gracefully, busts stall
      if(p.age<=27) center += perf.score * perf.weight * 1.6;
      else          center += perf.score * perf.weight * 0.7;
      center = clamp(center, -5, 4.5);
      const each = r=>{ if(p[r]!==undefined) p[r]=clamp(round(p[r]+gauss(center,1.2)),20,99); };
      (p.isP?["stu","ctl","stm"]:["con","pow","eye","spd","def"]).forEach(each);
      computeOvr(p);
      if(p.ovr > (p.peakOvr||0)) p.peakOvr = p.ovr;   // remember career-best OVR (for HoF)
      // a young breakout can raise his ceiling; everyone's ceiling erodes once past their prime
      if(p.age<=25 && (p.ovr>p.pot || (perf.score>0.7 && chance(0.5))))
        p.pot = clamp(Math.max(p.ovr, p.pot+rint(0,3)), p.ovr, 99);
      else if(p.age>=29) p.pot = Math.max(p.ovr, p.pot-1);
      p._lastDelta = p.ovr - before;        // for the offseason development report
      // reset season stats -> career
      mergeCareer(p);
      // a signed contract is fixed by its schedule — don't re-price it here
    });
    // retirements: driven by BOTH age and quality. Good players hang on (a 35+ vet who's
    // still ~62 OVR keeps grinding); washed-up players quit much earlier the older they get.
    // A stable per-player longevity factor adds variety so careers don't all end at once.
    const retired=[];
    Object.values(G.players).forEach(p=>{
      let retP;
      if(p.age<32) retP = 0;          // nobody retires young — careers end from age & decline only
      else {
        retP = (p.age-31)*0.06;                 // age ramp: 32→.06, 35→.24, 39→.48, 42→.66
        retP -= ((p.ovr-60)/100)*1.4;           // quality: stars (>60) hang on, scrubs (<60) leave sooner
        if(p.ovr<55) retP += (p.age-33)*0.05;   // genuinely bad + getting old → push them out
      }
      const lng = 0.78 + ((p.id*2654435761>>>0)%1000)/2273;   // ~0.78–1.22, stable per player
      retP = clamp(retP*lng, 0, 0.95);
      if(p.age>=44) retP = Math.max(retP, 0.9);                // almost nobody plays past 44
      if(chance(retP)){ retired.push(p.id); }
    });
    const retiredLog=[];
    retired.forEach(id=>{
      const p=G.players[id]; const t=teamById(G, p.teamId);
      inductIfWorthy(G, p);                  // great careers enter the Hall of Fame on retirement
      if(t){ t.lineup=t.lineup.filter(x=>x!==id); t.rotation=t.rotation.filter(x=>x!==id); if(t.pos) delete t.pos[id]; }
      G.freeAgents=G.freeAgents.filter(x=>x!==id);
      const tName=t?(t.aaa?G.teams[parentIdOf(t.id)].abbr:t.abbr):"FA";
      logNews(G,"roster",`${p.name} (${p.pos}, ${p.ovr} OVR, age ${p.age}) retired`, t?t.id:null);
      if(t && (t.id===G.userTeamId || t.id===aaaIdOf(G.userTeamId)))
        retiredLog.push({n:p.name, ovr:p.ovr, age:p.age, pos:p.pos});
      delete G.players[id];
    });
    // advance each rostered contract one year (drop the season just played), then expire to FA.
    // Free agents keep their ask intact — their "contract" is a demand, not a deal in progress.
    Object.values(G.players).forEach(p=>{
      if(p.teamId==null){ ensureContract(p); return; }
      if(Array.isArray(p.contract) && p.contract.length) p.contract.shift();
      p.years = Array.isArray(p.contract) ? p.contract.length : Math.max(0, (p.years||1)-1);
      if(Array.isArray(p.contract) && p.contract.length){ p.salary = p.contract[0]; p.incentive = incentivesPerYear(p); }
    });
    const expiredLog=[];
    Object.values(G.players).forEach(p=>{
      if(p.years<=0 && p.teamId!=null){
        // AAA prospects stay under org control until 28 (they're cheap, haven't hit arb yet)
        if(isAAAId(p.teamId) && p.age<28){ setContract(p, p.salary||0.7, rint(2,4), []); return; }
        const t=teamById(G, p.teamId);
        if(t){ t.lineup=t.lineup.filter(x=>x!==p.id); t.rotation=t.rotation.filter(x=>x!==p.id); if(t.pos) delete t.pos[p.id]; }
        logNews(G,"roster",`${p.name} (${p.pos}, ${p.ovr} OVR) contract expired — now a free agent`, t?t.id:null);
        if(t && (t.id===G.userTeamId || t.id===aaaIdOf(G.userTeamId)))
          expiredLog.push({n:p.name, ovr:p.ovr, age:p.age, pos:p.pos});
        p.teamId=null; setContract(p, salaryFor(p), rint(1,4), []);
        if(!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id);
      }
    });
    G._lastOffseasonDepartures = { retired: retiredLog, expired: expiredLog };
    G.offStep="draft-build";
    buildDraft(G);
    commit(G);
    tShow("Players aged & contracts processed");
  };

  if(step==="intro"){
    return (
      <div className="space-y-4">
        {champ && <Card className="text-center">
          <div className="text-3xl mb-1">🏆</div>
          <div className="text-xl font-black text-emerald-400">{champ.name}</div>

  }
  // draft-build or later
  const orgIds=[G.userTeamId, aaaIdOf(G.userTeamId)];
  const dev=Object.values(G.players).filter(p=>orgIds.includes(p.teamId) && p._lastDelta!=null);
  const risers=[...dev].sort((a,b)=>b._lastDelta-a._lastDelta).slice(0,6).filter(p=>p._lastDelta>0);
  const fallers=[...dev].sort((a,b)=>a._lastDelta-b._lastDelta).slice(0,6).filter(p=>p._lastDelta<0);

      <OvrPill v={p.ovr}/>
      <span className="flex-1 truncate">{p.pos} {p.name} <span className="text-slate-500 text-xs">{p.age}{isAAAId(p.teamId)?" · AAA":""}</span></span>
      <span className={"tnum font-semibold "+(p._lastDelta>0?"text-emerald-400":"text-red-400")}>{p._lastDelta>0?"+":""}{p._lastDelta}</span>
    </div>
  );
  const dep = G._lastOffseasonDepartures || {retired:[], expired:[]};
  return (
    <div className="space-y-4">
      {(dep.retired.length>0 || dep.expired.length>0) && <Card className="border-amber-700/40">
        <h3 className="font-bold mb-2 text-amber-300">⚠ Org Departures</h3>
        {dep.retired.length>0 && <div className="mb-2">
          <div className="text-xs font-semibold text-slate-400 mb-1">Retired</div>
          <div className="space-y-0.5">
            {dep.retired.map((p,i)=><div key={i} className="flex items-center gap-2 text-sm"><OvrPill v={p.ovr}/><span className="flex-1">{p.pos} {p.n} <span className="text-slate-500 text-xs">age {p.age}</span></span><span className="text-slate-400 text-xs">retired</span></div>)}
          </div>
        </div>}
        {dep.expired.length>0 && <div>
          <div className="text-xs font-semibold text-slate-400 mb-1">Contract expired → Free Agent</div>
          <div className="space-y-0.5">
            {dep.expired.map((p,i)=><div key={i} className="flex items-center gap-2 text-sm"><OvrPill v={p.ovr}/><span className="flex-1">{p.pos} {p.n} <span className="text-slate-500 text-xs">age {p.age}</span></span><button onClick={()=>setTab("fa")} className="text-xs text-emerald-400 hover:text-emerald-300">Re-sign →</button></div>)}
          </div>
        </div>}

      {(risers.length||fallers.length)>0 && <Card>
        <h3 className="font-bold mb-1">Player Development — {G.season} → {G.season+1}</h3>

        <div className="grid sm:grid-cols-2 gap-4">
          <div><div className="text-xs text-emerald-300 font-semibold mb-1">📈 Risers</div><div className="space-y-1">{risers.length?risers.map(devRow):<div className="text-slate-500 text-sm">—</div>}</div></div>

            className="px-4 py-2 bg-emerald-500 text-slate-900 rounded-lg font-semibold">Start {G.season+1} Season →</button>

/* ----------------------------- Hall of Fame ---------------------------- */
const HOF_THRESHOLD = 175;
// a career score weighing counting stats plus a strong bonus for peak greatness,
// so only players who were genuinely elite (not just long-lived) get in.
function hofScore(p){
  const c=p.career||{}; const peak=p.peakOvr||p.ovr||0;
  const peakBonus = Math.max(0, peak-75)*4;
  if(p.isP){
    const ip=(c.OUT||0)/3;
    return (c.W||0)*1.1 + (c.SV||0)*0.7 + (c.SO||0)*0.018 + ip*0.03 + peakBonus;
  }
  return (c.HR||0)*0.45 + (c.H||0)*0.035 + (c.RBI||0)*0.032 + (c.SB||0)*0.12 + (c.R||0)*0.02 + peakBonus;
}
function inductIfWorthy(G, p){
  if(hofScore(p) < HOF_THRESHOLD) return;
  G.hof = G.hof || [];
  const lt = (p.teamId!=null && !isAAAId(p.teamId) && G.teams[p.teamId]) ? G.teams[p.teamId].abbr
           : (p._yrTeams && p._yrTeams.length ? p._yrTeams[p._yrTeams.length-1] : "");
  G.hof.push({
    name:p.name, pos:p.pos, isP:p.isP, peakOvr:p.peakOvr||p.ovr,
    age:p.age, inducted:G.season, lastTeam:lt,
    seasons:(p.history?p.history.length:0),
    score:round(hofScore(p)),
    career:Object.assign({}, p.career||{}),
  });
}

// snapshot the season that just ended into per-year history (with team[s] played for),
// then clear the year's team tags. Call BEFORE aging/development so age & OVR reflect the season.
function recordSeasonHistory(p, season){
  flushLevel(p);                                  // bank the final stint to its level
  const ls = p._levelStats || {};
  const yt = p._yrTeams || [];
  // team labels carry a " AAA" suffix for minor-league stints; split them by level
  const teamsFor = lvl => yt.filter(t => / AAA$/.test(t) === (lvl==="AAA"));
  p.history = p.history||[];
  // one row per level actually played — so a season split MLB/AAA produces two rows
  ["MLB","AAA"].forEach(lvl=>{
    const st = ls[lvl]; if(!st) return;
    const played = p.isP ? (st.OUT>0) : (st.PA>0);
    if(!played) return;
    p.history.push({ season, age:p.age, ovr:p.ovr, isP:p.isP, level:lvl,
      teams: teamsFor(lvl), stats: Object.assign({}, st) });
  });
  while(p.history.length>40) p.history.shift();    // ~20 yrs even if every year is split
  p._yrTeams=[]; p._levelStats=null; p._levelSnap=null;
}
function mergeCareer(p){
  const c=p.career, s=p.stats;
  Object.keys(s).forEach(k=>{ c[k]=(c[k]||0)+s[k]; });
  p.stats = p.isP?emptyPitStats():emptyHitStats();
}
// At season end, settle stat-based incentives. They're off-cap (don't count toward the
// in-season payroll), but the owner really pays them — so earned bonuses come out of the
// team's budget, leaving less to spend the following year.
function payIncentives(G){
  G.teams.forEach(t=>{ t.incentivesPaid = 0; });
  Object.values(G.players).forEach(p=>{
    if(!p.incentives || !p.incentives.length || p.teamId==null || isAAAId(p.teamId)) return;
    const t=G.teams[p.teamId]; if(!t) return;
    let earned=0; const hits=[];
    p.incentives.forEach(inc=>{
      const def=STAT_INCENTIVES[inc.stat];
      const got = def ? def.get(p.stats) : (inc.stat==="_flat"?inc.need:0);
      const met = inc.stat==="_flat" ? true : (got>=(inc.need||0));
      if(met){ earned+=inc.amount||0; hits.push(def?def.label:"bonus"); }
    });
    if(earned>0){
      t.incentivesPaid += earned;
      t.budget = clamp(round((t.budget - earned)*10)/10, 70, 290);   // owner pays — less budget next year
      if(p.teamId===G.userTeamId)
        logNews(G,"signing",`${t.abbr} paid ${p.name} ${money(earned)} in incentives (${hits.join(", ")}) — off this year's budget`, p.teamId);
    }
  });
}

function buildDraft(G){
  // generate draft class: 5 rounds * 30 picks = 150 young prospects
  const cls=[];
  for(let i=0;i<150;i++){
    let p;
    if(chance(0.45)) p=makePitcher(chance(0.6)?"SP":"RP",[18,22]);
    else p=makeHitter(pick(INF_OF.concat(["DH"])),[18,22]);
    // prospects: lower current, boosted potential
    p.teamId=null; setContract(p, 0.7, 4, []);
    cls.push(p.id); G.players[p.id]=p;
  }
  // selection order from owned picks: by round, then the ORIGINAL team's
  // reverse-standings slot (so traded picks keep their original draft value)
  const worstFirst=[...G.teams].sort((a,b)=>pct(a)-pct(b)).map(t=>t.id);
  const slotOf=id=>worstFirst.indexOf(id);
  G.draftPicks=[...G.picks].sort((a,b)=> a.round-b.round || slotOf(a.orig)-slotOf(b.orig));
  G.draftPick=0;
  G.draftClass=cls.sort((a,b)=>G.players[b].pot-G.players[a].pot);
}

function Draft({G, commit, tShow, setTab}){
  const picksArr = G.draftPicks||[];
  if(!picksArr.length)
    return <Card>The draft isn't ready yet — process the offseason from the Hub first.</Card>;
  const totalPicks = picksArr.length;

  if(G.draftPick>=totalPicks){
    return <Card><div className="font-bold mb-2">✅ Draft complete</div>
      <p className="text-sm text-slate-300">Your picks report to your <b>AAA affiliate</b> (check the Roster → AAA section, then call up whoever's ready). Head to Free Agency or start the season from the Hub.</p></Card>;
  }

  const curPick = picksArr[G.draftPick];
  const onClock = curPick.owner;
  const round = curPick.round;
  const traded = curPick.owner!==curPick.orig;
  const isUser = onClock===G.userTeamId;
  const avail = G.draftClass.map(id=>G.players[id]).filter(Boolean);
  const pickInRound = picksArr.slice(0,G.draftPick).filter(p=>p.round===round).length+1;

  const assign=(g,pid,ownerId)=>{ const p=g.players[pid]; if(!p) return;        // draftees start in AAA
    const pk=(g.draftPicks||[])[g.draftPick]||{};
    p.draftInfo={ year:g.season+1, round:pk.round||0, overall:g.draftPick+1,
                  by:(g.teams[ownerId]?g.teams[ownerId].abbr:ownerId) };
    p.teamId=aaaIdOf(ownerId); };
  const draftPlayer=(pid)=>{
    if(!G.players[pid]) return;
    const p=G.players[pid];
    logNews(G,"draft",`${G.teams[onClock].abbr} drafted ${p.pos} ${p.name} (POT ${p.pot}) — Rd ${round}, #${G.draftPick+1}`, onClock);
    assign(G,pid,onClock);
    G.draftClass=G.draftClass.filter(x=>x!==pid);
    G.draftPick++; commit(G);
  };
  const aiPick=()=>{ const best=G.draftClass[0]; if(best!=null) draftPlayer(best); };
  const simToMe=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && picksArr[g.draftPick].owner!==g.userTeamId && guard<totalPicks){
      const best=g.draftClass[0]; if(best==null) break;
      assign(g,best,picksArr[g.draftPick].owner);
      g.draftClass=g.draftClass.filter(x=>x!==best); g.draftPick++; guard++;
    }
    commit(g);
  };
  const simAll=()=>{
    const g=G; let guard=0;
    while(g.draftPick<totalPicks && guard<totalPicks+5){
      const best=g.draftClass[0]; if(best==null) break;
      assign(g,best,picksArr[g.draftPick].owner);
      g.draftClass=g.draftClass.filter(x=>x!==best); g.draftPick++; guard++;
    }
    g.teams.forEach(t=>trimRoster(g,t));
    g.aaaTeams.forEach(t=>autoSetLineups(t,g.players)); // draftees joined AAA
    commit(g); tShow("Draft complete");
  };

  const myUpcoming = picksArr.filter((pk,i)=>i>=G.draftPick && pk.owner===G.userTeamId).length;

  return (
    <div className="space-y-3">
      <Card>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="text-sm">Round <b>{round}</b> · Pick <b>{pickInRound}</b> · Overall <b>{G.draftPick+1}</b>/{totalPicks}</div>
          <div className={"px-2 py-0.5 rounded text-sm font-semibold "+(isUser?"bg-emerald-500 text-slate-900":"bg-[#16213a]")}>
            On the clock: {G.teams[onClock].name}{isUser?" (YOU)":""}{traded?` (via ${G.teams[curPick.orig].abbr})`:""}
          </div>
          <div className="ml-auto flex gap-2">
            {setTab && <button onClick={()=>setTab("trades")} className="px-3 py-1 bg-amber-700 hover:bg-amber-600 rounded text-sm font-semibold">⇄ Trade Picks</button>}
            {!isUser && <button onClick={aiPick} className="px-3 py-1 bg-[#16213a] rounded text-sm">Next Pick</button>}
            <button onClick={simToMe} className="px-3 py-1 bg-[#16213a] rounded text-sm">Sim to My Pick</button>
            <button onClick={simAll} className="px-3 py-1 bg-[#16213a] rounded text-sm">Sim Rest</button>
          </div>
        </div>
      </Card>

      <div className="grid lg:grid-cols-3 gap-3">
        {/* best available — takes 2/3 on wide screens */}
        <Card className="lg:col-span-2">
          <div className="text-xs text-slate-400 mb-1">Best Available ({avail.length})</div>
          <div className="overflow-x-auto max-h-[65vh] overflow-y-auto">
            <table className="w-full text-sm tnum">
              <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940]"><th className="text-left">Pos</th><th className="text-left">Name</th><th>Age</th><th>OVR</th><th>POT</th>{isUser&&<th></th>}</tr></thead>
              <tbody>
                {avail.slice(0,60).map(p=>(
                  <tr key={p.id} className="border-b border-[#15203a]">
                    <td className="text-slate-400">{p.pos}</td><td className="text-left">{p.name}</td>
                    <td className="text-center">{p.age}</td><td className="text-center"><OvrPill v={p.ovr}/></td>
                    <td className="text-center text-amber-300 font-semibold">{p.pot}</td>
                    {isUser&&<td className="text-right"><button onClick={()=>draftPlayer(p.id)} className="px-2 py-0.5 bg-emerald-600 rounded text-xs hover:bg-emerald-500">Draft</button></td>}
                  </tr>

          </div>
        </Card>

        {/* draft order sidebar */}
        <Card>
          <div className="flex items-center justify-between mb-1">
            <div className="text-xs text-slate-400 font-semibold">Draft Order</div>
            <div className="text-[11px] text-emerald-400">{myUpcoming} of your picks left</div>
          </div>
          {setTab && <button onClick={()=>setTab("trades")} className="w-full mb-2 px-2 py-1 bg-amber-700 hover:bg-amber-600 rounded text-xs font-semibold">⇄ Propose a pick trade</button>}
          <div className="max-h-[60vh] overflow-y-auto space-y-0.5 text-sm tnum">
            {picksArr.map((pk,i)=>{
              const done=i<G.draftPick, cur=i===G.draftPick, mine=pk.owner===G.userTeamId;
              const t=G.teams[pk.owner];
              return (
                <div key={i} className={"flex items-center gap-2 px-2 py-1 rounded "+
                  (cur?"bg-emerald-500/20 ring-1 ring-emerald-500":mine?"bg-emerald-900/25":done?"opacity-40":"bg-[#0e1830]")}>
                  <span className="text-slate-500 text-xs w-9 shrink-0">#{i+1}</span>
                  <span className="text-slate-600 text-[10px] w-7 shrink-0">R{pk.round}</span>
                  <span className={"flex-1 truncate "+(mine?"text-emerald-300 font-semibold":"")}>
                    {cur&&<span className="text-emerald-400">▸ </span>}{t?t.abbr:"?"} {t?t.nick:""}
                    {pk.owner!==pk.orig && <span className="text-slate-500 text-[10px]"> (via {G.teams[pk.orig]?G.teams[pk.orig].abbr:"?"})</span>}
                  </span>
                  {mine&&!done&&<span className="text-emerald-400 text-[10px] font-bold shrink-0">YOU</span>}
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}

const ROSTER_CAP = 32;
const AAA_CAP = 38;     // affiliates hold prospects but still need a ceiling
function trimRoster(G, team, cap=ROSTER_CAP){
  let ros=rosterOf(G,team.id).sort((a,b)=>b.ovr-a.ovr);
  // cap roster size (keep the best by OVR); supports the deeper 30-man rosters
  while(ros.length>cap){
    const cut=ros.pop();
    cut.teamId=null; if(!G.freeAgents.includes(cut.id)) G.freeAgents.push(cut.id);
  }
}
// Keep the free-agent pool (and thus the whole player dict) from growing without
// bound across seasons — sim speed scales with total player count. Keep the best
// ~220 free agents; delete the rest from the game entirely.
function pruneFreeAgents(G, keepN=220){
  if(!G.freeAgents || G.freeAgents.length<=keepN) return;
  const ranked = G.freeAgents.map(id=>G.players[id]).filter(Boolean).sort((a,b)=>playerValue(b)-playerValue(a));
  const keep = new Set(ranked.slice(0,keepN).map(p=>p.id));
  ranked.slice(keepN).forEach(p=>{ delete G.players[p.id]; });
  G.freeAgents = G.freeAgents.filter(id=>keep.has(id) && G.players[id]);
}

function startNewSeason(G){
  // AI free agency: each AI team fills to ~26 and addresses cap
  G.teams.forEach(t=>{
    if(t.id===G.userTeamId) return;
    let ros=rosterOf(G,t.id);
    let guard=0;
    while(ros.length<28 && G.freeAgents.length && guard<80){
      // pick best affordable FA
      const space=t.budget-payroll(G,t.id);
      const cand=G.freeAgents.map(id=>G.players[id]).filter(p=>p&&p.salary<=Math.max(space,1)).sort((a,b)=>b.ovr-a.ovr)[0];
      if(!cand) break;
      cand.teamId=t.id; G.freeAgents=G.freeAgents.filter(id=>id!==cand.id);
      ros=rosterOf(G,t.id); guard++;
    }
    aiAlignOrg(G, t.id);          // promote the org's best to the bigs before trimming/lineups
    trimRoster(G,t);
    autoSetLineups(t, G.players);
  });
  // make sure user roster is valid for play
  const me=G.teams[G.userTeamId];
  ensureLineup(me, G.players);
  // AAA rosters changed (draft, call-ups/send-downs) — cap depth, top up thin affiliates
  // to a fieldable, prospect-developing minimum, then refresh lineups
  G.aaaTeams.forEach(t=>{ trimRoster(G, t, AAA_CAP); refillRoster(G, t.id, 12, 9, [19,26], -6); });
  G.aaaTeams.forEach(t=>autoSetLineups(t, G.players));
  // sweep any orphaned teamless players (e.g. leftover draft class, stray cuts) into
  // the FA pool, then prune — keeps the player dict bounded so sim speed stays flat.
  Object.values(G.players).forEach(p=>{ if(p.teamId==null && !G.freeAgents.includes(p.id)) G.freeAgents.push(p.id); });
  pruneFreeAgents(G);
  // archive the season that just finished into each team's record history
  const champId = G.champion ? G.champion.id : null;
  const empSeeds = playoffSeeds(G.teams,"Empire").map(t=>t.id);
  const pioSeeds = playoffSeeds(G.teams,"Pioneer").map(t=>t.id);
  G.teams.forEach(t=>{
    t.history = t.history||[];
    const made = (t.league==="Empire"?empSeeds:pioSeeds).includes(t.id);
    const champ = t.id===champId;
    t.history.push({ season:G.season, w:t.w, l:t.l, made, champ });
    // revenue/budget evolves with success — winning fills seats — but regresses gently
    // toward a market mean so a dynasty can't run the payroll away forever.
    const wp=(t.w+t.l)?t.w/(t.w+t.l):0.5;
    let delta=(wp-0.5)*0.45; if(made) delta+=0.04; if(champ) delta+=0.05;
    const old=t.budget;
    t.budget=clamp(round(t.budget*(1+delta) - (t.budget-160)*0.06), 95, 290);
    t.budgetDelta=t.budget-old;
    if(t.id===G.userTeamId && t.budgetDelta!==0)
      logNews(G,"signing",`${t.abbr} ${t.budgetDelta>0?"revenue up":"budget tightens"} — payroll budget ${t.budgetDelta>0?"+":""}${t.budgetDelta} to ${money(t.budget)}`, t.id);
  });
  // reset records & stats (MLB + AAA)
  G.teams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0; });
  G.aaaTeams.forEach(t=>{ t.w=0;t.l=0;t.rs=0;t.ra=0; });
  G.schedule = buildSchedule(G.teams);
  G.aaaSchedule = buildSchedule(G.aaaTeams);
  padSchedules(G.schedule, G.aaaSchedule);
  G.day=0; G.season++; G.phase="regular";
  G.playoffs=null; G.draftClass=[]; G.draftPicks=[]; G.draftPick=0; G.offStep=null;
  G.picks = buildPicks(G.season+1, G.teams);   // next year's tradeable picks
  G.tradeDeadline = Math.round(G.schedule.length*0.58);   // recompute for the new calendar
  G.tradeOffers = [];                                      // pending offers don't carry over
  (G.waivers||[]).forEach(w=>{ const p=G.players[w.id]; if(p&&p.teamId==null&&!G.freeAgents.includes(p.id)) G.freeAgents.push(p.id); });
  G.waivers = [];                                          // anyone still on the wire clears to FA
}

  );

// view toggle for Players tab: "ratings" shows attributes, "stats" shows season stats
function PlayersBrowser({G, commit, tShow, setTab, setTradeFocus}){
  const [q,setQ]=useState(""); const [teamF,setTeamF]=useState("ALL"); const [levelF,setLevelF]=useState("ALL");
  const [posF,setPosF]=useState("ALL"); const [ageMin,setAgeMin]=useState(""); const [ageMax,setAgeMax]=useState("");
  const [sortK,setSortK]=useState("ovr"); const [view,setView]=useState("ratings");
  const [modal,setModal]=useState(null);
  const [signTarget,setSignTarget]=useState(null);   // FA negotiate modal
  const [extendTarget,setExtendTarget]=useState(null); // extension modal
  const me=G.teams[G.userTeamId];
  const space=me.budget-payroll(G,me.id);
  const lvlOf=p=>p.teamId==null?"FA":(isAAAId(p.teamId)?"AAA":"MLB");
  const orgOf=p=>p.teamId==null?null:(isAAAId(p.teamId)?parentIdOf(p.teamId):p.teamId);
  const all=Object.values(G.players);
  let rows=all.filter(p=>{
    if(q && !p.name.toLowerCase().includes(q.toLowerCase())) return false;
    const lvl=lvlOf(p);
    if(levelF!=="ALL" && lvl!==levelF) return false;
    if(teamF==="FA"){ if(lvl!=="FA") return false; }
    else if(teamF!=="ALL"){ if(orgOf(p)!==Number(teamF)) return false; }
    if(posF==="P"){ if(!p.isP) return false; }
    else if(posF==="H"){ if(p.isP) return false; }
    else if(posF!=="ALL"){ if(p.pos!==posF) return false; }
    const amin=ageMin?Number(ageMin):0, amax=ageMax?Number(ageMax):99;
    if(p.age<amin||p.age>amax) return false;
    return true;
  });
  const sorters={ ovr:(a,b)=>b.ovr-a.ovr, pot:(a,b)=>b.pot-a.pot, age:(a,b)=>a.age-b.age,
    name:(a,b)=>a.name.localeCompare(b.name), salary:(a,b)=>b.salary-a.salary, value:(a,b)=>playerValue(b)-playerValue(a),
    hr:(a,b)=>(b.stats.HR||0)-(a.stats.HR||0), avg:(a,b)=>avg(b.stats)-avg(a.stats),
    era:(a,b)=>((a.isP&&a.stats.OUT)?era(a.stats):99)-((b.isP&&b.stats.OUT)?era(b.stats):99),
    ops:(a,b)=>ops(b.stats)-ops(a.stats), rbi:(a,b)=>(b.stats.RBI||0)-(a.stats.RBI||0),
    sb:(a,b)=>(b.stats.SB||0)-(a.stats.SB||0), so:(a,b)=>(b.stats.SO||0)-(a.stats.SO||0),
    sv:(a,b)=>(b.stats.SV||0)-(a.stats.SV||0), ip:(a,b)=>(b.stats.OUT||0)-(a.stats.OUT||0) };
  const total=rows.length; rows=[...rows].sort(sorters[sortK]||sorters.ovr).slice(0,400);
  const plbl=p=>{ const t=teamById(G,p.teamId); return t?(t.abbr+(t.aaa?" AAA":"")):"FA"; };
  const sel="bg-[#0b1220] border border-[#1d2940] rounded px-2 py-1 text-sm";

  // actions from the players browser
  const doSign=(p,aav,years,incs)=>{
    setContract(p,aav,years,incs); p.teamId=me.id; G.freeAgents=G.freeAgents.filter(id=>id!==p.id);
    ensureLineup(me,G.players);
    logNews(G,"signing",`${me.abbr} signed ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}`, me.id);
    setSignTarget(null); commit(G); tShow(`✅ Signed ${p.name}`);
  };
  const doExtend=(p,aav,years,incs)=>{
    setContract(p,aav,years,incs);
    logNews(G,"signing",`${me.abbr} extended ${p.pos} ${p.name} (${p.ovr}) — ${contractLabel(p)}`, me.id);
    setExtendTarget(null); commit(G); tShow(`✅ ${p.name} extended`);
  };
  // trade: we store the target in localStorage and open the Trades tab pre-loaded
  const [tradeTarget,setTradeTarget]=useState(null);   // player we want to acquire

  const isMine=p=>p.teamId===me.id || p.teamId===aaaIdOf(me.id);
  const isFA=p=>p.teamId==null;
  const isOtherMLB=p=>!isMine(p)&&!isFA(p)&&p.teamId!=null&&!isAAAId(p.teamId);

  // stat columns for ratings vs stats view
  const hitRatCols=[["CON","con"],["POW","pow"],["EYE","eye"],["SPD","spd"],["DEF","def"]];
  const pitRatCols=[["STU","stu"],["CTL","ctl"],["STM","stm"]];
  const hitStaCols=[["G","G"],["AB","AB"],["H","H"],["HR","HR"],["RBI","RBI"],["SB","SB"],["BB","BB"],["SO","SO"],["AVG",p=>f3(avg(p.stats))],["OBP",p=>f3(obp(p.stats))],["SLG",p=>f3(slg(p.stats))],["OPS",p=>f3(ops(p.stats))]];
  const pitStaCols=[["G","G"],["GS","GS"],["W","W"],["L","L"],["SV","SV"],["QS",p=>p.stats.QS||0],["HLD",p=>p.stats.HLD||0],["IP",p=>p.stats.OUT?f1(ip(p.stats)):"—"],["ERA",p=>p.stats.OUT?f2(era(p.stats)):"—"],["WHIP",p=>p.stats.OUT?f2(whip(p.stats)):"—"],["K",p=>p.stats.SO||0]];

  const colVal=(col,p)=>{ if(typeof col[1]==="function") return col[1](p); const k=col[1]; return p.stats?.[k]??p[k]??"—"; };

  // detect whether all rows are pitchers / all hitters or mixed (pick columns accordingly)
  const allP=rows.every(p=>p.isP), allH=rows.every(p=>!p.isP), mixed=!allP&&!allH;
  const ratCols=allP?pitRatCols:hitRatCols;
  const staCols=allP?pitStaCols:hitStaCols;
  const dispCols=view==="ratings"?ratCols:staCols;

  return (
    <div className="space-y-3">
      {/* filter bar */}

        <div className="flex flex-wrap gap-2 items-center">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search name…" className={sel+" flex-1 min-w-[120px]"} />
          <select value={teamF} onChange={e=>setTeamF(e.target.value)} className={sel}>
            <option value="ALL">All teams</option>
            {G.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            <option value="FA">Free Agents</option>
          </select>
          <select value={levelF} onChange={e=>setLevelF(e.target.value)} className={sel}>
            <option value="ALL">All levels</option><option value="MLB">MLB</option><option value="AAA">AAA</option><option value="FA">FA</option>
          </select>
          <select value={posF} onChange={e=>setPosF(e.target.value)} className={sel}>
            <option value="ALL">All pos</option><option value="H">Hitters</option><option value="P">Pitchers</option>
            {["C","1B","2B","3B","SS","LF","CF","RF","DH","SP","RP"].map(x=><option key={x} value={x}>{x}</option>)}
          </select>
          <input value={ageMin} onChange={e=>setAgeMin(e.target.value)} placeholder="min age" type="number" className={sel+" w-16"} />
          <span className="text-slate-500 text-xs">–</span>
          <input value={ageMax} onChange={e=>setAgeMax(e.target.value)} placeholder="max age" type="number" className={sel+" w-16"} />
          <select value={sortK} onChange={e=>setSortK(e.target.value)} className={sel}>
            <option value="ovr">Sort: OVR</option><option value="pot">POT</option><option value="value">Value</option>
            <option value="age">Age</option><option value="salary">Salary</option><option value="name">Name</option>
            <option value="hr">HR</option><option value="avg">AVG</option><option value="ops">OPS</option>
            <option value="rbi">RBI</option><option value="sb">SB</option>
            <option value="era">ERA</option><option value="so">K</option><option value="sv">SV</option><option value="ip">IP</option>
          </select>
          <div className="flex rounded overflow-hidden border border-[#1d2940] text-xs">
            <button onClick={()=>setView("ratings")} className={"px-2 py-1 "+(view==="ratings"?"bg-emerald-500 text-slate-900 font-semibold":"bg-[#16213a] text-slate-300")}>Ratings</button>
            <button onClick={()=>setView("stats")} className={"px-2 py-1 "+(view==="stats"?"bg-emerald-500 text-slate-900 font-semibold":"bg-[#16213a] text-slate-300")}>Stats</button>
          </div>
        </div>
        <div className="text-xs text-slate-500 mt-1">{total} players{total>400?" · showing first 400":""}</div>
      </Card>

      {/* main table */}
      <Card>
        <div className="overflow-x-auto max-h-[72vh] overflow-y-auto">
          <table className="w-full text-sm tnum">
            <thead><tr className="text-slate-400 text-xs border-b border-[#1d2940] sticky top-0 bg-[#101a30]">

              <th className="text-left">Team</th>

                const mine=isMine(p), fa=isFA(p), otherML=isOtherMLB(p);
                const etTerms=mine&&p.years<=2?extensionTerms(G,p):null;
                return (
                  <tr key={p.id} className={"border-b border-[#15203a] hover:bg-[#13203a]"+(mine?" bg-emerald-900/10":"")}>

                    <td className="text-center text-slate-500 text-xs">{lvlOf(p)}</td>

                    <td className="text-center"><OvrPill v={p.ovr}/></td>

                    {!mixed && dispCols.map(c=><td key={c[0]} className="text-center">{colVal(c,p)}</td>)}

                      {(otherML || (mine&&!fa)) && G.phase==="regular"&&G.day<=G.tradeDeadline && (
                        <button onClick={()=>setTradeTarget(p)} className="px-2 py-0.5 bg-amber-700 hover:bg-amber-600 rounded text-xs ml-1">Trade</button>
                      )}

        </div>
      </Card>

      {/* trade intent mini-panel: pre-loads a target into state then opens trades tab */}
      {tradeTarget && (()=>{
        const other = tradeTarget.teamId!=null && !isAAAId(tradeTarget.teamId) ? G.teams[tradeTarget.teamId] : null;
        return (
          <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={()=>setTradeTarget(null)}>
            <div className="bg-[#101a30] border border-[#1d2940] rounded-xl p-5 max-w-sm w-full" onClick={e=>e.stopPropagation()}>
              <div className="font-bold mb-2">Start a trade for {tradeTarget.name}?</div>
              <div className="text-sm text-slate-300 mb-4">
                {other ? `Owned by ${other.name}. Jump to the Trades tab with them pre-selected.` : `This is your player. Go to Trades to offer him out.`}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>{ if(setTradeFocus) setTradeFocus(tradeTarget.id); if(setTab) setTab("trades"); setTradeTarget(null); }} className="flex-1 py-2 bg-emerald-500 text-slate-900 rounded-lg font-bold">Open Trades →</button>
                <button onClick={()=>setTradeTarget(null)} className="px-4 py-2 bg-[#16213a] rounded-lg">Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}

      {modal && <PlayerModal p={modal} team={teamById(G, modal.teamId)} onClose={()=>setModal(null)} />}
      {signTarget && <ContractModal G={G} p={signTarget} mode="sign" capSpace={space} factor={1} refuses={false}
        onClose={()=>setSignTarget(null)} onSign={(a,y,inc)=>doSign(signTarget,a,y,inc)} tShow={tShow} />}
      {extendTarget && <ContractModal G={G} p={extendTarget} mode="extend" capSpace={space+extendTarget.salary}
        factor={extensionTerms(G,extendTarget).factor} refuses={extensionTerms(G,extendTarget).refuses}
        onClose={()=>setExtendTarget(null)} onSign={(a,y,inc)=>doExtend(extendTarget,a,y,inc)} tShow={tShow} />}
    </div>
  );
}

/* ----------------------------- mount ----------------------------------- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  (function(){
    try {
      var src = document.getElementById("app-src").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      (0, eval)(out);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<pre style="color:#f87171;padding:16px;white-space:pre-wrap">App failed to start:\n' +
        (e && (e.message || e)) + '</pre>';
      console.error(e);
    }
  })();
</script>
</body>
</html>
